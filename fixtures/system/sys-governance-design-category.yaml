    author: fixture-seed
    change_summary: v2 with reversibility and blast-radius framing
    status: active
    raw_prose: |
      Rules that apply when the task touches design work — architecture, API
      contracts, data models, interface shapes.
    fragments:
      - fragment_id: sys-governance-design-category-v2-f1
        fragment_type: guardrail
        sequence: 1
        content: |
          Prefer reversible decisions. If a proposed design makes a later
          change expensive, document the tradeoff explicitly before committing
          to the path.
      - fragment_id: sys-governance-design-category-v2-f2
        fragment_type: rationale
        sequence: 2
        content: |
          Most design errors are caught by articulating the blast radius of a
          change before it ships. A one-paragraph risk statement per
          non-trivial interface change pays for itself many times over.
