# Upstream documentation registry for skill authoring (R1 source step).
#
# Tiers:
#   tier-1: both llms.txt (index) and llms-full.txt (source) available.
#           Use llms.txt to enumerate skill briefs, llms-full.txt to source fragments.
#   tier-2: llms.txt only. Use it as a curated URL list; fetch the specific pages
#           it points to for fragment source.
#   tier-3: neither. Fall back to manual fetch flow (today's R1).
#
# Probed 2026-05-04. Re-probe before each authoring batch; sites add llms.txt frequently.
#
# Field semantics:
#   llms_url        — index URL (lists what this vendor documents)
#   llms_full_url   — full concatenated docs URL (R1 source replacement)
#   packs           — existing skill-source/_packs/ that map to this vendor (informational)
#   notes           — caveats: alternate paths, partial coverage, license

