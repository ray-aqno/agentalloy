language: Rust
version_anchor: Rust stable (1.83+)
generated_at: 2026-05-01
canonical:
  language_reference: https://doc.rust-lang.org/reference/index.html
  library_reference: https://doc.rust-lang.org/std/index.html
  spec_or_standard: https://doc.rust-lang.org/reference/index.html
  release_notes: https://blog.rust-lang.org/
topics:
  concurrency_and_async:
    description: Send/Sync traits, async/await syntax, and std thread/channel primitives
    urls:
      - https://doc.rust-lang.org/std/thread/index.html
      - https://doc.rust-lang.org/std/sync/index.html
      - https://doc.rust-lang.org/reference/expressions/await-expr.html
      - https://doc.rust-lang.org/book/ch16-00-concurrency.html
      - https://doc.rust-lang.org/std/future/trait.Future.html
  error_handling_and_exceptions:
    description: Result, Option, ? operator, and From/Into for error conversion
    urls:
      - https://doc.rust-lang.org/std/result/index.html
      - https://doc.rust-lang.org/std/option/index.html
      - https://doc.rust-lang.org/reference/expressions/operator-expr.html#the-question-mark-operator
      - https://doc.rust-lang.org/book/ch09-00-error-handling.html
  typing_and_generics:
    description: Trait bounds, associated types, lifetime annotations, and const generics
    urls:
      - https://doc.rust-lang.org/book/ch10-00-generics.html
      - https://doc.rust-lang.org/reference/trait-bounds.html
      - https://doc.rust-lang.org/reference/items/associated-items.html
  memory_and_performance:
    description: Ownership, borrowing, lifetimes, and the Nomicon for unsafe
    urls:
      - https://doc.rust-lang.org/book/ch04-00-understanding-ownership.html
      - https://doc.rust-lang.org/nomicon/index.html
      - https://doc.rust-lang.org/reference/expressions/block-expr.html#unsafe-blocks
      - https://doc.rust-lang.org/std/alloc/index.html
  packaging_and_dependency_management:
    description: Cargo.toml, features, workspaces, and crates.io
    urls:
      - https://doc.rust-lang.org/cargo/index.html
      - https://doc.rust-lang.org/cargo/reference/manifest.html
      - https://doc.rust-lang.org/cargo/reference/features.html
      - https://doc.rust-lang.org/cargo/reference/workspaces.html
  testing_idioms:
    description: Built-in test framework, #[test], #[cfg(test)], and integration tests
    urls:
      - https://doc.rust-lang.org/book/ch11-00-testing.html
      - https://doc.rust-lang.org/reference/attributes/testing.html
      - https://doc.rust-lang.org/cargo/guide/tests.html
  security_and_crypto_primitives:
    description: No stdlib crypto; secure patterns use constant-time comparisons in std
    urls:
      - https://doc.rust-lang.org/std/hint/fn.black_box.html
      - https://rust-lang.github.io/api-guidelines/
  io_and_filesystem:
    description: std::io traits, std::fs, BufReader/BufWriter, and Read/Write traits
    urls:
      - https://doc.rust-lang.org/std/io/index.html
      - https://doc.rust-lang.org/std/fs/index.html
      - https://doc.rust-lang.org/std/io/trait.Read.html
      - https://doc.rust-lang.org/std/io/trait.Write.html
  networking_and_http_client:
    description: std::net for TCP/UDP; HTTP requires third-party crates (known gap)
    urls:
      - https://doc.rust-lang.org/std/net/index.html
  serialization_json_binary:
    description: No stdlib JSON; serde is community standard but not in std
    urls:
      - https://doc.rust-lang.org/std/collections/index.html
  logging_and_observability:
    description: log crate facade is not stdlib; std only has eprintln!/dbg!
    urls:
      - https://doc.rust-lang.org/std/macro.dbg.html
      - https://doc.rust-lang.org/std/macro.eprintln.html
  language_evolution_and_deprecation:
    description: Edition guide for 2021/2024 migration and stability guarantees
    urls:
      - https://doc.rust-lang.org/edition-guide/index.html
      - https://doc.rust-lang.org/reference/attributes/diagnostics.html#the-deprecated-attribute
known_gaps:
  - No stdlib async runtime; tokio/async-std are required but not canonical
  - No stdlib HTTP client; reqwest/hyper are outside doc.rust-lang.org
  - No stdlib JSON serialization; serde/serde_json are community-canonical but not stdlib
  - Crypto requires crates (ring, rust-crypto); std has no cryptographic primitives
