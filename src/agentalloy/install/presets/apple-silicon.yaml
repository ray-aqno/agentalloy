  RUNTIME_EMBEDDING_MODEL: "qwen3-embedding:0.6b"
  DEDUP_HARD_THRESHOLD: "0.92"
  DEDUP_SOFT_THRESHOLD: "0.80"
  BOUNCE_BUDGET: "3"
  LOG_LEVEL: "INFO"
