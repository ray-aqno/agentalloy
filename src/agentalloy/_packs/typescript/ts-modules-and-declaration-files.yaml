raw_prose: |
  # TypeScript Modules and Declaration Files

  Modules are how TypeScript code is organized into files and packages, and declaration files (`.d.ts`) are how types travel separately from code. The rule is one sentence: write ESM imports/exports, distribute libraries with both ESM and CJS via the `exports` field, and provide `.d.ts` declarations for any non-TS code that consumers will type-check against. Most module-related issues — "cannot find module", "default export is undefined", `__esModule` confusion, dual-package hazard — come from a mismatch between what the package.json says and what tsc emits.

  ## ESM is the default, CJS is the legacy

  TypeScript supports both ECMAScript modules (ESM) and CommonJS (CJS), but ESM is the modern target. Two reasons:

  - **Browsers, Deno, Bun, and modern Node natively understand ESM.** Static `import`/`export` is the standard.
  - **CJS is being slowly displaced.** New libraries publish ESM; old libraries are migrating. CJS still works but is friction-heavy in modern toolchains.

  In TypeScript, ESM looks identical to JS:

  ```ts
  import { foo } from "./bar";
  import type { Foo } from "./types";
  export function baz() { /* ... */ }
  export type { Baz } from "./baz-types";
  ```

  Use `import type` and `export type` for type-only imports; with `verbatimModuleSyntax: true` (recommended), tsc emits these correctly as elided imports — no runtime cost.

  CJS-style imports (`const x = require("y")`) still work but should not appear in new TypeScript code unless interop with a CJS-only library demands it.

  ## File extensions in imports

  When `module: "NodeNext"` is set, TypeScript follows the Node ESM resolution rules — including the requirement to write the file extension explicitly:

  ```ts
  // module: "NodeNext"
  import { foo } from "./bar.js";  // note: .js, not .ts
  ```

  The `.js` looks wrong because the source is `.ts`, but it is correct: the import string refers to the *emitted* path, which is `.js`. tsc resolves `./bar.js` to `./bar.ts` at type-check time.

  Under `module: "Preserve"` or `"Bundler"`, extensions are optional — the bundler does the resolution. Pick the convention that matches your runtime; do not mix.

  ## Default exports vs named exports

  Both forms work, but named exports are usually better:

  ```ts
  // Named — preferred
  export function send(req: Request) { ... }
  export const VERSION = "1.0.0";

  // Default — works but less robust
  export default function send(req: Request) { ... }
  ```

  Named exports give you:

  - **Reliable rename refactoring.** The editor knows every `import { send }` site; renaming the export updates them all.
  - **Tree shaking.** Bundlers can eliminate unused named exports easily.
  - **Discoverable autocomplete.** `import { ... } from "lib"` shows everything available.

  Default exports are still common in framework conventions (React components in some style guides, Next.js pages, default router handlers). When you have to interop with a default-export ecosystem, follow the convention. For new library code, prefer named.

  Avoid the `export default { foo, bar }` pattern that mimics the CJS shape. It defeats tree shaking and confuses the type checker on consumer side.

  ## `.d.ts` declaration files

  A declaration file describes types for code that does not have them — typically JavaScript libraries, or compiled output. Three kinds:

  - **Bundled declarations.** Generated by tsc with `"declaration": true`. Ship a `.d.ts` next to each `.js` so consumers see types.
  - **Hand-written declarations.** Used to type a JS library you depend on. Common in `@types/*` packages on DefinitelyTyped.
  - **Ambient declarations.** Global type augmentation (`declare global { ... }`) or module shims (`declare module "css-modules" { ... }`).

  When publishing a TypeScript library, always emit declarations:

  ```json
  // tsconfig.json
  {
    "compilerOptions": {
      "declaration": true,
      "declarationMap": true,
      "outDir": "dist"
    }
  }
  ```

  `declarationMap: true` lets editors jump from a consumer's import site to your TypeScript source, not your compiled `.d.ts`. Important for library debuggability.

  ## The `exports` field in package.json

  Modern Node honors the `exports` field to determine entry points and conditional resolution. A library that publishes both ESM and CJS uses subpath conditions:

  ```json
  {
    "name": "mylib",
    "type": "module",
    "main": "./dist/index.cjs",
    "module": "./dist/index.js",
    "types": "./dist/index.d.ts",
    "exports": {
      ".": {
        "import": {
          "types": "./dist/index.d.ts",
          "default": "./dist/index.js"
        },
        "require": {
          "types": "./dist/index.d.cts",
          "default": "./dist/index.cjs"
        }
      }
    }
  }
  ```

  The `exports` field tells Node and bundlers: "for `import`, use the ESM file; for `require`, use the CJS file; types are aligned with each."

  Two rules:

  - **`types` must come first within each conditional.** Resolution order matters; if `default` precedes `types`, resolvers may not find the types.
  - **Provide separate `.d.ts` and `.d.cts` files** when shipping dual ESM/CJS, because the implied module style differs. This is what dual-publishing toolchains like `tsup`, `tshy`, or `pkgroll` do automatically.

  ## Dual-package hazard

  If a library publishes both ESM and CJS, and a consumer's dependency graph includes the library through both paths (some deps use `import`, some use `require`), the runtime ends up with *two copies* of the library. Singletons break; `instanceof` checks fail across the copies.

  Mitigations:

  - **Avoid stateful singletons in libraries that dual-publish.** State at module scope is fragile under dual-package hazard.
  - **Use `peerDependencies` for libraries whose state must be shared** (React, Pinia, Redux). Consumers install one copy; the library does not bundle a second.
  - **Publish ESM-only when the consumer ecosystem allows.** Modern Node, Vite, Bun all handle this. You avoid the hazard entirely.

  Dual-package hazard is the single most surprising issue when shipping a TypeScript library. Awareness up-front prevents the worst surprises.

  ## Module augmentation

  `declare module` lets you extend types in another module from your code:

  ```ts
  // mylib.d.ts
  import "express";

  declare module "express" {
    interface Request {
      user?: User;
    }
  }
  ```

  After this declaration, every `Request` from express has the optional `user` field, project-wide. Useful for adding fields a middleware sets, or for typing third-party libraries whose stock types are incomplete.

  Augmentation works only on `interface` declarations in the target library; `type` aliases cannot be augmented (see ts-types-vs-interfaces).

  ## Path aliases vs relative imports

  TypeScript's `paths` in tsconfig lets you write `import { x } from "@/components/Foo"` instead of `../../../components/Foo`. The catch: tsc only handles paths at type-check time. At runtime, the bundler or runtime must also resolve them.

  Pick one convention per project:

  - **Bundler resolves paths.** Vite, Webpack, esbuild all support tsconfig paths via plugins. Common in app code.
  - **Runtime resolves paths.** Some runtimes (`tsx`, `bun`) honor `paths` natively.
  - **No paths; use package-relative imports.** Set up the source as a workspace package, import via the package name. Cleanest for monorepos.
  - **No paths; relative imports throughout.** Simplest, most portable, sometimes ugliest.

  Mixing path-alias imports and relative imports in the same project is not wrong, but it produces inconsistent style. Pick one approach and lint for it.

  ## Anti-patterns

  - **Mixing CJS `require` and ESM `import` in the same TS file.** Compiles inconsistently across `module` settings.
  - **Default exports in libraries published as ESM.** Unpredictable interop with consumers who bundle through CJS.
  - **`exports` field with `default` before `types`.** Breaks type resolution in modern resolvers.
  - **Path aliases without runtime resolution.** Type-check passes; runtime fails with "cannot find module."
  - **Stateful singleton in a dual-published library.** Dual-package hazard breaks `instanceof` and shared state.
  - **`declare module "*"` in production code.** Hides real type errors. Useful only for tooling shims (CSS modules, image imports).
  - **`/// <reference path="...">` in modern code.** Pre-modules pattern; no longer needed with proper imports.

  ## Verification

  - [ ] New code uses ESM `import`/`export`; CJS `require` only when interop with a CJS-only library demands it.
  - [ ] `import type` / `export type` are used for type-only imports; `verbatimModuleSyntax: true` makes the emit predictable.
  - [ ] Library `package.json` has an `exports` field with `types` listed first inside each conditional.
  - [ ] Library `tsconfig.json` has `declaration: true` and `declarationMap: true`; emitted `.d.ts` ships with the package.
  - [ ] When dual-publishing ESM+CJS, separate `.d.ts` and `.d.cts` files are emitted via a tool like `tsup`/`tshy`/`pkgroll`.
  - [ ] No stateful singletons in dual-published libraries; if state must be shared, use `peerDependencies`.
  - [ ] One module-resolution convention per project (NodeNext, Bundler, or paths-with-bundler); not mixed.

