raw_prose: |
  # TypeScript Utility Types

  ## Overview

  TypeScript ships a set of utility types implemented as conditional + mapped types. They cover the most common derivation needs: making fields optional, picking subsets, extracting return types, unwrapping promises. This skill covers each utility + when to reach for it.

  Sourced from typescriptlang.org/docs/handbook/utility-types.html.

  ---

  TypeScript provides several utility types to facilitate common type transformations. These utilities are available globally.

  ## `Awaited<Type>`

  <blockquote class=bg-reading>

  Released:
  [4.5](/docs/handbook/release-notes/typescript-4-5.html#the-awaited-type-and-promise-improvements)

  </blockquote>

  This type is meant to model operations like `await` in `async` functions, or the
  `.then()` method on `Promise`s - specifically, the way that they recursively
  unwrap `Promise`s.

  ##### Example

  ```ts twoslash
  type A = Awaited<Promise<string>>;
  //   ^?

  type B = Awaited<Promise<Promise<number>>>;
  //   ^?

  type C = Awaited<boolean | Promise<number>>;
  //   ^?
  ```

  ## `Partial<Type>`

  <blockquote class=bg-reading>

  Released:  
  [2.1](/docs/handbook/release-notes/typescript-2-1.html#partial-readonly-record-and-pick)

  </blockquote>

  Constructs a type with all properties of `Type` set to optional. This utility will return a type that represents all subsets of a given type.

  ##### Example

  ```ts twoslash
  interface Todo {
    title: string;
    description: string;
  }

  function updateTodo(todo: Todo, fieldsToUpdate: Partial<Todo>) {
    return { ...todo, ...fieldsToUpdate };
  }

  const todo1 = {
    title: "organize desk",
    description: "clear clutter",
  };

  const todo2 = updateTodo(todo1, {
    description: "throw out trash",
  });
  ```

  ## `Required<Type>`

  <blockquote class=bg-reading>

  Released:  
  [2.8](/docs/handbook/release-notes/typescript-2-8.html#improved-control-over-mapped-type-modifiers)

  </blockquote>

  Constructs a type consisting of all properties of `Type` set to required. The opposite of [`Partial`](#partialtype).

  ##### Example

  ```ts twoslash
  // @errors: 2741
  interface Props {
    a?: number;
    b?: string;
  }

  const obj: Props = { a: 5 };

  const obj2: Required<Props> = { a: 5 };
  ```

  ## `Readonly<Type>`

  <blockquote class=bg-reading>

  Released:  
  [2.1](/docs/handbook/release-notes/typescript-2-1.html#partial-readonly-record-and-pick)

  </blockquote>

  Constructs a type with all properties of `Type` set to `readonly`, meaning the properties of the constructed type cannot be reassigned.

  ##### Example

  ```ts twoslash
  // @errors: 2540
  interface Todo {
    title: string;
  }

  const todo: Readonly<Todo> = {
    title: "Delete inactive users",
  };

  todo.title = "Hello";
  ```

  This utility is useful for representing assignment expressions that will fail at runtime (i.e. when attempting to reassign properties of a [frozen object](https://developer.mozilla.org/docs/Web/JavaScript/Reference/Global_Objects/Object/freeze)).

  ##### `Object.freeze`

  ```ts
  function freeze<Type>(obj: Type): Readonly<Type>;
  ```

  ## `Record<Keys, Type>`

  <blockquote class=bg-reading>

  Released:  
  [2.1](/docs/handbook/release-notes/typescript-2-1.html#partial-readonly-record-and-pick)

  </blockquote>

  Constructs an object type whose property keys are `Keys` and whose property values are `Type`. This utility can be used to map the properties of a type to another type.

  ##### Example

  ```ts twoslash
  type CatName = "miffy" | "boris" | "mordred";

  interface CatInfo {
    age: number;
    breed: string;
  }

  const cats: Record<CatName, CatInfo> = {
    miffy: { age: 10, breed: "Persian" },
    boris: { age: 5, breed: "Maine Coon" },
    mordred: { age: 16, breed: "British Shorthair" },
  };

  cats.boris;
  // ^?
  ```

  ## `Pick<Type, Keys>`

  <blockquote class=bg-reading>

  Released:  
  [2.1](/docs/handbook/release-notes/typescript-2-1.html#partial-readonly-record-and-pick)

  </blockquote>

  Constructs a type by picking the set of properties `Keys` (string literal or union of string literals) from `Type`.

  ##### Example

  ```ts twoslash
  interface Todo {
    title: string;
    description: string;
    completed: boolean;
  }

  type TodoPreview = Pick<Todo, "title" | "completed">;

  const todo: TodoPreview = {
    title: "Clean room",
    completed: false,
  };

  todo;
  // ^?
  ```

  ## `Omit<Type, Keys>`

  <blockquote class=bg-reading>

  Released:  
  [3.5](/docs/handbook/release-notes/typescript-3-5.html#the-omit-helper-type)

  </blockquote>

  Constructs a type by picking all properties from `Type` and then removing `Keys` (string literal or union of string literals). The opposite of [`Pick`](#picktype-keys).

  ##### Example

  ```ts twoslash
  interface Todo {
    title: string;
    description: string;
    completed: boolean;
    createdAt: number;
  }

  type TodoPreview = Omit<Todo, "description">;

  const todo: TodoPreview = {
    title: "Clean room",
    completed: false,
    createdAt: 1615544252770,
  };

  todo;
  // ^?

  type TodoInfo = Omit<Todo, "completed" | "createdAt">;

  const todoInfo: TodoInfo = {
    title: "Pick up kids",
    description: "Kindergarten closes at 5pm",
  };

  todoInfo;
  // ^?
  ```

  ## `Exclude<UnionType, ExcludedMembers>`

  <blockquote class=bg-reading>

  Released:  
  [2.8](/docs/handbook/release-notes/typescript-2-8.html#predefined-conditional-types)

  </blockquote>

  Constructs a type by excluding from `UnionType` all union members that are assignable to `ExcludedMembers`.

  ##### Example

  ```ts twoslash
  type T0 = Exclude<"a" | "b" | "c", "a">;
  //    ^?
  type T1 = Exclude<"a" | "b" | "c", "a" | "b">;
  //    ^?
  type T2 = Exclude<string | number | (() => void), Function>;
  //    ^?

  type Shape =
    | { kind: "circle"; radius: number }
    | { kind: "square"; x: number }
    | { kind: "triangle"; x: number; y: number };

  type T3 = Exclude<Shape, { kind: "circle" }>
  //    ^?
  ```

  ## `Extract<Type, Union>`

  <blockquote class=bg-reading>

  Released:  
  [2.8](/docs/handbook/release-notes/typescript-2-8.html#predefined-conditional-types)

  </blockquote>

  Constructs a type by extracting from `Type` all union members that are assignable to `Union`.

  ##### Example

  ```ts twoslash
  type T0 = Extract<"a" | "b" | "c", "a" | "f">;
  //    ^?
  type T1 = Extract<string | number | (() => void), Function>;
  //    ^?

  type Shape =
    | { kind: "circle"; radius: number }
    | { kind: "square"; x: number }
    | { kind: "triangle"; x: number; y: number };

  type T2 = Extract<Shape, { kind: "circle" }>
  //    ^?
  ```

  ## `NonNullable<Type>`

  <blockquote class=bg-reading>

  Released:  
  [2.8](/docs/handbook/release-notes/typescript-2-8.html#predefined-conditional-types)

  </blockquote>

  Constructs a type by excluding `null` and `undefined` from `Type`.

  ##### Example

  ```ts twoslash
  type T0 = NonNullable<string | number | undefined>;
  //    ^?
  type T1 = NonNullable<string[] | null | undefined>;
  //    ^?
  ```

  ## `Parameters<Type>`

  <blockquote class=bg-reading>

  Released:  
  [3.1](https://github.com/microsoft/TypeScript/pull/26243)

  </blockquote>

  Constructs a tuple type from the types used in the parameters of a function type `Type`.

  For overloaded functions, this will be the parameters of the _last_ signature; see [Inferring Within Conditional Types](/docs/handbook/2/conditional-types.html#inferring-within-conditional-types).

  ##### Example

  ```ts twoslash
  // @errors: 2344
  declare function f1(arg: { a: number; b: string }): void;

  type T0 = Parameters<() => string>;
  //    ^?
  type T1 = Parameters<(s: string) => void>;
  //    ^?
  type T2 = Parameters<<T>(arg: T) => T>;
  //    ^?
  type T3 = Parameters<typeof f1>;
  //    ^?
  type T4 = Parameters<any>;
  //    ^?
  type T5 = Parameters<never>;
  //    ^?
  type T6 = Parameters<string>;
  //    ^?
  type T7 = Parameters<Function>;
  //    ^?
  ```

  ## `ConstructorParameters<Type>`

  <blockquote class=bg-reading>

  Released:  
  [3.1](https://github.com/microsoft/TypeScript/pull/26243)

  </blockquote>

  Constructs a tuple or array type from the types of a constructor function type. It produces a tuple type with all the parameter types (or the type `never` if `Type` is not a function).

  ##### Example

  ```ts twoslash
  // @errors: 2344
  // @strict: false
  type T0 = ConstructorParameters<ErrorConstructor>;
  //    ^?
  type T1 = ConstructorParameters<FunctionConstructor>;
  //    ^?
  type T2 = ConstructorParameters<RegExpConstructor>;
  //    ^?
  class C {
    constructor(a: number, b: string) {}
  }
  type T3 = ConstructorParameters<typeof C>;
  //    ^?
  type T4 = ConstructorParameters<any>;
  //    ^?

  type T5 = ConstructorParameters<Function>;
  //    ^?
  ```

  ## `ReturnType<Type>`

  <blockquote class=bg-reading>

  Released:  
  [2.8](/docs/handbook/release-notes/typescript-2-8.html#predefined-conditional-types)

  </blockquote>

  Constructs a type consisting of the return type of function `Type`.

  For overloaded functions, this will be the return type of the _last_ signature; see [Inferring Within Conditional Types](/docs/handbook/2/conditional-types.html#inferring-within-conditional-types).

  ##### Example

  ```ts twoslash
  // @errors: 2344 2344
  declare function f1(): { a: number; b: string };

  type T0 = ReturnType<() => string>;
  //    ^?
  type T1 = ReturnType<(s: string) => void>;
  //    ^?
  type T2 = ReturnType<<T>() => T>;
  //    ^?
  type T3 = ReturnType<<T extends U, U extends number[]>() => T>;
  //    ^?
  type T4 = ReturnType<typeof f1>;
  //    ^?
  type T5 = ReturnType<any>;
  //    ^?
  type T6 = ReturnType<never>;
  //    ^?
  type T7 = ReturnType<string>;
  //    ^?
  type T8 = ReturnType<Function>;
  //    ^?
  ```

