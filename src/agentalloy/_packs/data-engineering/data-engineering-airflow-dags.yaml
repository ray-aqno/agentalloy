raw_prose: |
  # Airflow — DAGs, Tasks, and Operators

  ## Overview

  Airflow DAGs are Python files declaring tasks and their ordering. Operators are the unit of work; sensors wait for external conditions; dependencies flow with >>. This skill covers DAG + task + operator authoring.

  Sourced from apache/airflow github docs (core-concepts/dags, tasks, operators).

