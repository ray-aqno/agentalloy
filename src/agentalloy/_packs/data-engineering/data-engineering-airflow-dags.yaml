  # Operators


  An Operator is conceptually a template for a predefined `Task <tasks>`, that you can just define declaratively inside your Dag::

      with DAG("my-dag") as dag:
          ping = HttpOperator(endpoint="http://example.com/update/")
          email = EmailOperator(to="admin@example.com", subject="Update complete")

          ping >> email

  Airflow has a very extensive set of operators available, with some built-in to the core or pre-installed providers. Some popular operators from core include:

  - `~airflow.providers.standard.operators.bash.BashOperator` - executes a bash command
  - `~airflow.providers.standard.operators.python.PythonOperator` - calls an arbitrary Python function
  - Use the ``@task`` decorator to execute an arbitrary Python function. It doesn't support rendering jinja templates passed as arguments.

  .. note::
      The ``@task`` decorator is recommended over the classic `~airflow.providers.standard.operators.python.PythonOperator`
      to execute Python callables with no template rendering in its arguments.

  For a list of all core operators, see: `Core Operators and Hooks Reference </operators-and-hooks-ref>`.

  If the operator you need isn't installed with Airflow by default, you can probably find it as part of our huge set of community `providers <apache-airflow-providers:index>`. Some popular operators from here include:

  - `~airflow.providers.smtp.operators.smtp.EmailOperator`
  - `~airflow.providers.http.operators.http.HttpOperator`
  - `~airflow.providers.common.sql.operators.sql.SQLExecuteQueryOperator`
  - `~airflow.providers.docker.operators.docker.DockerOperator`
  - `~airflow.providers.apache.hive.operators.hive.HiveOperator`
  - `~airflow.pro

