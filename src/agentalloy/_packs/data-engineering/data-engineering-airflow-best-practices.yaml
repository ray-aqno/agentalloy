raw_prose: |
  # Airflow — Best Practices and Timetables

  ## Overview

  Production Airflow runs into the same patterns repeatedly: idempotent tasks, parsed-DAGs without side effects, lean XComs, and custom timetables for non-cron schedules. This skill covers the operational craft.

  Sourced from apache/airflow github docs (best-practices, authoring-and-scheduling/timetable).

