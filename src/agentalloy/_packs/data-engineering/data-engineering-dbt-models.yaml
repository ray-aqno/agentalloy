raw_prose: "# dbt — Models, Materializations, Sources\n\n## Overview\n\ndbt models are SQL files that define transformations;\
  \ materializations decide whether they become tables, views, or incremental tables. Sources declare external data the project\
  \ depends on. This skill covers the core authoring surface.\n\nSourced from https://docs.getdbt.com/docs/build/models, /materializations,\
  \ and /sources.\n\n---\n\n# About dbt models\n\ndbt Core and Cloud are composed of different moving parts working harmoniously.\
  \ All of them are important to what dbt does — transforming data—the 'T' in ELT. When you execute `dbt run`, you are running\
  \ a model that will transform your data without that data ever leaving your warehouse.\n\nModels are where your developers\
  \ spend most of their time within a dbt environment. Models are primarily written as a `select` statement and saved as a\
  \ `.sql` file. While the definition is straightforward, the complexity of the execution will vary from environment to environment.\
  \  Models will be written and rewritten as needs evolve and your organization finds new ways to maximize efficiency.\n\n\
  SQL is the language most dbt users will utilize, but it is not the only one for building models. Starting in version 1.3,\
  \ dbt Core and support Python models. Python models are useful for training or deploying data science models, complex transformations,\
  \ or where a specific Python package meets a need &mdash; such as using the `dateutil` library to parse dates.\n\n### Models\
  \ and modern workflows\n\nThe top level of a dbt workflow is the project. A project is a directory of a `.yml` file (the\
  \ project configuration) and either `.sql` or `.py` files (the models). The project file tells dbt the project context,\
  \ and the models let dbt know how to build a specific data set. For more details on projects, refer to [About dbt projects](/docs/build/projects).\n\
  \nYour organization may need only a few models, but more likely you’ll need a complex structure of nested models to transform\
  \ the required data. A model is a single file containing a final `select` statement, and a project can have multiple models,\
  \ and models can even reference each other. Add to that, numerous projects and the level of effort required for transforming\
  \ complex data sets can improve drastically compared to older methods.\n\nLearn more about models in [SQL models](/docs/build/sql-models)\
  \ and [Python models](/docs/build/python-models) pages. If you'd like to begin with a bit of practice, visit our [Getting\
  \ Started Guide](/guides) for instructions on setting up the Jaffle_Shop sample data so yo\n\n---\n\n# Materializations\n\
  \n## Overview\nMaterializations are strategies for persisting dbt models in a warehouse. There are five types of materializations\
  \ built into dbt. They are:\n\n- - - incremental\n- ephemeral\n- materialized view\n\nYou can also configure [custom materializations](/guides/create-new-materializations?step=1)\
  \ in dbt. Custom materializations are a powerful way to extend dbt's functionality to meet your specific needs. \n\nFor\
  \ a detailed guide on materializations, refer to [Materializations best practices](/best-practices/materializations/1-guide-overview).\
  \ For information about data streaming, refer to [How to handle real-time data](/best-practices/how-we-handle-real-time-data/1-intro).\n\
  \n## Configuring materializations\nBy default, dbt models are materialized as \"views\". Models can be configured with a\
  \ different materialization by supplying the [`materialized` configuration](/reference/resource-configs/materialized) parameter\
  \ as shown in the following tabs.\n\n---\nProject file\n---\n```yaml\n# The following dbt_project.yml configures a project\
  \ that looks like this:\n# .\n# └── models\n#     ├── csvs\n#     │   ├── employees.sql\n#     │   └── goals.sql\n#    \
  \ └── events\n#         ├── stg_event_log.sql\n#         └── stg_event_sessions.sql\n\nname: my_project\nversion: 1.0.0\n\
  config-version: 2\n\nmodels:\n  my_project:\n    events:\n      # materialize all models in models/events as tables\n  \
  \    +materialized: table\n    csvs:\n      # this is redundant, and does not need to be set\n      +materialized: view\n\
  ```\n\n---\nModel file\n---\nAlternatively, materializations can be configured directly inside of the model SQL files. This\
  \ can be useful if you are also setting [Performance Optimization] configs for specific models (for example, [Redshift specific\
  \ configurations](/reference/resource-configs/redshift-configs) or [BigQuery specific configurations](/reference/resource-configs/bigquery-configs)).\n\
  \n```sql\n\n{{ config(materialized='table', sort='timestamp', dist='user_id') }}\n\nselect *\nfrom ...\n```\n\n---\nProperty\
  \ file\n---\nMaterializations can also be configured in the model's `properties.yml` file.  The following example shows\
  \ the `table` materialization type. For a complete list of materialization types, refer to [materializations](/docs/build/materializations#materializations).\n\
  \n```yaml\n\nmodels:\n  - name: events\n    config:\n      materialized: table\n```\n\n---\n\n# Add sources to your DAG\n\
  \n## Related reference docs\n* [Source properties](/reference/source-properties)\n* [Source configurations](/reference/source-configs)\n\
  * [`{{ source() }}` Jinja function](/reference/dbt-jinja-functions/source)\n* [`source freshness` command](/reference/commands/source)\n\
  \n## Using sources\nSources make it possible to name and describe the data loaded into your warehouse by your Extract and\
  \ Load tools. By declaring these tables as sources in dbt, you can then\n- select from source tables in your models using\
  \ the [`{{ source() }}` function,](/reference/dbt-jinja-functions/source) helping define the lineage of your data\n- test\
  \ your assumptions about your source data\n- calculate the freshness of your source data\n\n### Declaring a source\n\nSources\
  \ are defined in `.yml` files nested under a `sources:` key.\n\n.yml'>\n\n```yaml\n\nsources:\n  - name: jaffle_shop\n \
  \   database: raw  \n    schema: jaffle_shop  \n    tables:\n      - name: orders\n      - name: customers\n\n  - name:\
  \ stripe\n    tables:\n      - name: payments\n```\n\n*By default, `schema` will be the same as `name`. Add `schema` only\
  \ if you want to use a source name that differs from the existing schema.\n\nIf you're not already familiar with these files,\
  \ be sure to check out [the documentation on properties.yml files](/reference/configs-and-properties) before proceeding.\n\
  \n### Selecting from a source\n\nOnce a source has been defined, it can be referenced from a model using the [`{{ source()}}`\
  \ function](/reference/dbt-jinja-functions/source).\n\n```sql\nselect\n  ...\n\nfrom {{ source('jaffle_shop', 'orders')\
  \ }}\n\nleft join {{ source('jaffle_shop', 'customers') }} using (customer_id)\n\n```\n\ndbt will compile this to the full\
  \ name:\n\n```sql\n\nselect\n  ...\n\nfrom raw.jaffle_shop.orders\n\nleft join raw.jaffle_shop.customers using (customer_id)\n\
  \n```\n\nUsing the `{{ source () }}` function also creates a dependency between the model and the source table.\n\n<Lightbox\
  \ src=\"/img/docs/building-a-dbt-project/sources-dag.png\" title=\"The source function tells dbt a model is dependent on\
  \ a source \"/>\n\n### Testing and documenting sources\nYou can also:\n- Add data tests to sources\n- Add descriptions to\
  \ sources, that get rendered as part of your documentation site\n\nThese should be familiar concepts if you've already added\
  \ data tests and descriptions to your models (if not check out the guides on [testing](/docs/build/data-tests) and [documentation](/docs/build/documentation)).\n\
  \n.yml'>\n\n```yaml\n\nsources:\n  - name: jaffle_shop\n    description: This is a replica of the Postgres database used\
  \ by our app\n    tables:\n      - name: orders\n        database: raw\n        description: >\n          One record per\
  \ order. Includes cancelled and deleted orders.\n        columns:\n          - name: id\n            description: Primary\
  \ key of the orders table\n            data_tests:\n              - unique\n              - not_null\n          - name:\
  \ status\n            description: Note that the status can change over time\n\n      - name: ...\n\n  - name: ...\n```\n\
  \nYou can find more details on the available properties for sources in the [reference section](/reference/source-properties).\n\
  \n### FAQs\n<FAQ path=\"\n"
