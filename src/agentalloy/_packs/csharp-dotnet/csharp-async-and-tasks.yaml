raw_prose: |
  # C# Async and Tasks

  C#'s asynchronous model is built on three pillars: the `Task` and `Task<T>` types in `System.Threading.Tasks` representing in-flight work, the `async`/`await` keywords that let you write straight-line code that compiles to a state machine, and `CancellationToken` for cooperative cancellation. The rule is one sentence: every async API takes a `CancellationToken` and returns a `Task` (or `ValueTask` on hot paths), `await` consumes those tasks, library code uses `ConfigureAwait(false)`, and you never call `.Result` or `.Wait()` to bridge sync-to-async. Most production C# async bugs are one of four things: `async void` swallowing exceptions outside event handlers, `.Result` on an unstarted task deadlocking under a sync context, ignoring the `CancellationToken` parameter, or using unbounded `Channel` and OOMing the process under load.

  ## `Task`, `Task<T>`, and the `async`/`await` desugaring

  `Task` represents an asynchronous operation that may complete with no result or with a `T`. `async Task<T> FooAsync()` is a method whose body the compiler rewrites into a state machine: each `await` becomes a suspension point where the method registers a continuation with the awaited task and returns control. Awaiting a `Task<T>` unwraps it to `T`; awaiting a `Task` yields nothing but observes completion (or rethrows the captured exception).

  ```csharp
  using System.Threading;
  using System.Threading.Tasks;

  public async Task<Order> ProcessOrderAsync(int id, CancellationToken ct)
  {
      Order order = await _repo.GetAsync(id, ct).ConfigureAwait(false);
      await _audit.RecordAsync(order, ct).ConfigureAwait(false);
      return order;
  }
  ```

  Tasks returned from `async` methods are *hot* — already started — unlike Rust futures or `Task` objects you construct with `new Task(...)` (which is almost never what you want; use `Task.Run` or just call the async method). Awaiting the same `Task<T>` twice is allowed and yields the same result; the second await is essentially free.

  ## `ValueTask<T>` and the allocation tradeoff

  `Task<T>` is a class — every async method that returns one allocates on the heap. For hot paths that often complete *synchronously* (cache hits, buffered reads), `ValueTask<T>` is a struct that wraps either an immediate `T` or an underlying `Task<T>` — no allocation in the synchronous-completion case.

  ```csharp
  using System.Threading.Tasks;

  public ValueTask<byte[]> ReadAsync(int key)
  {
      if (_cache.TryGetValue(key, out var bytes))
          return new ValueTask<byte[]>(bytes); // sync, no alloc
      return new ValueTask<byte[]>(LoadAsync(key)); // async path
  }
  ```

  The contract is stricter: a `ValueTask<T>` must be awaited *at most once*, and you must not block on it (`.Result` is permitted only after completion). Default to `Task<T>`; reach for `ValueTask<T>` when profiling shows the allocation matters. `IValueTaskSource` for pooled, reusable backing is an advanced pattern — out of scope here.

  ## `CancellationToken`: propagation and linking

  Every async API in modern .NET takes a `CancellationToken`, and you forward it down the call chain unchanged. The token is created from a `CancellationTokenSource`; `cts.Cancel()` flips the token, all observers see `IsCancellationRequested == true`, and any `await` on a cancellation-aware operation throws `OperationCanceledException` (specifically `TaskCanceledException`, which inherits from it).

  ```csharp
  using System.Threading;
  using System.Threading.Tasks;

  public async Task RunAsync(CancellationToken ct)
  {
      using var timeout = new CancellationTokenSource(TimeSpan.FromSeconds(30));
      using var linked = CancellationTokenSource.CreateLinkedTokenSource(ct, timeout.Token);
      await DoWorkAsync(linked.Token).ConfigureAwait(false);
  }
  ```

  `CreateLinkedTokenSource` produces a token that fires when *any* source token fires — perfect for combining a request-scoped cancellation with a per-operation timeout. For a `Task` that does not natively accept a `CancellationToken` (a third-party API, `Task.Delay` you've already started), wrap it with `Task.WaitAsync(ct)` (.NET 6+, verified 2026-05-05) — this returns a new task that throws `OperationCanceledException` when the token fires, leaving the original task running but unobserved. When throwing `OperationCanceledException` yourself, pass the token: `throw new OperationCanceledException(ct)` — the token-bearing constructor is what callers need to distinguish "we were cancelled" from "the operation failed."

  ## `ConfigureAwait(false)` and the sync-context rule

  By default, `await` captures the current `SynchronizationContext` (or `TaskScheduler`) and resumes the continuation on it. WPF, WinForms, and pre-net6 ASP.NET captured a UI/request context, so awaiting in a library forced the continuation back onto that thread — a classic deadlock when callers also block on `.Result`. `ConfigureAwait(false)` tells the awaiter not to capture, resuming on whatever thread the task completed on.

  Rules of thumb (verified 2026-05-05):

  - **Library code:** always `ConfigureAwait(false)` on every `await`. You do not know your caller's context. Roslyn analyzer rule **CA2007** flags missing `ConfigureAwait` in libraries.
  - **ASP.NET Core (.NET 6+):** has *no* `SynchronizationContext`. `ConfigureAwait(false)` is a no-op there but harmless. Web app code authored against ASP.NET Core can omit it; libraries the app consumes still should not.
  - **WPF/WinForms:** application code awaits *without* `ConfigureAwait(false)` when it needs to touch UI after the await. Library code servicing them still uses `false`.

  The Roslyn analyzer suppresses CA2007 in projects that opt out (typically web apps). Use a `.editorconfig` rule or project-level suppression rather than littering pragmas.

  ## `Task.WhenAll`, `Task.WhenAny`, and exception aggregation

  `Task.WhenAll(tasks)` returns a task that completes when every input completes. `Task.WhenAny(tasks)` completes when the first one finishes — it returns the *task that finished*, not its result. The aggregation edge that bites people: if multiple tasks in `WhenAll` fail, `await` rethrows *only the first* exception. The full set lives on `whenAllTask.Exception` (an `AggregateException`).

  ```csharp
  using System.Threading.Tasks;

  Task[] tasks = new[] { FailAAsync(), FailBAsync() };
  Task all = Task.WhenAll(tasks);
  try
  {
      await all.ConfigureAwait(false);
  }
  catch (Exception)
  {
      // 'all.Exception' is the AggregateException with BOTH inner exceptions.
      // The 'catch' here only sees the first one because await unwraps.
      foreach (var inner in all.Exception!.InnerExceptions)
          _log.LogError(inner, "task failed");
  }
  ```

  Walked: tasks A and B both throw. `await all` rethrows A's exception (or whichever the runtime ordered first). B's exception is *not* lost — it's on `all.Exception.InnerExceptions` — but a naive `catch` that does not consult the task object will silently drop it. If you need every failure observed (audit logging, retry decisions), check `task.Exception` after the await.

  ## `System.Threading.Channels` for bounded producer-consumer

  `System.Threading.Channels` (since .NET Core 3.0, fully featured in .NET 9, verified 2026-05-05) is the canonical async producer-consumer queue. Two flavors:

  - **`Channel.CreateBounded<T>(BoundedChannelOptions)`** — fixed capacity, applies backpressure. `WriteAsync` awaits when full.
  - **`Channel.CreateUnbounded<T>()`** — no capacity limit. Producers never block. **Do not use in production for inputs you don't fully control** — a fast producer OOMs the process.

  ```csharp
  using System.Threading.Channels;
  using System.Threading.Tasks;

  var channel = Channel.CreateBounded<Order>(new BoundedChannelOptions(capacity: 100)
  {
      FullMode = BoundedChannelFullMode.Wait,
      SingleReader = true,
      SingleWriter = false,
  });

  // producer
  await channel.Writer.WriteAsync(order, ct).ConfigureAwait(false);
  channel.Writer.Complete();

  // consumer
  await foreach (var item in channel.Reader.ReadAllAsync(ct).ConfigureAwait(false))
  {
      await HandleAsync(item, ct).ConfigureAwait(false);
  }
  ```

  `BoundedChannelFullMode` choices: `Wait` (default — backpressure), `DropNewest`, `DropOldest`, `DropWrite` (silently discard new items). Pick deliberately. `SingleReader`/`SingleWriter` enable internal optimizations but are *contracts* — violate them and behavior is undefined.

  ## `Parallel.ForEachAsync` for CPU-bound work over async sources

  `Parallel.ForEachAsync` (.NET 6+, verified 2026-05-05) iterates a sequence, dispatching async work with bounded parallelism — the async cousin of `Parallel.ForEach`.

  ```csharp
  using System.Threading.Tasks;

  await Parallel.ForEachAsync(
      ids,
      new ParallelOptions { MaxDegreeOfParallelism = 8, CancellationToken = ct },
      async (id, token) => await ProcessAsync(id, token).ConfigureAwait(false));
  ```

  Use it for fan-out where you'd otherwise hand-roll a `SemaphoreSlim` plus `Task.WhenAll`. Default `MaxDegreeOfParallelism` is `Environment.ProcessorCount` — pin it explicitly when the work hits a downstream service that has its own concurrency limit.

  ## Anti-patterns

  - **`async void`.** Reserved for event handlers (subscribed to `EventHandler` delegates) where the framework cannot await a `Task`. Anywhere else, exceptions escape to the `SynchronizationContext` and crash the process. Use `async Task` and let callers await.
  - **`.Result` and `.Wait()` to bridge sync-to-async.** Blocks the calling thread on a task it expects to complete on the same thread under a sync context — classic deadlock in WPF/WinForms/old ASP.NET. In ASP.NET Core (no sync context) it merely wastes a thread-pool thread. Either propagate `async` upward or use `GetAwaiter().GetResult()` *only* at the true sync-async boundary (`Main`, console entry).
  - **`ConfigureAwait(true)` (the default) in library code.** See above. Always `false` in libraries. Roslyn CA2007.
  - **Ignoring the `CancellationToken` parameter.** A long-running API that does not pass `ct` down to its awaits is uncancellable — the caller's `cts.Cancel()` does nothing. Forward the token to every async call you make.
  - **`await Task.Run(() => syncMethod())` to "make it async".** This shifts work to the thread pool but the underlying work is still synchronous and consumes a thread. For true I/O, use the async API. `Task.Run` is for CPU-bound work, not for hiding sync code.
  - **Throwing `OperationCanceledException` without checking `ct.IsCancellationRequested`.** The token-bearing constructor `new OperationCanceledException(ct)` is required for callers to distinguish cancellation from failure. Better: call `ct.ThrowIfCancellationRequested()` at suitable yield points.
  - **`Channel.CreateUnbounded<T>()` in production.** No backpressure. Use bounded with a deliberate capacity.
  - **Forgetting to call `Writer.Complete()` on a Channel.** Consumers awaiting `ReadAllAsync` hang forever waiting for an end-of-stream signal that never arrives.

  ## Verification

  - [ ] `dotnet build /warnaserror` exits 0 — promotes async-related warnings (CS1998 "async method lacks await", CS4014 "call not awaited") to errors.
  - [ ] `dotnet format --verify-no-changes` exits 0 — confirms style/whitespace conformance.
  - [ ] `grep -rn 'async void' src/` returns no matches outside files that subscribe to `EventHandler` delegates. Each remaining match has a comment justifying the event-handler use.
  - [ ] `grep -rnE '\.Result|\.Wait\(\)' src/` returns no matches inside async call paths. Matches in `Main`/console entry points are acceptable; flag any inside `async` methods.
  - [ ] Roslyn analyzer **CA2007** ("Consider calling ConfigureAwait on the awaited task") is enabled at warning-or-error level for library projects via `.editorconfig` (`dotnet_diagnostic.CA2007.severity = warning`). `dotnet build /warnaserror` then fails the build on missing `ConfigureAwait(false)`.
  - [ ] `grep -rn 'CreateUnbounded' src/` returns no matches in production paths, or each match has a comment justifying unbounded use and bounding the producer upstream.
  - [ ] Every `public` async method in the library exposes a `CancellationToken` parameter (default `default` permitted). Inventory with `grep -rnE 'public.*async (Task|ValueTask)' src/` and confirm each signature.
  - [ ] Every `Channel.Writer` has a corresponding `Writer.Complete()` (or `TryComplete()`) on the producer-shutdown path. `grep -rn 'Channel.Create' src/` to inventory; trace each to a `Complete` call.
  - [ ] `Parallel.ForEachAsync` calls pin `MaxDegreeOfParallelism` explicitly. `grep -rn 'Parallel.ForEachAsync' src/` and confirm each `ParallelOptions` sets the field.

