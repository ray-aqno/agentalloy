      - [ ] Roslyn analyzer **CA2007** ("Consider calling ConfigureAwait on the awaited task") is enabled at warning-or-error level for library projects via `.editorconfig` (`dotnet_diagnostic.CA2007.severity = warning`). `dotnet build /warnaserror` then fails the build on missing `ConfigureAwait(false)`.
      - [ ] `grep -rn 'CreateUnbounded' src/` returns no matches in production paths, or each match has a comment justifying unbounded use and bounding the producer upstream.
      - [ ] Every `public` async method in the library exposes a `CancellationToken` parameter (default `default` permitted). Inventory with `grep -rnE 'public.*async (Task|ValueTask)' src/` and confirm each signature.
      - [ ] Every `Channel.Writer` has a corresponding `Writer.Complete()` (or `TryComplete()`) on the producer-shutdown path. `grep -rn 'Channel.Create' src/` to inventory; trace each to a `Complete` call.
      - [ ] `Parallel.ForEachAsync` calls pin `MaxDegreeOfParallelism` explicitly. `grep -rn 'Parallel.ForEachAsync' src/` and confirm each `ParallelOptions` sets the field.
