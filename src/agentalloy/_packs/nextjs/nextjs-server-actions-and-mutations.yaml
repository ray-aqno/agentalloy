      'use server'
      import { redirect } from 'next/navigation'
      import { revalidatePath } from 'next/cache'

      export async function createPost(formData: FormData) {
        const session = await auth()
        if (!session?.user) throw new Error('Unauthorized')

        try {
          await db.posts.create({ data: { /* ... */ } })
        } catch (err) {
          // handle DB error
          return { error: 'Save failed' }
        }
        revalidatePath('/posts')
        redirect('/posts') // OUTSIDE the try — must be reached without being caught
      }
      ```

      Order matters: revalidate before redirect, because `redirect` aborts execution.

  - sequence: 7
    fragment_type: example
    content: |
      ## Optimistic updates with `useOptimistic`

      `useOptimistic` (React 19) lets a client component render a provisional state immediately, then reconcile with the actual Server Action result on resolution. The optimistic state automatically rolls back if the action throws.

      ```tsx
      'use client'
      import { useOptimistic } from 'react'
      import { send } from './actions'

      type Message = { message: string }

      export function Thread({ messages }: { messages: Message[] }) {
        const [optimisticMessages, addOptimisticMessage] = useOptimistic<Message[], string>(
          messages,
          (state, newMessage) => [...state, { message: newMessage }],
        )
        const formAction = async (formData: FormData) => {
          const message = formData.get('message') as string
          addOptimisticMessage(message)
          await send(message)
        }
        return (
          <form action={formAction}>
            <input name="message" />
            <button>Send</button>
          </form>
        )
      }
      ```

      The provisional message renders on submit; if `send` throws, React rolls back to the prior `messages` prop. Pair with `useActionState` for explicit error display when rollback alone is not enough signal to the user.

      ## Server-side validation

      Client-side validation is a UX optimization, not a security boundary. Because every Server Action is reachable as a direct POST, a client that bypasses the form (curl, fetch, a modified bundle) submits arbitrary `FormData`. Validate inside the action with a schema library — Zod, Valibot, or hand-written guards:

      ```ts
      'use server'
      import { z } from 'zod'

      const CreatePost = z.object({
        title: z.string().min(1).max(200),
        body: z.string().min(1),
      })

      export async function createPost(prevState: State, formData: FormData) {
        const parsed = CreatePost.safeParse(Object.fromEntries(formData))
        if (!parsed.success) {
          return { error: parsed.error.flatten().fieldErrors }
        }
        // parsed.data is typed and trusted from here on
      }
      ```

  - sequence: 8
    fragment_type: example
    content: |
      ## The security edge: a Server Action without authorization

      Walk this edge. You build an admin page that renders a "Delete all records" form. The page redirects non-admins to `/login` at the top, so you reason: only admins ever see the form, only admins can submit it, no auth check needed in the action. The Data Security guide is explicit that this reasoning is wrong (verified 2026-05-06):

      ```ts
      // app/admin/actions.ts — VULNERABLE
      'use server'
      export async function deleteAllRecords() {
        await db.record.deleteMany() // NO AUTH CHECK
      }
      ```

      An attacker discovers the action ID by inspecting any page that imports it (the framework emits a stable hashed reference into the client bundle), then POSTs directly to the action endpoint with the action header — no UI, no admin page render. The mutation runs. The fix: every Server Action authenticates and authorizes inside its body:

      ```ts
      'use server'
      import { auth } from '@/lib/auth'
      export async function deleteAllRecords() {
        const session = await auth()
        if (!session?.user?.isAdmin) throw new Error('Unauthorized')
        await db.record.deleteMany()
      }
      ```

      Beyond authentication (is the user logged in?) check **authorization** (does this user have permission for this specific resource?) — the IDOR class. `deletePost(postId)` must verify `post.userId === session.user.id` before deleting, not just that the caller is logged in.

  - sequence: 9
    fragment_type: guardrail
    content: |
      ## Anti-patterns

      - **Skipping authz "because the client cannot call it."** It can — every Server Action is a public POST endpoint reachable by direct request, regardless of which page renders the form. The page-level auth check on the rendering route does not extend to the action.
      - **Not revalidating after a mutation.** The Next.js cache serves stale data until invalidated; users see their write succeed but the list page still shows the old rows. Call `revalidatePath` or `revalidateTag` before returning (or before `redirect`).
      - **Calling `redirect` inside `try/catch`.** `redirect` works by throwing a framework-handled exception. A surrounding `catch` swallows the throw and the navigation never happens. Place `redirect` outside any `try` block.
      - **Putting the only authorization check in the page that renders the form.** A page-level redirect controls UI rendering, not the Server Action's reachability. Authorize inside the action body.
      - **`'use server'` at the top of a file that exports types or constants.** Type-only exports (`type`, `interface`) are erased and safe, but every async function export becomes network-callable. Helpers, factories, and inadvertently-exported async values become Server Functions and leak. Keep `actions.ts` narrow.
      - **Reading `formData.get('field')` without null-narrowing in TypeScript.** The return type is `FormDataEntryValue | null` (`string | File | null`). Treating it as `string` directly compiles only with `as string` casts that hide bugs at runtime when the field is missing or is a file upload.
      - **Throwing from a `useActionState` reducer instead of returning an error state.** A throw causes React to skip subsequent queued dispatches. Catch inside the action and return `{ error }`.
      - **Trusting client-side validation only.** Required fields, length checks, and type coercion in the browser are UX, not security. Re-validate inside the action with a schema library.
      - **Calling `revalidatePath` or `revalidateTag` from a Client Component.** Both are server-only and throw if called from the client. Invoke them from inside the Server Action.

  - sequence: 10
    fragment_type: verification
    content: |
      ## Verification

      - [ ] Every `'use server'` file is in `app/lib/actions.ts` or similar narrow location, exporting only async functions. `grep -rn "^'use server'" app/ src/` and audit each file's exports.
      - [ ] Every Server Action authenticates the caller. `grep -rnB1 "'use server'" app/ src/` and confirm each enclosing async function calls `auth()`, `requireSession()`, or your Data Access Layer equivalent.
      - [ ] Every mutating Server Action calls `revalidatePath` or `revalidateTag`. `grep -rln "'use server'" app/ src/ | xargs grep -L "revalidatePath\|revalidateTag"` should return no files (or only files that exclusively read).
      - [ ] No Server Action calls `redirect` inside a `try` block. `grep -rnB10 "redirect(" app/lib/ | grep -B10 "try {"` — manually audit any matches.
      - [ ] Every `formData.get(...)` call in a Server Action is followed by a `typeof === 'string'` narrow or schema parse. `grep -rn "formData.get(" app/ src/` and audit each.
      - [ ] Imports are correct: `grep -rn "from 'next/cache'" app/ src/` shows `revalidatePath`/`revalidateTag` only; `grep -rn "from 'next/navigation'" app/ src/` shows `redirect`; `grep -rn "from 'react'" app/ src/ | grep -E 'useActionState|useOptimistic'` and `grep -rn "from 'react-dom'" app/ src/ | grep useFormStatus`.
      - [ ] React version is 19+ in `package.json`. `node -e "console.log(require('./package.json').dependencies.react)"` returns a 19+ range.
      - [ ] Next.js version is 16+ in `package.json`. `node -e "console.log(require('./package.json').dependencies.next)"` returns a 16+ range.
      - [ ] `revalidateTag` calls pass the `profile` argument (`'max'` or a custom cacheLife profile). `grep -rn "revalidateTag(" app/ src/` and confirm each call has two arguments — single-argument calls are deprecated in Next.js 16.2.4.

      ## Verified

      - Server Actions / Server Functions stable in Next.js App Router; React 19 `useActionState` and `useOptimistic` shipped December 2024 (verified 2026-05-06).
      - `revalidatePath` and `revalidateTag` stable in `next/cache`; `revalidateTag` single-argument form deprecated in Next.js 16.2.4 in favor of explicit `profile` (verified 2026-05-06 against nextjs.org/docs/app/api-reference/functions/revalidateTag).
      - `redirect` from `next/navigation` works by throwing a framework-handled control-flow exception; must be called outside `try/catch` (verified 2026-05-06 against nextjs.org/docs/app/getting-started/mutating-data).
      - Every Server Action is a network-reachable POST endpoint; page-level auth does not extend to the action (verified 2026-05-06 against nextjs.org/docs/app/guides/data-security).
      - `useFormStatus` returns status only for the parent `<form>` and only when called from a component rendered inside it (verified 2026-05-06 against react.dev/reference/react-dom/hooks/useFormStatus).
      - `useActionState` reducer throws cause React to skip subsequently queued dispatches; catch inside and return error state (verified 2026-05-06 against react.dev/reference/react/useActionState).
