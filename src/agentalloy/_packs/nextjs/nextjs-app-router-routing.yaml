    content: |
      ## `<Link>` — prefetch and client-side navigation

      `<Link>` from `next/link` extends `<a>` with prefetching and client-side transitions. Prefetching is automatic in production for visible `<Link>` elements; the prefetched RSC payload is hydrated on click without a full request.

      ```tsx
      import Link from 'next/link';

      export default async function Posts() {
        const posts = await getPosts();
        return (
          <ul>
            {posts.map((post) => (
              <li key={post.slug}>
                <Link href={`/blog/${post.slug}`}>{post.title}</Link>
              </li>
            ))}
          </ul>
        );
      }
      ```

      `<Link>` is the primary navigation primitive. For programmatic navigation, use the `useRouter` hook from `next/navigation`. The plain `<a>` tag still works but triggers a full document reload and loses the App Router's state preservation. To force a reload, set `prefetch={false}` and use a regular anchor.

  - sequence: 9
    fragment_type: guardrail
    content: |
      ## Anti-patterns

      - **Auth checks placed only in `layout.tsx`.** Layouts do NOT re-render on navigations within their subtree — once a user has rendered a layout, navigating between sibling pages does not re-execute the layout's body. A redirect call there fires only on the initial entry. Per-request authorization belongs in `proxy.ts` (Next.js 16's renamed middleware) or at the top of each `page.tsx`/`route.ts` body, not in a layout.
      - **Both `route.ts` and `page.tsx` in the same folder.** Build error. A segment is either a UI page or an HTTP endpoint, not both. Move the handler under `app/api/...` or rename the segment.
      - **Synchronous destructure of `params` in Next.js 15+.** Code copied from pre-15 docs that writes `function Page({ params }) { const { slug } = params; }` now reads a `Promise` and either TypeScript-errors or surfaces the dev-time warning "params should be awaited." Always `await params` in Server Components or `use(params)` in Client Components.
      - **Putting `'use client'` at the top of `app/layout.tsx`.** Forces the entire route tree under that layout into the client bundle and disables server data fetching for every page below it. Push the directive down to the leaves that actually need state, effects, or browser APIs.
      - **Forgetting `default.tsx` for a parallel-route slot.** When the user hard-navigates to a URL that does not match a slot, the framework needs a fallback to render. Without `default.tsx` you get either an unexpected 404 or a stale slot rendering, depending on the navigation type.
      - **Building auth-aware redirects with `useEffect` in a Server Component file.** A Server Component that imports `useEffect` is a TypeScript and runtime error — Server Components have no effects. If you need an effect, mark the file `'use client'` (and accept the bundle cost) or move the redirect to the server side using `redirect()` from `next/navigation`.
      - **Treating Pages Router conventions as App Router conventions.** `getServerSideProps`, `getStaticProps`, `_app.tsx`, `_document.tsx`, and `pages/api/*` are Pages Router APIs. The App Router has no equivalent: data fetching is done by `await`ing in Server Components, the root layout replaces `_document`, and `route.ts` replaces `pages/api`. Mixing the two within the same project is supported but conventions do NOT cross over.
      - **Deeply nested layouts that copy boilerplate.** When five segments each repeat the same nav header, factor the JSX into a shared module (e.g. `app/_components/SiteNav.tsx`) imported by each layout. The leading underscore folder is excluded from routing.

  - sequence: 10
    fragment_type: verification
    content: |
      ## Verification

      - [ ] App Router is in use, not Pages Router. `test -d app && echo app-router` should print, and `test -d pages` should be empty (or both directories present if intentionally migrating).
      - [ ] Root layout exists and emits `<html>` and `<body>`. `grep -nE '<html' app/layout.tsx` and `grep -nE '<body' app/layout.tsx` each return exactly one match.
      - [ ] No folder contains both `route.ts` and `page.tsx`. `find app -type d -exec sh -c 'test -f "$1/route.ts" && test -f "$1/page.tsx" && echo "CONFLICT: $1"' _ {} \;` returns no lines.
      - [ ] All dynamic segments treat `params` as a Promise. `grep -rnE 'params:\s*\{[^}]*\}' app` should return zero matches whose value is not wrapped in `Promise<...>`. Run `pnpm tsc --noEmit` — TypeScript flags every synchronous destructure.
      - [ ] No Server Component file imports `useEffect` or `useState` without `'use client'`. `grep -rLn "'use client'" app | xargs grep -lE 'useEffect|useState' 2>/dev/null` should return no files.
      - [ ] Every parallel-route slot has either a matching page for every reachable URL or a `default.tsx`. `find app -type d -name '@*' -exec sh -c 'test -f "$1/default.tsx" || test -f "$1/default.js" || echo "MISSING default: $1"' _ {} \;` returns no lines.
      - [ ] Every `error.tsx` is a Client Component. `for f in $(find app -name error.tsx); do head -1 "$f" | grep -q "'use client'" || echo "MISSING use client: $f"; done` returns no lines.
      - [ ] Auth redirects are not buried in layouts. `grep -rn -E '(redirect|notFound)\(' app/**/layout.tsx` and review each hit — layouts do not re-render between sibling navigations.
      - [ ] `<Link>` is imported from `next/link`, not authored as raw `<a>` for in-app navigation. `grep -rnE '<a [^>]*href="/' app` should be reviewed; raw anchors trigger full reloads.
      - [ ] Next.js version is 15.0.0 or later (so the `params` Promise contract holds). `node -e "console.log(require('./package.json').dependencies.next)"` returns a 15+ range.

      ## Verified

      - App Router stable since Next.js 13.4 (May 2023); current release 16.2.4 per `nextjs.org/docs-index` (verified 2026-05-06).
      - `params` and `searchParams` are Promises starting in Next.js 15 (October 2024) per `nextjs.org/docs/app/api-reference/file-conventions/dynamic-routes` and `.../page` and `.../route` (verified 2026-05-06).
      - Parallel routes slot prop pattern, `default.js` fallback, slot URL transparency per `nextjs.org/docs/app/api-reference/file-conventions/parallel-routes` (verified 2026-05-06).
      - Intercepting routes `(.)`, `(..)`, `(..)(..)`, `(...)` resolution rules and segment-not-filesystem semantics per `nextjs.org/docs/app/api-reference/file-conventions/intercepting-routes` (verified 2026-05-06).
      - Route Handler verb set (`GET`, `POST`, `PUT`, `PATCH`, `DELETE`, `HEAD`, `OPTIONS`), context `params` Promise shape, and synthesized `OPTIONS` per `nextjs.org/docs/app/api-reference/file-conventions/route` (verified 2026-05-06).
      - `<Link>` prefetching and client-side transitions per `nextjs.org/docs/app/getting-started/layouts-and-pages` and `.../linking-and-navigating` (verified 2026-05-06).
      - Next.js 16 renames the middleware special file from `middleware.js` to `proxy.js` per `nextjs.org/docs-index` `proxy.js` entry (verified 2026-05-06).
