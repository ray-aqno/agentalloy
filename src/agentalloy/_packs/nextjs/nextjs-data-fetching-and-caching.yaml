raw_prose: |
  # Next.js 16 Data Fetching and Caching

  Next.js 16 (October 2025, current 16.2.4 verified 2026-05-06) introduces **Cache Components**, an opt-in rendering model that replaces the implicit fetch-cached-by-default behavior of earlier App Router versions. With `cacheComponents: true` in `next.config.ts`, fetch results are NOT cached across requests; you opt in to caching explicitly with the `'use cache'` directive. Identical `fetch` calls inside the same render are still memoized so you can call them in the components that need the data instead of prop-drilling. This skill covers the new model end to end: enabling Cache Components, the two scopes of `'use cache'`, `cacheLife` profiles, tag-based revalidation with `cacheTag` and `revalidateTag`, streaming dynamic data through `<Suspense>`, and the request-time-API edge that forces a function to be dynamic.

  ## Enabling Cache Components

  Cache Components is opt-in. Add the flag in `next.config.ts`:

  ```ts
  // next.config.ts
  import type { NextConfig } from 'next'

  const nextConfig: NextConfig = {
    cacheComponents: true,
  }

  export default nextConfig
  ```

  Once enabled, the entire app runs under the new semantics: `fetch` is no longer cached by default, route segment options like `force-static`/`force-dynamic` are not the primary control surface, and every page is treated as a static shell into which dynamic regions stream via `<Suspense>`. `GET` Route Handlers follow the same prerendering model as pages. Migration warning: enabling this mid-app without auditing fetches that previously cached implicitly will silently regress hit rates and load real backends on every request — inventory those callsites first and add `'use cache'` where the implicit caching was load-bearing.

  ## Fetching data in Server Components

  In an `async` Server Component you `await` data directly. The component runs once on the server per render and its output is serialized to the client.

  ```tsx
  // app/blog/page.tsx
  export default async function Page() {
    const data = await fetch('https://api.vercel.app/blog')
    const posts = await data.json()
    return (
      <ul>
        {posts.map((post: { id: string; title: string }) => (
          <li key={post.id}>{post.title}</li>
        ))}
      </ul>
    )
  }
  ```

  Two properties of `fetch` under Cache Components, verbatim from the upstream docs (verified 2026-05-06): identical `fetch` requests in a React component tree are memoized within a single render so you can call them in the component that needs the data instead of drilling props; `fetch` requests are not cached across requests by default and will block rendering until the request completes — wrap the fetching component in `<Suspense>` to stream, or apply `'use cache'` to cache the result.

  ORM and direct DB queries work identically — credentials and query logic stay on the server, never crossing into the client bundle:

  ```tsx
  // app/blog/page.tsx
  import { db, posts } from '@/lib/db'

  export default async function Page() {
    const allPosts = await db.select().from(posts)
    return (
      <ul>
        {allPosts.map((post) => (
          <li key={post.id}>{post.title}</li>
        ))}
      </ul>
    )
  }
  ```

  ## `'use cache'` at two scopes

  The `'use cache'` directive caches the return value of an async function or component. Two placements:

  **Data-level** — at the top of an async function body, the function's return value is cached keyed on its arguments and any closed-over values:

  ```tsx
  // app/lib/data.ts
  import { cacheLife } from 'next/cache'

  export async function getUsers() {
    'use cache'
    cacheLife('hours')
    return db.query('SELECT * FROM users')
  }
  ```

  **UI-level** — at the top of a Server Component, page, or layout body, the entire rendered output is cached:

  ```tsx
  // app/page.tsx
  import { cacheLife } from 'next/cache'

  export default async function Page() {
    'use cache'
    cacheLife('hours')

    const users = await db.query('SELECT * FROM users')
    return (
      <ul>
        {users.map((user: { id: string; name: string }) => (
          <li key={user.id}>{user.name}</li>
        ))}
      </ul>
    )
  }
  ```

  If `'use cache'` appears at the file level, every exported function in the file is cached. Arguments and any closed-over values from parent scopes automatically become part of the cache key, so different inputs produce separate entries — this is what makes parameterized cached content (e.g. `getUser(id)`) work. Per the upstream constraints (verified 2026-05-06): cache keys must be serializable; functions, class instances, Maps, Sets, and circular references cannot participate. A function that takes a non-serializable arg will miss the cache on every call.

  ## `cacheLife` profiles

  `cacheLife(profile)` from `next/cache` sets the cache lifetime for the enclosing `'use cache'` function. Preset profile names (verified 2026-05-06 against the cacheLife API reference):

  - `seconds` — real-time data (stock prices, live scores)
  - `minutes` — frequently updated feeds (social, news)
  - `hours` — multiple daily updates (inventory, weather)
  - `days` — daily updates (blog posts, articles)
  - `weeks` — weekly updates (podcasts, newsletters)
  - `max` — rarely changes (legal pages, archives)

  Each profile balances three timing properties — `stale` (how long the client may use the cached response without checking), `revalidate` (how often fresh content is generated on the server), and `expire` (when the entry is fully evicted). For custom timing, pass an object: `cacheLife({ stale: 60, revalidate: 300, expire: 3600 })`. Only one `cacheLife` call should execute per function invocation; if you branch on input, ensure only one branch's call runs. If you omit `cacheLife` inside a `'use cache'` function, the `default` profile applies.

  ## `cacheTag` and `revalidateTag` for invalidation

  `cacheTag(tag)` from `next/cache`, called inside a `'use cache'` function, attaches a string tag to the cache entry. After a mutation you call `revalidateTag(tag, profile)` from a Server Action or Route Handler to invalidate every entry that carries the tag.

  ```tsx
  // app/lib/posts.ts
  import { cacheLife, cacheTag } from 'next/cache'

  export async function getPosts() {
    'use cache'
    cacheLife('hours')
    cacheTag('posts')
    const res = await fetch('https://api.vercel.app/blog')
    return res.json()
  }
  ```

  ```tsx
  // app/posts/actions.ts
  'use server'
  import { revalidateTag } from 'next/cache'
  import { db } from '@/lib/db'

  export async function createPost(formData: FormData) {
    await db.posts.insert({ title: formData.get('title') as string })
    revalidateTag('posts', 'max') // stale-while-revalidate
  }
  ```

  Revalidation behavior, verbatim from the upstream `revalidateTag` reference (verified 2026-05-06): with `profile="max"` (recommended) the tag entry is marked stale and the next visit serves stale content while fresh content is fetched in the background; with a custom profile the named profile's behavior applies; the single-argument form `revalidateTag(tag)` is deprecated and will be removed. Tags are case-sensitive and capped at 256 characters. `revalidateTag` does not eagerly refetch — it marks data stale; the next page visit triggers the refresh.

  ## Streaming dynamic data with `<Suspense>`

  Components that read request-time data — `cookies()`, `headers()`, `searchParams`, dynamic `params` — cannot be statically prerendered. Wrap them in `<Suspense>` so the rest of the page renders as a static shell and the dynamic region streams when the request resolves.

  ```tsx
  // app/dashboard/page.tsx
  import { Suspense } from 'react'
  import { cookies } from 'next/headers'

  async function UserGreeting() {
    const cookieStore = await cookies()
    const theme = cookieStore.get('theme')?.value || 'light'
    return <p>Your theme: {theme}</p>
  }

  export default function Page() {
    return (
      <>
        <h1>Dashboard</h1>
        <Suspense fallback={<p>Loading...</p>}>
          <UserGreeting />
        </Suspense>
      </>
    )
  }
  ```

  The same pattern works for any `async` data-fetching child whose result must be fresh per request. Without the boundary the dynamic component blocks the entire page from streaming until its data resolves.

  ## The boundary edge: `'use cache'` plus `cookies()`

  Walk this edge. A function tries to combine caching with a request-time API:

  ```tsx
  // BROKEN — request-time API inside a cached function
  import { cookies } from 'next/headers'
  import { cacheLife } from 'next/cache'

  export async function getDashboard() {
    'use cache'
    cacheLife('minutes')
    const session = await cookies() // dynamic — forces request-time
    return db.dashboards.findForUser(session.get('uid')?.value)
  }
  ```

  The function is internally contradictory: `cookies()` makes the function dynamic and the cache directive cannot apply. The fix is to split: a cached function that takes the user id as a serializable argument, and a thin dynamic wrapper that reads the cookie and calls the cached function with the id.

  ```tsx
  // app/lib/dashboard.ts
  import { cacheLife, cacheTag } from 'next/cache'

  export async function getDashboard(userId: string) {
    'use cache'
    cacheLife('minutes')
    cacheTag(`dashboard:${userId}`)
    return db.dashboards.findForUser(userId)
  }

  // app/dashboard/Dashboard.tsx
  import { cookies } from 'next/headers'
  import { getDashboard } from '@/app/lib/dashboard'

  export default async function Dashboard() {
    const session = await cookies()
    const userId = session.get('uid')?.value
    if (!userId) return null
    const data = await getDashboard(userId) // cached per userId
    return <pre>{JSON.stringify(data)}</pre>
  }
  ```

  The wrapper is dynamic (so it must live inside a `<Suspense>` boundary), but the expensive work behind it is cached per user with a tag that supports targeted invalidation.

  ## Anti-patterns

  - **Enabling `cacheComponents: true` mid-app without auditing implicit fetch caches.** Pages that previously cached `fetch` calls by default will now hit your origin on every request. Inventory `fetch` callsites and add `'use cache'` where the implicit cache was load-bearing before flipping the flag.
  - **Putting `'use cache'` on a function that calls `cookies()`, `headers()`, or `searchParams`.** The request-time API forces the function dynamic; the cache directive does not apply. Split the function into a cached pure function keyed by a serializable id and a thin dynamic wrapper that reads the request data.
  - **Caching a function with a non-serializable argument.** Class instances, Maps, Sets, functions, and circular structures cannot participate in cache keys. Passing one produces a miss every call — the function still runs but you pay the cache machinery overhead with no hit-rate benefit.
  - **Applying `'use cache'` to mutations.** The directive caches return values; a mutation has side effects that you do not want to deduplicate. Mutations belong in Server Actions or Route Handlers; call `revalidateTag` after the mutation to invalidate the relevant cached reads.
  - **Forgetting `<Suspense>` around request-time data.** A bare `cookies()`-reading component blocks the entire response until the request resolves, defeating the static-shell-plus-streaming model. Wrap every dynamic region.
  - **Suspense boundaries placed too granularly.** A boundary per row produces a fallback waterfall, each fallback animating in turn. Group siblings that should appear together under one boundary.
  - **Calling the deprecated `revalidateTag(tag)` single-argument form.** It currently works only with TypeScript errors suppressed and is slated for removal. Use `revalidateTag(tag, 'max')` or `updateTag` per the current API.
  - **Tagging cached functions with high-cardinality dynamic strings without a budget.** A tag per user-id-per-resource is fine for targeted invalidation but produces an unbounded tag table — make sure the tag domain is intentional and finite enough to operate.

  ## Verification

  - [ ] `cacheComponents: true` is set in `next.config.ts`. Run `node -e "import('./next.config.ts').then(m => console.log(m.default.cacheComponents))"` (or `grep -n cacheComponents next.config.ts`) and confirm the flag.
  - [ ] Every cached function imports its helpers from `next/cache`. `grep -rnE "from ['\\\"]next/cache['\\\"]" app/ src/` lists the import sites; spot-check that each `'use cache'` block has a matching `cacheLife` import in scope.
  - [ ] Every `'use cache'` directive sits at the top of an async function or file, not inside a function body. `grep -rn "'use cache'" app/ src/` and audit each match for placement.
  - [ ] No `'use cache'` function calls `cookies()`, `headers()`, or reads `searchParams`. `grep -rn -B2 -A20 "'use cache'" app/ src/ | grep -E '(cookies|headers|searchParams)\\(' ` should return no hits inside cached blocks.
  - [ ] Every `cacheTag(...)` call has a corresponding `revalidateTag(...)` somewhere in the codebase. `grep -rnE "cacheTag\\(" app/ src/` and `grep -rnE "revalidateTag\\(" app/ src/` — every tag value in the first should appear in the second or be intentionally never-revalidated.
  - [ ] No deprecated single-argument `revalidateTag` calls remain. `grep -rnE "revalidateTag\\([^,)]+\\)" app/ src/` should return no hits; all calls take a profile second argument.
  - [ ] Every component reading request-time APIs is inside a `<Suspense>` boundary. `grep -rnE "(cookies|headers)\\(\\)" app/ src/` lists candidates; verify each is rendered under a `<Suspense fallback=...>`.
  - [ ] Every `<Suspense>` has a non-empty `fallback` prop. `grep -rnE "<Suspense[^>]*fallback=" app/ src/` count matches `grep -rn '<Suspense' app/ src/`.
  - [ ] Next.js version is 16.x (Cache Components requires 16+). `node -e "console.log(require('./package.json').dependencies.next)"` returns a 16+ range.

  ## Verified

  - Cache Components opt-in via `cacheComponents: true` in `next.config.ts`, including the migration note about `GET` Route Handlers following the page prerendering model, per nextjs.org/docs/app/getting-started/caching (verified 2026-05-06).
  - `'use cache'` two-scope semantics (data-level and UI-level), cache key derived from arguments and closed-over values, file-level placement caches all exports, per nextjs.org/docs/app/api-reference/directives/use-cache and the Caching getting-started page (verified 2026-05-06).
  - `cacheLife` preset profiles `seconds`, `minutes`, `hours`, `days`, `weeks`, `max`, plus the custom `{ stale, revalidate, expire }` shape, per nextjs.org/docs/app/api-reference/functions/cacheLife — Next.js 16.2.4 (verified 2026-05-06).
  - `revalidateTag(tag, profile)` two-argument signature is current; single-argument form is deprecated; tags are case-sensitive and capped at 256 characters; `profile="max"` provides stale-while-revalidate, per nextjs.org/docs/app/api-reference/functions/revalidateTag (verified 2026-05-06).
  - Identical `fetch` calls memoized within a render but not cached across requests under Cache Components; explicit `'use cache'` is required for cross-request caching, per nextjs.org/docs/app/getting-started/fetching-data (verified 2026-05-06).
  - Request-time APIs (`cookies`, `headers`, `searchParams`, dynamic `params`) require `<Suspense>` wrapping under Cache Components, per nextjs.org/docs/app/getting-started/caching "Working with runtime APIs" (verified 2026-05-06).

