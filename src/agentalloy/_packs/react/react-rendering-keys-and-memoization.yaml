raw_prose: |
  # React Rendering, Keys, and Memoization

  React's rendering model is two-phase: render means React calls your component functions to produce a JSX tree, then reconciles that tree against the previous one; commit means React applies the resulting DOM mutations. Pure render is the contract — no side effects, no DOM reads, no fetches inline — because React may render speculatively and discard the result. Side effects belong in event handlers and `useEffect`. Keys, `React.memo`, `useMemo`, and `useCallback` all exist to give the reconciler enough information to do the *right* thing during the diff: which children correspond to which previous children (keys), and which subtrees can be skipped entirely (memoization). The React Compiler (React 19+) automates most hand-rolled memoization but does not replace correct keys, and code authored to be correct without the compiler stays correct with it.

  ## Render and commit

  Rendering is React calling your component function to get JSX. Committing is React mutating the DOM to match. The split matters because render runs may be thrown away — React may render and not commit, render twice in development (Strict Mode), or render with stale props before another render arrives. Treat render as a pure function from props and state to JSX; never mutate refs, write to module-level variables, or fire requests during render. The render-commit boundary is also where the reconciler decides whether to mount, update, or unmount each element in the tree.

  Renders are triggered by initial mount, by a state setter, or by a parent re-rendering. A parent re-rendering re-renders all of its children by default — unless `React.memo` (or the React Compiler) decides the child's props are referentially equal to last render and skips it.

  ## Reconciliation: same type at same position preserves state

  Given the previous tree and a freshly-rendered tree, React walks position-by-position. At each position:

  - Same component type at the same position with the same `key`: React **preserves** the existing fiber, reuses the DOM node, and updates props. Component state survives.
  - Different component type at the same position: React **unmounts** the old subtree (state lost, effects cleaned up) and **mounts** the new one.
  - Same type at the same position but the `key` differs: React treats it as a new component — unmount + mount, state lost. This is the deliberate "reset state via key" mechanism.

  Walked: a `<Form>` rendered inside a parent that toggles `showAdvanced` between two slightly different layouts will lose its draft state if the toggle changes the JSX shape such that `<Form>` ends up at a different position (sibling index changes), or if a wrapper above it changes type. Position is structural — `if (cond) <Form/> else <div><Form/></div>` puts `<Form>` at different positions and remounts it across the toggle.

  ## Keys for lists: stable, unique, derived from data identity

  When rendering a list with `map`, every element needs a `key` prop. The reconciler uses keys to match new list items to previous list items — without keys (or with index keys on a mutable list), reordering, insertion, or deletion makes React match by position, which means each item *appears* to mutate into the next, state and DOM identity follow position rather than data.

  ```jsx
  // GOOD — stable id from the data
  function TodoList({ todos }) {
    return (
      <ul>
        {todos.map(todo => (
          <ItemRow key={todo.id} todo={todo} />
        ))}
      </ul>
    );
  }

  // BAD — array index as key on a list that can reorder
  function TodoList({ todos }) {
    return (
      <ul>
        {todos.map((todo, i) => (
          <ItemRow key={i} todo={todo} />
        ))}
      </ul>
    );
  }
  ```

  Walked-edge: a list rendered with `key={index}`, then the user sorts it. Item A was at index 0 with input focus; item B was at index 1. After sort, B is at index 0 and A is at index 1. Because keys are positional, React thinks "item with key 0 still exists, just got new props" — the input that had focus on A now has focus on B's value, the DOM node was reused but the component state belongs to a different conceptual row. State leaks across rows.

  Index keys are acceptable only when the list is static, never reordered, never inserted-in-the-middle, and items have no per-item state. When in doubt, mint a stable id at the point you build the data, not at the point you render it.

  ## `key` as a state-reset signal

  Because changing the `key` on a same-type element forces unmount+mount, you can deliberately reset a child's state by changing its key. The canonical use case is a form bound to a selected record — when the user picks a different record, you want the form's draft state cleared:

  ```jsx
  function RecordEditor({ recordId, record }) {
    // Changing recordId remounts <EditForm>, clearing its useState.
    return <EditForm key={recordId} record={record} />;
  }
  ```

  This is the documented escape hatch from "state is tied to position." Reach for it instead of plumbing a `useEffect` that resets every state slot whenever `recordId` changes — the key approach is one line, declarative, and cannot drift out of sync with the state shape. Do not abuse it: changing `key` on every render forces a remount on every render, defeating the reconciler entirely.

  ## `React.memo`: skip re-render when props are referentially equal

  `React.memo` wraps a component; on re-render, React shallow-compares new props to old props with `Object.is` per key, and if all equal, skips rendering the wrapped component (and its subtree, transitively, if children are also stable).

  ```jsx
  import { memo } from 'react';

  const ItemRow = memo(function ItemRow({ todo, onToggle }) {
    return (
      <li>
        <input type="checkbox" checked={todo.done} onChange={() => onToggle(todo.id)} />
        {todo.text}
      </li>
    );
  });
  ```

  The catch: shallow-equality on props means **referential** equality for objects, arrays, and functions. If the parent passes `onToggle={() => ...}` inline, that's a fresh function reference every render, `Object.is` returns false, and `memo` is a no-op. Same for `style={{color: 'red'}}` and `data={[...]}` inline. Either lift these to stable values, wrap them in `useMemo`/`useCallback`, or accept that `memo` won't help here.

  ## `useMemo` and `useCallback`: identity-stabilizers, not blanket optimizers

  `useMemo(fn, deps)` caches the result of `fn` between renders, recomputing only when a dependency in `deps` changes (compared with `Object.is`). `useCallback(fn, deps)` is the same idea for a function reference: the returned function is stable across renders unless deps change.

  ```jsx
  import { useMemo, useCallback } from 'react';

  function TodoList({ todos, filter, onToggle }) {
    const visible = useMemo(
      () => todos.filter(t => filter === 'all' || (filter === 'open' && !t.done)),
      [todos, filter]
    );
    const handleToggle = useCallback(id => onToggle(id), [onToggle]);
    return visible.map(todo => (
      <ItemRow key={todo.id} todo={todo} onToggle={handleToggle} />
    ));
  }
  ```

  Reach for `useMemo` when (a) the value is passed as a prop to a memoized child and identity must be stable across renders, or (b) the computation itself is genuinely expensive and runs on every render. Reach for `useCallback` for the same two reasons applied to function references. **Wrapping every value in `useMemo` is cargo-cult**: each `useMemo` adds bookkeeping, the dependency comparison itself costs, and most values are cheap to recompute. Profile before optimizing.

  ## React Compiler (React 19+): automatic memoization at compile time

  The React Compiler (GA-stage as of 2026-05-06) is a Babel-style compiler plugin that analyzes component code and inserts the equivalent of `useMemo`, `useCallback`, and `memo` where it would matter — values are cached based on inferred dependencies, child components skip re-renders when props are referentially stable. The react.dev `memo`, `useMemo`, and `useCallback` reference pages each carry a note: "React Compiler automatically applies the equivalent of `memo`/memoizes values and functions, reducing the need for manual memoization."

  Practical guidance:

  - **Adoption is uneven.** Many production codebases are not on the compiler yet, and even compiled code can be invoked from non-compiled code. Author code that is correct without the compiler — pure render, stable keys, no side-effects-during-render — and it stays correct with it.
  - **Manual `useMemo`/`useCallback` is still useful** during the transition: explicit memoization stays, the compiler simply makes additional cases fast that weren't before.
  - **Keys are not memoization.** The compiler does not invent `key` props for you; bad keys remain a correctness bug regardless of compiler status.

  ## "Why did this re-render?" — the diagnostic loop

  When a component re-renders unexpectedly, walk the chain in this order, using the React DevTools Profiler:

  1. Did the parent re-render? If no, the trigger was state or context owned by this component or an ancestor that propagated.
  2. Did the props change identity? Profiler's "why did this render?" panel shows which props changed by `Object.is`. Inline objects/arrays/functions almost always change identity.
  3. Did a context this component consumes change? `useContext` re-renders the consumer when the provider's value changes by `Object.is` — passing `value={{user, setUser}}` inline to a Provider re-renders every consumer on every parent render.
  4. Is `React.memo` in place but a no-op because of (2) or (3)? Stabilize the offending prop or accept the re-render.

  ## Anti-patterns

  - **Array index as `key` on a sortable, filterable, or insertable list.** Position-keyed identity drifts under reorder; component state and DOM identity attach to the wrong rows. Use a stable data id.
  - **`useMemo` on every value.** Adds bookkeeping cost without retrieval benefit on cheap computations. Reach for it for memoized-child props or genuinely expensive work.
  - **`React.memo` on a component whose props always change identity.** Inline objects/arrays/functions defeat the shallow compare; the wrap is dead weight. Stabilize the props or drop the memo.
  - **Changing `key` on every render to force a remount.** Defeats reconciliation; replace with the proper hook (`useEffect` cleanup, or lift the resettable state up).
  - **Inline object literal as a Context Provider `value`.** `<Ctx.Provider value={{user, setUser}}>` — every render of the provider creates a new object, every consumer re-renders. Wrap the value in `useMemo`.
  - **Inline arrow function passed to a `React.memo`'d child.** `<MemoChild onClick={() => ...} />` — fresh reference each render, `memo` no-ops. Use `useCallback` or hoist the handler.
  - **Side effects during render.** Fetching, subscribing, mutating refs, writing to module state — all forbidden in render. They run unpredictably (Strict Mode double-render, speculative renders) and break the reconciler's purity assumption.

  ## Verification

  - [ ] `grep -rnE 'key=\{(index|i|idx)\}' src/` returns no matches in lists that can reorder, filter, or accept inserts. Static lists with index keys carry a comment justifying the choice.
  - [ ] ESLint `react/jsx-key` rule is enabled and `npx eslint src/` exits 0 — the rule catches missing `key` props on `.map()`-rendered children.
  - [ ] `grep -rn 'React.memo\|memo(' src/` — for each match, inspect the call sites: every prop passed to the memoized component is either a primitive, a stable id, a `useMemo`/`useCallback` result, or a hoisted constant. Inline `{...}`, `[...]`, or `() => ...` props are bugs.
  - [ ] React DevTools Profiler "Highlight updates when components render" overlay shows no flashing on subtrees whose data did not change. Record a profile of a known-stable interaction (hovering an unrelated element) and confirm the memoized subtree does not re-render.
  - [ ] `grep -rnE '<[A-Z][A-Za-z]*\.Provider value=\{\{' src/` returns no matches — inline-object Provider values force every consumer to re-render. Each Provider value is either a `useMemo` result or a stable reference.
  - [ ] For any deliberate `key={recordId}`-style state-reset, a comment on the line names the intent ("remount to clear draft state on record change"). Drive-by readers will otherwise read it as a normal list key.
  - [ ] If the React Compiler is enabled, `npx react-compiler-healthcheck` (or the project's equivalent) reports zero opt-outs in the changed files; opt-outs imply the compiler found something it could not safely memoize and the code may need adjustment.

