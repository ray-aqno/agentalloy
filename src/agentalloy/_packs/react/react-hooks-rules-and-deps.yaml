      ## Verification

      - [ ] `eslint --rule 'react-hooks/rules-of-hooks: error' --rule 'react-hooks/exhaustive-deps: error' src/` exits 0.
      - [ ] `grep -rnE 'eslint-disable.*react-hooks/(exhaustive-deps|rules-of-hooks)' src/` returns no matches, or each match has a comment justifying the suppression with a link to the ticket.
      - [ ] No object, array, or function *literal* appears inside a deps array. Inventory with `grep -rnE '\}, ?\[.*\{|\}, ?\[.*\[|\}, ?\[.*=>' src/` and audit each hit.
      - [ ] No hook is called from inside an `if`/`for`/`while`/`switch` or after a `return`. The `react-hooks/rules-of-hooks` lint covers this; running it as `--max-warnings 0` enforces it.
      - [ ] `grep -rnE 'useEffect\(\s*async' src/` returns no matches — Effect callbacks are not `async` (they would return a Promise instead of a cleanup function).
      - [ ] No `ref.current` read inside JSX or top-level component body. `grep -rnE '\.current' src/` and confirm each access is inside an event handler, Effect, or imperative method.
      - [ ] Every `useEffect` that opens a subscription, timer, or AbortController returns a cleanup function. Inventory with `grep -rn 'useEffect' src/`; confirm each callback either is trivially synchronous-and-pure (rare) or returns a `() => ...` cleanup.
      - [ ] React DevTools Profiler shows no component re-rendering on every parent commit when its props are referentially stable — confirms `React.memo` + `useCallback`/`useMemo` are wired correctly where used.
      - [ ] React Strict Mode is enabled in development (`<StrictMode>` wraps the app root). Components survive the dev-mode double mount/cleanup cycle without duplicating subscriptions, double-counting, or invalidating tokens.
