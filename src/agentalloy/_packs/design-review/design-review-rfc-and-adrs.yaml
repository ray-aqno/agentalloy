raw_prose: |
  # Design Review — RFCs and Architecture Decision Records

  ## Overview

  RFCs propose changes; ADRs record decisions. Both are async, written-first artifacts that bound the design review workflow. RFC review surfaces tradeoffs before commitment; ADRs preserve the *why* once decisions are made. This skill covers both formats and the review patterns that apply to them.

  Sourced from agent-skills/documentation-and-adrs.

  ---

  # Documentation and ADRs

  ## Overview

  Document decisions, not just code. The most valuable documentation captures the *why* — the context, constraints, and trade-offs that led to a decision. Code shows *what* was built; documentation explains *why it was built this way* and *what alternatives were considered*. This context is essential for future humans and agents working in the codebase.

  ## When to Use

  - Making a significant architectural decision
  - Choosing between competing approaches
  - Adding or changing a public API
  - Shipping a feature that changes user-facing behavior
  - Onboarding new team members (or agents) to the project
  - When you find yourself explaining the same thing repeatedly

  **When NOT to use:** Don't document obvious code. Don't add comments that restate what the code already says. Don't write docs for throwaway prototypes.

  ## Architecture Decision Records (ADRs)

  ADRs capture the reasoning behind significant technical decisions. They're the highest-value documentation you can write.

  ### When to Write an ADR

  - Choosing a framework, library, or major dependency
  - Designing a data model or database schema
  - Selecting an authentication strategy
  - Deciding on an API architecture (REST vs. GraphQL vs. tRPC)
  - Choosing between build tools, hosting platforms, or infrastructure
  - Any decision that would be expensive to reverse

  ### ADR Template

  Store ADRs in `docs/decisions/` with sequential numbering:

  ```markdown
  # ADR-001: Use PostgreSQL for primary database

  ## Status
  Accepted | Superseded by ADR-XXX | Deprecated

  ## Date
  2025-01-15

  ## Context
  We need a primary database for the task management application. Key requirements:
  - Relational data model (users, tasks, teams with relationships)
  - ACID transactions for task state changes
  - Support for full-text search on task content
  - Managed hosting available (for small team, limited ops capacity)

  ## Decision
  Use PostgreSQL with Prisma ORM.

  ## Alternatives Considered

  ### MongoDB
  - Pros: Flexible schema, easy to start with
  - Cons: Our data is inherently relational; would need to manage relationships manually
  - Rejected: Relational data in a document store leads to complex joins or data duplication

  ### SQLite
  - Pros: Zero configuration, embedded, fast for reads
  - Cons: Limited concurrent write support, no managed hosting for production
  - Rejected: Not suitable for multi-user web application in production

  ### MySQL
  - Pros: Mature, widely supported
  - Cons: PostgreSQL has better JSON support, full-text search, and ecosystem tooling
  - Rejected: PostgreSQL is the better fit for our feature requirements

  ## Consequences
  - Prisma provides type-safe database access and migration management
  - We can use PostgreSQL's full-text search instead of adding Elasticsearch
  - Team needs PostgreSQL knowledge (standard skill, low risk)
  - Hosting on managed service (Supabase, Neon, or RDS)
  ```

  ### ADR Lifecycle

  ```
  PROPOSED → ACCEPTED → (SUPERSEDED or DEPRECATED)
  ```

  - **Don't delete old ADRs.** They capture historical context.
  - When a decision changes, write a new ADR that references and supersedes the old one.

  ## Inline Documentation

  ### When to Comment

  Comment the *why*, not the *what*:

  ```typescript
  // BAD: Restates the code
  // Increment counter by 1
  counter += 1;

  // GOOD: Explains non-obvious intent
  // Rate limit uses a sliding window — reset counter at window boundary,
  // not on a fixed schedule, to prevent burst attacks at window edges
  if (now - windowStart > WINDOW_SIZE_MS) {
    counter = 0;
    windowStart = now;
  }
  ```

  ### When NOT to Comment

  ```typescript
  // Don't comment self-explanatory code
  function calculateTotal(items: CartItem[]): number {
    return items.reduce((sum, item) => sum + item.price * item.quantity, 0);
  }

  // Don't leave TODO comments for things you should just do now
  // TODO: add error handling  ← Just add it

  // Don't leave commented-out code
  // const oldImplementation = () => { ... }  ← Delete it, git has history
  ```

  ### Document Known Gotchas

  ```typescript
  /**
   * IMPORTANT: This function must be called before the first render.
   * If called after hydration, it causes a flash of unstyled content
   * because the theme context isn't available during SSR.
   *
   * See ADR-003 for the full design rationale.
   */
  export function initializeTheme(theme: Theme): void {
    // ...
  }
  ```

  ## API Documentation

  For public APIs (REST, GraphQL, library interfaces):

  ### Inline with Types (Preferred for TypeScript)

  ```typescript
  /**
   * Creates a new task.
   *
   * @param input - Task creation data (title required, description optional)
   * @returns The created task with server-generated ID and timestamps
   * @throws {ValidationError} If title is empty or exceeds 200 characters
   * @throws {AuthenticationError} If the user is not authenticated
   *
   * @example
   * const task = await createTask({ title: 'Buy groceries' });
   * console.log(task.id); // "task_abc123"
   */
  export async function createTask(input: CreateTaskInput): Promise<Task> {
    // ...
  }
  ```

  ### OpenAPI / Swagger for REST APIs

  ```yaml
  paths:
    /api/tasks:
      post:
        summary: Create a task
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTaskInput'
        responses:
          '201':
            description: Task created
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Task'
          '422':
            description: Validation error
  ```

  ## README Structure

  Every project should have a README that covers:

  ```markdown
  # Project Name

  One-paragraph description of what this project does.

  ## Quick Start
  1. Clone the repo
  2. Install dependencies: `npm install`
  3. Set up environment: `cp .env.example .env`
  4. Run the dev server: `npm run dev`

  ## Commands
  | Command | Description |
  |---------|-------------|
  | `npm run dev` | Start development server |
  | `npm test` | Run tests |
  | `npm run build` | Production build |
  | `npm run lint` | Run linter |

  ## Architecture
  Brief overview of the project structure and key design decisions.
  Link to ADRs for details.

  ## Contributing
  How to contribute, coding standards, PR process.
  ```

  ## Changelog Maintenance

  For shipped features:

  ```markdown
  # Changelog

  ## [1.2.0] - 2025-01-20
  ### Added
  - Task sharing: users can share tasks with team members (#123)
  - Email notifications for task assignments (#124)

  ### Fixed
  - Duplicate tasks appearing when rapidly clicking create button (#125)

  ### Changed
  - Task list now loads 50 items per page (was 20) for better UX (#126)
  ```

  ## Documentation for Agents

  Special consideration for AI agent context:

  - **CLAUDE.md / rules files** — Document project conventions so agents follow them
  - **Spec files** — Keep specs updated so agents build the right thing
  - **ADRs** — Help agents understand why past decisions were made (prevents re-deciding)
  - **Inline gotchas** — Prevent agents from falling into known traps

  ## Common Rationalizations

  | Rationalization | Reality |
  |---|---|
  | "The code is self-documenting" | Code shows what. It doesn't show why, what alternatives were rejected, or what constraints apply. |
  | "We'll write docs when the API stabilizes" | APIs stabilize faster when you document them. The doc is the first test of the design. |
  | "Nobody reads docs" | Agents do. Future engineers do. Your 3-months-later self does. |
  | "ADRs are overhead" | A 10-minute ADR prevents a 2-hour debate about the same decision six months later. |
  | "Comments get outdated" | Comments on *why* are stable. Comments on *what* get outdated — that's why you only write the former. |

  ## Red Flags

  - Architectural decisions with no written rationale
  - Public APIs with no documentation or types
  - README that doesn't explain how to run the project
  - Commented-out code instead of deletion
  - TODO comments that have been there for weeks
  - No ADRs in a project with significant architectural choices
  - Documentation that restates the code instead of explaining intent

  ## Verification

  After documenting:

  - [ ] ADRs exist for all significant architectural decisions
  - [ ] README covers quick start, commands, and architecture overview
  - [ ] API functions have parameter and return type documentation
  - [ ] Known gotchas are documented inline where they matter
  - [ ] No commented-out code remains
  - [ ] Rules files (CLAUDE.md etc.) are current and accurate

  ## ADR core rule (one sentence)

  ADRs record *why*, are written when the decision is made, and are immutable once accepted — superseded, never edited. Most ADR collections that lost value broke this rule somewhere: records were written months after the fact (so the context was already lost), they recorded the *what* (which the code already shows) instead of the *why* (which only humans remember), or they were edited in place when the decision changed (destroying the historical reasoning).

  ## When an ADR is warranted

  Not every decision deserves an ADR. The bar is whether the decision will surface as "why is this done this way?" six months later. Specifically, write an ADR when:

  - The decision constrains future work (database choice, framework choice, deployment topology).
  - The decision is non-obvious (you would explain it in onboarding).
  - The decision picked one option over a real alternative (not "chose Postgres because everyone uses Postgres").
  - The decision is hard to reverse cheaply (any architectural commitment).

  Skip ADRs for routine decisions documented elsewhere: dependency upgrades (commit history), small refactors (the diff), feature implementations (PR description). The ADR collection is for the long arc, not daily work.

  ## The Nygard standard ADR shape

  - **Title.** A short noun phrase: "Use Postgres for primary OLTP storage", not a question.
  - **Status.** One of: `proposed`, `accepted`, `deprecated`, `superseded by ADR-NNNN`. Status changes over time; the rest of the document does not.
  - **Context.** What forces are at play — technical constraints, business pressure, team capability, prior commitments. The context section is what dates the document; a future reader uses it to decide whether the decision still applies.
  - **Decision.** The choice, stated plainly. One paragraph, present tense: "We will use Postgres."
  - **Consequences.** What changes as a result — what becomes easier, what becomes harder, what new commitments the team has taken on. Listing only the upsides is propaganda; listing the trade-offs is a record.

  Some teams add **Options Considered** as a separate section between Context and Decision.

  ## Number sequentially, store in the repo

  ADRs are numbered sequentially (`ADR-0001`, `ADR-0002`, ...) and stored as Markdown files in the repo, typically under `docs/adr/` or `architecture/decisions/`. They live with the code so they are versioned alongside it and discoverable through the same search the code uses.

  Numbers are never reused. If ADR-0007 is superseded, ADR-0023 might replace it; the file for ADR-0007 stays, with its status changed to `superseded by ADR-0023`.

  Tools like `adr-tools` (`adr new`, `adr supersede`) automate the numbering and cross-linking.

  ## Immutable after acceptance — supersede, don't edit

  Once an ADR is accepted, the body does not change. If the decision later turns out wrong, write a new ADR that supersedes the old one and explains the new reasoning. The superseded ADR keeps its original text plus a status header pointing to the successor.

  Editing in place destroys the record — a future reader cannot tell what the team believed when the decision was made vs. what they believe now. Typo fixes and link corrections are fine. Substantive rewrites of the reasoning are not.

  ## Write when the decision is made, not later

  The single biggest failure mode of ADR collections is "we'll write them up next week." Next week, the context has faded and the alternatives are half-remembered. The ADR ends up summarizing the decision (which the code shows anyway) without the *why* (which is the value).

  Write the ADR as part of making the decision. The PR that implements the decision should include the ADR. If the team has not coalesced around the decision yet, the ADR-in-progress is the artifact you discuss — proposing it surfaces the alternatives faster than discussing the implementation diff.

  ## ADRs are short — not RFCs in disguise

  An ADR is one to two pages. If it is longer, it is probably an RFC or a design document. The ADR captures the decision crisply; the design doc explores the design space. ADRs do not need long preambles, implementation details, or marketing language.

  ## ADR-specific anti-patterns

  - **Writing ADRs months after the fact.** Context is lost; the document degrades to a summary of the code.
  - **Recording the *what* not the *why*.** "We use Postgres." The code shows that. Why? What was the alternative? What were the trade-offs?
  - **Editing in place after a change of mind.** Destroys the historical record. Supersede instead.
  - **One-option-considered ADRs.** "We picked Postgres because Postgres is good." Without a real alternative, the ADR records a foregone conclusion, not a decision.
  - **ADRs that are RFCs in disguise.** Ten pages of design exploration is an RFC. The ADR captures the conclusion of an RFC, not the exploration.
  - **Living-doc ADRs that drift.** "Updated 2026-05-04: now we use MySQL instead." Edit creates ambiguity. Supersede.

  ## Tying ADRs to the code

  ADRs are most useful when the code that implements them references them. A comment like `// see ADR-0023` at a non-obvious config or schema definition points future readers to the rationale. A README section listing the active ADRs (and their statuses) makes them discoverable.

  Some teams add an `adr-link` lint that flags PRs touching files marked as covered by an ADR — forcing the author to update or supersede the ADR rather than silently changing the underlying decision.

  ## ADR verification checklist (Nygard discipline)

  - [ ] Each ADR file has the standard sections: title (noun phrase), status, context, decision, consequences (and optionally options considered).
  - [ ] ADR was written at the time of the decision, not retrofitted weeks later.
  - [ ] Decision section states the choice plainly in present tense, one paragraph.
  - [ ] Consequences section lists trade-offs honestly, including what becomes harder.
  - [ ] ADRs are stored in-repo (e.g. `docs/adr/`), numbered sequentially, never reused.
  - [ ] Superseded ADRs were not edited; their status was updated and a new ADR written that references the old.
  - [ ] At least two real options were weighed in any ADR claiming to capture a decision.

