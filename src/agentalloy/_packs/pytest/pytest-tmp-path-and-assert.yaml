raw_prose: |
  # Pytest tmp_path and Assertion Introspection

  ## Overview

  The `tmp_path` fixture provides a per-test temporary directory; `tmp_path_factory` provides session-scoped temp dirs. Pytest also rewrites `assert` statements at import time to produce detailed failure messages with intermediate values. This skill covers both surfaces.

  Sourced from https://docs.pytest.org/en/stable/how-to/tmp_path.html and https://docs.pytest.org/en/stable/how-to/assert.html.

  ---

  .. _`tmp_path handling`:
  .. _tmp_path:

  # How to use temporary directories and files in tests


  ## The ``tmp_path`` fixture


  You can use the ``tmp_path`` fixture which will provide a temporary directory
  unique to each test function.

  ``tmp_path`` is a `pathlib.Path` object. Here is an example test usage:

  ```python
  # content of test_tmp_path.py
  CONTENT = "content"
  ```


      def test_create_file(tmp_path):
          d = tmp_path / "sub"
          d.mkdir()
          p = d / "hello.txt"
          p.write_text(CONTENT, encoding="utf-8")
          assert p.read_text(encoding="utf-8") == CONTENT
          assert len(list(tmp_path.iterdir())) == 1
          assert 0

  Running this would result in a passed test except for the last
  ``assert 0`` line which we use to look at values:

  ```pytest
  $ pytest test_tmp_path.py
  =========================== test session starts ============================
  platform linux -- Python 3.x.y, pytest-9.x.y, pluggy-1.x.y
  rootdir: /home/sweet/project
  collected 1 item
  ```

      test_tmp_path.py F                                                   [100%]

      ================================= FAILURES =================================
      _____________________________ test_create_file _____________________________

      tmp_path = PosixPath('PYTEST_TMPDIR/test_create_file0')

          def test_create_file(tmp_path):
              d = tmp_path / "sub"
              d.mkdir()
              p = d / "hello.txt"
              p.write_text(CONTENT, encoding="utf-8")
              assert p.read_text(encoding="utf-8") == CONTENT
              assert len(list(tmp_path.iterdir())) == 1
      >       assert 0
      E       assert 0

      test_tmp_path.py:11: AssertionError
      ========================= short test summary info ==========================
      FAILED test_tmp_path.py::test_create_file - assert 0
      ============================ 1 failed in 0.12s =============================

  By default, ``pytest`` retains the temporary directory for the last 3 ``pytest``
  invocations. Concurrent invocations of the same test function are supported by
  configuring the base temporary directory to be unique for each concurrent
  run. See `temporary directory location and retention`_ for details.

  .. _`tmp_path_factory example`:

  ## The ``tmp_path_factory`` fixture


  The ``tmp_path_factory`` is a session-scoped fixture which can be used
  to create arbitrary temporary directories from any other fixture or test.

  For example, suppose your test suite needs a large image on disk, which is
  generated procedurally. Instead of computing the same image for each test
  that uses it into its own ``tmp_path``, you can generate it once per-session
  to save time:

  ```python
  # contents of conftest.py
  import pytest
  ```


      @pytest.fixture(scope="session")
      def image_file(tmp_path_factory):
          img = compute_expensive_image()
          fn = tmp_path_factory.mktemp("data") / "img.png"
          img.save(fn)
          return fn


      # contents of test_image.py
      def test_histogram(image_file):
          img = load_image(image_file)
          # compute and test histogram

  See `tmp_path_factory API <tmp_path_factory factory api>` for details.

  .. _`tmpdir and tmpdir_factory`:
  .. _tmpdir:

  ## The ``tmpdir`` and ``tmpdir_factory`` fixtures


  The ``tmpdir`` and ``tmpdir_factory`` fixtures are similar to ``tmp_path``
  and ``tmp_path_factory``, but use/return legacy `py.path.local`_ objects
  rather than standard `pathlib.Path` objects.

  .. note::
      These days, it is preferred to use ``tmp_path`` and ``tmp_path_factory``.

      In order to help modernize old code bases, one can run pytest with the legacypath
      plugin disabled:

      ```bash
      pytest -p no:legacypath
  ```

      This will trigger errors on tests using the legacy paths.
      It can also be permanently set as part of the `addopts` parameter in the
      config file.

  See `tmpdir <tmpdir>` `tmpdir_factory <tmpdir_factory>`
  API for details.


  .. _`temporary directory location and retention`:

