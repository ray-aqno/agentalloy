raw_prose: |
  # Snowflake Cost Monitoring and Optimization

  ## Overview

  Snowflake bills by warehouse-size-second (compute) plus storage. Costs balloon when small teams self-serve queries on giant warehouses. The discipline: monitor per-warehouse usage, set Resource Monitors as guardrails, attribute costs to teams, and right-size warehouses to actual workload.

  ---

  ## The Credit Model

  Compute costs scale with warehouse size:

  - X-Small: 1 credit/hour
  - Small: 2 credits/hour
  - Medium: 4 credits/hour
  - Large: 8 credits/hour
  - X-Large: 16 credits/hour
  - 2X-Large: 32 credits/hour
  - 3X-Large: 64 credits/hour
  - 4X-Large: 128 credits/hour
  - 5X-Large: 256 credits/hour
  - 6X-Large: 512 credits/hour

  Doubles per size. Auto-suspend means idle warehouses don't charge.

  ## Where Credits Go — ACCOUNT_USAGE Schema

  ```sql
  -- Credits by warehouse, last 30 days
  SELECT
    warehouse_name,
    SUM(credits_used) AS credits
  FROM SNOWFLAKE.ACCOUNT_USAGE.WAREHOUSE_METERING_HISTORY
  WHERE start_time > CURRENT_DATE - 30
  GROUP BY 1
  ORDER BY credits DESC;
  ```

  ```sql
  -- Credits by user / role
  SELECT
    user_name,
    role_name,
    SUM(credits_used_cloud_services + execution_time / 1000 / 60 / 60 * warehouse_size_credits) AS credits
  FROM SNOWFLAKE.ACCOUNT_USAGE.QUERY_HISTORY q
  JOIN warehouse_sizes ws ON q.warehouse_size = ws.size
  WHERE start_time > CURRENT_DATE - 30
  GROUP BY 1, 2
  ORDER BY credits DESC;
  ```

  Attribute spend to teams via warehouse naming convention (`analytics_wh`, `eng_wh`, `prod_wh`) and role usage.

  ## Resource Monitors

  ```sql
  CREATE RESOURCE MONITOR analytics_monthly
    CREDIT_QUOTA = 1000
    FREQUENCY = MONTHLY
    START_TIMESTAMP = IMMEDIATELY
    TRIGGERS
      ON 75 PERCENT DO NOTIFY
      ON 90 PERCENT DO NOTIFY
      ON 100 PERCENT DO SUSPEND
      ON 120 PERCENT DO SUSPEND_IMMEDIATE;

  ALTER WAREHOUSE analytics_wh SET RESOURCE_MONITOR = analytics_monthly;
  ```

  Notifies stakeholders at 75% / 90%; suspends the warehouse at 100% (running queries finish) or immediately at 120% (kills running queries).

  Attaching to multiple warehouses caps shared spend. The pattern: per-team monitors with a budget; org-level monitor as a backstop.

  ## Right-Sizing Warehouses

  Bigger warehouses run queries faster but cost more per second. The sweet spot is when query duration is dominated by inherent complexity, not data scan time.

  To find right size:

  ```sql
  -- Average duration per warehouse
  SELECT
    warehouse_size,
    AVG(execution_time / 1000.0) AS avg_seconds,
    AVG(bytes_scanned / 1024.0 / 1024 / 1024) AS avg_gb_scanned,
    COUNT(*) AS queries
  FROM SNOWFLAKE.ACCOUNT_USAGE.QUERY_HISTORY
  WHERE start_time > CURRENT_DATE - 7
  GROUP BY 1;
  ```

  If queries on Small finish in <30s and you bump to Medium, you'll often see ~50% reduction in time at 100% more cost — net negative.

  ## Multi-Cluster Warehouses

  For high concurrency:

  ```sql
  ALTER WAREHOUSE analytics_wh
    SET MIN_CLUSTER_COUNT = 1
    MAX_CLUSTER_COUNT = 5
    SCALING_POLICY = 'STANDARD';
  ```

  Adds clusters when queue grows. STANDARD policy is conservative; ECONOMY waits longer before adding.

  For multi-tenant analytics where different teams hit the same warehouse, multi-cluster prevents one team's slow queries from blocking another.

  ## Auto-Suspend and Auto-Resume

  ```sql
  ALTER WAREHOUSE small_wh
    SET AUTO_SUSPEND = 60      -- seconds
    AUTO_RESUME = TRUE;
  ```

  Default is 600 seconds (10 minutes) — too long for many use cases. Set to 60 for warehouses serving sporadic queries; pay only for actual work.

  ## Query Result Caching

  Identical queries within 24 hours return from cache for free:

  ```sql
  SET USE_CACHED_RESULT = TRUE;  -- session level
  ALTER ACCOUNT SET USE_CACHED_RESULT = TRUE;  -- account level (default)
  ```

  If a dashboard hits the same dim_orders rollup 50 times an hour, 49 of those are free. Always-on by default.

  ## Materialized Views and Dynamic Tables

  For repeatedly-recomputed aggregations, materialize:

  - **Materialized view** — Snowflake refreshes on source changes; compute cost when source updates.
  - **Dynamic table** — declarative incremental; same idea but more flexible.

  Cheaper than running the same aggregation on every query if it's expensive.

  ## Common Pitfalls

  - **One giant warehouse for everything.** No team-level cost attribution; one bad query slows everyone. Split per-team or per-workload.
  - **Auto-suspend at the default 10 minutes.** A query at 9:00 keeps the warehouse alive to 9:10 for free, but if the next query is at 9:15, you paid 10 minutes for nothing.
  - **No Resource Monitor.** A runaway COPY INTO from a misconfigured pipeline burns through monthly budget overnight.
  - **Big warehouse for small queries.** A 4X-Large running a SELECT * LIMIT 10 — overkill, expensive.
  - **Result cache disabled.** Identical queries cost compute every time. Re-enable.

  ## Verification

  Healthy Snowflake spend:

  - ACCOUNT_USAGE shows steady-state credits matching budget.
  - Resource Monitors at 50-75% of monthly budget by mid-month.
  - No 'mystery warehouses' burning credits without owner.
  - Per-team attribution visible via warehouse naming + role usage.
  - Right-sized warehouses: avg query duration in expected range for warehouse size.
