  # Warehouse considerations

  This topic provides general guidelines and best practices for using virtual warehouses in Snowflake to process queries. It does
  not provide specific or absolute numbers, values, or recommendations because every query scenario is different and is affected by
  numerous factors, including number of concurrent users/queries, number of tables being queried, and data size and composition, as well as
  your specific requirements for warehouse availability, latency, and cost.

  It also does not cover warehouse considerations for data loading, which are covered in another topic (see the sidebar).

  The keys to using warehouses effectively and efficiently are:

  1. Experiment with different types of queries and different warehouse sizes to determine the combinations that best meet your
     specific query needs and workload.
  2. Don’t focus on warehouse size. Snowflake utilizes per-second billing, so you can run larger warehouses (Large, X-Large,
     2X-Large, etc.) and simply suspend them when not in use.

  > **Note:**
  >
  > These guidelines and best practices apply to both single-cluster warehouses, which are standard for all accounts, and
  > [multi-cluster warehouses](warehouses-multicluster.md), which are available in [Snowflake Enterprise Edition](intro-editions.md) (and higher).

  ## How are credits charged for warehouses?

  Credit charges are calculated based on:

  * The warehouse size.
  * The number of clusters (if using [multi-cluster warehouses](warehouses-multicluster.md)).
  * The length of time the compute resources in each cluster runs.

  For example:

  X-Small:
  :   Bills 1 credit per full, continuous hour that each cluster runs; each successive size generally doubles the number of compute
      resources per warehouse.

  4X-Large:
  :   Bills 128 credits per full, continuous hour that each cluster runs.

  Note the following:

  * When compute resources are provisioned for a warehouse:

    + The minimum billing charge for provisioning compute resources is 1 minute (i.e. 60 seconds).
    + There is no benefit to stopping a warehouse before the first 60-second period is over because the credits have already
      been billed for that period.
    + After the first 60 seconds, all subsequent billing for a running warehouse is per-second (until all its compute resources are shut down).
      Three examples are provided below:

      - If a warehouse runs for 30 to 60 seconds, it is billed for 60 seconds.
      - If a warehouse runs for 61 seconds, it is billed for only 61 seconds.
      - If a warehouse runs for 61 seconds, shuts down, and then restarts and runs for less than 60 seconds, it is billed for 121 seconds (60 + 1 + 60).
  * Resizing a warehouse provisions additional compute resources for each cluster in the warehouse:

    + This results in a corresponding increase in the number of credits billed for the warehouse (while the additional compute resources are running).
    + The additional compute resources are billed when they are provisioned (i.e. credits for the additional resources are billed relative
      to the time when the warehouse was resized).
    + Resizing between a 5XL or 6XL warehouse to a 4XL or smaller warehouse results in a brief period during which the customer is
      charged for both the new warehouse and the old warehouse while the old warehouse is quiesced.
    + Credit usage is displayed in hour increments. With per-second billing, you will see fractional amounts for credit usage/billing.

  > **Tip:**
  >
  > For information about cost implications of changing the RESOURCE_CONSTRAINT property, see
  > [considerations for changing RESOURCE_CONSTRAINT while a warehouse is running or suspended](warehouses-gen2.md).

  ---

  ## Where Credits Go — ACCOUNT_USAGE Schema

  ```sql
  -- Credits by warehouse, last 30 days
  SELECT
    warehouse_name,
    SUM(credits_used) AS credits
  FROM SNOWFLAKE.ACCOUNT_USAGE.WAREHOUSE_METERING_HISTORY
  WHERE start_time > CURRENT_DATE - 30
  GROUP BY 1
  ORDER BY credits DESC;
  ```

  ```sql
  -- Credits by user / role
  SELECT
    user_name,
    role_name,
    SUM(credits_used_cloud_services + execution_time / 1000 / 60 / 60 * warehouse_size_credits) AS credits
  FROM SNOWFLAKE.ACCOUNT_USAGE.QUERY_HISTORY q
  JOIN warehouse_sizes ws ON q.warehouse_size = ws.size
  WHERE start_time > CURRENT_DATE - 30
  GROUP BY 1, 2
  ORDER BY credits DESC;
  ```

  Attribute spend to teams via warehouse naming convention (`analytics_wh`, `eng_wh`, `prod_wh`) and role usage.

  ## Resource Monitors

  ```sql
  CREATE RESOURCE MONITOR analytics_monthly
    CREDIT_QUOTA = 1000
    FREQUENCY = MONTHLY
    START_TIMESTAMP = IMMEDIATELY
    TRIGGERS
      ON 75 PERCENT DO NOTIFY
      ON 90 PERCENT DO NOTIFY
      ON 100 PERCENT DO SUSPEND
      ON 120 PERCENT DO SUSPEND_IMMEDIATE;

  ALTER WAREHOUSE analytics_wh SET RESOURCE_MONITOR = analytics_monthly;
  ```

  Notifies stakeholders at 75% / 90%; suspends the warehouse at 100% (running queries finish) or immediately at 120% (kills running queries).

  Attaching to multiple warehouses caps shared spend. The pattern: per-team monitors with a budget; org-level monitor as a backstop.

  ## Right-Sizing Warehouses

  Bigger warehouses run queries faster but cost more per second. The sweet spot is when query duration is dominated by inherent complexity, not data scan time.

  ```sql
  -- Average duration per warehouse
  SELECT
    warehouse_size,
    AVG(execution_time / 1000.0) AS avg_seconds,
    AVG(bytes_scanned / 1024.0 / 1024 / 1024) AS avg_gb_scanned,
    COUNT(*) AS queries
  FROM SNOWFLAKE.ACCOUNT_USAGE.QUERY_HISTORY
  WHERE start_time > CURRENT_DATE - 7
  GROUP BY 1;
  ```

  If queries on Small finish in <30s and you bump to Medium, you'll often see ~50% reduction in time at 100% more cost — net negative.

  ## Multi-Cluster Warehouses

  For high concurrency:

  ```sql
  ALTER WAREHOUSE analytics_wh
    SET MIN_CLUSTER_COUNT = 1
    MAX_CLUSTER_COUNT = 5
    SCALING_POLICY = 'STANDARD';
  ```

  Adds clusters when queue grows. STANDARD policy is conservative; ECONOMY waits longer before adding. Multi-cluster prevents one team's slow queries from blocking another in shared analytics warehouses.

  ## Auto-Suspend and Auto-Resume

  ```sql
  ALTER WAREHOUSE small_wh
    SET AUTO_SUSPEND = 60      -- seconds
    AUTO_RESUME = TRUE;
  ```

  Default is 600 seconds (10 minutes) — too long for many use cases. Set to 60 for warehouses serving sporadic queries; pay only for actual work.

  ## Query Result Caching

  Identical queries within 24 hours return from cache for free:

  ```sql
  SET USE_CACHED_RESULT = TRUE;  -- session level
  ALTER ACCOUNT SET USE_CACHED_RESULT = TRUE;  -- account level (default)
  ```

  If a dashboard hits the same dim_orders rollup 50 times an hour, 49 of those are free. Always-on by default.

  ## Materialized Views and Dynamic Tables

  For repeatedly-recomputed aggregations, materialize:

  - **Materialized view** — Snowflake refreshes on source changes; compute cost when source updates.
  - **Dynamic table** — declarative incremental; same idea but more flexible.

  Cheaper than running the same aggregation on every query if it's expensive.

  ## Common Pitfalls

  - **One giant warehouse for everything.** No team-level cost attribution; one bad query slows everyone. Split per-team or per-workload.
  - **Auto-suspend at the default 10 minutes.** A query at 9:00 keeps the warehouse alive to 9:10 for free, but if the next query is at 9:15, you paid 10 minutes for nothing.
  - **No Resource Monitor.** A runaway COPY INTO from a misconfigured pipeline burns through monthly budget overnight.
  - **Big warehouse for small queries.** A 4X-Large running a SELECT * LIMIT 10 — overkill, expensive.
  - **Result cache disabled.** Identical queries cost compute every time. Re-enable.

  ## Verification

  Healthy Snowflake spend:

  - ACCOUNT_USAGE shows steady-state credits matching budget.
  - Resource Monitors at 50-75% of monthly budget by mid-month.
  - No 'mystery warehouses' burning credits without owner.
  - Per-team attribution visible via warehouse naming + role usage.
  - Right-sized warehouses: avg query duration in expected range for warehouse size.
