raw_prose: |
  # Python asyncio — Streams and Network I/O

  ## Overview

  asyncio's stream API wraps low-level transports in a high-level reader/writer interface. StreamReader.read*, StreamWriter.write + drain, and the connection helpers cover most network I/O needs. This skill covers the streams surface.

  Sourced from docs.python.org/3/library/asyncio-stream.html.

  .. _asyncio-streams:

  =======
  # Streams

  **Source code:** `Lib/asyncio/streams.py`

  -------------------------------------------------

  Streams are high-level async/await-ready primitives to work with
  network connections.  Streams allow sending and receiving data without
  using callbacks or low-level protocols and transports.

  .. _asyncio_example_stream:

  Here is an example of a TCP echo client written using asyncio
  streams::

      import asyncio

      async def tcp_echo_client(message):
          reader, writer = await asyncio.open_connection(
              '127.0.0.1', 8888)

          print(f'Send: {message!r}')
          writer.write(message.encode())
          await writer.drain()

          data = await reader.read(100)
          print(f'Received: {data.decode()!r}')

          print('Close the connection')
          writer.close()
          await writer.wait_closed()

      asyncio.run(tcp_echo_client('Hello World!'))

  See also the `Examples`_ section below.

  The following top-level asyncio functions can be used to create
  and work with streams:

