raw_prose: |
  # Python Dataclasses

  ## Overview

  `@dataclass` reduces the boilerplate of value-object classes. The decorator generates `__init__`, `__repr__`, and `__eq__` from class annotations. Options like `frozen`, `slots`, `kw_only`, and `field()` cover the long tail. This skill covers dataclasses end-to-end.

  Sourced from docs.python.org/3/library/dataclasses.html.

  ---

  # `!dataclasses` --- Data Classes


      :synopsis: Generate special methods on user-defined classes.

  **Source code:** `Lib/dataclasses.py`

  --------------

  This module provides a decorator and functions for automatically
  adding generated `special methods <special method>` such as `~object.__init__` and
  `~object.__repr__` to user-defined classes.  It was originally described
  in `557`.

  The member variables to use in these generated methods are defined
  using `526` type annotations.  For example, this code::

    from dataclasses import dataclass

    @dataclass
    class InventoryItem:
        """Class for keeping track of an item in inventory."""
        name: str
        unit_price: float
        quantity_on_hand: int = 0

        def total_cost(self) -> float:
            return self.unit_price * self.quantity_on_hand

  will add, among other things, a `!__init__` that looks like::

    def __init__(self, name: str, unit_price: float, quantity_on_hand: int = 0):
        self.name = name
        self.unit_price = unit_price
        self.quantity_on_hand = quantity_on_hand

  Note that this method is automatically added to the class: it is not
  directly specified in the `!InventoryItem` definition shown above.


  ## Module contents



     This function is a `decorator` that is used to add generated
     `special methods <special method>` to classes, as described below.

     The ``@dataclass`` decorator examines the class to find
     ``field``\s.  A ``field`` is defined as a class variable that has a
     `type annotation <variable annotation>`.  With two
     exceptions described below, nothing in ``@dataclass``
     examines the type specified in the variable annotation.

     The order of the fields in all of the generated methods is the
     order in which they appear in the class definition.

     The ``@dataclass`` decorator will add various "dunder" methods to
     the class, described below.  If any of the added methods already
     exist in the class, the behavior depends on the parameter, as documented
     below. The decorator returns the same class that it is called on; no new
     class is created.

     If ``@dataclass`` is used just as a simple decorator with no parameters,
     it acts as if it has the default values documented in this
     signature.  That is, these three uses of ``@dataclass`` are
     equivalent::

       @dataclass
       class C:
           ...

       @dataclass()
       class C:
           ...

       @dataclass(init=True, repr=True, eq=True, order=False, unsafe_hash=False, frozen=False,
                  match_args=True, kw_only=False, slots=False, weakref_slot=False)
       class C:
           ...

     The parameters to ``@dataclass`` are:

     - *init*: If true (the default), a `~object.__init__` method will be
       generated.

       If the class already defines `!__init__`, this parameter is
       ignored.

     - *repr*: If true (the default), a `~object.__repr__` method will be
       generated.  The generated repr string will have the class name and
       the name and repr of each field, in the order they are defined in
       the class.  Fields that are marked as being excluded from the repr
       are not included.  For example:
       ``InventoryItem(name='widget', unit_price=3.0, quantity_on_hand=10)``.

       If the class already defines `!__repr__`, this parameter is
       ignored.

     - *eq*: If true (the default), an `~object.__eq__` method will be
       generated.  This method compares the class as if it were a tuple
       of its fields, in order.  Both instances in the comparison must
       be of the identical type.

       If the class already defines `!__eq__`, this parameter is
       ignored.

     - *order*: If true (the default is ``False``), `~object.__lt__`,
       `~object.__le__`, `~object.__gt__`, and `~object.__ge__` methods will be
       generated.  These compare the class as if it were a tuple of its
       fields, in order.  Both instances in the comparison must be of the
       identical type.  If *order* is true and *eq* is false, a
       `ValueError` is raised.

       If the class already defines any of `!__lt__`,
       `!__le__`, `!__gt__`, or `!__ge__`, then
       `TypeError` is raised.

     - *unsafe_hash*: If true, force ``dataclasses`` to create a
       `~object.__hash__` method, even though it may not be safe to do so.
       Otherwise, generate a `~object.__hash__` method according to how
       *eq* and *frozen* are set.
       The default value is ``False``.

       `!__hash__` is used by built-in `hash`, and when objects are
       added to hashed collections such as dictionaries and sets.  Having a
       `!__hash__` implies that instances of the class are immutable.
       Mutability is a complicated property that depends on the programmer's
       intent, the existence and behavior of `!__eq__`, and the values of
       the *eq* and *frozen* flags in the ``@dataclass`` decorator.

       By default, ``@dataclass`` will not implicitly add a `~object.__hash__`
       method unless it is safe to do so.  Neither will it add or change an
       existing explicitly defined `!__hash__` method.  Setting the class
       attribute ``__hash__ = None`` has a specific meaning to Python, as
       described in the `!__hash__` documentation.

       If `!__hash__` is not explicitly defined, or if it is set to ``None``,
       then ``@dataclass`` *may* add an implicit `!__hash__` method.
       Although not recommended, you can force ``@dataclass`` to create a
       `!__hash__` method with ``unsafe_hash=True``. This might be the case
       if your class is logically immutable but can still be mutated.
       This is a specialized use case and should be considered carefully.

       Here are the rules governing implicit creation of a `!__hash__`
       method.  Note that you cannot both have an explicit `!__hash__`
       method in your dataclass and set ``unsafe_hash=True``; this will result
       in a `TypeError`.

       If *eq* and *frozen* are both true, by default ``@dataclass`` will
       generate a `!__hash__` method for you.  If *eq* is true and
       *frozen* is false, `!__hash__` will be set to ``None``, marking it
       unhashable (which it is, since it is mutable).  If *eq* is false,
       `!__hash__` will be left untouched meaning the `!__hash__`
       method of the superclass will be used (if the superclass is
       `object`, this means it will fall back to id-based hashing).

     - *frozen*: If true (the default is ``False``), assigning to fields will
       generate an exception.  This emulates read-only frozen instances.
       See the `discussion <dataclasses-frozen>` below.

       If `~object.__setattr__` or `~object.__delattr__` is defined in the class
       and *frozen* is true, then `TypeError` is raised.

     - *match_args*: If true (the default is ``True``), the
       `~object.__match_args__` tuple will be created from the list of
       non keyword-only parameters to the generated `~object.__init__` method (even if
       `!__init__` is not generated, see above).  If false, or if
       `!__match_args__` is already defined in the class, then
       `!__match_args__` will not be generated.

        
     - *kw_only*: If true (the default value is ``False``), then all
       fields will be marked as keyword-only.  If a field is marked as
       keyword-only, then the only effect is that the `~object.__init__`
       parameter generated from a keyword-only field must be specified
       with a keyword when `!__init__` is called. See the `parameter`
       glossary entry for details.  Also see the
       `KW_ONLY` section.

       Keyword-only fields are not included in `!__match_args__`.

        
     - *slots*: If true (the default is ``False``), `~object.__slots__` attribute
       will be generated and new class will be returned instead of the original one.
       If `!__slots__` is already defined in the class, then `TypeError`
       is raised.

             Passing parameters to a base class `~object.__init_subclass__`
         when using ``slots=True`` will result in a `TypeError`.
         Either use ``__init_subclass__`` with no parameters
         or use default values as a workaround.
         See `91126` for full details.

        
             If a field name is already included in the `!__slots__`
         of a base class, it will not be included in the generated `!__slots__`
         to prevent `overriding them <datamodel-note-slots>`.
         Therefore, do not use `!__slots__` to retrieve the field names of a
         dataclass. Use `fields` instead.
         To be able to determine inherited slots,
         base class `!__slots__` may be any iterable, but *not* an iterator.


     - *weakref_slot*: If true (the default is ``False``), add a slot
       named "__weakref__", which is required to make an instance
       `weakref-able <weakref.ref>`.
       It is an error to specify ``weakref_slot=True``
       without also specifying ``slots=True``.

        
     ``field``\s may optionally specify a default value, using normal
     Python syntax::

       @dataclass
       class C:
           a: int       # 'a' has no default value
           b: int = 0   # assign a default value for 'b'

       In

