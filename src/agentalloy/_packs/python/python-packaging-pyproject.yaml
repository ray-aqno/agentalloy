raw_prose: |
  # Python Packaging — pyproject.toml

  ## Overview

  pyproject.toml is the standard Python project metadata file (PEP 621). It declares the build backend, project metadata, dependencies, and tool configuration. Replaces setup.py for most use cases.

  ---

  ## File Structure

  A minimal pyproject.toml:

  ```toml
  [build-system]
  requires = ["hatchling"]
  build-backend = "hatchling.build"

  [project]
  name = "my-package"
  version = "0.1.0"
  description = "A short description"
  authors = [{ name = "Alice", email = "alice@example.com" }]
  license = { text = "MIT" }
  requires-python = ">=3.10"
  dependencies = ["requests>=2.31"]

  [project.optional-dependencies]
  dev = ["pytest>=8", "ruff"]

  [project.scripts]
  my-cli = "my_package.cli:main"
  ```

  Three top-level tables matter most: `[build-system]` (how to build), `[project]` (what it is), and `[tool.*]` (per-tool config).

  ## [build-system]

  Declares the build backend — the tool that produces wheels and sdists. Common choices:

  - `hatchling` — modern, fast, minimal config. Default for new projects.
  - `setuptools` — legacy default; still widely used. Verbose config.
  - `poetry-core` — Poetry projects.
  - `flit-core` — pure-Python packages, minimal config.
  - `pdm-backend` — PDM projects.
  - `maturin` — Rust extensions.

  ```toml
  [build-system]
  requires = ["hatchling>=1.18"]
  build-backend = "hatchling.build"
  ```

  `requires` lists what's needed to RUN the build backend. Keep this tight — it's installed in an isolated environment for the build.

  ## [project] — Required Metadata

  The PEP 621 standard fields:

  - `name` — PyPI distribution name (kebab-case allowed; underscore in import path).
  - `version` — semantic version. Can be dynamic via `dynamic = ["version"]` and read from a file or VCS.
  - `description` — one-line summary.
  - `authors` / `maintainers` — list of dicts with `name` and `email`.
  - `license` — `{ text = "MIT" }` or `{ file = "LICENSE" }`. PEP 639 simplifies this in newer specs.
  - `readme` — `"README.md"` or `{ file = "README.md", content-type = "text/markdown" }`.
  - `requires-python` — version range like `">=3.10"`.
  - `dependencies` — list of PEP 508 requirement strings.
  - `classifiers` — PyPI classifiers (programming language, license, status).
  - `keywords` — list of search keywords for PyPI.
  - `urls` — dict of label → URL (homepage, repository, docs, issues).

  ## Optional Dependencies

  ```toml
  [project.optional-dependencies]
  dev = ["pytest>=8", "ruff", "mypy"]
  docs = ["mkdocs>=1.5", "mkdocs-material"]
  all = ["my-package[dev,docs]"]
  ```

  Install with `pip install my-package[dev]` or `uv pip install -e ".[dev]"`. The `all` group composes other groups.

  PEP 735 added `[dependency-groups]` as a more explicit alternative for dev-only dependencies that don't belong as installable extras.

  ## Entry Points and Scripts

  Console scripts (CLI commands installed in the env's bin/):

  ```toml
  [project.scripts]
  my-cli = "my_package.cli:main"
  my-other = "my_package.other:run"
  ```

  GUI scripts get `[project.gui-scripts]`. Plugin entry points use `[project.entry-points."group.name"]`:

  ```toml
  [project.entry-points."pytest11"]
  my-plugin = "my_package.pytest_plugin"
  ```

  Plugin entry points let third parties register plugins your package discovers via `importlib.metadata.entry_points()`. Entry points are how Python's plugin ecosystem composes: rather than importing every plugin explicitly, your package discovers them at runtime via `importlib.metadata.entry_points(group="mypackage.plugins")`. This is the same mechanism pytest uses for plugins, the same hatch uses for build hooks, and the same Black uses for formatter integrations. Use it whenever your package wants to be extensible without hardcoding plugin names; reach for explicit imports when the integration set is closed and small.

  ## [tool.*] Sections

  Tools read their own subsection. Common ones:

  ```toml
  [tool.ruff]
  line-length = 100

  [tool.pytest.ini_options]
  testpaths = ["tests"]
  addopts = "-v"

  [tool.mypy]
  strict = true

  [tool.uv]
  dev-dependencies = ["pytest", "ruff"]
  ```

  Each tool defines its own schema; pyproject.toml just hosts them.

  ## Dynamic Fields

  Some fields can be computed by the build backend rather than declared statically:

  ```toml
  [project]
  name = "my-package"
  dynamic = ["version", "readme"]

  [tool.hatch.version]
  path = "src/my_package/__init__.py"
  ```

  Common for `version` (read from `__init__.py` or VCS) and `readme` (computed from multiple files).

  ## Use the src layout

  Two project layouts exist:

  ```
  # Flat layout
  mypackage/
    __init__.py
  pyproject.toml

  # Src layout
  src/
    mypackage/
      __init__.py
  pyproject.toml
  ```

  Use the src layout. Why:

  - **Forces installation before import.** With flat layout, running tests from the repo root imports the source directly even if the package is not installed; this hides packaging bugs (missing files in the wheel, incorrect entry points) until release.
  - **Cleaner separation.** Test files, docs, and tooling live alongside `src/` without polluting the package's import namespace.
  - **Standard.** Most modern templates (cookiecutter, hatch new, uv init) default to src layout.

  The flat layout still works and may be simpler for tiny single-file packages. For anything else, src layout is the safer default.

  ## Editable install for local development

  When developing a package locally, install it in editable mode so changes are picked up without reinstalling:

  ```bash
  pip install -e .
  # or with uv:
  uv pip install -e .
  ```

  The editable install creates a link from your environment to the source tree. Edits to `src/mypackage/` are visible immediately. PEP 660 (2021) standardized editable installs across build backends, so this works with any modern backend.

  Avoid editable installs in production environments — they couple the running code to the source tree, which may not be present after deploy.

  ## Dependencies and lockfiles

  Two declarations matter:

  - **`dependencies` in `pyproject.toml`.** The *abstract* requirements — version ranges your code is compatible with. This is what gets published to PyPI.
  - **Lockfile (e.g., `uv.lock`, `poetry.lock`, `pdm.lock`, `requirements.lock`).** The *concrete* resolved versions used in development and deployment. Pinned exactly, including transitive deps.

  For applications, both matter. The `pyproject.toml` declares compatibility; the lockfile pins reproducibility. Commit the lockfile to version control. CI installs from the lockfile; local development uses the lockfile by default.

  For libraries (published to PyPI), the lockfile is for development only and is not part of the published artifact. Library users get the abstract `dependencies`; their lockfile pins versions for their use.

  Tools that manage lockfiles natively: `uv`, `poetry`, `pdm`, `pip-tools` (with `pip-compile`). Plain `pip install -r requirements.txt` works but the requirements file is hand-maintained, not generated from the lockfile resolver — drift is harder to control.

  ## Virtual environments

  Every Python project lives in a virtual environment — never install dependencies into the system Python. Two equivalent patterns:

  ```bash
  # Standard library tooling
  python -m venv .venv
  source .venv/bin/activate
  pip install -e .

  # uv (faster, integrated)
  uv venv
  source .venv/bin/activate
  uv pip install -e .

  # uv with sync-from-lockfile
  uv sync
  ```

  `uv sync` is the modern shortcut: creates the venv if missing, installs from `pyproject.toml` and `uv.lock` in one step, and removes packages not in the lock. Equivalent commands exist in Poetry (`poetry install`) and pdm (`pdm install`).

  For multi-version testing, use `tox` or `nox` — they create per-Python-version venvs and run the test matrix.

  ## Versioning

  Use semantic versioning (`MAJOR.MINOR.PATCH`). For applications, simple integer versions or date-based versions are also fine; the rule is to be explicit and consistent.

  Two patterns for keeping `version` in sync with the source:

  - **Static version in pyproject.toml.** Simple; the version lives in one place.
  - **Dynamic version from a source file or git tag.** Hatchling supports `version = { source = "vcs" }`; setuptools supports `version = { attr = "mypackage.__version__" }`. Useful when CI tags drive releases.

  Pick one; do not write the version in three places that then drift apart.

  ## Common Pitfalls

  - **Mismatched build-backend and tool.* config.** Setting `[tool.hatch]` while using `setuptools.build_meta` does nothing.
  - **Including `pyproject.toml` and `setup.py` together.** During migration, the toml takes precedence but setup.py may still be invoked. Pick one.
  - **Running `python setup.py develop`.** Deprecated. Use `pip install -e .` or `uv pip install -e .`.
  - **Forgetting `requires-python`.** Without it, pip won't refuse to install on incompatible versions and your users get cryptic errors at import time.

  ## Verification

  A correctly-configured pyproject.toml:

  - `pip install .` (or `uv pip install .`) succeeds in a fresh venv.
  - `python -m build` produces a wheel and sdist with the right metadata.
  - `pip show my-package` shows the metadata you declared.
  - Console scripts appear in `<venv>/bin/` and run correctly.
  - `pip install .[dev]` installs the optional dependency group.
