raw_prose: |
  # Python Structural Pattern Matching (match/case)

  ## Overview

  Python's match statement (PEP 634) destructures values by pattern. Unlike a switch, patterns can extract substructure: `case Point(x=0, y=y)` matches and binds. This skill covers the pattern syntax and idiomatic use.

  Sourced from PEP 636 (Pattern Matching tutorial).

  ---

  PEP: 636
  Title: Structural Pattern Matching: Tutorial
  Author: Daniel F Moisset <dfmoisset@gmail.com>
