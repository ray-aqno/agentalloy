raw_prose: "# FastAPI File Uploads\n\n## Overview\n\nFastAPI exposes uploaded files via UploadFile (async, spooled to disk if large) or File (raw bytes). Mix with Form fields for multipart submissions. This skill covers upload patterns.\n\n---\n\n## UploadFile vs File\n\n```python\nfrom fastapi import FastAPI, File, UploadFile\n\napp = FastAPI()\n\n@app.post(\"/upload-bytes\")\nasync def upload_bytes(file: bytes = File(...)):\n    # Whole file in memory — only for small files\n    return {\"size\": len(file)}\n\n@app.post(\"/upload-spooled\")\nasync def upload_spooled(file: UploadFile = File(...)):\n    # SpooledTemporaryFile — stays in memory under threshold, spills to disk\n    return {\"filename\": file.filename, \"content_type\": file.content_type}\n```\n\nDefault to `UploadFile`. The `bytes` form loads the entire file into memory; for anything over a few MB you'll OOM. UploadFile uses Python's SpooledTemporaryFile which buffers in memory up to a threshold (default 1MB) then spills to disk.\n\n## Reading the Upload\n\nUploadFile exposes async methods for reading:\n\n```python\n@app.post(\"/process\")\nasync def process(file: UploadFile):\n    content = await file.read()                # full bytes\n    # or chunked:\n    while chunk := await file.read(64 * 1024):  # 64 KB at a time\n        process_chunk(chunk)\n    await file.close()\n```\n\nFor large files, chunk through. UploadFile.file is the underlying SpooledTemporaryFile if you need sync access.\n\n## Saving to Disk\n\n```python\nimport shutil\nfrom pathlib import Path\n\n@app.post(\"/save\")\nasync def save(file: UploadFile):\n    target = Path(\"/uploads\") / file.filename\n    with target.open(\"wb\") as out:\n        shutil.copyfileobj(file.file, out)\n    return {\"path\": str(target)}\n```\n\n`shutil.copyfileobj` streams without buffering the whole file. Watch the upload directory's permissions and validate the filename — never trust user input for path components.\n\n## Multiple Files\n\n```python\nfrom typing import List\n\n@app.post(\"/multi\")\nasync def multi(files: List[UploadFile] = File(...)):\n    return {\"names\": [f.filename for f in files]}\n```\n\nThe HTML form needs `multiple` on the input element. The list parameter receives all uploaded files.\n\n## Mixing Files and Form Fields\n\n```python\nfrom fastapi import Form\n\n@app.post(\"/with-metadata\")\nasync def with_metadata(\n    file: UploadFile = File(...),\n    description: str = Form(...),\n    tags: List[str] = Form(default=[]),\n):\n    return {\"file\": file.filename, \"desc\": description, \"tags\": tags}\n```\n\n`File` and `Form` parameters can coexist — multipart bodies carry both. The frontend submits as `multipart/form-data`.\n\n## Streaming Uploads to Object Storage\n\nFor uploads going straight to S3 / GCS / Azure Blob, stream rather than buffer:\n\n```python\nimport boto3\n\ns3 = boto3.client(\"s3\")\n\n@app.post(\"/upload-s3\")\nasync def upload_s3(file: UploadFile):\n    s3.upload_fileobj(file.file, \"my-bucket\", file.filename)\n    return {\"uploaded\": file.filename}\n```\n\n`upload_fileobj` accepts a file-like object and streams it. Beats reading the whole file then re-uploading. For very large files use `s3.Object.upload_file` with multipart.\n\n## Validation\n\n```python\nfrom fastapi import HTTPException\n\nALLOWED_TYPES = {\"image/jpeg\", \"image/png\", \"application/pdf\"}\nMAX_SIZE = 10 * 1024 * 1024  # 10 MB\n\n@app.post(\"/validated\")\nasync def validated(file: UploadFile):\n    if file.content_type not in ALLOWED_TYPES:\n        raise HTTPException(415, \"unsupported media type\")\n    \n    # Don't trust content_type alone — verify magic bytes\n    head = await file.read(8)\n    await file.seek(0)\n    if not head.startswith(b\"\\x89PNG\") and file.content_type == \"image/png\":\n        raise HTTPException(400, \"content does not match declared type\")\n    \n    # Check size by reading in chunks\n    size = 0\n    while chunk := await file.read(64 * 1024):\n        size += len(chunk)\n        if size > MAX_SIZE:\n            raise HTTPException(413, \"file too large\")\n    await file.seek(0)\n    \n    return {\"ok\": True}\n```\n\nDon't trust client-declared content type or size. Verify both server-side.\n\n## Common Pitfalls\n\n- **Using `bytes` for large uploads.** OOMs on big files.\n- **Path traversal via filename.** A filename like `../../etc/passwd` writes outside your upload directory. Strip path separators or use `Path(file.filename).name`.\n- **Forgetting to close UploadFile.** SpooledTemporaryFile holds a temp file descriptor; close it after processing or use it as a context manager.\n- **Trusting content-type from the client.** Browsers and curl will report whatever the user says. Always verify by sniffing magic bytes if it matters.\n- **No size limit at the proxy/server level.** uvicorn / nginx will accept arbitrarily large bodies by default. Set `client_max_body_size` (nginx) or limits in your platform.\n\n## Verification\n\nA working upload endpoint:\n\n- Handles 10MB+ files without buffering them in memory.\n- Validates content type by sniffing, not just trusting the header.\n- Rejects oversized uploads with 413, not 500.\n- Sanitizes the filename before storing.\n- Streams to object storage rather than buffering through the app.\n"
