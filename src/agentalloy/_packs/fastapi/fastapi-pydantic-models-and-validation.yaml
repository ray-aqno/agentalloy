          price: float
          tax: float = 10.5
          tags: list[str] = []

      items = {
          "foo": {"name": "Foo", "price": 50.2},
          "bar": {"name": "Bar", "description": "The Bar", "price": 62, "tax": 20.2},
          "baz": {"name": "Baz", "description": None, "price": 50.2, "tax": 10.5, "tags": []},
      }

      @app.get("/items/{item_id}", response_model=Item, response_model_exclude_unset=True)
      async def read_item(item_id: str) -> dict:
          return items[item_id]
      ```

      For `foo`, the response is `{"name": "Foo", "price": 50.2}` — `description`, `tax`, `tags` are unset and excluded. For `bar`, those fields were set so they appear. For `baz`, every field was set explicitly, including the values that happen to equal defaults, so the response includes them all. `exclude_unset` is set/unset, not value/default.

  - sequence: 8
    fragment_type: execution
    content: |
      ## HTTPException for domain errors and OpenAPI enrichment

      When the request validates but the domain rejects (item not found, business rule fails), raise `HTTPException` from the route or a dependency. FastAPI converts it to a JSON response with the chosen `status_code` and `detail` (FastAPI docs, "Handling Errors" — "Use HTTPException", verified 2026-05-06). Pair with `responses=` on the path operation to surface the error in OpenAPI:

      ```python
      items = {"foo": "The Foo Wrestlers"}

      @app.get(
          "/items/{item_id}",
          responses={404: {"description": "Item not found"}},
      )
      async def read_item(item_id: str) -> dict:
          if item_id not in items:
              raise HTTPException(status_code=404, detail="Item not found")
          return {"item": items[item_id]}
      ```

      OpenAPI extras on `Field` enrich `/docs` and downstream client generators: `Field(..., description="Quantity", examples=[42])` adds a description and example to the property's schema. Validation errors raised by Pydantic during request parsing surface as 422 with a structured `detail` array; FastAPI's request-body validation handler is registered automatically and you do not implement it yourself.

  - sequence: 9
    fragment_type: example
    content: |
      ## End-to-end: input/output split, validators, response_model

      This single example walks the case-space: a `UserIn` with a password, a `UserOut` without one, a `@field_validator` that enforces alphanumeric usernames, a `@model_validator` that catches mismatched password confirmation, and `response_model=UserOut` filtering the password out at the wire.

      ```python
      from typing import Annotated
      from fastapi import Body, FastAPI, HTTPException
      from pydantic import BaseModel, ConfigDict, Field, field_validator, model_validator

      app = FastAPI()

      class UserIn(BaseModel):
          model_config = ConfigDict(extra="forbid", str_strip_whitespace=True)
          username: str = Field(min_length=3, max_length=32)
          password: str = Field(min_length=8)
          password_confirm: str
          email: str

          @field_validator("username")
          @classmethod
          def username_alnum(cls, v: str) -> str:
              if not v.isalnum():
                  raise ValueError("username must be alphanumeric")
              return v

          @model_validator(mode="after")
          def passwords_match(self) -> "UserIn":
              if self.password != self.password_confirm:
                  raise ValueError("passwords do not match")
              return self

      class UserOut(BaseModel):
          username: str
          email: str

      _users: dict[str, UserIn] = {}

      @app.post("/users/", response_model=UserOut)
      async def create_user(user: Annotated[UserIn, Body()]) -> UserIn:
          if user.username in _users:
              raise HTTPException(status_code=409, detail="username taken")
          _users[user.username] = user
          # returning UserIn — response_model=UserOut filters password and password_confirm
          return user
      ```

      Three paths: a request with `{"username": "ab", ...}` fails the `min_length=3` constraint at parse time and gets 422 with `string_too_short`. A request with mismatched passwords passes per-field validation and trips the `model_validator`, returning 422 with the validator's `ValueError` text. A valid request creates the user; the response is `{"username": "...", "email": "..."}` — the password fields are dropped by `response_model=UserOut`, not by hand.

  - sequence: 10
    fragment_type: verification
    content: |
      ## Verification checklist

      Mechanical checks for any FastAPI request/response model surface:

      - [ ] No `pydantic.v1` imports in new modules. `grep -rn 'from pydantic\.v1\|import pydantic\.v1' src/` returns nothing.
      - [ ] No deprecated v1 validator decorators in v2 code. `grep -rnE '@validator\b|@root_validator\b' src/` returns nothing; expected hits are `@field_validator` and `@model_validator`.
      - [ ] No legacy `class Config:` inner class on `BaseModel` subclasses. `grep -rnB1 'class Config:' src/` should not show lines preceded by a class extending `BaseModel`. Replace with `model_config = ConfigDict(...)`.
      - [ ] Every path operation that returns a model declares `response_model=` (or a typed return annotation FastAPI can pick up). `grep -rn 'response_model=' src/` enumerates the declared shapes; spot-check that response models do not include password, secret, or token fields.
      - [ ] Input and output models for sensitive resources (users, accounts, tokens) are split. `grep -rn 'class User' src/` should show at least `UserIn`/`UserOut` (or equivalent) — a single `User` model used for both is a likely leak surface.
      - [ ] Constraint kwargs on `Field` are non-empty for any field that has a documented domain range. `grep -rn 'Field(' src/` and confirm `gt`, `ge`, `lt`, `le`, `min_length`, `max_length`, or `pattern` are present where the contract requires them.
      - [ ] `extra="forbid"` is set on request models that should reject unknown fields. `grep -rn 'extra=\"forbid\"' src/` enumerates them.
      - [ ] `pytest -k validation` passes — the test suite exercises at least one happy path and one constraint-violating path per request model, asserting the 422 status and a recognizable error code in `detail`.
      - [ ] OpenAPI schema diff after a model change is reviewed. `curl -s http://localhost:8000/openapi.json > openapi.new.json && diff openapi.old.json openapi.new.json` — unintended widenings or narrowings of response shapes show up here.

  - sequence: 11
    fragment_type: guardrail
    content: |
      ## Guardrails: never do these

      Lines you do not cross when modeling FastAPI request and response bodies. Each item has shipped a real outage or a real client-facing surprise.

      - Never return a model that contains a password, token, or other secret field through a path operation that lacks a `response_model` filter. Even a typed return annotation like `-> UserIn` will serialize the password. Declare a separate `UserOut` and pass `response_model=UserOut`, or add the field to `response_model_exclude={"password"}`.
      - Never use the v1 `@validator` or `@root_validator` decorators in v2 code. Both are deprecated in Pydantic v2 (verified 2026-05-06) and will be removed; they also have different argument signatures than the v2 replacements, so cargo-culting an old example introduces subtle bugs. Use `@field_validator` and `@model_validator`.
      - Never use the v1 `class Config:` inner class on a v2 `BaseModel`. It is deprecated and Pydantic emits a warning; use `model_config = ConfigDict(...)`.
      - Never mutate the model in-place from a `@model_validator(mode="after")` with the expectation that Pydantic will re-validate. The validator runs once after parsing; if you mutate `self` in ways that violate other constraints, those constraints are not re-checked.
      - Never declare `response_model=Model` over a class that includes a SQLAlchemy mapped column or other non-Pydantic attribute without setting `model_config = ConfigDict(from_attributes=True)`. Pydantic will fail to build the model from an ORM row otherwise.
      - Never rely on `response_model_exclude_none=True` to hide secrets. If the secret is not `None`, it serializes. Use `response_model_exclude={"password"}` or a separate output model — `exclude_none` is a presentation tweak, not a security boundary.
      - Never expand a shared model with optional new fields and assume existing endpoints stay byte-stable. Adding a field with a default is non-breaking for the model but **does** change the response shape unless `response_model_exclude_unset=True` was already set; clients with strict schema validation will fail.
      - Never mix `pydantic.v1.BaseModel` and `pydantic.BaseModel` in the same module or call site. The two types are not interchangeable, and FastAPI's route inspection picks one path or the other based on which base class it sees — silent drift between request parsing and response serialization is the result.
      - Never write a `@field_validator` that makes a network or database call. Validators run on every request; a synchronous DB lookup in a validator is an injection of latency and a coupling between the model layer and the data layer. Move that check into the route or a dependency.
      - Never expose a Pydantic model directly as both the input and output type for a resource with secrets. Even with `response_model_exclude={"password"}`, a future refactor that drops the `exclude` set re-leaks the secret. Two model classes is the durable boundary.
