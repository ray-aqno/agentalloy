raw_prose: |
  # FastAPI OpenAPI Customization

  ## Overview

  FastAPI auto-generates a complete OpenAPI 3.x spec. Customization happens at three levels: route decorators (tags, summary, response_description), parameter annotations (examples, descriptions), and post-generation override of the spec. This skill covers each.

  ---

  There are some cases where you might need to modify the generated OpenAPI schema.

  In this section you will see how.

  ## The normal process { #the-normal-process }

  The normal (default) process, is as follows.

  A `FastAPI` application (instance) has an `.openapi()` method that is expected to return the OpenAPI schema.

  As part of the application object creation, a *path operation* for `/openapi.json` (or for whatever you set your `openapi_url`) is registered.

  It just returns a JSON response with the result of the application's `.openapi()` method.

  By default, what the method `.openapi()` does is check the property `.openapi_schema` to see if it has contents and return them.

  If it doesn't, it generates them using the utility function at `fastapi.openapi.utils.get_openapi`.

  And that function `get_openapi()` receives as parameters:

  * `title`: The OpenAPI title, shown in the docs.
  * `version`: The version of your API, e.g. `2.5.0`.
  * `openapi_version`: The version of the OpenAPI specification used. By default, the latest: `3.1.0`.
  * `summary`: A short summary of the API.
  * `description`: The description of your API, this can include markdown and will be shown in the docs.
  * `routes`: A list of routes, these are each of the registered *path operations*. They are taken from `app.routes`.

  /// info

  The parameter `summary` is available in OpenAPI 3.1.0 and above, supported by FastAPI 0.99.0 and above.

  ///

  ## Overriding the defaults { #overriding-the-defaults }

  Using the information above, you can use the same utility function to generate the OpenAPI schema and override each part that you need.

  For example, let's add [ReDoc's OpenAPI extension to include a custom logo](https://github.com/Rebilly/ReDoc/blob/master/docs/redoc-vendor-extensions.md#x-logo).

  ### Normal **FastAPI** { #normal-fastapi }

  First, write all your **FastAPI** application as normally:

  {* ../../docs_src/extending_openapi/tutorial001_py310.py hl[1,4,7:9] *}

  ### Generate the OpenAPI schema { #generate-the-openapi-schema }

  Then, use the same utility function to generate the OpenAPI schema, inside a `custom_openapi()` function:

  {* ../../docs_src/extending_openapi/tutorial001_py310.py hl[2,15:21] *}

  ### Modify the OpenAPI schema { #modify-the-openapi-schema }

  Now you can add the ReDoc extension, adding a custom `x-logo` to the `info` "object" in the OpenAPI schema:

  {* ../../docs_src/extending_openapi/tutorial001_py310.py hl[22:24] *}

  ### Cache the OpenAPI schema { #cache-the-openapi-schema }

  You can use the property `.openapi_schema` as a "cache", to store your generated schema.

  That way, your application won't have to generate the schema every time a user opens your API docs.

  It will be generated only once, and then the same cached schema will be used for the next requests.

  {* ../../docs_src/extending_openapi/tutorial001_py310.py hl[13:14,25:26] *}

  ### Override the method { #override-the-method }

  Now you can replace the `.openapi()` method with your new function.

  {* ../../docs_src/extending_openapi/tutorial001_py310.py hl[29] *}

  ### Check it { #check-it }

  Once you go to [http://127.0.0.1:8000/redoc](http://127.0.0.1:8000/redoc) you will see that you are using your custom logo (in this example, **FastAPI**'s logo):

  <img src="/img/tutorial/extending-openapi/image01.png">

  ---

  You could create an API with a *path operation* that could trigger a request to an *external API* created by someone else (probably the same developer that would be *using* your API).

  The process that happens when your API app calls the *external API* is named a "callback". Because the software that the external developer wrote sends a request to your API and then your API *calls back*, sending a request to an *external API* (that was probably created by the same developer).

  In this case, you could want to document how that external API *should* look like. What *path operation* it should have, what body it should expect, what response it should return, etc.

  ## An app with callbacks { #an-app-with-callbacks }

  Let's see all this with an example.

  Imagine you develop an app that allows creating invoices.

  These invoices will have an `id`, `title` (optional), `customer`, and `total`.

  The user of your API (an external developer) will create an invoice in your API with a POST request.

  Then your API will (let's imagine):

  * Send the invoice to some customer of the external developer.
  * Collect the money.
  * Send a notification back to the API user (the external developer).
      * This will be done by sending a POST request (from *your API*) to some *external API* provided by that external developer (this is the "callback").

  ## The normal **FastAPI** app { #the-normal-fastapi-app }

  Let's first see how the normal API app would look like before adding the callback.

  It will have a *path operation* that will receive an `Invoice` body, and a query parameter `callback_url` that will contain the URL for the callback.

  This part is pretty normal, most of the code is probably already familiar to you:

  {* ../../docs_src/openapi_callbacks/tutorial001_py310.py hl[7:11,34:51] *}

  /// tip

  The `callback_url` query parameter uses a Pydantic [Url](https://docs.pydantic.dev/latest/api/networks/) type.

  ///

  The only new thing is the `callbacks=invoices_callback_router.routes` as an argument to the *path operation decorator*. We'll see what that is next.

  ## Documenting the callback { #documenting-the-callback }

  The actual callback code will depend heavily on your own API app.

  And it will probably vary a lot from one app to the next.

  It could be just one or two lines of code, like:

  ```Python
  callback_url = "https://example.com/api/v1/invoices/events/"
  httpx.post(callback_url, json={"description": "Invoice paid", "paid": True})
  ```

  But possibly the most important part of the callback is making sure that your API user (the external developer) implements the *external API* correctly, according to the data that *your API* is going to send in the request body of the callback, etc.

  So, what we will do next is add the code to document how that *external API* should look like to receive the callback from *your API*.

  That documentation will show up in the Swagger UI at `/docs` in your API, and it will let external developers know how to build the *external API*.

  This example doesn't implement the callback itself (that could be just a line of code), only the documentation part.

  /// tip

  The actual callback is just an HTTP request.

  When implementing the callback yourself, you could use something like [HTTPX](https://www.python-httpx.org) or [Requests](https://requests.readthedocs.io/).

  ///
fragments:
  - fragment_type: setup
    sequence: 1
    content: |
      FastAPI auto-generates a complete OpenAPI 3.x spec. Customization happens at three levels: route decorators (tags, summary, response_description), parameter annotations (examples, descriptions), and post-generation override of the spec.
  - fragment_type: execution
    sequence: 2
    content: |
      The normal (default) process involves using the `.openapi()` method to return the OpenAPI schema. This method checks if `.openapi_schema` has contents and returns them; otherwise, it generates them using `fastapi.openapi.utils.get_openapi`.
  - fragment_type: example
    sequence: 3
    content: |
      ```python
      # Example of adding ReDoc's OpenAPI extension to include a custom logo
      from fastapi import FastAPI

      app = FastAPI()

      def custom_openapi():
          if app.openapi_schema:
              return app.openapi_schema
          openapi_schema = get_openapi(
              title="Custom Title",
              version="2.5.0",
              openapi_version="3.1.0",
              description="This is a custom API.",
              routes=app.routes,
          )
          openapi_schema["info"]["x-logo"] = {
              "url": "https://fastapi.tiangolo.com/img/logo-margin.png"
          }
          app.openapi_schema = openapi_schema
          return app.openapi_schema

      app.openapi = custom_openapi
      ```
  - fragment_type: verification
    sequence: 4
    content: |
      Once you go to [http://127.0.0.1:8000/redoc](http://127.0.0.1:8000/redoc), you will see that you are using your custom logo (in this example, **FastAPI**'s logo).
  - fragment_type: execution
    sequence: 5
    content: |
      To add callbacks to your FastAPI app, define a path operation with a `callback_url` query parameter and use the `callbacks` argument in the path operation decorator.
  - fragment_type: example
    sequence: 6
    content: |
      ```python
      # Example of an API with callbacks
      from fastapi import FastAPI, Query

      app = FastAPI()

      @app.post("/invoices/")
      async def create_invoice(
          invoice: Invoice,
          callback_url: str = Query(..., description="Callback URL for notifications"),
      ):
          # Process the invoice and send a notification to the external API
          httpx.post(callback_url, json={"description": "Invoice paid", "paid": True})
          return {"message": "Invoice created"}
      ```
  - fragment_type: rationale
    sequence: 7
    content: |
      The most important part of the callback is ensuring that your API user implements the external API correctly, according to the data that your API sends in the request body of the callback.