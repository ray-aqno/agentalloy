raw_prose: "# Test-Driven Development Cycle\n\n## Overview\n\nTDD is a discipline:\
  \ write a test that fails for the right reason, implement the minimum that makes\
  \ it pass, then refactor. The cycle is short (minutes), and it produces a durable\
  \ test suite as a side effect of authoring code.\n\n---\n\n## The Three Phases\n\
  \n**Red** — write a test that fails. The failure must be for the right reason: assertion\
  \ failed because behavior is missing, not because code doesn't compile or types\
  \ don't match. A test that fails because the function doesn't exist yet is fine;\
  \ a test that fails because of a typo isn't progress.\n\n**Green** — write the minimum\
  \ production code to make the test pass. Resist the urge to add features the test\
  \ doesn't exercise. The simplest implementation that turns the test green — even\
  \ hardcoded values — is correct here.\n\n**Refactor** — improve the code with the\
  \ test as a safety net. Eliminate duplication, rename for clarity, extract methods.\
  \ Run tests after each change; revert if anything goes red.\n\n## What 'Failing\
  \ for the Right Reason' Means\n\nA test that fails with `TypeError: undefined is\
  \ not a function` proves nothing about your assertion. A test that fails with `expected\
  \ 5, got 0` proves the assertion mechanism works and the production code is wrong.\n\
  \nAlways run a new test, see it fail, then make it pass. If a test passes the first\
  \ time you write it, either it's not testing what you think, or the behavior was\
  \ already there.\n\n## Cycle Length\n\nEach cycle should be minutes, not hours:\n\
  \n- Red: 30 seconds — 2 minutes (one assertion, one new behavior)\n- Green: 1-5\
  \ minutes (smallest change to pass)\n- Refactor: 0-3 minutes (only what's obvious)\n\
  \nIf a cycle takes 30 minutes, the test was too big. Break it into smaller tests\
  \ covering individual behaviors.\n\n## Triangulation — Forcing Generality\n\nWhen\
  \ a single test can be passed by hardcoded values, write a second test that forces\
  \ a real implementation:\n\n```python\n# Red: test 1\ndef test_add_two_numbers():\n\
  \    assert add(1, 2) == 3\n\n# Green (cheap): return 3 hardcoded\ndef add(a, b):\n\
  \    return 3\n\n# Red: test 2 forces generality\ndef test_add_other_numbers():\n\
  \    assert add(2, 5) == 7\n\n# Green: now real impl\ndef add(a, b):\n    return\
  \ a + b\n```\n\nThis sounds wasteful but proves the test suite drives the implementation,\
  \ not the developer's foreknowledge.\n\n## When TDD Helps Most\n\n- Adding behavior\
  \ to existing code with regression risk.\n- New algorithms where the spec is clear\
  \ but implementation isn't.\n- Bug fixes — write the failing test first, then fix;\
  \ you have proof the fix worked and the regression test is permanent.\n- Refactors\
  \ of business logic — the tests pin behavior so you can change structure freely.\n\
  \n## When TDD Helps Less\n\n- Pure exploration / spike code that will be deleted.\n\
  - UI-heavy work where the test cost is high and the design is iterating fast.\n\
  - Performance optimization — measure first; tests come after the right approach\
  \ is identified.\n\n## Verification\n\nA working TDD cycle produces:\n\n- A test\
  \ suite that fails the moment a behavior breaks (test isolation works).\n- Code\
  \ structured around what's tested rather than around speculative future needs.\n\
  - Confident refactoring without manual regression testing.\n- A fossil record of\
  \ intent — every commit has a test explaining what was added or fixed.\n"
