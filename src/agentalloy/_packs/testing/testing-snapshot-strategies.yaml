      ## Execution Steps

      1. Choose between inline and file snapshots based on output size.
      2. Review every snapshot diff carefully.
      3. Redact non-deterministic content to ensure stable snapshots.
      4. Use approval testing for large outputs or when the output is a test artifact.
      5. Utilize tools like `vitest --ui` and `jest --watch` for interactive review.
      6. Ensure snapshot files are tracked in source control and named clearly.