raw_prose: "# Webhooks â€” Signature Verification\n\n## Overview\n\nWebhooks must be authenticated to prevent forgery and replay\
  \ attacks. The standard pattern: HMAC-sign the (timestamp + body) tuple, send the signature in a header, the consumer recomputes\
  \ and compares constant-time. This skill covers verification end-to-end.\n\nSourced from svix-docs receiving/verifying-payloads/why\
  \ and how.\n\n## Why Verify Webhooks\n\nBecause of the way webhooks work, attackers can impersonate services by simply sending\
  \ a fake webhook to an endpoint. Think about it: it's just an HTTP POST from an unknown source. This is a potential security\
  \ hole for many applications, or at the very least, a source of problems.\n\nIn order to prevent it, Svix signs every webhook\
  \ and its metadata with a unique key for each endpoint. This signature can then be used to verify the webhook indeed comes\
  \ from Svix, and only process it if it is.\n\nAnother potential security hole is what's called replay attacks. A [replay\
  \ attack](https://en.wikipedia.org/wiki/Replay_attack) is when an attacker intercepts a valid payload (including the signature),\
  \ and re-transmits it to your endpoint. This payload will pass signature validation, and will therefore be acted upon.\n\
  \nTo mitigate this attack, Svix includes a timestamp for when the webhook attempt occurred. Our libraries automatically\
  \ reject webhooks with a timestamp that are more than five minutes away (past or future) from the current time. This requires\
  \ your server's clock to be synchronised and accurate, and it's recommended that you use [NTP](https://en.wikipedia.org/wiki/Network_Time_Protocol)\
  \ to achieve this.\n\nFor additional information about webhook vulnerabilities, please refer to the [webhook security](/security)\
  \ section of the docs.\n\n## How to Verify Webhooks with the Svix Libraries\n\nAs shown in the [Why Verify section](./why.mdx),\
  \ verifying operational webhooks is very important. This section describes how to do it.\n\n### Verifying using our official\
  \ libraries\n\nFirst install the libraries if you haven't already:\n\n---\nJavaScript\n---\n```js\nnpm install svix\n//\
  \ Or\nyarn add svix\n```\n\n---\nPython\n---\n```sh\npip install svix\n```\n\n---\nRust\n---\n```toml\nhttp = \"1.0.0\"\n\
  svix = \"1.20.0\"\n```\n\n---\nGo\n---\n```shell\ngo get github.com/svix/svix-webhooks/go\n```\n\n---\nJava\n---\nGradle:\
  \ Add this dependency to your project's build file:\n\n```groovy\nimplementation \"com.svix:svix:0.x.y\"\n```\n\nMaven:\
  \ Add this dependency to your project's POM:\n\n```xml\n<dependency>\n  <groupId>com.svix</groupId>\n  <artifactId>svix</artifactId>\n\
  \  <version>0.x.y</version>\n</dependency>\n```\n\n---\nKotlin\n---\nGradle: Add this dependency to your project's build\
  \ file:\n\n```groovy\nimplementation \"com.svix.kotlin:svix-kotlin:0.x.y\"\n```\n\nMaven: Add this dependency to your project's\
  \ POM:\n\n```xml\n<dependency>\n  <groupId>com.svix.kotlin</groupId>\n  <artifactId>svix-kotlin</artifactId>\n  <version>0.x.y</version>\n\
  </dependency>\n```\n\n---\nRuby\n---\n```shell\ngem install svix\n```\n\n---\nC#\n---\n```shell\ndotnet add package Svix\n\
  ```\n\n---\nPHP\n---\n```shell\ncomposer require svix/svix\n```\n\n---\nCLI\n---\nOn macOS install via <a href=\"https://brew.sh/\"\
  >Homebrew</a>:\n```sh\nbrew install svix/svix/svix-cli\n```\n\nOn Windows install via <a href=\"https://scoop.sh/\">Scoop</a>:\n\
  ```sh\nscoop bucket add svix https://github.com/svix/scoop-svix.git\nscoop install svix\n```\n\nFor other platforms, such\
  \ as linux, checkout the <a href=\"https://github.com/svix/svix-cli#installation\">CLI docs</a> on Github.\n\n---\ncURL\n\
  ---\n```shell\n# Install cURL. E.g. on arch linux:\npacman -S curl\n```\n\nThen verify webhooks using the code below. The\
  \ payload is the raw (string) body of the request, and the headers are the headers passed in the request.\n\n> **Warning:**\n\
  >\n**Use the raw request body**\n\nYou need to use the raw request body when verifying webhooks, as the cryptographic signature\
  \ is sensitive to even the slightest changes.\nYou should watch out for frameworks that parse the request as JSON and then\
  \ stringify it because this too will break the signature verification.\n\nSee examples below for how to get the raw request\
  \ body with different frameworks.\n>\nThe signature you should get from where you added the endpoint, e.g. the application\
  \ portal.\n\n---\nJavaScript\n---\n```js\n\nconst secret = \"whsec_EXAMPLE_PLACEHOLDER_NOT_A_REAL_SECRET\";\n\n// These\
  \ were all sent from the server\nconst headers = {\n  \"svix-id\": \"msg_EXAMPLE_PLACEHOLDER\",\n  \"svix-timestamp\": \"\
  1614265330\",\n  \"svix-signature\": \"v1,EXAMPLE_PLACEHOLDER_SIGNATURE=\",\n};\nconst payload = '{\"test\": 2432232314}';\n\
  \nconst wh = new Webhook(secret);\n// Throws on error, returns the verified content on success\nwh.verify(payload, headers);\n\
  ```\n\n---\nPython\n---\n```python\nfrom svix.webhooks import Webhook\n\nsecret = \"whsec_EXAMPLE_PLACEHOLDER_NOT_A_REAL_SECRET\"\
  \n\n# These were all sent from the server\nheaders = {\n  \"svix-id\": \"msg_EXAMPLE_PLACEHOLDER\",\n  \"svix-timestamp\"\
  : \"1614265330\",\n  \"svix-signature\": \"v1,EXAMPLE_PLACEHOLDER_SIGNATURE=\",\n}\npayload = '{\"test\": 2432232314}'\n\
  \nwh = Webhook(secret)\n# Throws on error, returns the verified content on success\nwh.verify(payload, headers)\n```\n\n\
  ---\nRust\n---\n```rust\nuse svix::webhooks::Webhook;\n\nlet secret = \"whsec_EXAMPLE_PLACEHOLDER_NOT_A_REAL_SECRET\".to_string();\n\
  \nlet mut headers = http::HeaderMap::new();\nheaders.insert(\"svix-id\", \"msg_EXAMPLE_PLACEHOLDER\");\nheaders.insert(\"\
  svix-timestamp\", \"1614265330\");\nheaders.insert(\n    \"svix-signature\",\n    \"v1,EXAMPLE_PLACEHOLDER_SIGNATURE=\"\
  ,\n);\n\nlet payload = b\"{\\\"test\\\": 2432232314}\";\n\nlet wh = Webhook::new(&secret)?;\nwh.verify(&payload, &headers)?;\n\
  // returns Ok on success, Err otherwise\n```\n\n---\nGo\n---\n```go\nsvix \"github.com/svix/svix-webhooks/go\"\n)\n\nsecret\
  \ := \"whsec_EXAMPLE_PLACEHOLDER_NOT_A_REAL_SECRET\"\n\n// These were all sent from the server\nheaders := http.Header{}\n\
  headers.Set(\"svix-id\", \"msg_EXAMPLE_PLACEHOLDER\")\nheaders.Set(\"svix-timestamp\", \"1614265330\")\nheaders.Set(\"svix-signature\"\
  , \"v1,EXAMPLE_PLACEHOLDER_SIGNATURE=\")\n\npayload := []byte(`{\"test\": 2432232314}`)\n\nwh, err := svix.NewWebhook(secret)\n\
  err := wh.Verify(payload, headers)\n// returns nil on success, error otherwise\n```\n\n---\nJava\n---\n```java\n\nString\
  \ secret = \"whsec_EXAMPLE_PLACEHOLDER_NOT_A_REAL_SECRET\";\n\n// These were all sent from the server\nHashMap<String, List<String>>\
  \ headerMap = new HashMap<String, List<String>>();\nheaderMap.put(\"svix-id\", Arrays.asList(\"msg_EXAMPLE_PLACEHOLDER\"\
  ));\nheaderMap.put(\"svix-timestamp\", Arrays.asList(\"1614265330\"));\nheaderMap.put(\"svix-signature\", Arrays.asList(\"\
  v1,EXAMPLE_PLACEHOLDER_SIGNATURE=\"));\nHttpHeaders headers = HttpHeaders.of(headerMap, BiPredicate<String, String>)\n\n\
  String payload = \"{\\\"test\\\": 2432232314}\";\n\nWebhook webhook = new Webhook(secret);\n\nwebhook.verify(payload, headers)\n\
  // throws WebhookVerificationError exception on failure.\n```\n\n---\nKotlin\n---\n```kotlin\n\nval secret = \"whsec_EXAMPLE_PLACEHOLDER_NOT_A_REAL_SECRET\"\
  ;\n\n// These were all sent from the server\nval headersMap = mapOf(\n    \"svix-id\" to listOf(\"msg_EXAMPLE_PLACEHOLDER\"\
  ),\n    \"svix-timestamp\" to listOf(\"1614265330\"),\n    \"svix-signature\" to listOf(\"v1,EXAMPLE_PLACEHOLDER_SIGNATURE=\"\
  ),\n)\nval headers = HttpHeaders(headersMap)\n\nval payload = \"{\\\"test\\\": 2432232314}\"\n\nval webhook = Webhook(secret)\n\
  \ntry {\n    webhook.verify(payload, headers)\n} catch (e: WebhookVerificationError) {\n    // Handle error\n}\n```\n\n\
  ---\nRuby\n---\n```ruby\nrequire 'svix'\n\nsecret = \"whsec_EXAMPLE_PLACEHOLDER_NOT_A_REAL_SECRET\"\n\n# These were all\
  \ sent from the server\nheaders = {\n  \"svix-id\" => \"msg_EXAMPLE_PLACEHOLDER\",\n  \"svix-timestamp\" => \"1614265330\"\
  ,\n  \"svix-signature\" => \"v1,EXAMPLE_PLACEHOLDER_SIGNATURE=\",\n}\npayload = '{\"test\": 2432232314}'\n\nwh = Svix::Webhook.new(secret)\n\
  # Throws on error, returns the verified content on success\nwh.verify(payload, headers)\n```\n\n---\nC#\n---\n```csharp\n\
  using Svix;\n\nstring secret = \"whsec_EXAMPLE_PLACEHOLDER_NOT_A_REAL_SECRET\";\n\n// These were all sent from the server\n\
  var headers = new Dictionary<string, List<string>> {\n    { \"svix-id\", new List<string> { \"msg_EXAMPLE_PLACEHOLDER\"\
  \ } },\n    { \"svix-timestamp\", new List<string> { \"1614265330\" } },\n    { \"svix-signature\", new List<string> { \"\
  v1,EXAMPLE_PLACEHOLDER_SIGNATURE=\" } }\n};\nstring payload = \"{\\\"test\\\": 2432232314}\";\n\nvar webhook = new Webhook(secret);\n\
  // Throws on error, returns the verified content on success\nwebhook.Verify(payload, headers);\n```\n\n---\nPHP\n---\n```php\n\
  use Svix\\Webhook;\n\n$secret = \"whsec_EXAMPLE_PLACEHOLDER_NOT_A_REAL_SECRET\";\n\n// These were all sent from the server\n\
  $headers = [\n    'svix-id' => ['msg_EXAMPLE_PLACEHOLDER'],\n    'svix-timestamp' => ['1614265330'],\n    'svix-signature'\
  \ => ['v1,EXAMPLE_PLACEHOLDER_SIGNATURE=']\n];\n$payload = '{\"test\": 2432232314}';\n\n$webhook = new Webhook($secret);\n\
  // Throws on error, returns the verified content on success\n$webhook->verify($payload, $headers);\n```\n\n---\nCLI\n---\n\
  ```sh\nsvix verify --secret whsec_EXAMPLE_PLACEHOLDER_NOT_A_REAL_SECRET --body '{\"test\": 2432232314}' --headers 'svix-id=msg_EXAMPLE_PLACEHOLDER'\
  \ 'svix-timestamp=1614265330' 'svix-signature=v1,EXAMPLE_PLACEHOLDER_SIGNATURE='\n```\n\n---\ncURL\n---\n```sh\n# Install\
  \ cURL. E.g. on arch linux:\npacman -S curl\n```\n\n## Verifying Webhooks Manually\n\n> **Note:**\n>\nThe recommended way\
  \ to verify webhooks is using our official libraries as outlined in the [How to Verify](./how.mdx) section.\n>\nHowever,\
  \ here are instructions for verifying manually for those who need it.\n\n## Verifying signatures manually\n\nEach webhook\
  \ call includes three headers with additional information that are used for verification:\n\n* `svix-id`: the unique message\
  \ identifier for the webhook message. This identifier is unique across all messages, but will be the same when the same\
  \ webhook is being resent (e.g. due to a previous failure).\n* `svix-timestamp`: timestamp in [seconds since epoch](https://en.wikipedia.org/wiki/Unix_time).\n\
  * `svix-signature`: the [Base64](https://en.wikipedia.org/wiki/Base64) encoded list of signatures (space delimited).\n\n\
  > **Note:**\n>\nProfessional and Enterprise tier customers can have the headers white-labeled to use the `webhook-` prefix\
  \ instead of the `svix-` prefix used above. The Svix libraries support both.\n>\n### Constructing the signed content\n\n\
  The content to sign is composed by concatenating the id, timestamp and payload, separated by the full-stop character (`.`).\
  \ In code, it will look something like:\n\n```javascript\nconst signedContent = `${svix_id}.${svix_timestamp}.${body}`;\n\
  ```\n\nWhere `body` is the raw body of the request. The signature is sensitive to any changes, so even a small change in\
  \ the body will cause the signature to be completely different. This means that you should *not* change the body in any\
  \ way before verifying.\n\n### Determining the expected signature\n\nSvix uses an [HMAC](https://en.wikipedia.org/wiki/Hash-based_message_authentication_code)\
  \ with [SHA-256](https://en.wikipedia.org/wiki/SHA-2) to sign its webhooks.\n\nSo to calculate the expected signature, you\
  \ should HMAC the `signed_content` from above using the base64 portion of your signing secret (this is the part after the\
  \ `whsec_` prefix) as the key.\nFor example, given the secret `whsec_EXAMPLE_PLACEHOLDER_NOT_A_REAL_SECRET` you will want\
  \ to use `MfKQ9r8GKYqrTwjUPD8ILPZIo2LaLaSw`.\n\nFor example, this is how you can calculate the signature in Node.js:\n\n\
  ```javascript\nconst crypto = require('crypto');\n\nconst signedContent = `${svix_id}.${svix_timestamp}.${body}`;\nconst\
  \ secret = \"whsec_5WbX5kEWLlfzsGNjH64I8lOOqUB6e8FH\";\n\n// Need to base64 decode the secret\nconst secretBytes = Buffer.from(secret.split('_')[1],\
  \ \"base64\");\nconst signature = crypto\n  .createHmac('sha256', secretBytes)\n  .update(signedContent)\n  .digest('base64');\n\
  \nconsole.log(signature);\n```\n\nThis generated signature should match one of the ones sent in the `svix-signature` header.\n\
  \nThe `svix-signature` header is composed of a list of space delimited signatures and their corresponding version identifiers.\
  \ The signature list is most commonly of length one. Though there could be any number of signatures. For example:\n\n```\n\
  v1,EXAMPLE_PLACEHOLDER_SIGNATURE= v1,bm9ldHUjKzFob2VudXRob2VodWUzMjRvdWVvdW9ldQo= v2,MzJsNDk4MzI0K2VvdSMjMTEjQEBAQDEyMzMzMzEyMwo=\n\
  ```\n\nMake sure to remove the version prefix and delimiter (e.g. `v1,`) before verifying the signature.\n\nPlease note\
  \ that to compare the signatures it's recommended to use a constant-time string comparison method in order to prevent timing\
  \ attacks.\n\n### Verify timestamp\n\nAs mentioned above, Svix also sends the timestamp of the attempt in the `svix-timestamp`\
  \ header. You should compare this timestamp against your system timestamp and ensure that it falls within an acceptable\
  \ tolerance (e.g., Â±5 minutes). This helps prevent replay attacks by ensuring that the webhook is not too old or too new.\n\
  \nIf the timestamp is outside the acceptable range, you should reject the webhook to prevent unauthorized access.\n"
