    \ on success\nwh.verify(payload, headers)\n```\n\n---\nC#\n---\n```csharp\nusing Svix;\n\nstring secret = \"whsec_EXAMPLE_PLACEHOLDER_NOT_A_REAL_SECRET\"\
    ;\n\n// These were all sent from the server\nvar headers = new Dictionary<string, List<string>> {\n    { \"svix-id\",\
    \ new List<string> { \"msg_EXAMPLE_PLACEHOLDER\" } },\n    { \"svix-timestamp\", new List<string> { \"1614265330\" } },\n\
    \    { \"svix-signature\", new List<string> { \"v1,EXAMPLE_PLACEHOLDER_SIGNATURE=\" } }\n};\nstring payload = \"{\\\"\
    test\\\": 2432232314}\";\n\nvar webhook = new Webhook(secret);\n// Throws on error, returns the verified content on success\n\
    webhook.Verify(payload, headers);\n```\n\n---\nPHP\n---\n```php\nuse Svix\\Webhook;\n\n$secret = \"whsec_EXAMPLE_PLACEHOLDER_NOT_A_REAL_SECRET\"\
    ;\n\n// These were all sent from the server\n$headers = [\n    'svix-id' => ['msg_EXAMPLE_PLACEHOLDER'],\n    'svix-timestamp'\
    \ => ['1614265330'],\n    'svix-signature' => ['v1,EXAMPLE_PLACEHOLDER_SIGNATURE=']\n];\n$payload = '{\"test\": 2432232314}';\n\
    \n$webhook = new Webhook($secret);\n// Throws on error, returns the verified content on success\n$webhook->verify($payload,\
    \ $headers);\n```\n\n---\nCLI\n---\n```sh\nsvix verify --secret whsec_EXAMPLE_PLACEHOLDER_NOT_A_REAL_SECRET --body '{\"\
    test\": 2432232314}' --headers 'svix-id=msg_EXAMPLE_PLACEHOLDER' 'svix-timestamp=1614265330' 'svix-signature=v1,EXAMPLE_PLACEHOLDER_SIGNATURE='\n\
    ```\n\n---\ncURL\n---\n```sh\n# Install cURL. E.g. on arch linux:\npacman -S curl\n```\n"
- fragment_type: rationale
  sequence: 7
  content: 'The recommended way to verify webhooks is using our official libraries as outlined in the [How to Verify](./how.mdx)
    section.


    However, here are instructions for verifying manually for those who need it.

    '
- fragment_type: example
  sequence: 8
  content: 'Each webhook call includes three headers with additional information that are used for verification:


    * `svix-id`: the unique message identifier for the webhook message. This identifier is unique across all messages, but
    will be the same when the same webhook is being resent (e.g. due to a previous failure).

    * `svix-timestamp`: timestamp in [seconds since epoch](https://en.wikipedia.org/wiki/Unix_time).

    * `svix-signature`: the [Base64](https://en.wikipedia.org/wiki/Base64) encoded list of signatures (space delimited).


    > **Note:**

    >

    Professional and Enterprise tier customers can have the headers white-labeled to use the `webhook-` prefix instead of
    the `svix-` prefix used above. The Svix libraries support both.

    >

    '
- fragment_type: execution
  sequence: 9
  content: 'Constructing the signed content


    The content to sign is composed by concatenating the id, timestamp and payload, separated by the full-stop character (`.`).
    In code, it will look something like:


    ```javascript

    const signedContent = `${svix_id}.${svix_timestamp}.${body}`;

    ```


    Where `body` is the raw body of the request. The signature is sensitive to any changes, so even a small change in the
    body will cause the signature to be completely different. This means that you should *not* change the body in any way
    before verifying.

    '
- fragment_type: example
  sequence: 10
  content: "Determining the expected signature\n\nSvix uses an [HMAC](https://en.wikipedia.org/wiki/Hash-based_message_authentication_code)\
    \ with [SHA-256](https://en.wikipedia.org/wiki/SHA-2) to sign its webhooks.\n\nSo to calculate the expected signature,\
    \ you should HMAC the `signed_content` from above using the base64 portion of your signing secret (this is the part after\
    \ the `whsec_` prefix) as the key.\nFor example, given the secret `whsec_EXAMPLE_PLACEHOLDER_NOT_A_REAL_SECRET` you will\
    \ want to use `MfKQ9r8GKYqrTwjUPD8ILPZIo2LaLaSw`.\n\nFor example, this is how you can calculate the signature in Node.js:\n\
    \n```javascript\nconst crypto = require('crypto');\n\nconst signedContent = `${svix_id}.${svix_timestamp}.${body}`;\n\
    const secret = \"whsec_5WbX5kEWLlfzsGNjH64I8lOOqUB6e8FH\";\n\n// Need to base64 decode the secret\nconst secretBytes =\
    \ Buffer.from(secret.split('_')[1], \"base64\");\nconst signature = crypto\n  .createHmac('sha256', secretBytes)\n  .update(signedContent)\n\
    \  .digest('base64');\n\nconsole.log(signature);\n```\n\nThis generated signature should match one of the ones sent in\
    \ the `svix-signature` header.\n\nThe `svix-signature` header is composed of a list of space delimited signatures and\
    \ their corresponding version identifiers. The signature list is most commonly of length one. Though there could be any\
    \ number of signatures. For example:\n\n```\nv1,EXAMPLE_PLACEHOLDER_SIGNATURE= v1,bm9ldHUjKzFob2VudXRob2VodWUzMjRvdWVvdW9ldQo=\
    \ v2,MzJsNDk4MzI0K2VvdSMjMTEjQEBAQDEyMzMzMzEyMwo=\n```\n\nMake sure to remove the version prefix and delimiter (e.g. `v1,`)\
    \ before verifying the signature.\n\nPlease note that to compare the signatures it's recommended to use a constant-time\
    \ string comparison method in order to prevent timing attacks.\n"
- fragment_type: verification
  sequence: 11
  content: 'Verify timestamp


    As mentioned above, Svix also sends the timestamp of the attempt in the `svix-timestamp` header. You should compare this
    timestamp against your system timestamp and ensure that it falls within an acceptable tolerance (e.g., Â±5 minutes). This
    helps prevent replay attacks by ensuring that the webhook is not too old or too new.


    If the timestamp is outside the acceptable range, you should reject the webhook to prevent unauthorized access.'
