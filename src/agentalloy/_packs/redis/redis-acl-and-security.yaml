raw_prose: |
  # Redis ACL and Security

  ## Overview

  Redis ACL provides per-user RBAC: each user has a set of allowed commands, keys, and pub/sub channels. The 'default' user is special — typically restricted in production. This skill covers ACL configuration.

  ---

  # ACL

