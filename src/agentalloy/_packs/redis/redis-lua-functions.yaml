raw_prose: |
  # Redis Lua Functions (FUNCTION LOAD)

  ## Overview

  Redis 7 introduced Functions — a successor to EVAL. Unlike EVAL scripts (cached only in memory), Functions are durable, replicate to replicas, and support library namespaces. This skill covers Function authoring + deployment.

  ## Redis functions

  ```json metadata
  {
    "title": "Redis functions",
    "description": "Scripting with Redis 7 and beyond",
    "categories": ["docs","develop","stack","oss","rs","rc","oss","kubernetes","clients"],
    "tableOfContents": {"sections":[{"id":"prologue-or-whats-wrong-with-eval-scripts","title":"Prologue (or, what's wrong with Eval Scripts?)"},{"id":"what-are-redis-functions","title":"What are Redis Functions?"},{"id":"loading-libraries-and-functions","title":"Loading libraries and functions"},{"id":"input-keys-and-regular-arguments","title":"Input keys and regular arguments"},{"id":"expanding-the-library","title":"Expanding the library"},{"id":"reusing-code-in-the-library","title":"Reusing code in the library"},{"id":"functions-in-cluster","title":"Functions in cluster"},{"id":"functions-and-ephemeral-redis-instances","title":"Functions and ephemeral Redis instances"},{"id":"function-flags","title":"Function flags"}]}

  ,
    "codeExamples": []
  }
  ```
  Redis Functions is an API for managing code to be executed on the server. This feature, which became available in Redis 7, supersedes the use of [EVAL](https://redis.io/docs/latest/develop/programmability/eval-intro) in prior versions of Redis.

  ## Prologue (or, what's wrong with Eval Scripts?)

  Prior versions of Redis made scripting available only via the [`EVAL`](https://redis.io/docs/latest/commands/eval) command, which allows a Lua script to be sent for execution by the server.
  The core use cases for [Eval Scripts](https://redis.io/docs/latest/develop/programmability/eval-intro) is executing part of your application logic inside Redis, efficiently and atomically.
  Such script can perform conditional updates across multiple keys, possibly combining several different data types.

  Using [`EVAL`](https://redis.io/docs/latest/commands/eval) requires that the application sends the entire script for execution every time.
  Because this results in network and script compilation overheads, Redis provides an optimization in the form of the [`EVALSHA`](https://redis.io/docs/latest/commands/evalsha) command. By first calling [`SCRIPT LOAD`](https://redis.io/docs/latest/commands/script-load) to obtain the script's SHA1, the application can invoke it repeatedly afterward with its digest alone.

  By design, Redis only caches the loaded scripts.
  That means that the script cache can become lost at any time, such as after calling [`SCRIPT FLUSH`](https://redis.io/docs/latest/commands/script-flush), after restarting the server, or when failing over to a replica.
  The application is responsible for reloading scripts during runtime if any are missing.
  The underlying assumption is that scripts are a part of the application and not maintained by the Redis server.

  This approach suits many light-weight scripting use cases, but introduces several difficulties once an application becomes complex and relies more heavily on scripting, namely:

  1. All client application instances must maintain a copy of all scripts. That means having some mechanism that applies script updates to all of the application's instances.
  1. Calling cached scripts within the context of a [transaction](https://redis.io/docs/latest/develop/using-commands/transactions) increases the probability of the transaction failing because of a missing script. Being more likely to fail makes using cached scripts as building blocks of workflows less attractive.
  1. SHA1 digests are meaningless, making debugging the system extremely hard (e.g., in a [`MONITOR`](https://redis.io/docs/latest/commands/monitor) session).
  1. When used naively, [`EVAL`](https://redis.io/docs/latest/commands/eval) promotes an anti-pattern in which scripts the client application renders verbatim scripts instead of responsibly using the [`KEYS` and `ARGV` Lua APIs](https://redis.io/docs/latest/develop/programmability/lua-api#runtime-globals).
  1. Because they are ephemeral, a script can't call another script. This makes sharing and reusing code between scripts nearly impossible, short of client-side preprocessing (see the first point).

  To address these needs while avoiding breaking changes to already-established and well-liked ephemeral scripts, Redis v7.0 introduces Redis Functions.

  ## What are Redis Functions?

  Redis functions are an evolutionary step from ephemeral scripting.

  Functions provide the same core functionality as scripts but are first-class software artifacts of the database.
  Redis manages functions as an integral part of the database and ensures their availability via data persistence and replication.
  Because functions are part of the database and therefore declared before use, applications aren't required to load them during runtime nor risk aborted transactions.
  An application that uses functions depends only on their APIs rather than on the embedded script logic in the database.

  Whereas ephemeral scripts are considered a part of the application's domain, functions extend the database server itself with user-provided logic.
  They can be used to expose a richer API composed of core Redis commands, similar to modules, developed once, loaded at startup, and used repeatedly by various applications / clients.
  Every function has a unique user-defined name, making it much easier to call and trace its execution.

  The design of Redis Functions also attempts to demarcate between the programming language used for writing functions and their management by the server.
  Lua, the only language interpreter that Redis presently support as an embedded execution engine, is meant to be simple and easy to learn.
  However, the choice of Lua as a language still presents many Redis users with a challenge.

  The Redis Functions feature makes no assumptions about the implementation's language.
  An execution engine that is part of the definition of the function handles running it.
  An engine can theoretically execute functions in any language as long as it respects several rules (such as the ability to terminate an executing function).

  Presently, as noted above, Redis ships with a single embedded [Lua 5.1](https://redis.io/docs/latest/develop/programmability/lua-api) engine.
  There are plans to support additional engines in the future.
  Redis functions can use all of Lua's available capabilities to ephemeral scripts,
  with the only exception being the [Redis Lua scripts debugger](https://redis.io/docs/latest/develop/programmability/lua-debugging).

  Functions also simplify development by enabling code sharing.
  Every function belongs to a single library, and any given library can consist of multiple functions.
  The library's contents are immutable, and selective updates of its functions aren't allowed.
  Instead, libraries are updated as a whole with all of their functions together in one operation.
  This allows calling functions from other functions within the same library, or sharing code between functions by using a common code in library-internal methods, that can also take language native arguments.

  Functions are intended to better support the use case of maintaining a consistent view for data entities through a logical schema, as mentioned above.
  As such, functions are stored alongside the data itself.
  Functions are also persisted to the AOF file and replicated from master to replicas, so they are as durable as the data itself.
  When Redis is used as an ephemeral cache, additional mechanisms (described below) are required to make functions more durable.

  Like all other operations in Redis, the execution of a function is atomic.
  A function's execution blocks all server activities during its entire time, similarly to the semantics of [transactions](https://redis.io/docs/latest/develop/using-commands/transactions).
  These semantics mean that all of the script's effects either have yet to happen or had already happened.
  The blocking semantics of an executed function apply to all connected clients at all times.
  Because running a function blocks the Redis server, functions are meant to finish executing quickly, so you should avoid using long-running functions.

  ## EVAL (Redis pre-7.0 scripting)

  For Redis versions before 7.0 — or when working with ephemeral scripts that do not need durability/replication — EVAL runs Lua server-side. The script executes atomically with respect to other Redis operations. Use for compare-and-swap patterns, conditional updates, multi-key atomic transitions. Scripts must be deterministic (same input → same output).

  ### Getting started with EVAL

  We'll start scripting with Redis by using the [`EVAL`](https://redis.io/docs/latest/commands/eval) command.

  Here's our first example:

  ```
  > EVAL "return 'Hello, scripting!'" 0
  "Hello, scripting!"
  ```

  In this example, [`EVAL`](https://redis.io/docs/latest/commands/eval) takes two arguments.
  The first argument is a string that consists of the script's Lua source code.
  The script doesn't need to include any definitions of Lua function.
  It is just a Lua program that will run in the Redis engine's context.

  The second argument is the number of arguments that follow the script's body, starting from the third argument, representing Redis key names.
  In this example, we used the value _0_ because we didn't provide the script with any arguments, whether the names of keys or not.

  ### Script parameterization

  It is possible, although highly ill-advised, to have the application dynamically generate script source code per its needs.
  For example, the application could send these two entirely different, but at the same time perfectly identical scripts:

  ```
  redis> EVAL "return 'Hello'" 0
  "Hello"
  redis> EVAL "return 'Scripting!'" 0
  "Scripting!"
  ```

  Although this mode of operation isn't blocked by Redis, it is an anti-pattern due to script cache considerations. Instead of having your application generate subtle variations of the same scripts, you can parametrize them and pass any arguments needed to execute them.

  The following example demonstrates how to achieve the same effects as above, but via parameterization:

  ```
  redis> EVAL "return ARGV[1]" 0 Hello
  "Hello"
  redis> EVAL "return ARGV[1]" 0 Parameterization!
  "Parameterization!"
  ```

  At this point, it is essential to understand the distinction Redis makes between input arguments that are names of keys and those that aren't.

  **Important:** to ensure the correct execution of scripts, both in standalone and clustered deployments, all names of keys that a script accesses must be explicitly provided as input key arguments. The script **should only** access keys whose names are given as input arguments. Scripts **should never** access keys with programmatically-generated names or based on the contents of data structures stored in the database.

  Any input to the function that isn't the name of a key is a regular input argument. The execution context makes arguments available to the script through [_KEYS_](https://redis.io/docs/latest/develop/programmability/lua-api#the-keys-global-variable) and [_ARGV_](https://redis.io/docs/latest/develop/programmability/lua-api#the-argv-global-variable) global runtime variables.

  ```
  redis> EVAL "return { KEYS[1], KEYS[2], ARGV[1], ARGV[2], ARGV[3] }" 2 key1 key2 arg1 arg2 arg3
  1) "key1"
  2) "key2"
  3) "arg1"
  4) "arg2"
  5) "arg3"
  ```

  ### Interacting with Redis from a script

  It is possible to call Redis commands from a Lua script either via [`redis.call()`](https://redis.io/docs/latest/develop/programmability/lua-api#redis.call) or [`redis.pcall()`](https://redis.io/docs/latest/develop/programmability/lua-api#redis.pcall).

  The two are nearly identical. Both execute a Redis command along with its provided arguments, if these represent a well-formed command. However, the difference lies in error handling. Errors raised from calling `redis.call()` are returned directly to the client. Errors encountered when calling `redis.pcall()` are returned to the script's execution context instead for possible handling.

  ```
  > EVAL "return redis.call('SET', KEYS[1], ARGV[1])" 1 foo bar
  OK
  ```

  The above script accepts one key name and one value as its input arguments. When executed, the script calls the [`SET`](https://redis.io/docs/latest/commands/set) command to set the input key, _foo_, with the string value "bar".

  EVALSHA optimization: by first calling [`SCRIPT LOAD`](https://redis.io/docs/latest/commands/script-load) to obtain the script's SHA1, the application can invoke it repeatedly afterward with its digest alone — avoiding network and compilation overhead per call.

