raw_prose: |
  # Fastify Error Handling

  ## Overview

  Fastify routes errors through a layered pipeline: the active `setErrorHandler` runs for thrown/rejected errors; the `onError` hook fires alongside; schema validation errors get a separate `schemaErrorFormatter`. Error handlers honor encapsulation. This skill covers error handling patterns.

  Sourced from https://fastify.dev/docs/latest/Reference/Errors/.

  ## Errors

