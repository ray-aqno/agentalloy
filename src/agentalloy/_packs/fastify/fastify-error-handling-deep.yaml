raw_prose: |
  # Fastify Error Handling Deep

  ## Overview

  Fastify routes errors through a layered pipeline. The active setErrorHandler runs for thrown/rejected errors; schema validation errors get a separate schemaErrorFormatter; the onError hook fires alongside. Error handlers honor encapsulation.

  ---

  ## setErrorHandler

  ```ts
  app.setErrorHandler((error, request, reply) => {
      request.log.error(error);

      if (error.validation) {
          return reply.status(400).send({
              error: 'Validation failed',
              details: error.validation,
          });
      }

      if (error instanceof BusinessRuleError) {
          return reply.status(422).send({
              error: error.message,
              code: error.code,
          });
      }

      // Generic 500
      reply.status(500).send({ error: 'Internal server error' });
  });
  ```

  The handler runs for any thrown or rejected error in routes or hooks. Returns determine the response.

  ## Validation Errors

  Fastify throws a structured error when JSON Schema validation fails:

  ```ts
  // error.validation = [
  //   { instancePath: '/email', schemaPath: '#/properties/email/format', keyword: 'format', params: { format: 'email' }, message: 'must match format "email"' }
  // ]
  ```

  Customize with `schemaErrorFormatter`:

  ```ts
  app.setSchemaErrorFormatter((errors, dataVar) => {
      return new Error('validation: ' + errors.map(e => e.instancePath + ' ' + e.message).join('; '));
  });
  ```

  Or handle in setErrorHandler:

  ```ts
  if (error.validation) {
      return reply.status(400).send({
          error: 'Validation failed',
          fields: error.validation.map(e => ({
              field: e.instancePath.replace(/^\//, ''),
              message: e.message,
          })),
      });
  }
  ```

  ## Error Codes vs Status

  ```ts
  class NotFoundError extends Error {
      statusCode = 404;
      code = 'USER_NOT_FOUND';
  }

  throw new NotFoundError('user not found');
  ```

  Fastify reads `statusCode` automatically. The `code` field flows to monitoring; clients can switch on it.

  ```ts
  app.setErrorHandler((error, req, reply) => {
      reply.status(error.statusCode || 500).send({
          error: error.message,
          code: error.code,
          requestId: req.id,
      });
  });
  ```

  Including `requestId` lets users report errors with a key the team can grep logs for.

  ## 404 and 405 Handlers

  ```ts
  app.setNotFoundHandler((req, reply) => {
      reply.status(404).send({ error: 'route not found', path: req.url });
  });

  app.setNotFoundHandler({ preValidation: [authHandler] }, (req, reply) => {
      // 404 handler with auth
  });
  ```

  405 (method not allowed) needs explicit registration via `fastify-method-override` or the `attachValidation` route option. Most APIs don't bother; 404 catches both cases.

  ## onError Hook

  ```ts
  app.addHook('onError', async (req, reply, error) => {
      Sentry.captureException(error, {
          contexts: { request: { url: req.url, method: req.method } },
      });
  });
  ```

  Fires when an error occurs but doesn't transform the response. Use for monitoring side effects.

  ## Encapsulation

  Error handlers honor plugin scope:

  ```ts
  app.register(async (admin) => {
      admin.setErrorHandler((error, req, reply) => {
          reply.send({ adminError: error.message });
      });
      admin.get('/admin/dashboard', ...);
  });

  app.get('/public', ...);  // uses default handler, not admin's
  ```

  Each plugin can customize errors for its routes without affecting siblings.

  ## Error Logging Levels

  ```ts
  app.setErrorHandler((error, req, reply) => {
      if (error.statusCode && error.statusCode < 500) {
          req.log.warn({ err: error }, 'client error');
      } else {
          req.log.error({ err: error }, 'server error');
      }
      // ...
  });
  ```

  4xx errors (validation, not-found, auth) shouldn't page on-call. 5xx should. Log accordingly.

  ## Async Errors

  ```ts
  app.get('/data', async () => {
      const data = await fetchData();  // rejection caught
      return data;
  });

  app.get('/data', (req, reply) => {
      fetchData()  // not awaited!
          .then(data => reply.send(data))
          .catch(err => { /* must handle manually */ });
  });
  ```

  Async handlers: thrown / rejected errors auto-route to setErrorHandler. Sync handlers with manual promises: catch yourself or call `reply.send(err)`.

  ## Common Pitfalls

  - **Returning instead of replying.** A handler that does `return { error: '...' }` sends a 200 with that body. Use `reply.status(...)` for non-200.
  - **No requestId in errors.** Hard to correlate user reports to logs. Always include `req.id`.
  - **Logging at error level for 4xx.** Pages on-call for invalid input. Use warn or info.
  - **Stack traces in client errors.** Information disclosure. Strip in production responses; keep in logs.
  - **Custom error classes without `statusCode`.** Default to 500. Always set explicitly.

  ## Verification

  A working error pipeline:

  - Validation errors return structured 400 with field details.
  - Business errors return appropriate status (4xx vs 5xx).
  - Server errors log with stack; clients see generic message.
  - requestId on every error response correlates to logs.
  - Sentry / monitoring captures every 5xx with context.
