    method: 'GET',

    url: '/',

    schema: {

      querystring: {

        type: 'object',

        properties: {

          name: { type: 'string' },

          excitement: { type: 'integer' }

        }

      },

      response: {

        200: {

          type: 'object',

          properties: {

