    sequence: 12
    content: |
      ## Rationale

      This skill covers the configuration and usage of GitHub Actions deployment environments, including scoped secrets, required reviewers, deployment branches, wait timers, and integration with deployment workflows. It emphasizes the importance of gating production deploys behind manual approval or per-environment secrets to ensure security and reliability.

  - fragment_type: example
    sequence: 13
    content: |
      ## Example

      ```yaml
      jobs:
        deploy-prod:
          runs-on: ubuntu-latest
          environment:
            name: production
            url: https://myapp.com
          steps:
            - run: ./deploy.sh
      ```

      This example shows how to configure a job that deploys to the 'production' environment, with secrets scoped to that environment.

  - fragment_type: guardrail
    sequence: 14
    content: |
      ## Guardrails

      - Ensure that all production environments have required reviewers configured.
      - Set appropriate wait timers for critical deployments.
      - Restrict deployment branches to prevent untested code from reaching production.
      - Use environment secrets instead of repository-level secrets for sensitive information.

  - fragment_type: rationale
    sequence: 15
    content: |
      ## Rationale

      By following the guidelines outlined in this skill, teams can enhance the security and reliability of their deployment processes. Properly configured environments help prevent accidental deployments, ensure that only authorized personnel can deploy to production, and maintain a clear audit trail of who deployed what when.