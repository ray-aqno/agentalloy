raw_prose: |
  # GitHub Actions Workflow Syntax

  ## Overview

  GitHub Actions workflows are YAML files in `.github/workflows/`. The schema covers triggers, jobs, steps, conditional execution, matrix builds, dependency ordering, and permissions. This skill covers the workflow-syntax surface end-to-end.

  Sourced from https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax.

  ## About YAML syntax for workflows

  Workflow files use YAML syntax, and must have either a `.yml` or `.yaml` file extension. 

  You must store workflow files in the `.github/workflows` directory of your repository.

  ## `name`

  ## `run-name`

  The name for workflow runs generated from the workflow.  displays the workflow run name in the list of workflow runs on your repository's "Actions" tab. If `run-name` is omitted or is only whitespace, then the run name is set to event-specific information for the workflow run. For example, for a workflow triggered by a `push` or `pull_request` event, it is set as the commit message or the title of the pull request.

  This value can include expressions and can reference the [`github`](/actions/learn-github-actions/contexts#github-context) and [`inputs`](/actions/learn-github-actions/contexts#inputs-context).

  ### Example of `run-name`

  ```yaml
  run-name: Deploy to $ by @$
  ```

