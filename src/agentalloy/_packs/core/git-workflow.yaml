raw_prose: |
  # Git Workflow

  Git workflow is the discipline of moving a change from the working tree to the merged main branch in small, reviewable, reversible steps. The rule is one sentence: every code change goes through a feature branch, an atomic commit, and a pull request before it lands on main. Most regressions that ship to production failed this rule somewhere — the change was committed directly to main, the commit lumped together unrelated edits, or the PR was self-merged without review.

  ## Branches — one branch per change

  Create a new branch for every change that is not strictly local to your working tree. Name it after the change, not the author: `feat/auth-token-refresh`, `fix/null-pointer-in-cart`, `docs/install-readme`. The prefix tells the reviewer the kind of change. The slug names the change.

  Branch off main, not off another feature branch unless that feature branch is a hard dependency. Stacked feature branches multiply merge conflicts and make rollback harder.

  Keep branches short-lived. A branch open for more than a few days collects merge conflicts and drifts from main. If a change is too big to land in a few days, split it (see planning-and-task-breakdown).

  ## Commits — atomic and described

  An atomic commit is one logical change that can be reverted in one step without breaking anything else. "Refactor the cart and add the checkout button" is two commits, not one. The reviewer reads commits as units; mixed commits force them to mentally untangle the diff.

  Commit message structure: imperative-mood subject under 72 chars, blank line, body explaining the *why* (not the *what* — the diff already shows that). "Fix race in token refresh" beats "Updated auth code." If the change is non-trivial, the body should answer: what was the symptom, what was the cause, why this fix.

  Stage by hunk (`git add -p`) when a working tree contains unrelated edits. Committing the whole tree because it is faster turns a clean diff into a soup that the reviewer cannot evaluate.

  ## Pull requests — every code change, no exceptions

  Every code change goes through a pull request. PRs are not bureaucracy — they are the asynchronous review surface that catches the bugs your local verification missed. Self-merging without review is acceptable only for genuine emergencies (incident hotfix at 3am) and trivial doc edits where convention permits direct-to-main.

  PR description structure:

  - **Summary**: 1–3 bullets of what changed and why.
  - **Test plan**: how to verify the change works. Specific commands, not "tested locally."
  - **Screenshots / recordings**: for UI changes, attach before/after.

  Keep PRs small. A PR with 1500 lines of diff cannot be reviewed carefully — it gets rubber-stamped or sits open for a week. If a PR exceeds ~500 changed lines, split it. Large infrastructure migrations are the rare exception; flag them explicitly.

  ## Never do these

  - **Force-push to main or a shared branch.** `git push --force` rewrites history and silently drops other people's commits. On personal branches it is fine; on main or any branch others may have checked out, it is destructive. Use `--force-with-lease` if you must rewrite a personal branch you have already pushed.
  - **Commit secrets, credentials, or large binaries.** Once a secret is in git history, rotating it is the only fix — `git filter-branch` and BFG can hide it but the GitHub mirror, the contributor's local clone, and any caches will still have it. Keep `.env` files in `.gitignore` and use `git-secrets` or a pre-commit hook to block accidental commits.
  - **Skip pre-commit hooks (`--no-verify`) without a reason.** Hooks exist because something went wrong before. Bypassing them silently is how the same problem ships twice.
  - **Use `git reset --hard` on a branch with uncommitted work you want to keep.** It is the fastest way to lose hours of work. `git stash` first if you are unsure.

  ## Recovering from mistakes

  Git rarely loses work — most "I deleted everything" panics are recoverable from `git reflog`. The reflog records every HEAD movement for ~90 days. If you hard-reset away a commit, `git reflog` shows the SHA; `git checkout <sha>` brings it back.

  Branch deleted by mistake? `git reflog` finds the last commit on it; `git checkout -b <branch> <sha>` recreates it. Force-pushed over your work? Same recovery, on the remote tracking branch (`refs/remotes/origin/<branch>`). Worktree wiped by `git reset --hard` you regret? `git stash list` shows any stashes; the reflog shows prior HEAD positions you can check out into a recovery branch. The general lesson: before reaching for any destructive git command, ask whether `git stash` or a throwaway branch would work instead. Stash and branches are reversible; `reset --hard`, `clean -fd`, and `push --force` are not. The reflog catches most of the rest, but it only records HEAD movements for the last ~90 days, so do not lean on it as your primary safety net.

  ## Merging strategies

  Three options exist; pick one per repo and stick to it.

  - **Merge commit.** Preserves the branch shape; main has merge bubbles. Verbose history, full record of how a feature came together.
  - **Squash merge.** Collapses the PR into one commit on main. Clean linear history, loses individual commit grain. Most product repos use this.
  - **Rebase merge.** Replays each commit linearly on main. Clean history *and* preserves commit grain, but only works if PR commits are atomic and well-described — otherwise you get a messy linear history of WIP commits.

  Mixing strategies in one repo creates a confusing history. Decide once, document in CONTRIBUTING.md, configure the platform to enforce it.

  ## Verification

  - [ ] Every change is on a non-main branch named after the change with a kind prefix (`feat/`, `fix/`, `docs/`, `refactor/`, `chore/`).
  - [ ] Each commit is atomic — reverting it does not break unrelated code.
  - [ ] Commit subjects are imperative, under 72 chars, and describe the change; non-trivial commits have a body explaining the *why*.
  - [ ] No code change reached main without going through a PR (doc-only edits may go direct-to-main if repo convention allows).
  - [ ] No `--force` push touched main or any shared branch; personal-branch rewrites used `--force-with-lease`.
  - [ ] `.env`, credentials, and large binaries stayed out of history (verified by `.gitignore` and pre-commit hooks).

