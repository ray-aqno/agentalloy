- sequence: 3
  fragment_type: example
  content: "## Quick Examples\n\n### Eliminating `any` with generics\n\n**Before**\n```ts\nfunction getProperty(obj: any, key: string): any {\n  return obj[key];\n}\n```\n\n**After**\n```ts\nfunction getProperty<T, K extends keyof T>(obj: T, key: K): T[K] {\n  return obj[key];\n}\n// getProperty({ name: \"Alice\" }, \"name\") → inferred as string ✓\n```\n\n### Narrowing an unknown API response\n\n**Before**\n```ts\nasync function fetchUser(): Promise<any> {\n  const res = await fetch(\"/api/user\");\n  return res.json();\n}\n```\n\n**After**\n```ts\ninterface User { id: number; name: string }\n\nfunction isUser(value: unknown): value is User {\n  return (\n    typeof value === \"object\" &&\n    value !== null &&\n    \"id\" in value &&\n    \"name\" in value\n  );\n}\n\nasync function fetchUser(): Promise<User> {\n  const res = await fetch(\"/api/user\");\n  const data: unknown = await res.json();\n  if (!isUser(data)) throw new Error(\"Invalid user shape\");\n  return data;\n}\n```\n\n### Brand types for nominal IDs\n\n```ts\ntype Brand<T, B> = T & { __brand: B };\ntype UserId = Brand<string, 'UserId'>;\ntype OrderId = Brand<string, 'OrderId'>;\n\nfunction asUserId(s: string): UserId { return s as UserId; }\nfunction loadUser(id: UserId) { /* ... */ }\n\nconst oid: OrderId = 'o-1' as OrderId;\n// loadUser(oid); // Error: OrderId is not assignable to UserId ✓\n```\n\n### Mapped + conditional: deep readonly\n\n```ts\ntype DeepReadonly<T> = T extends (infer U)[]\n  ? readonly DeepReadonly<U>[]\n  : T extends object\n  ? { readonly [K in keyof T]: DeepReadonly<T[K]> }\n  : T;\n```"
- sequence: 4
  fragment_type: guardrail
  content: '## Anti-Patterns


    | Anti-Pattern | Problem | Fix |

    |---|---|---|

    | `as any` to silence errors | Loses all type safety in that subtree | Narrow with type guards or fix the upstream type |

    | `as unknown as T` cast chains | Lying to the compiler; runtime breaks silently | Use a type guard; if structure is uncertain, parse with Zod |

    | `enum` in modern TS code | Generates runtime artifacts; doesn''t tree-shake well; non-trivial type behavior | `as const` object + `typeof` |

    | `// @ts-ignore` without explanation | Hides genuine bugs | `// @ts-expect-error <reason>` (errors when no longer needed) |

    | Returning `any` from JSON parsers | Untyped data flows through the codebase | Return `unknown`, validate with a guard or schema |

    | Overusing `Function` type | Unsafe, accepts anything callable | `(...args: T[]) => U` with explicit signatures |

    | Deeply nested conditional types | Compiler slow; unreadable | Refactor into named helpers; consider dedicated branded types |


    ### Verification


    - [ ] `tsc --noEmit` passes with `"strict": true`

    - [ ] No new `any` introduced (run `eslint` with `@typescript-eslint/no-explicit-any: ''error''`)

    - [ ] Each `as` cast has a comment justifying it

    - [ ] Public APIs return concrete types, not `unknown` (callers shouldn''t have to re-narrow)'
