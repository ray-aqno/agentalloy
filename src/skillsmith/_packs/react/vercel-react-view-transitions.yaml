  content: '# React View Transitions


    Animate between UI states using the browser''s native `document.startViewTransition`. Declare *what* with `<ViewTransition>`, trigger *when* with `startTransition` / `useDeferredValue` / `Suspense`, control *how* with CSS classes. Unsupported browsers skip animations gracefully.'
- sequence: 2
  fragment_type: setup
  content: '## When to Animate


    Every `<ViewTransition>` should communicate a spatial relationship or continuity. If you can''t articulate what it communicates, don''t add it.


    Implement **all** applicable patterns from this list, in this order:


    | Priority | Pattern | What it communicates |

    |----------|---------|---------------------|

    | 1 | **Shared element** (`name`) | "Same thing — going deeper" |

    | 2 | **Suspense reveal** | "Data loaded" |

    | 3 | **List identity** (per-item `key`) | "Same items, new arrangement" |

    | 4 | **State change** (`enter`/`exit`) | "Something appeared/disappeared" |

    | 5 | **Route change** (layout-level) | "Going to a new place" |


    This is an implementation order, not a "pick one" list. Implement every pattern that fits the app.'
- sequence: 3
  fragment_type: execution
  content: '### Choosing Animation Style


    | Context | Animation | Why |

    |---------|-----------|-----|

    | Hierarchical navigation (list → detail) | Type-keyed `nav-forward` / `nav-back` | Communicates spatial depth |

    | Lateral navigation (tab-to-tab) | Bare `<ViewTransition>` (fade) or `default="none"` | No depth to communicate |

    | Suspense reveal | `enter`/`exit` string props | Content arriving |

    | Revalidation / background refresh | `default="none"` | Silent — no animation needed |


    Reserve directional slides for hierarchical navigation and ordered sequences (prev/next photo, carousel). Lateral/unordered navigation should not use directional slides — it falsely implies spatial depth.'
