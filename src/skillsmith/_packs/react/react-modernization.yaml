raw_prose: '# React Modernization


  Master React version upgrades, class to hooks migration, concurrent features adoption, and codemods for automated transformation.


  ## When to Use


  - Upgrading React applications to latest versions

  - Migrating class components to functional components with hooks

  - Adopting concurrent React features (Suspense, transitions)

  - Applying codemods for automated refactoring

  - Modernizing state management patterns

  - Updating to TypeScript

  - Improving performance with React 18+ features


  ## Version Upgrade Path


  **React 17 breaking changes:** event delegation changes, no event pooling, effect cleanup timing, JSX transform (no React import needed).


  **React 18 breaking changes:** automatic batching, concurrent rendering, StrictMode double-invocation, new root API, Suspense on server.


  ## Class to Hooks Migration


  - **State** — `this.state` / `setState` → `useState`

  - **Lifecycle** — `componentDidMount` + `componentDidUpdate` + `componentWillUnmount` → `useEffect` with cleanup return + dependency array

  - **Context** — `static contextType` / `<Context.Consumer>` → `useContext(Context)`

  - **HOCs** → custom hooks (e.g. `withUser` → `useUser`)


  ## React 18 Concurrent Features


  - **New Root API** — `import { createRoot } from "react-dom/client"; createRoot(el).render(<App />)`

  - **Automatic Batching** — multiple `setState` calls (even in setTimeout/promises) batched into one render. Opt out with `flushSync`.

  - **Transitions** — `useTransition()` returns `[isPending, startTransition]`. Wrap non-urgent updates in `startTransition()` so they can be interrupted.

  - **Suspense** — declarative loading boundaries. Resource-based data fetching: components throw promises, Suspense waits.


  ## Codemods for Automation


  - `rename-unsafe-lifecycles.js` — `componentWillMount` → `UNSAFE_componentWillMount`

  - `update-react-imports.js` — strip default React import where unused

  - `error-boundaries.js` — scaffold error boundary components

  - `convert-class-to-function` — class to functional component conversion


  Run with `npx jscodeshift -t <url> src/`. Use `--parser=tsx` for TypeScript. Use `--dry --print` to preview.


  ## Performance Optimization


  - `useMemo` for expensive derivations

  - `useCallback` for stable callback identity (paired with `React.memo` children)

  - `React.lazy` + `Suspense` for code splitting


  ## TypeScript Migration


  Add `interface` for component props, type generic components with `<T>`, prefer `React.ReactNode` over `React.ReactElement` for `children`.


  ## Migration Checklist


  Pre-migration: incremental dep updates, review release notes, set up tests, branch.

  Class → hooks: leaf components first, useState/useEffect/useContext, extract custom hooks, test.

  React 18: 17 first if needed, then 18 + types, createRoot, StrictMode double-invocation, address concurrent issues.

  Performance: memo only where bottlenecks exist, code splitting, profile.

  Testing: update React Testing Library, test concurrent features.'
