- sequence: 12
  fragment_type: example
  content: "### Performance: useMemo, useCallback, React.memo\n\n```javascript\nfunction ExpensiveComponent({ items, filter }) {\n  // Memoize expensive derivation\n  const filteredItems = useMemo(\n    () => items.filter(item => item.category === filter),\n    [items, filter]\n  );\n\n  // Stable callback identity for memo'd children\n  const handleClick = useCallback((id) => {\n    console.log(\"Clicked:\", id);\n  }, []);\n\n  return <List items={filteredItems} onClick={handleClick} />;\n}\n\n// Child only re-renders when items or onClick change\nconst List = React.memo(({ items, onClick }) =>\n  items.map(item => <Item key={item.id} item={item} onClick={onClick} />)\n);\n```\n\nDon't memo everything — measure first. memo has overhead."
- sequence: 13
  fragment_type: example
  content: "### Code Splitting with React.lazy\n\n```javascript\nimport { lazy, Suspense } from \"react\";\n\nconst Dashboard = lazy(() => import(\"./Dashboard\"));\nconst Settings = lazy(() => import(\"./Settings\"));\n\nfunction App() {\n  return (\n    <Suspense fallback={<Loading />}>\n      <Routes>\n        <Route path=\"/dashboard\" element={<Dashboard />} />\n        <Route path=\"/settings\" element={<Settings />} />\n      </Routes>\n    </Suspense>\n  );\n}\n```"
- sequence: 14
  fragment_type: example
  content: "### TypeScript Migration\n\n```typescript\n// Add typed props\ninterface ButtonProps {\n  onClick: () => void;\n  children: React.ReactNode;\n}\n\nfunction Button({ onClick, children }: ButtonProps) {\n  return <button onClick={onClick}>{children}</button>;\n}\n\n// Generic components\ninterface ListProps<T> {\n  items: T[];\n  renderItem: (item: T) => React.ReactNode;\n}\n\nfunction List<T>({ items, renderItem }: ListProps<T>) {\n  return <>{items.map(renderItem)}</>;\n}\n```"
- sequence: 15
  fragment_type: verification
  content: '## Migration Checklist


    **Pre-migration**

    - [ ] Update dependencies incrementally — not all at once

    - [ ] Review breaking changes in release notes

    - [ ] Set up testing suite if not already

    - [ ] Create feature branch


    **Class → Hooks**

    - [ ] Identify class components to migrate (start with leaves — no children)

    - [ ] Convert state to useState

    - [ ] Convert lifecycle to useEffect with cleanup + deps

    - [ ] Convert context to useContext

    - [ ] Extract reusable logic into custom hooks

    - [ ] Test thoroughly


    **React 18 Upgrade**

    - [ ] Update react + react-dom + @types/react

    - [ ] Switch to createRoot API

    - [ ] Test with StrictMode (effects double-invoke in dev)

    - [ ] Address concurrent rendering issues (race conditions in effects)

    - [ ] Adopt Suspense / Transitions where beneficial


    **Performance & Testing**

    - [ ] Profile before adding memo — only memo bottlenecks

    - [ ] Add code splitting on routes

    - [ ] Update React Testing Library

    - [ ] Run with no console warnings'
