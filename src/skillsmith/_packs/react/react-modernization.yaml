- sequence: 3
  fragment_type: rationale
  content: '## Version Upgrade Path: 16 → 17 → 18


    **React 17 breaking changes:**

    - Event delegation changes (events attach to root, not document)

    - No more event pooling

    - Effect cleanup timing changed

    - New JSX transform (no need to import React in scope)


    **React 18 breaking changes:**

    - Automatic batching (even in promises/setTimeout)

    - Concurrent rendering enabled

    - StrictMode double-invokes effects in dev

    - New root API (`createRoot`)

    - Suspense on server (SSR streaming)'
- sequence: 4
  fragment_type: execution
  content: "### Class → Functional: State\n\n```javascript\n// Before\nclass Counter extends React.Component {\n  constructor(props) {\n    super(props);\n    this.state = { count: 0, name: \"\" };\n  }\n  increment = () => {\n    this.setState({ count: this.state.count + 1 });\n  };\n  render() {\n    return (\n      <div>\n        <p>Count: {this.state.count}</p>\n        <button onClick={this.increment}>Increment</button>\n      </div>\n    );\n  }\n}\n\n// After\nfunction Counter() {\n  const [count, setCount] = useState(0);\n  const [name, setName] = useState(\"\");\n  const increment = () => setCount(count + 1);\n  return (\n    <div>\n      <p>Count: {count}</p>\n      <button onClick={increment}>Increment</button>\n    </div>\n  );\n}\n```"
- sequence: 5
  fragment_type: execution
  content: "### Class → Functional: Lifecycle\n\n```javascript\n// Before — three lifecycle methods\nclass DataFetcher extends React.Component {\n  state = { data: null, loading: true };\n\n  componentDidMount() { this.fetchData(); }\n  componentDidUpdate(prevProps) {\n    if (prevProps.id !== this.props.id) this.fetchData();\n  }\n  componentWillUnmount() { this.cancelRequest(); }\n\n  fetchData = async () => { /* ... */ };\n}\n\n// After — one useEffect with cleanup + dependency array\nfunction DataFetcher({ id }) {\n  const [data, setData] = useState(null);\n  const [loading, setLoading] = useState(true);\n\n  useEffect(() => {\n    let cancelled = false;\n\n    (async () => {\n      try {\n        const response = await fetch(`/api/${id}`);\n        const result = await response.json();\n        if (!cancelled) {\n          setData(result);\n          setLoading(false);\n        }\n      } catch (error) {\n        if (!cancelled) console.error(error);\n      }\n    })();\n\n    return () => { cancelled = true; };\n  }, [id]);\n\n  if (loading) return <div>Loading...</div>;\n  return <div>{data}</div>;\n}\n```"
- sequence: 6
  fragment_type: execution
  content: "### Class → Functional: Context and HOCs\n\nContext becomes `useContext`:\n```javascript\n// Before\nclass ThemedButton extends React.Component {\n  static contextType = ThemeContext;\n  render() {\n    return <button style={{ background: this.context.theme }}>{this.props.children}</button>;\n  }\n}\n\n// After\nfunction ThemedButton({ children }) {\n  const { theme } = useContext(ThemeContext);\n  return <button style={{ background: theme }}>{children}</button>;\n}\n```\n\nHOCs become custom hooks:\n```javascript\n// Before — withUser HOC\nfunction withUser(Component) {\n  return class extends React.Component {\n    state = { user: null };\n    componentDidMount() { fetchUser().then(user => this.setState({ user })); }\n    render() { return <Component {...this.props} user={this.state.user} />; }\n  };\n}\n\n// After — useUser hook\nfunction useUser() {\n  const [user, setUser] = useState(null);\n  useEffect(() => { fetchUser().then(setUser); }, []);\n  return user;\n}\n\nfunction UserProfile() {\n  const user = useUser();\n  if (!user) return <div>Loading...</div>;\n  return <div>{user.name}</div>;\n}\n```"
- sequence: 7
  fragment_type: execution
  content: '### React 18: New Root API


    ```javascript

    // Before — React 17

    import ReactDOM from "react-dom";

    ReactDOM.render(<App />, document.getElementById("root"));


    // After — React 18

    import { createRoot } from "react-dom/client";

    const root = createRoot(document.getElementById("root"));

    root.render(<App />);

    ```'
- sequence: 8
  fragment_type: execution
  content: "### React 18: Automatic Batching\n\n```javascript\n// All setState calls batched — even inside setTimeout / promises\nfunction handleClick() {\n  setCount(c => c + 1);\n  setFlag(f => !f);\n  // Only one re-render\n}\n\nsetTimeout(() => {\n  setCount(c => c + 1);\n  setFlag(f => !f);\n  // Still batched in React 18!\n}, 1000);\n\n// Opt out if needed\nimport { flushSync } from \"react-dom\";\nflushSync(() => { setCount(c => c + 1); });   // re-render immediately\nsetFlag(f => !f);                              // another re-render\n```"
- sequence: 9
  fragment_type: execution
  content: "### React 18: Transitions\n\nMark non-urgent updates so they can be interrupted by user input.\n\n```javascript\nimport { useState, useTransition } from \"react\";\n\nfunction SearchResults() {\n  const [query, setQuery] = useState(\"\");\n  const [results, setResults] = useState([]);\n  const [isPending, startTransition] = useTransition();\n\n  const handleChange = (e) => {\n    // Urgent: keep input responsive\n    setQuery(e.target.value);\n\n    // Non-urgent: can be interrupted by next keypress\n    startTransition(() => {\n      setResults(searchResults(e.target.value));\n    });\n  };\n\n  return (\n    <>\n      <input value={query} onChange={handleChange} />\n      {isPending && <Spinner />}\n      <Results data={results} />\n    </>\n  );\n}\n```"
- sequence: 10
  fragment_type: execution
  content: "### React 18: Suspense for Data Fetching\n\n```javascript\nimport { Suspense } from \"react\";\n\nconst resource = fetchProfileData();\n\nfunction ProfilePage() {\n  return (\n    <Suspense fallback={<Loading />}>\n      <ProfileDetails />\n      <Suspense fallback={<Loading />}>\n        <ProfileTimeline />\n      </Suspense>\n    </Suspense>\n  );\n}\n\nfunction ProfileDetails() {\n  const user = resource.user.read();   // suspends until ready\n  return <h1>{user.name}</h1>;\n}\n```\n\nNested boundaries let inner content stream while outer is ready."
