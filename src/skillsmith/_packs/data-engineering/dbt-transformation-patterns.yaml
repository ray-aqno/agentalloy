  content: "### Pattern 7: Incremental Strategies\n\n```sql\n-- Delete+Insert (default for most warehouses)\n{{\n    config(\n        materialized='incremental',\n        unique_key='id',\n        incremental_strategy='delete+insert'\n    )\n}}\n\n-- Merge (best for late-arriving data)\n{{\n    config(\n        materialized='incremental',\n        unique_key='id',\n        incremental_strategy='merge',\n        merge_update_columns=['status', 'amount', 'updated_at']\n    )\n}}\n\n-- Insert Overwrite (partition-based)\n{{\n    config(\n        materialized='incremental',\n        incremental_strategy='insert_overwrite',\n        partition_by={\n            \"field\": \"created_date\",\n            \"data_type\": \"date\",\n            \"granularity\": \"day\"\n        }\n    )\n}}\n\nselect\n    *,\n    date(created_at) as created_date\nfrom {{ ref('stg_events') }}\n\n{% if is_incremental() %}\nwhere created_date >= dateadd(day, -3, current_date)\n{% endif %}\n```"
- sequence: 12
  fragment_type: execution
  content: '## dbt Commands


    ```bash

    # Development

    dbt run                          # Run all models

    dbt run --select staging         # Run staging models only

    dbt run --select +fct_orders     # Run fct_orders and its upstream

    dbt run --select fct_orders+     # Run fct_orders and its downstream

    dbt run --full-refresh           # Rebuild incremental models


    # Testing

    dbt test                         # Run all tests

    dbt test --select stg_stripe     # Test specific models

    dbt build                        # Run + test in DAG order


    # Documentation

    dbt docs generate                # Generate docs

    dbt docs serve                   # Serve docs locally


    # Debugging

    dbt compile                      # Compile SQL without running

    dbt debug                        # Test connection

    dbt ls --select tag:critical     # List models by tag

    ```'
- sequence: 13
  fragment_type: guardrail
  content: '## Best Practices


    ### Do''s


    - **Use staging layer** - Clean data once, use everywhere

    - **Test aggressively** - Not null, unique, relationships

    - **Document everything** - Column descriptions, model descriptions

    - **Use incremental** - For tables > 1M rows

    - **Version control** - dbt project in Git


    ### Don''ts


    - **Don''t skip staging** - Raw → mart is tech debt

    - **Don''t hardcode dates** - Use `{{ var(''start_date'') }}`

    - **Don''t repeat logic** - Extract to macros

    - **Don''t test in prod** - Use dev target

    - **Don''t ignore freshness** - Monitor source data'
