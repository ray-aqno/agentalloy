  content: "### Template 5: Domain-Specific Embedding Pipeline\n\n```python\nimport re\nfrom typing import List, Optional\nfrom dataclasses import dataclass\n\n@dataclass\nclass EmbeddedDocument:\n    id: str\n    document_id: str\n    chunk_index: int\n    text: str\n    embedding: List[float]\n    metadata: dict\n\nclass DomainEmbeddingPipeline:\n    \"\"\"Pipeline for domain-specific embeddings.\"\"\"\n\n    def __init__(\n        self,\n        embedding_model: str = \"voyage-3-large\",\n        chunk_size: int = 512,\n        chunk_overlap: int = 50,\n        preprocessing_fn=None\n    ):\n        self.embeddings = VoyageAIEmbeddings(model=embedding_model)\n        self.chunk_size = chunk_size\n        self.chunk_overlap = chunk_overlap\n        self.preprocess = preprocessing_fn or self._default_preprocess\n\n    def _default_preprocess(self, text: str) -> str:\n        \"\"\"Default preprocessing.\"\"\"\n        # Remove excessive whitespace\n        text = re.sub(r'\\s+', ' ', text)\n        # Remove special characters (customize for your domain)\n        text = re.sub(r'[^\\w\\s.,!?-]', '', text)\n        return text.strip()\n\n    async def process_documents(\n        self,\n        documents: List[dict],\n        id_field: str = \"id\",\n        content_field: str = \"content\",\n        metadata_fields: Optional[List[str]] = None\n    ) -> List[EmbeddedDocument]:\n        \"\"\"Process documents for vector storage.\"\"\"\n        processed = []\n\n        for doc in documents:\n            content = doc[content_field]\n            doc_id = doc[id_field]\n\n            # Preprocess\n            cleaned = self.preprocess(content)\n\n            # Chunk\n            chunks = chunk_by_tokens(\n                cleaned,\n                self.chunk_size,\n                self.chunk_overlap\n            )\n\n            # Create embeddings\n            embeddings = await self.embeddings.aembed_documents(chunks)\n\n            # Create records\n            for i, (chunk, embedding) in enumerate(zip(chunks, embeddings)):\n                metadata = {\"document_id\": doc_id, \"chunk_index\": i}\n\n                # Add specified metadata fields\n                if metadata_fields:\n                    for field in metadata_fields:\n                        if field in doc:\n                            metadata[field] = doc[field]\n\n                processed.append(EmbeddedDocument(\n                    id=f\"{doc_id}_chunk_{i}\",\n                    document_id=doc_id,\n                    chunk_index=i,\n                    text=chunk,\n                    embedding=embedding,\n                    metadata=metadata\n                ))\n\n        return processed\n```"
