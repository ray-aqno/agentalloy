raw_prose: |
  # Claude API Patterns

  ## Overview

  Anthropic's Messages API is the foundation for building with Claude. This skill covers the patterns that matter most for an agentic team:
  - Calling the Messages API with the official SDK
  - Prompt caching to cut input cost 90% on repeated context
  - Tool use loop (`stop_reason: "tool_use"` → execute → return `tool_result`)
  - Batch API for bulk inference at half price

  ## Current model lineup (as of 2026-04-28)

  - `claude-opus-4-7` — flagship reasoning
  - `claude-sonnet-4-6` — balanced default; **most apps should default here**
  - `claude-haiku-4-5` — fast/cheap

  Choose Sonnet 4.6 unless cost (→ Haiku) or hardest reasoning (→ Opus) demands otherwise.

  ## SDK choice

  - **TypeScript** — `@anthropic-ai/sdk`
  - **Python** — `anthropic`

  Both maintained by Anthropic and kept in sync with the API. Examples below show TypeScript; Python signatures are nearly identical.

fragments:
  - sequence: 1
    fragment_type: setup
    content: |
      ## Setup

      ```bash
      pnpm add @anthropic-ai/sdk
      ```

      ```typescript
      import Anthropic from '@anthropic-ai/sdk';

      const client = new Anthropic({
        apiKey: process.env.ANTHROPIC_API_KEY,
        // maxRetries: 2 (default), timeout: 600_000 (default)
      });
      ```

      `ANTHROPIC_API_KEY` is read automatically — pass it explicitly only when you have a multi-tenant scenario.

      ### First call

      ```typescript
      const response = await client.messages.create({
        model: 'claude-sonnet-4-6',
        max_tokens: 1024,
        system: 'You are a concise technical assistant.',
        messages: [{ role: 'user', content: 'Explain RRF in 3 sentences.' }],
      });

      const text = response.content
        .filter((b) => b.type === 'text')
        .map((b) => b.text)
        .join('');
      ```

      `content` is always an array of typed blocks. Real apps almost always have multi-block responses (text + tool_use), so write code that filters by `type` — never assume `content[0].text`.

  - sequence: 2
    fragment_type: execution
    content: |
      ## Prompt caching — the single highest-leverage optimization

      Mark a stable prefix with `cache_control: { type: 'ephemeral' }`. On subsequent requests within the TTL, that prefix is read from cache at **10% of the input token price** (vs. the 25% premium for the initial cache write).

      ### What to cache

      Anything stable across requests in the same conversation/agent loop:
      - Long system prompts (instructions, persona, tool descriptions)
      - Tool definitions
      - Knowledge-base context (docs, code, transcripts)
      - Few-shot examples

      ### Minimum cache size (matters)

      A prefix must be at least:
      - **4096 tokens** for `claude-opus-4-7` and `claude-haiku-4-5`
      - **2048 tokens** for `claude-sonnet-4-6`

      Below the minimum, the cache silently doesn't engage — no error, just `cache_read_input_tokens: 0`. Always check the response usage.

      ### Up to 4 cache breakpoints per request

      You typically want one each at:
      1. End of `tools` array
      2. End of `system` block(s)
      3. End of long context document in messages
      4. (Optional) inside the conversation, after a stable run-up

      ### Example: agent loop with cached system + tools

      ```typescript
      const SYSTEM_PROMPT = `... long persona + instructions, > 2048 tokens ...`;

      const TOOLS = [
        { name: 'search_db', description: '...', input_schema: { ... } },
        { name: 'send_email', description: '...', input_schema: { ... } },
      ] as const;

      async function turn(messages: Anthropic.MessageParam[]) {
        return client.messages.create({
          model: 'claude-sonnet-4-6',
          max_tokens: 4096,
          system: [{
            type: 'text',
            text: SYSTEM_PROMPT,
            cache_control: { type: 'ephemeral' },
          }],
          tools: TOOLS.map((t, i) =>
            i === TOOLS.length - 1
              ? { ...t, cache_control: { type: 'ephemeral' } }    // breakpoint at last tool
              : t,
          ),
          messages,
        });
      }
      ```

      ### TTL — 5m default, 1h optional

      Default is 5 minutes. For agents with long pauses between turns:

      ```typescript
      cache_control: { type: 'ephemeral', ttl: '1h' }
      ```

      1h TTL costs 2x the 5m write price but lasts 12x longer. Math favors 1h when expected re-use is < ~12 minutes.

      ### Verifying cache hits

      ```typescript
      console.log({
        input: response.usage.input_tokens,
        cache_creation: response.usage.cache_creation_input_tokens,   // wrote N tokens to cache
        cache_read: response.usage.cache_read_input_tokens,           // read N tokens from cache
        output: response.usage.output_tokens,
      });
      ```

      If `cache_read_input_tokens` is 0 on the second request, your prefix isn't stable — most common cause: a per-request timestamp or counter inside the cached block.

  - sequence: 3
    fragment_type: execution
    content: |
      ## Tool use loop

      Tools let Claude call functions you define. The loop is:

      ```
      1. Send messages with `tools` array
      2. Receive response
      3. If stop_reason === 'tool_use': execute each tool_use block, append tool_result blocks, go to step 2
      4. If stop_reason === 'end_turn': we're done
      ```

      ### Defining a tool

      ```typescript
      const tools: Anthropic.Tool[] = [
        {
          name: 'get_user',
          description: 'Look up a user by ID. Returns email, name, role, created_at.',
          input_schema: {
            type: 'object',
            properties: {
              user_id: { type: 'string', description: 'The user ID (cuid format)' },
            },
            required: ['user_id'],
          },
        },
      ];
      ```

      Description quality matters more than schema. Claude decides when to call based on the description; treat it like a docstring for a teammate.

      ### Loop implementation

      ```typescript
      const MAX_TURNS = 25;   // hard cap to prevent runaway agent loops

      async function runAgent(userMessage: string): Promise<string> {
        const messages: Anthropic.MessageParam[] = [
          { role: 'user', content: userMessage },
        ];

        for (let turn = 0; turn < MAX_TURNS; turn++) {
          const response = await client.messages.create({
            model: 'claude-sonnet-4-6',
            max_tokens: 4096,
            tools,
            messages,
          });

          messages.push({ role: 'assistant', content: response.content });

          if (response.stop_reason === 'end_turn') {
            // Final answer
            return response.content
              .filter((b): b is Anthropic.TextBlock => b.type === 'text')
              .map((b) => b.text)
              .join('');
          }

          if (response.stop_reason === 'tool_use') {
            const toolUses = response.content.filter(
              (b): b is Anthropic.ToolUseBlock => b.type === 'tool_use',
            );

            // Execute tools (parallel when independent). Each result is
            // returned in a single user message; failures use is_error: true
            // so Claude can recover or retry.
            const toolResults = await Promise.all(
              toolUses.map(async (tu) => {
                try {
                  const result = await dispatch(tu.name, tu.input);
                  return {
                    type: 'tool_result' as const,
                    tool_use_id: tu.id,
                    content: JSON.stringify(result),
                  };
                } catch (err) {
                  return {
                    type: 'tool_result' as const,
                    tool_use_id: tu.id,
                    content: `Error: ${(err as Error).message}`,
                    is_error: true,
                  };
                }
              }),
            );

            messages.push({ role: 'user', content: toolResults });
            continue;
          }

          throw new Error(`Unexpected stop_reason: ${response.stop_reason}`);
        }

        throw new Error(`Agent loop exceeded ${MAX_TURNS} turns without resolving`);
      }

      async function dispatch(name: string, input: any): Promise<unknown> {
        switch (name) {
          case 'get_user': return await db.user.findUnique({ where: { id: input.user_id } });
          default: throw new Error(`Unknown tool: ${name}`);
        }
      }
      ```

      ### Parallel tool calls

      Claude may emit multiple `tool_use` blocks in one response when the calls are independent. Execute them concurrently (`Promise.all`) and return all `tool_result` blocks in a single `user` message.

      ### Error reporting back to Claude

      If a tool fails, return a `tool_result` with `is_error: true` and an explanation in `content`. Claude will see the error and either retry differently or respond to the user.

  - sequence: 4
    fragment_type: execution
    content: |
      ## Combining tool use with prompt caching

      The biggest cost win in agent loops. Tool definitions and the system prompt are stable across all turns; cache them.

      ```typescript
      const baseRequest: Anthropic.MessageCreateParams = {
        model: 'claude-sonnet-4-6',
        max_tokens: 4096,
        system: [{
          type: 'text',
          text: SYSTEM_PROMPT,
          cache_control: { type: 'ephemeral' },     // breakpoint 1
        }],
        tools: tools.map((t, i) =>
          i === tools.length - 1
            ? { ...t, cache_control: { type: 'ephemeral' } }   // breakpoint 2 (end of tools)
            : t,
        ),
        messages: [],
      };
      ```

      With both breakpoints, every turn after the first reads system + tools from cache (10% of base price). Iterating over a long agent loop, this is the difference between a feasible and a prohibitively expensive feature.

      ### Important gotchas

      - `tool_use` block JSON key ordering must be stable. Some languages (Swift, Go) randomize map key order — that breaks cache hits.
      - Changing `tool_choice` invalidates the cache.
      - Adding/removing/reordering images anywhere invalidates the cache.

  - sequence: 5
    fragment_type: execution
    content: |
      ## Batch API — half-price async inference

      For workloads tolerant of up-to-24h latency:

      ```typescript
      const batch = await client.messages.batches.create({
        requests: [
          {
            custom_id: 'rec-1',
            params: {
              model: 'claude-sonnet-4-6',
              max_tokens: 1024,
              messages: [{ role: 'user', content: 'Summarize: ...' }],
            },
          },
          // ... up to 100k requests per batch ...
        ],
      });

      // Poll until done
      while (true) {
        const status = await client.messages.batches.retrieve(batch.id);
        if (status.processing_status === 'ended') break;
        await new Promise((r) => setTimeout(r, 30_000));
      }

      // Stream the results (JSONL — one line per request)
      // The SDK's `.results(id)` returns an async iterator of parsed entries.
      for await (const entry of client.messages.batches.results(batch.id)) {
        // entry.custom_id        — same id you sent in the request
        // entry.result.type      — 'succeeded' | 'errored' | 'canceled' | 'expired'
        // entry.result.message   — the Anthropic.Message (when succeeded)
        // entry.result.error     — { type, message } (when errored)
        if (entry.result.type === 'succeeded') {
          await persist(entry.custom_id, entry.result.message);
        } else {
          logger.warn({ id: entry.custom_id, ...entry.result }, 'batch entry failed');
        }
      }
      ```

      (If the SDK version you're on returns a raw stream rather than an async iterator, parse the response body line-by-line as JSONL — each line is one entry.)

      ### Batch + caching

      Batch supports prompt caching — same `cache_control` semantics. Combined: 50% off output via batch × 90% off cached input = the cheapest way to run high-volume LLM workloads.

      ### When to batch

      - Bulk classification / summarization / extraction
      - Backfills and re-evaluations
      - Offline scoring jobs

      Don't batch interactive workflows — even though it's cheaper, the latency makes it useless for chat.

  - sequence: 6
    fragment_type: example
    content: |
      ## NestJS service wrapper

      ```typescript
      // src/anthropic/anthropic.service.ts
      import { Injectable, Logger } from '@nestjs/common';
      import Anthropic from '@anthropic-ai/sdk';

      @Injectable()
      export class AnthropicService {
        private readonly logger = new Logger(AnthropicService.name);
        private readonly client = new Anthropic({
          apiKey: process.env.ANTHROPIC_API_KEY,
        });

        async chat(opts: {
          messages: Anthropic.MessageParam[];
          system?: string;
          tools?: Anthropic.Tool[];
          model?: string;
          maxTokens?: number;
        }): Promise<Anthropic.Message> {
          const start = Date.now();
          const response = await this.client.messages.create({
            model: opts.model ?? 'claude-sonnet-4-6',
            max_tokens: opts.maxTokens ?? 4096,
            system: opts.system
              ? [{ type: 'text', text: opts.system, cache_control: { type: 'ephemeral' } }]
              : undefined,
            tools: opts.tools,
            messages: opts.messages,
          });

          this.logger.log({
            elapsed_ms: Date.now() - start,
            input_tokens: response.usage.input_tokens,
            cache_read: response.usage.cache_read_input_tokens ?? 0,
            cache_write: response.usage.cache_creation_input_tokens ?? 0,
            output_tokens: response.usage.output_tokens,
            stop_reason: response.stop_reason,
          });

          return response;
        }
      }
      ```

      Inject anywhere via `constructor(private readonly anthropic: AnthropicService) {}`. Always log token usage — it's the first thing you'll need when the bill is bigger than expected.

  - sequence: 7
    fragment_type: guardrail
    content: |
      ## Anti-patterns

      | Anti-pattern | Problem | Fix |
      |---|---|---|
      | Returning Claude's output blindly to users | May contain prompt injection from tool results, may hallucinate | Validate / structure-check the output; for safety-sensitive UIs, use structured outputs |
      | `content[0].text` access | Crashes on tool_use responses | Filter by `block.type === 'text'` |
      | Forgetting `stop_reason` check | Silent infinite loop OR cut-off mid-tool-call | Always branch on `stop_reason` (`end_turn`, `tool_use`, `max_tokens`, `stop_sequence`) |
      | Caching a system prompt under the minimum size | Silent cache miss; pays full price | Verify size; check `cache_read_input_tokens` after first hit |
      | Per-request timestamps inside cached blocks | Prefix changes every request → never matches | Move dynamic content out of the cached span |
      | API key in client-side code | Key leakage | Always proxy through your backend; use short-lived tokens for direct browser calls |
      | Hardcoded model name everywhere | Hard to test/upgrade | One config: `MODEL_PRIMARY = 'claude-sonnet-4-6'`, used by all callers |
      | Long polling without exponential backoff | Hammering the API; rate limit | `await new Promise(r => setTimeout(r, Math.min(60000, 1000 * 2**attempt)))` |
      | Tool definitions written like a function signature | Claude misuses or doesn't call them | Tool descriptions are docstrings — explain WHEN to use, not just WHAT |
      | `max_tokens` set too low | Output truncated; `stop_reason: 'max_tokens'` | Set generously (e.g., 4096); cost is per-output-token, not the cap |
      | Ignoring `stop_reason: 'refusal'` (Claude declined) | UX shows confusing partial output | Map to a user-friendly "couldn't help with that" message |

      ### Cost discipline

      - Always log per-request usage. Aggregate by user / endpoint / day.
      - When iterating an agent loop, verify cache hits in the first 2 turns. A cache miss in turn 2 is a bug.
      - Batch what you can. Half-price compounds with caching's 10x discount.

  - sequence: 8
    fragment_type: verification
    content: |
      ## Verification checklist

      Before shipping a Claude integration:

      - [ ] `ANTHROPIC_API_KEY` from env, never hardcoded; never sent to a browser
      - [ ] One model name in one config constant, not scattered string literals
      - [ ] `content` blocks are filtered by `type` — no `content[0]` assumptions
      - [ ] `stop_reason` handled for every documented value (`end_turn`, `tool_use`, `max_tokens`, `stop_sequence`, `refusal`)
      - [ ] Tool-use loop has a max iteration cap (e.g., 25) to prevent runaway agent loops
      - [ ] Tool definitions have docstring-quality `description` fields explaining when to use them
      - [ ] Stable prefix marked with `cache_control: { type: 'ephemeral' }` (system, tools, long context)
      - [ ] First-call response logged with `cache_creation_input_tokens` > 0; second-call with `cache_read_input_tokens` > 0 — cache verified working
      - [ ] No per-request mutable content (timestamps, counters) inside the cached span
      - [ ] Tool execution wrapped in try/catch; failures returned as `tool_result` with `is_error: true`
      - [ ] Per-request usage logged: input/output/cache_read/cache_write tokens, stop_reason, latency
      - [ ] Retries with exponential backoff for transient errors (`429`, `529`)
      - [ ] Long-running batches use the Batch API, not loops of synchronous calls
