raw_prose: '# Dispatching Parallel Agents


  Delegate tasks to specialized agents with isolated context. By precisely crafting their instructions and context, you ensure they stay focused and succeed at their task. They should never inherit your session''s context or history — you construct exactly what they need. This also preserves your own context for coordination work.


  When you have multiple unrelated failures (different test files, different subsystems, different bugs), investigating them sequentially wastes time. Each independent investigation can happen in parallel.


  **Core principle:** Dispatch one agent per independent problem domain. Let them work concurrently.


  ## When to Use


  Use when:

  - 3+ test files failing with different root causes

  - Multiple subsystems broken independently

  - Each problem can be understood without context from others

  - No shared state between investigations


  Don''t use when:

  - Failures are related (fix one might fix others)

  - Need full system state to understand

  - Agents would interfere with each other (editing same files)

  - Exploratory debugging — you don''t know what''s broken yet


  ## The Pattern


  1. **Identify independent domains.** Group failures by what''s broken. Each domain is independent — fixing one doesn''t affect another.

  2. **Create focused agent tasks.** Each agent gets specific scope (one file/subsystem), clear goal (make these tests pass), constraints (don''t change other code), expected output (summary of findings + fixes).

  3. **Dispatch in parallel.** All agents run concurrently in a single dispatch.

  4. **Review and integrate.** Read each summary, verify no conflicts, run full suite, integrate.


  ## Agent Prompt Structure


  Good prompts are: focused (one clear domain), self-contained (all context needed), specific about output (what should the agent return).


  Include error messages, test names, root-cause hints if known, and explicit constraints ("do NOT change production code", "fix tests only", "do NOT just increase timeouts — find the real issue").


  ## Common Mistakes


  - Too broad ("Fix all tests") — agent gets lost. Specific scope wins.

  - No context ("Fix the race condition") — paste error messages and test names.

  - No constraints — agent might refactor everything.

  - Vague output ("Fix it") — require summary of root cause + changes.


  ## Verification


  After agents return:

  1. Review each summary

  2. Check for conflicts (did agents edit same code?)

  3. Run full suite to verify fixes work together

  4. Spot check — agents can make systematic errors'
