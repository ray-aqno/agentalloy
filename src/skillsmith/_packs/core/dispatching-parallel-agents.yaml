- sequence: 4
  fragment_type: example
  content: '## Agent Prompt Structure


    Good prompts are **focused** (one clear domain), **self-contained** (all context needed), and **specific about output**.


    Example:


    ```

    Fix the 3 failing tests in src/agents/agent-tool-abort.test.ts:

    1. "should abort tool with partial output capture" — expects ''interrupted at'' in message

    2. "should handle mixed completed and aborted tools" — fast tool aborted instead of completed

    3. "should properly track pendingToolCount" — expects 3 results but gets 0


    These are timing/race condition issues. Your task:

    1. Read the test file and understand what each test verifies

    2. Identify root cause — timing issues or actual bugs?

    3. Fix by replacing arbitrary timeouts with event-based waiting, fixing bugs in abort impl, or adjusting test expectations.


    Do NOT just increase timeouts — find the real issue.


    Return: summary of what you found and what you fixed.

    ```'
- sequence: 5
  fragment_type: guardrail
  content: '## Common Mistakes


    | Bad | Good |

    |-----|------|

    | "Fix all the tests" | "Fix agent-tool-abort.test.ts" — focused scope |

    | "Fix the race condition" | Paste error messages and test names |

    | No constraints | "Do NOT change production code" |

    | "Fix it" | "Return summary of root cause and changes" |'
- sequence: 6
  fragment_type: verification
  content: '## Verification After Agents Return


    1. **Review each summary** — understand what changed

    2. **Check for conflicts** — did agents edit the same code?

    3. **Run full suite** — verify all fixes work together

    4. **Spot check** — agents can make systematic errors


    Multiple investigations completing concurrently is the goal; failed integration loses the gain.'
