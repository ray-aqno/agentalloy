- sequence: 11
  fragment_type: verification
  content: '## STOP Before Next Skill


    After writing ANY skill, you MUST STOP and complete deployment before moving on.


    **Do NOT:**

    - Create multiple skills in batch without testing each

    - Move to next skill before current one is verified

    - Skip testing because "batching is more efficient"


    **Deployment checklist (per skill):**


    RED phase:

    - Pressure scenarios (3+ combined pressures for discipline skills)

    - Run WITHOUT skill, document baseline verbatim

    - Identify rationalization patterns


    GREEN phase:

    - Frontmatter valid, description starts with "Use when..."

    - Address baseline failures

    - One excellent example (not multi-language)

    - Run WITH skill, verify compliance


    REFACTOR phase:

    - Identify NEW rationalizations

    - Add explicit counters (discipline skills)

    - Build rationalization table + red flags list

    - Re-test until bulletproof


    Deploying untested skills = deploying untested code.'
