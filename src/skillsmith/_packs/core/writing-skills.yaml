raw_prose: '# Writing Skills


  **Writing skills IS Test-Driven Development applied to process documentation.**


  Write test cases (pressure scenarios with subagents), watch them fail (baseline behavior), write the skill (documentation), watch tests pass (agents comply), and refactor (close loopholes).


  **Core principle:** If you didn''t watch an agent fail without the skill, you don''t know if the skill teaches the right thing.


  ## What is a Skill?


  A reference guide for proven techniques, patterns, or tools. Skills help future Claude instances find and apply effective approaches.


  - **Skills are:** reusable techniques, patterns, tools, reference guides

  - **Skills are NOT:** narratives about how you solved a problem once


  ## When to Create


  Create when: technique wasn''t intuitively obvious; you''d reference this again across projects; pattern applies broadly; others would benefit.


  Don''t create for: one-off solutions; standard practices documented elsewhere; project-specific conventions (CLAUDE.md instead); mechanical constraints enforceable with regex/validation.


  ## TDD Mapping


  | TDD | Skill Creation |

  |-----|---------------|

  | Test case | Pressure scenario with subagent |

  | Production code | Skill document (SKILL.md) |

  | RED | Agent violates rule without skill |

  | GREEN | Agent complies with skill present |

  | Refactor | Close loopholes while maintaining compliance |


  ## SKILL.md Structure


  Frontmatter (YAML, max 1024 chars):

  - `name` — letters/numbers/hyphens only

  - `description` — starts with "Use when...", third person, describes ONLY triggering conditions, NOT what the skill does or its workflow


  Body: Overview + core principle, When to Use, Core Pattern (for techniques), Quick Reference, Implementation, Common Mistakes, optional Real-World Impact.


  ## CSO — Claude Search Optimization


  **Description = When to Use, NOT What the Skill Does.**


  Testing showed that descriptions summarizing workflow cause Claude to follow the description instead of reading the skill. A description saying "code review between tasks" caused Claude to do ONE review even though the skill specified TWO.


  ❌ "Use when executing plans — dispatches subagent per task with code review between tasks"

  ✅ "Use when executing implementation plans with independent tasks in the current session"


  Use keywords Claude would search for: error messages, symptoms, synonyms, tool/library names. Active voice verb-first names (`creating-skills`, not `skill-creation`).


  ## Token Efficiency


  - getting-started workflows: <150 words

  - Frequently-loaded: <200 words total

  - Other skills: <500 words


  Move details to `--help`, cross-reference instead of repeating, compress examples.


  ## Cross-References


  Use skill name + explicit requirement marker:

  - ✅ `**REQUIRED SUB-SKILL:** Use superpowers:test-driven-development`

  - ❌ `@skills/.../SKILL.md` (force-loads, burns context)


  ## Flowcharts


  Use ONLY for non-obvious decision points, process loops where you might stop too early, "A vs B" decisions. Never for reference material (use tables), code examples (markdown blocks), linear instructions (numbered lists).


  ## RED-GREEN-REFACTOR


  **RED:** Run scenario without skill. Document choices, rationalizations (verbatim), pressures that triggered violations.


  **GREEN:** Write minimal skill addressing those specific rationalizations. Run scenarios with skill. Agent should comply.


  **REFACTOR:** New rationalization? Add explicit counter. Re-test until bulletproof.


  ## Bulletproofing Discipline Skills


  Don''t just state the rule — forbid specific workarounds:

  - "Don''t keep it as ''reference''"

  - "Don''t ''adapt'' it while writing tests"

  - "Don''t look at it"

  - "Delete means delete"


  Add foundational principle: "Violating the letter of the rules is violating the spirit of the rules." Cuts off "spirit vs letter" arguments.


  Build a Rationalization Table from baseline testing: every excuse goes in. Create a Red Flags list — make self-checking easy.


  ## The Iron Law


  **NO SKILL WITHOUT A FAILING TEST FIRST.**


  Applies to NEW skills AND EDITS. Write skill before testing? Delete it. Edit without testing? Same violation.


  No exceptions for "simple additions", "just adding a section", "documentation updates". Don''t keep untested changes as "reference". Don''t "adapt" while running tests.


  ## STOP Before Next Skill


  After writing ANY skill, complete deployment before moving on. Don''t batch-create. Don''t skip testing because "batching is efficient". Untested skills = untested code.'
