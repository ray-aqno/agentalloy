    - What rationalizations did it use?

    - Which pressures triggered violations?


    **GREEN — write minimal skill:** Address those specific rationalizations. Don''t add content for hypothetical cases. Run same scenarios WITH skill — agent should comply.


    **REFACTOR — close loopholes:** Agent found new rationalization? Add explicit counter. Re-test until bulletproof.'
