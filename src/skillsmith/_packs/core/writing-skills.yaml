- sequence: 4
  fragment_type: guardrail
  content: '## CSO — Description = When to Use, NOT Workflow Summary


    Testing revealed: when a description summarizes the skill''s workflow, Claude follows the description instead of reading the skill body.


    Real example: a description saying "code review between tasks" caused Claude to do ONE review, even though the skill clearly specified TWO. Changed to "Use when executing implementation plans with independent tasks" — Claude correctly followed the two-stage process.


    ```yaml

    # ❌ BAD — summarizes workflow

    description: Use when executing plans — dispatches subagent per task with code review between tasks


    # ❌ BAD — too much process detail

    description: Use for TDD — write test first, watch it fail, write minimal code, refactor


    # ✅ GOOD — triggering conditions only

    description: Use when executing implementation plans with independent tasks in the current session


    # ✅ GOOD — symptom-based

    description: Use when tests have race conditions, timing dependencies, or pass/fail inconsistently

    ```


    Use concrete triggers and symptoms. Third person. NEVER summarize the workflow.'
- sequence: 5
  fragment_type: execution
  content: '## Token Efficiency


    Skills load into context. Every token counts.


    **Targets:**

    - getting-started workflows: <150 words each

    - Frequently-loaded skills: <200 words total

    - Other skills: <500 words


    **Techniques:**

    - Move details to tool `--help` instead of documenting all flags

    - Cross-reference other skills instead of repeating workflow

    - Compress examples — minimal example beats verbose

    - Eliminate redundancy — don''t repeat what''s in cross-referenced skills


    Verify with `wc -w skills/path/SKILL.md`.'
- sequence: 6
  fragment_type: execution
  content: '## Cross-References


    Use skill name + explicit requirement marker:


    - ✅ `**REQUIRED SUB-SKILL:** Use superpowers:test-driven-development`

    - ✅ `**REQUIRED BACKGROUND:** You MUST understand superpowers:systematic-debugging`

    - ❌ `See skills/testing/test-driven-development` (unclear if required)

    - ❌ `@skills/testing/test-driven-development/SKILL.md` (force-loads, burns 200k+ context)


    `@` syntax force-loads files immediately, consuming context before you need it.'
- sequence: 7
  fragment_type: guardrail
  content: '## Flowchart Usage


    Use flowcharts ONLY for:

    - Non-obvious decision points

    - Process loops where you might stop too early

    - "When to use A vs B" decisions


    **Never** use flowcharts for:

    - Reference material → use tables/lists

    - Code examples → use markdown blocks

    - Linear instructions → use numbered lists

    - Labels without semantic meaning (`step1`, `helper2`)


    One excellent code example beats many mediocre ones in different languages.'
