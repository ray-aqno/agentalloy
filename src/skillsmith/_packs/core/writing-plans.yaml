- sequence: 5
  fragment_type: example
  content: '## Plan Document Header


    Every plan starts with this header:


    ```markdown

    # [Feature Name] Implementation Plan


    > **For agentic workers:** REQUIRED SUB-SKILL: Use subagent-driven-development (recommended) or executing-plans to implement this plan task-by-task. Steps use checkbox (`- [ ]`) syntax for tracking.


    **Goal:** [One sentence describing what this builds]


    **Architecture:** [2-3 sentences about approach]


    **Tech Stack:** [Key technologies/libraries]


    ---

    ```'
- sequence: 6
  fragment_type: example
  content: "## Task Structure (TDD-style)\n\n````markdown\n### Task N: [Component Name]\n\n**Files:**\n- Create: `exact/path/to/file.py`\n- Modify: `exact/path/to/existing.py:123-145`\n- Test: `tests/exact/path/to/test.py`\n\n- [ ] **Step 1: Write the failing test**\n\n```python\ndef test_specific_behavior():\n    result = function(input)\n    assert result == expected\n```\n\n- [ ] **Step 2: Run test to verify it fails**\n\nRun: `pytest tests/path/test.py::test_name -v`\nExpected: FAIL with \"function not defined\"\n\n- [ ] **Step 3: Write minimal implementation**\n\n```python\ndef function(input):\n    return expected\n```\n\n- [ ] **Step 4: Run test to verify it passes**\n\nRun: `pytest tests/path/test.py::test_name -v`\nExpected: PASS\n\n- [ ] **Step 5: Commit**\n\n```bash\ngit add tests/path/test.py src/path/file.py\ngit commit -m \"feat: add specific feature\"\n```\n````"
- sequence: 7
  fragment_type: guardrail
  content: '## No Placeholders


    Every step must contain the actual content an engineer needs. These are **plan failures** — never write them:


    - "TBD", "TODO", "implement later", "fill in details"

    - "Add appropriate error handling" / "add validation" / "handle edge cases"

    - "Write tests for the above" (without actual test code)

    - "Similar to Task N" (repeat the code — the engineer may be reading tasks out of order)

    - Steps that describe **what** to do without showing **how** (code blocks required for code steps)

    - References to types, functions, or methods not defined in any task


    Always include exact file paths, complete code in every step, exact commands with expected output. DRY, YAGNI, TDD, frequent commits.'
- sequence: 8
  fragment_type: verification
  content: '## Self-Review


    After writing the complete plan, look at the spec with fresh eyes and check the plan against it. This is a checklist you run yourself — not a subagent dispatch.


    1. **Spec coverage** — Skim each section/requirement in the spec. Can you point to a task that implements it? List any gaps.

    2. **Placeholder scan** — Search your plan for red flags from the "No Placeholders" section. Fix them.

    3. **Type consistency** — Do the types, method signatures, and property names you used in later tasks match what you defined in earlier tasks? A function called `clearLayers()` in Task 3 but `clearFullLayers()` in Task 7 is a bug.


    If you find issues, fix them inline. No need to re-review — just fix and move on. If you find a spec requirement with no task, add the task.'
- sequence: 9
  fragment_type: execution
  content: '## Execution Handoff


    After saving the plan, offer execution choice:


    > **Plan complete and saved to `docs/plans/<filename>.md`. Two execution options:**

    >

    > **1. Subagent-Driven (recommended)** — fresh subagent per task, review between tasks, fast iteration

    >

    > **2. Inline Execution** — execute tasks in this session, batch execution with checkpoints

    >

    > **Which approach?**


    - If subagent-driven chosen → use the `subagent-driven-development` skill

    - If inline execution chosen → use the `executing-plans` skill'
