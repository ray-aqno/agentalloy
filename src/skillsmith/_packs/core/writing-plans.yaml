raw_prose: '# Writing Plans


  ## Overview


  Write comprehensive implementation plans assuming the engineer has zero context for our codebase and questionable taste. Document everything they need to know: which files to touch for each task, code, testing, docs they might need to check, how to test it. Give them the whole plan as bite-sized tasks. DRY. YAGNI. TDD. Frequent commits.


  Assume they are a skilled developer, but know almost nothing about the toolset or problem domain. Assume they don''t know good test design very well.


  Save plans to `docs/plans/YYYY-MM-DD-<feature-name>.md` (or override per project).


  ## Scope Check


  If the spec covers multiple independent subsystems, suggest breaking into separate plans — one per subsystem. Each plan should produce working, testable software on its own.


  ## File Structure


  Before defining tasks, map out which files will be created or modified and what each one is responsible for. This is where decomposition decisions get locked in.


  - Design units with clear boundaries and well-defined interfaces. Each file has one clear responsibility.

  - Smaller, focused files beat large ones that do too much — easier to reason about and edit reliably.

  - Files that change together live together. Split by responsibility, not by technical layer.

  - In existing codebases, follow established patterns. Don''t unilaterally restructure.


  ## Bite-Sized Task Granularity


  Each step is one action (2-5 minutes):

  - "Write the failing test" — step

  - "Run it to make sure it fails" — step

  - "Implement the minimal code to make the test pass" — step

  - "Run the tests and make sure they pass" — step

  - "Commit" — step


  ## Plan Document Header


  Every plan MUST start with: feature name, goal (one sentence), architecture (2-3 sentences), tech stack.


  ## Task Structure


  Each task lists exact `Files:` (Create / Modify with line ranges / Test paths), then numbered checkbox `- [ ]` steps. Each step that produces code includes the actual code in a code block. Each step that runs a command lists the exact command and expected output.


  ## No Placeholders


  Plan failures — never write:

  - "TBD", "TODO", "implement later", "fill in details"

  - "Add appropriate error handling" / "add validation" / "handle edge cases"

  - "Write tests for the above" (without actual test code)

  - "Similar to Task N" (repeat the code)

  - Steps that describe what to do without showing how

  - References to types/functions not defined in any task


  ## Self-Review


  After writing the complete plan, look at the spec with fresh eyes and check the plan against it.


  1. **Spec coverage** — point to a task that implements each section

  2. **Placeholder scan** — search for red-flag patterns; fix them

  3. **Type consistency** — `clearLayers()` in Task 3 but `clearFullLayers()` in Task 7 is a bug


  ## Execution Handoff


  Offer two paths: subagent-driven (recommended — fresh subagent per task, fast iteration) or inline execution (batch execution with checkpoints).'
