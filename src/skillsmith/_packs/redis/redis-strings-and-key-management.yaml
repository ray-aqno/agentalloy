raw_prose: |
  # Redis Strings and Key Management

  ## Overview

  Redis strings are the simplest and most-used value type — binary-safe up to 512MB. The string commands also cover counters (INCR/DECR), atomic conditional sets (SET NX), and TTL management. This skill covers strings + key-level lifecycle and eviction.

  Sourced from https://redis.io/docs/latest/develop/data-types/strings/ and https://redis.io/docs/latest/develop/reference/eviction/.

