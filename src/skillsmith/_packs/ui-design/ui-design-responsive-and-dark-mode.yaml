raw_prose: |
  # Tailwind Responsive Design and Dark Mode

  ## Overview

  Tailwind's responsive design uses prefix-based variants — `md:flex` applies `display: flex` only at `min-width: md`. Mobile-first by default. Dark mode comes in three flavors (media, selector, class) with v4 favoring CSS variables. This skill covers both surfaces.

  Sourced from https://tailwindcss.com/docs/responsive-design and https://tailwindcss.com/docs/dark-mode.

  ## Overview

  Every utility class in Tailwind can be applied conditionally at different breakpoints, which makes it a piece of cake to build complex responsive interfaces without ever leaving your HTML.

  First, make sure you've added the [viewport meta tag](https://developer.mozilla.org/en-US/docs/Web/HTML/Viewport_meta_tag) to the `<head>` of your document:

  ```html
  <!-- [!code filename:index.html] -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  ```

  Then to add a utility but only have it take effect at a certain breakpoint, all you need to do is prefix the utility with the breakpoint name, followed by the `:` character:

  ```html
  <!-- [!code filename:HTML]  -->
  <!-- [!code word:md\:w-32] -->
  <!-- [!code word:lg\:w-48] -->
  <!-- Width of 16 by default, 32 on medium screens, and 48 on large screens -->
  <img class="w-16 md:w-32 lg:w-48" src="..." />
  ```

  There are five breakpoints by default, inspired by common device resolutions:

  {

  <table>
    <thead>
      <tr>
        <th>Breakpoint prefix</th>
        <th>Minimum width</th>
        <th>CSS</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>
          <code>sm</code>
        </td>
        <td>
          40rem <em>(640px)</em>
        </td>
        <td>
          <code>@media (width &gt;= 40rem) &#123; ... &#125;</code>
        </td>
      </tr>
      <tr>
        <td>
          <code>md</code>
        </td>
        <td>
          48rem <em>(768px)</em>
        </td>
        <td>
          <code>@media (width &gt;= 48rem) &#123; ... &#125;</code>
        </td>
      </tr>
      <tr>
        <td>
          <code>lg</code>
        </td>
        <td>
          64rem <em>(1024px)</em>
        </td>
        <td>
          <code>@media (width &gt;= 64rem) &#123; ... &#125;</code>
        </td>
      </tr>
      <tr>
        <td>
          <code>xl</code>
        </td>
        <td>
          80rem <em>(1280px)</em>
        </td>
        <td>
          <code>@media (width &gt;= 80rem) &#123; ... &#125;</code>
        </td>
      </tr>
      <tr>
        <td>
          <code>2xl</code>
        </td>
        <td>
          96rem <em>(1536px)</em>
        </td>
        <td>
          <code>@media (width &gt;= 96rem) &#123; ... &#125;</code>
        </td>
      </tr>
    </tbody>
  </table>
  }

  This works for **every utility class in the framework**, which means you can change literally anything at a given breakpoint — even things like letter spacing or cursor styles.

  Here's a simple example of a marketing page component that uses a stacked layout on small screens, and a side-by-side layout on larger screens:

  <Figure>

  <Example resizable padding={false}>
    {
      <Iframe className="h-[572px] w-full overflow-x-scroll">
        <div className="flex h-screen w-screen items-center justify-center p-8">
          <div className="mx-auto max-w-md overflow-hidden rounded-lg bg-white shadow-xl ring-1 ring-gray-900/5 sm:max-w-2xl">
            <div className="flex flex-col sm:flex-row">
              <div className="sm:shrink-0">
                <img
                  className="h-[200px] w-full object-cover object-bottom sm:w-[193px] sm:object-center"
                  src="https://images.unsplash.com/photo-1637734433731-621aca1c8cb6?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=crop&w=404&q=80"
                  width="202"
                  height="192"
                  alt="Beautiful abstract building in the sun"
                />
              </div>
              <div className="space-y-2 p-6 2xl:p-8">
                <div className="text-sm leading-6 font-medium text-indigo-600">Company retreats</div>
                <a href="#" className="block text-base leading-6 font-semibold text-gray-900 hover:underline">
                  Incredible accommodation for your team
                </a>
                <p
                  className="text-sm leading-6 text-gray-600"
                  children={`Looking to take your team away on a retreat to enjoy awesome food
              and take in some sunshine? We have a list of places to do just
              that.`}
                ></p>
              </div>
            </div>
          </div>
        </div>
      </Iframe>
    }
  </Example>

  ```html
  <!-- [!code word:md\:max-w-2xl] -->
  <div class="mx-auto max-w-md overflow-hidden rounded-xl bg-white shadow-md md:max-w-2xl">
    <!-- [!code word:md\:flex] -->
    <div class="md:flex">
      <!-- [!code word:md\:shrink-0] -->
      <div class="md:shrink-0">
        <!-- [!code word:md\:h-full] -->
        <!-- [!code word:md\:w-48] -->
        <img
          class="h-48 w-full object-cover md:h-full md:w-48"
          src="/img/building.jpg"
          alt="Modern building architecture"
        />
      </div>
      <div class="p-8">
        <div class="text-sm font-semibold tracking-wide text-indigo-500 uppercase">Company retreats</div>
        <a href="#" class="mt-1 block text-lg leading-tight font-medium text-black hover:underline">
          Incredible accommodation for your team
        </a>
        <p class="mt-2 text-gray-500">
          Looking to take your team away on a retreat to enjoy awesome food and take in some sunshine? We have a list of
          places to do just that.
        </p>
      </div>
    </div>
  </div>
  ```

  </Figure>

  Here's how the example above works:

  - By default, the outer `div` is `display: block`, but by adding the `md:flex` utility, it becomes `display: flex` on medium screens and larger.
  - When the parent is a flex container, we want to make sure the image never shrink

  ## Dark mode

  Now that dark mode is a first-class feature of many operating systems, it's becoming more and more common to design a dark version of your website to go along with the default design.

  To make this as easy as possible, Tailwind includes a `dark` variant that lets you style your site differently when dark mode is enabled:

  <Figure>

  <Example padding={false}>
    {
      <div className="grid grid-cols-1 sm:grid-cols-2">
        <div className="p-8 pt-7">
          <p className="mb-2 text-sm font-medium text-gray-500">Light mode</p>
          <div className="rounded-lg bg-white px-6 py-8 shadow-xl ring ring-gray-900/5">
            <div>
              <span className="inline-flex items-center justify-center rounded-md bg-indigo-500 p-2 shadow-lg">
                <svg
                  className="h-6 w-6 text-white"
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                  aria-hidden="true"
                >
                  <path
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    strokeWidth="2"
                    d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"
                  />
                </svg>
              </span>
            </div>
            <p className="mt-5 text-base font-medium tracking-tight text-gray-900">Writes upside-down</p>
            <p
              className="mt-2 text-sm text-gray-500"
              children={`The Zero Gravity Pen can be used to write in any orientation,
          including upside-down. It even works in outer space.`}
            />
          </div>
        </div>
        <div className="bg-gray-900 p-8 pt-7">
          <p className="mb-2 text-sm font-medium text-gray-400">Dark mode</p>
          <div className="rounded-lg bg-gray-800 px-6 py-8 shadow-xl ring ring-gray-900/5">
            <div>
              <span className="inline-flex items-center justify-center rounded-md bg-indigo-500 p-2 shadow-lg">
                <svg
                  className="h-6 w-6 text-white"
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                  aria-hidden="true"
                >
                  <path
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    strokeWidth="2"
                    d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"
                  />
                </svg>
              </span>
            </div>
            <p className="mt-5 text-base font-medium tracking-tight text-white">Writes upside-down</p>
            <p
              className="mt-2 text-sm text-gray-400"
              children={`The Zero Gravity Pen can be used to write in any orientation,
          including upside-down. It even works in outer space.`}
            />
          </div>
        </div>
      </div>
    }
  </Example>

  ```html
  <!-- [!code word:dark\:bg-gray-800] -->
  <!-- prettier-ignore -->
  <div class="bg-white dark:bg-gray-800 rounded-lg px-6 py-8 ring shadow-xl ring-gray-900/5">
    <div>
      <span class="inline-flex items-center justify-center rounded-md bg-indigo-500 p-2 shadow-lg">
        <svg class="h-6 w-6 stroke-white" ...>
          <!-- ... -->
        </svg>
      </span>
    </div>
    <!-- prettier-ignore -->
    <!-- [!code word:dark\:text-white] -->
    <h3 class="text-gray-900 dark:text-white mt-5 text-base font-medium tracking-tight ">Writes upside-down</h3>
    <!-- prettier-ignore -->
    <!-- [!code word:dark\:text-gray-400] -->
    <p class="text-gray-500 dark:text-gray-400 mt-2 text-sm ">
      The Zero Gravity Pen can be used to write in any orientation, including upside-down. It even works in outer space.
    </p>
  </div>
  ```

  </Figure>

  By default this uses the `prefers-color-scheme` CSS media feature, but you can also build sites that support [toggling dark mode manually](#toggling-dark-mode-manually) by overriding the dark variant.

