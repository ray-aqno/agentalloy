raw_prose: "# React Native Design\n\nMaster React Native styling patterns, React Navigation, and Reanimated 3 to build performant, cross-platform mobile applications with native-quality user experiences.\n\n## When to Use This Skill\n\n- Building cross-platform mobile apps with React Native\n- Implementing navigation with React Navigation 6+\n- Creating performant animations with Reanimated 3\n- Styling components with StyleSheet and styled-components\n- Building responsive layouts for different screen sizes\n- Implementing platform-specific designs (iOS/Android)\n- Creating gesture-driven interactions with Gesture Handler\n- Optimizing React Native performance\n\n## Core Concepts\n\n### 1. StyleSheet and Styling\n\n**Basic StyleSheet:**\n\n```typescript\nimport { StyleSheet, View, Text } from 'react-native';\n\nconst styles = StyleSheet.create({\n  container: {\n    flex: 1,\n    padding: 16,\n    backgroundColor: '#ffffff',\n  },\n  title: {\n    fontSize: 24,\n    fontWeight: '600',\n    color: '#1a1a1a',\n    marginBottom: 8,\n  },\n  subtitle: {\n    fontSize: 16,\n    color: '#666666',\n    lineHeight: 24,\n  },\n});\n\nfunction Card() {\n  return (\n    <View style={styles.container}>\n      <Text style={styles.title}>Title</Text>\n      <Text style={styles.subtitle}>Subtitle text</Text>\n    </View>\n  );\n}\n```\n\n**Dynamic Styles:**\n\n```typescript\ninterface CardProps {\n  variant: 'primary' | 'secondary';\n  disabled?: boolean;\n}\n\nfunction Card({ variant, disabled }: CardProps) {\n  return (\n    <View style={[\n      styles.card,\n      variant === 'primary' ? styles.primary : styles.secondary,\n      disabled && styles.disabled,\n    ]}>\n      <Text style={styles.text}>Content</Text>\n    </View>\n  );\n}\n\nconst styles = StyleSheet.create({\n  card: {\n    padding: 16,\n    borderRadius: 12,\n  },\n  primary: {\n    backgroundColor: '#6366f1',\n  },\n  secondary: {\n    backgroundColor: '#f3f4f6',\n    borderWidth: 1,\n    borderColor: '#e5e7eb',\n  },\n  disabled: {\n    opacity: 0.5,\n  },\n  text: {\n    fontSize: 16,\n  },\n});\n```\n\n### 2. Flexbox Layout\n\n**Row and Column Layouts:**\n\n```typescript\nconst styles = StyleSheet.create({\n  // Vertical stack (column)\n  column: {\n    flexDirection: \"column\",\n    gap: 12,\n  },\n  // Horizontal stack (row)\n  row: {\n    flexDirection: \"row\",\n    alignItems: \"center\",\n    gap: 8,\n  },\n  // Space between items\n  spaceBetween: {\n    flexDirection: \"row\",\n    justifyContent: \"space-between\",\n    alignItems: \"center\",\n  },\n  // Centered content\n  centered: {\n    flex: 1,\n    justifyContent: \"center\",\n    alignItems: \"center\",\n  },\n  // Fill remaining space\n  fill: {\n    flex: 1,\n  },\n});\n```\n\n### 3. React Navigation Setup\n\n**Stack Navigator:**\n\n```typescript\nimport { NavigationContainer } from '@react-navigation/native';\nimport { createNativeStackNavigator } from '@react-navigation/native-stack';\n\ntype RootStackParamList = {\n  Home: undefined;\n  Detail: { itemId: string };\n  Settings: undefined;\n};\n\nconst Stack = createNativeStackNavigator<RootStackParamList>();\n\nfunction AppNavigator() {\n  return (\n    <NavigationContainer>\n      <Stack.Navigator\n        initialRouteName=\"Home\"\n        screenOptions={{\n          headerStyle: { backgroundColor: '#6366f1' },\n          headerTintColor: '#ffffff',\n          headerTitleStyle: { fontWeight: '600' },\n        }}\n      >\n        <Stack.Screen\n          name=\"Home\"\n          component={HomeScreen}\n          options={{ title: 'Home' }}\n        />\n        <Stack.Screen\n          name=\"Detail\"\n          component={DetailScreen}\n          options={({ route }) => ({\n            title: `Item ${route.params.itemId}`,\n          })}\n        />\n        <Stack.Screen name=\"Settings\" component={SettingsScreen} />\n      </Stack.Navigator>\n    </NavigationContainer>\n  );\n}\n```\n\n**Tab Navigator:**\n\n```typescript\nimport { createBottomTabNavigator } from '@react-navigation/bottom-tabs';\nimport { Ionicons } from '@expo/vector-icons';\n\ntype TabParamList = {\n  Home: undefined;\n  Search: undefined;\n  Profile: undefined;\n};\n\nconst Tab = createBottomTabNavigator<TabParamList>();\n\nfunction TabNavigator() {\n  return (\n    <Tab.Navigator\n      screenOptions={({ route }) => ({\n        tabBarIcon: ({ focused, color, size }) => {\n          const icons: Record<string, keyof typeof Ionicons.glyphMap> = {\n            Home: focused ? 'home' : 'home-outline',\n            Search: focused ? 'search' : 'search-outline',\n            Profile: focused ? 'person' : 'person-outline',\n          };\n          return <Ionicons name={icons[route.name]} size={size} color={color} />;\n        },\n        tabBarActiveTintColor: '#6366f1',\n        tabBarInactiveTintColor: '#9ca3af',\n      })}\n    >\n      <Tab.Screen name=\"Home\" component={HomeScreen} />\n      <Tab.Screen name=\"Search\" component={SearchScreen} />\n      <Tab.Screen name=\"Profile\" component={ProfileScreen} />\n    </Tab.Navigator>\n  );\n}\n```\n\n### 4. Reanimated 3 Basics\n\n**Animated Values:**\n\n```typescript\nimport Animated, {\n  useSharedValue,\n  useAnimatedStyle,\n  withSpring,\n  withTiming,\n} from 'react-native-reanimated';\n\nfunction AnimatedBox() {\n  const scale = useSharedValue(1);\n  const opacity = useSharedValue(1);\n\n  const animatedStyle = useAnimatedStyle(() => ({\n    transform: [{ scale: scale.value }],\n    opacity: opacity.value,\n  }));\n\n  const handlePress = () => {\n    scale.value = withSpring(1.2, {}, () => {\n      scale.value = withSpring(1);\n    });\n  };\n\n  return (\n    <Pressable onPress={handlePress}>\n      <Animated.View style={[styles.box, animatedStyle]} />\n    </Pressable>\n  );\n}\n```\n\n**Gesture Handler Integration:**\n\n```typescript\nimport { Gesture, GestureDetector } from 'react-native-gesture-handler';\nimport Animated, {\n  useSharedValue,\n  useAnimatedStyle,\n  withSpring,\n} from 'react-native-reanimated';\n\nfunction DraggableCard() {\n  const translateX = useSharedValue(0);\n  const translateY = useSharedValue(0);\n\n  const gesture = Gesture.Pan()\n    .onUpdate((event) => {\n      translateX.value = event.translationX;\n      translateY.value = event.translationY;\n    })\n    .onEnd(() => {\n      translateX.value = withSpring(0);\n      translateY.value = withSpring(0);\n    });\n\n  const animatedStyle = useAnimatedStyle(() => ({\n    transform: [\n      { translateX: translateX.value },\n      { translateY: translateY.value },\n    ],\n  }));\n\n  return (\n    <GestureDetector gesture={gesture}>\n      <Animated.View style={[styles.card, animatedStyle]}>\n        <Text>Drag me!</Text>\n      </Animated.View>\n    </GestureDetector>\n  );\n}\n```\n\n### 5. Platform-Specific Styling\n\n```typescript\nimport { Platform, StyleSheet } from \"react-native\";\n\nconst styles = StyleSheet.create({\n  container: {\n    padding: 16,\n    ...Platform.select({\n      ios: {\n        shadowColor: \"#000\",\n        shadowOffset: { width: 0, height: 2 },\n        shadowOpacity: 0.1,\n        shadowRadius: 4,\n      },\n      android: {\n        elevation: 4,\n      },\n    }),\n  },\n  text: {\n    fontFamily: Platform.OS === \"ios\" ? \"SF Pro Text\" : \"Roboto\",\n    fontSize: 16,\n  },\n});\n\n// Platform-specific components\nimport { Platform } from \"react-native\";\nconst StatusBarHeight = Platform.OS === \"ios\" ? 44 : 0;\n```\n\n## Quick Start Component\n\n```typescript\nimport React from 'react';\nimport {\n  View,\n  Text,\n  StyleSheet,\n  Pressable,\n  Image,\n} from 'react-native';\nimport Animated, {\n  useSharedValue,\n  useAnimatedStyle,\n  withSpring,\n} from 'react-native-reanimated';\n\ninterface ItemCardProps {\n  title: string;\n  subtitle: string;\n  imageUrl: string;\n  onPress: () => void;\n}\n\nconst AnimatedPressable = Animated.createAnimatedComponent(Pressable);\n\nexport function ItemCard({ title, subtitle, imageUrl, onPress }: ItemCardProps) {\n  const scale = useSharedValue(1);\n\n  const animatedStyle = useAnimatedStyle(() => ({\n    transform: [{ scale: scale.value }],\n  }));\n\n  return (\n    <AnimatedPressable\n      style={[styles.card, animatedStyle]}\n      onPress={onPress}\n      onPressIn={() => { scale.value = withSpring(0.97); }}\n      onPressOut={() => { scale.value = withSpring(1); }}\n    >\n      <Image source={{ uri: imageUrl }} style={styles.image} />\n      <View style={styles.content}>\n        <Text style={styles.title} numberOfLines={1}>\n          {title}\n        </Text>\n        <Text style={styles.subtitle} numberOfLines={2}>\n          {subtitle}\n        </Text>\n      </View>\n    </AnimatedPressable>\n  );\n}\n\nconst styles = StyleSheet.create({\n  card: {\n    backgroundColor: '#ffffff',\n    borderRadius: 16,\n    overflow: 'hidden',\n    shadowColor: '#000',\n    shadowOffset: { width: 0, height: 2 },\n    shadowOpacity: 0.1,\n    shadowRadius: 8,\n    elevation: 4,\n  },\n  image: {\n    width: '100%',\n    height: 160,\n    backgroundColor: '#f3f4f6',\n  },\n  content: {\n    padding: 16,\n    gap: 4,\n  },\n  title: {\n    fontSize: 18,\n    fontWeight: '600',\n    color: '#1f2937',\n  },\n  subtitle: {\n    fontSize: 14,\n    color: '#6b7280',\n    lineHeight: 20,\n  },\n});\n```\n\n## Best Practices\n\n1. **Use TypeScript**: Define navigation and prop types for type safety\n2. **Memoize Components**: Use `React.memo` and `useCallback` to prevent unnecessary rerenders\n3. **Run Animations on UI Thread**: Use Reanimated worklets for 60fps animations\n4. **Avoid Inline Styles**: Use StyleSheet.create for performance\n5. **Handle Safe Areas**: Use `SafeAreaView` or `useSafeAreaInsets`\n6. **Test on Real Devices**: Simulator/emulator performance differs from real devices\n7. **Use FlatList for Lists**: Never use ScrollView with map for long lists\n8. **Platform-Specific Code**: Use Platform.select for iOS/Android differences\n\n\
  ## Common Issues\n\n- **Gesture Conflicts**: Wrap gestures with `GestureDetector` and use `simultaneousHandlers`\n- **Navigation Type Errors**: Define `ParamList` types for all navigators\n- **Animation Jank**: Move animations to UI thread with `runOnUI` worklets\n- **Memory Leaks**: Cancel animations and cleanup in useEffect\n- **Font Loading**: Use `expo-font` or `react-native-asset` for custom fonts\n- **Safe Area Issues**: Test on notched devices (iPhone, Android with cutouts)"
