raw_prose: "# SDD — Verify and Code Review\n\n## Overview\n\nThe verify phase is the gate before delivery. Tests pass, the linter is green, types check, and a structured review compares the implementation against the spec/design/plan to catch drift. This skill covers the verify checklist + review patterns.\n\nSourced from agent-skills/code-review-and-quality.\n\n---\n\n\n# Code Review and Quality\n\n## Overview\n\nMulti-dimensional code review with quality gates. Every change gets reviewed before merge — no exceptions. Review covers five axes: correctness, readability, architecture, security, and performance.\n\n**The approval standard:** Approve a change when it definitely improves overall code health, even if it isn't perfect. Perfect code doesn't exist — the goal is continuous improvement. Don't block a change because it isn't exactly how you would have written it. If it improves the codebase and follows the project's conventions, approve it.\n\n## When to Use\n\n- Before merging any\
  \ PR or change\n- After completing a feature implementation\n- When another agent or model produced code you need to evaluate\n- When refactoring existing code\n- After any bug fix (review both the fix and the regression test)\n\n## The Five-Axis Review\n\nEvery review evaluates code across these dimensions:\n\n### 1. Correctness\n\nDoes the code do what it claims to do?\n\n- Does it match the spec or task requirements?\n- Are edge cases handled (null, empty, boundary values)?\n- Are error paths handled (not just the happy path)?\n- Does it pass all tests? Are the tests actually testing the right things?\n- Are there off-by-one errors, race conditions, or state inconsistencies?\n\n### 2. Readability & Simplicity\n\nCan another engineer (or agent) understand this code without the author explaining it?\n\n- Are names descriptive and consistent with project conventions? (No `temp`, `data`, `result` without context)\n- Is the control flow straightforward (avoid nested ternaries, deep callbacks)?\n\
  - Is the code organized logically (related code grouped, clear module boundaries)?\n- Are there any \"clever\" tricks that should be simplified?\n- **Could this be done in fewer lines?** (1000 lines where 100 suffice is a failure)\n- **Are abstractions earning their complexity?** (Don't generalize until the third use case)\n- Would comments help clarify non-obvious intent? (But don't comment obvious code.)\n- Are there dead code artifacts: no-op variables (`_unused`), backwards-compat shims, or `// removed` comments?\n\n### 3. Architecture\n\nDoes the change fit the system's design?\n\n- Does it follow existing patterns or introduce a new one? If new, is it justified?\n- Does it maintain clean module boundaries?\n- Is there code duplication that should be shared?\n- Are dependencies flowing in the right direction (no circular dependencies)?\n- Is the abstraction level appropriate (not over-engineered, not too coupled)?\n\n### 4. Security\n\nFor detailed security guidance, see `security-and-hardening`.\
  \ Does the change introduce vulnerabilities?\n\n- Is user input validated and sanitized?\n- Are secrets kept out of code, logs, and version control?\n- Is authentication/authorization checked where needed?\n- Are SQL queries parameterized (no string concatenation)?\n- Are outputs encoded to prevent XSS?\n- Are dependencies from trusted sources with no known vulnerabilities?\n- Is data from external sources (APIs, logs, user content, config files) treated as untrusted?\n- Are external data flows validated at system boundaries before use in logic or rendering?\n\n### 5. Performance\n\nFor detailed profiling and optimization, see `performance-optimization`. Does the change introduce performance problems?\n\n- Any N+1 query patterns?\n- Any unbounded loops or unconstrained data fetching?\n- Any synchronous operations that should be async?\n- Any unnecessary re-renders in UI components?\n- Any missing pagination on list endpoints?\n- Any large objects created in hot paths?\n\n## Change Sizing\n\
  \nSmall, focused changes are easier to review, faster to merge, and safer to deploy. Target these sizes:\n\n```\n~100 lines changed   → Good. Reviewable in one sitting.\n~300 lines changed   → Acceptable if it's a single logical change.\n~1000 lines changed  → Too large. Split it.\n```\n\n**What counts as \"one change\":** A single self-contained modification that addresses one thing, includes related tests, and keeps the system functional after submission. One part of a feature — not the whole feature.\n\n**Splitting strategies when a change is too large:**\n\n| Strategy | How | When |\n|----------|-----|------|\n| **Stack** | Submit a small change, start the next one based on it | Sequential dependencies |\n| **By file group** | Separate changes for groups needing different reviewers | Cross-cutting concerns |\n| **Horizontal** | Create shared code/stubs first, then consumers | Layered architecture |\n| **Vertical** | Break into smaller full-stack slices of the feature | Feature work\
  \ |\n\n**When large changes are acceptable:** Complete file deletions and automated refactoring where the reviewer only needs to verify intent, not every line.\n\n**Separate refactoring from feature work.** A change that refactors existing code and adds new behavior is two changes — submit them separately. Small cleanups (variable renaming) can be included at reviewer discretion.\n\n## Change Descriptions\n\nEvery change needs a description that stands alone in version control history.\n\n**First line:** Short, imperative, standalone. \"Delete the FizzBuzz RPC\" not \"Deleting the FizzBuzz RPC.\" Must be informative enough that someone searching history can understand the change without reading the diff.\n\n**Body:** What is changing and why. Include context, decisions, and reasoning not visible in the code itself. Link to bug numbers, benchmark results, or design docs where relevant. Acknowledge approach shortcomings when they exist.\n\n**Anti-patterns:** \"Fix bug,\" \"Fix build,\" \"\
  Add patch,\" \"Moving code from A to B,\" \"Phase 1,\" \"Add convenience functions.\"\n\n## Review Process\n\n### Step 1: Understand the Context\n\nBefore looking at code, understand the intent:\n\n```\n- What is this change trying to accomplish?\n- What spec or task does it implement?\n- What is the expected behavior change?\n```\n\n### Step 2: Review the Tests First\n\nTests reveal intent and coverage:\n\n```\n- Do tests exist for the change?\n- Do they test behavior (not implementation details)?\n- Are edge cases covered?\n- Do tests have descriptive names?\n- Would the tests catch a regression if the code changed?\n```\n\n### Step 3: Review the Implementation\n\nWalk through the code with the five axes in mind:\n\n```\nFor each file changed:\n1. Correctness: Does this code do what the test says it should?\n2. Readability: Can I understand this without help?\n3. Architecture: Does this fit the system?\n4. Security: Any vulnerabilities?\n5. Performance: Any bottlenecks?\n```\n\n### Step\
  \ 4: Categorize Findings\n\nLabel every comment with its severity so the author knows what's required vs optional:\n\n| Prefix | Meaning | Author Action |\n|--------|---------|---------------|\n| *(no prefix)* | Required change | Must address before merge |\n| **Critical:** | Blocks merge | Security vulnerability, data loss, broken functionality |\n| **Nit:** | Minor, optional | Author may ignore — formatting, style preferences |\n| **Optional:** / **Consider:** | Suggestion | Worth considering but not required |\n| **FYI** | Informational only | No action needed — context for future reference |\n\nThis prevents authors from treating all feedback as mandatory and wasting time on optional suggestions.\n\n### Step 5: Verify the Verification\n\nCheck the author's verification story:\n\n```\n- What tests were run?\n- Did the build pass?\n- Was the change tested manually?\n- Are there screenshots for UI changes?\n- Is there a before/after comparison?\n```\n\n## Multi-Model Review Pattern\n\n\
  Use different models for different review perspectives:\n\n```\nModel A writes the code\n    │\n    ▼\nModel B reviews for correctness and architecture\n    │\n    ▼\nModel A addresses the feedback\n    │\n    ▼\nHuman makes the final call\n```\n\nThis catches issues that a single model might miss — different models have different blind spots.\n\n**Example prompt for a review agent:**\n```\nReview this code change for correctness, security, and adherence to\nour project conventions. The spec says [X]. The change should [Y].\nFlag any issues as Critical, Important, or Suggestion.\n```\n\n## Dead Code Hygiene\n\nAfter any refactoring or implementation change, check for orphaned code:\n\n1. Identify code that is now unreachable or unused\n2. List it explicitly\n3. **Ask before deleting:** \"Should I remove these now-unused elements: [list]?\"\n\nDon't leave dead code lying around — it confuses future readers and agents. But don't silently delete things you're not sure about. When in doubt,\
  \ — replaced by formatDate()\\n- OldTaskCard component in src/components/ — replaced by TaskCard\\n- LEGACY_API_URL constant in src/config.ts — no remaining references\\n→ Safe to remove these?\\n```\\n\\n## Artifact Completeness Evaluation (Soft Advisory)\\n\\nWhen you see a `[skillsmith-eval]` block in your context, the system is\\nasking you to evaluate whether a specific artifact meets its completeness\\ncriteria. This is a **soft advisory** — it does not block your work.\\n\\n```\\n[skillsmith-eval] Soft completeness check — does this artifact meet the bar?\\nCriteria: <criteria text>\\n\\n<artifact content>\\n```\\n\\n**How to respond:**\\n\\n1. Read the criteria and the artifact content.\\n2. Compare them honestly — does the artifact actually meet the stated bar?\\n3. If yes, acknowledge it briefly and continue.\\n4. If no, note what's missing and address it before proceeding.\\n\\nThis is your chance to catch quality issues that automated checks can't\\ndetect: incomplete specs, half-finished implementations, missing edge\\ncases, or artifacts that look structurally correct but lack substance.\\nBe honest but pragmatic — \"good enough to proceed\" counts as complete.\\n```"
