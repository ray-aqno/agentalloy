applies_to_phases:
- spec
exit_gates:
  all_of:
  - artifact_exists:
      path: docs/spec/*.md
  - artifact_contains:
      path: docs/spec/*.md
      sections:
      - Acceptance Criteria
      - Out of Scope
signal_keywords:
- done with spec
- ready to design
- next phase
contract_template: "---\nphase: spec\ntask_slug: {{task_slug}}\ndomain_tags: []\n\
  scope:\n  touches: []\n  avoids: []\nsuccess_criteria: []\nrelated_contracts: []\n\
  created_at: {{created_at}}\n---\n\n# {{task_slug}}\n\n## Task description\n<fill\
  \ in what you intend to do and why>\n"
