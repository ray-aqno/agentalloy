- sequence: 3
  fragment_type: execution
  content: '## Pattern 1: Attack Tree Data Model


    Define enums for `NodeType` (OR, AND, LEAF), `Difficulty` (TRIVIAL=1 to EXPERT=5), `Cost` (FREE=1 to NATION_STATE=5), `DetectionRisk` (NONE=1 to CERTAIN=5). Create `AttackAttributes` dataclass with all ratings plus boolean flags. Create `AttackNode` dataclass with id, name, node_type, attributes, children list, and mitigations list.


    ## Pattern 2: Attack Tree Builder


    Use builder pattern: `add_or_node()`, `add_and_node()`, `add_leaf()` to register nodes, then `connect(parent_id, child_id)` to build the tree structure. Call `build(root_id)` to produce the final `AttackTree`.


    ## Pattern 3: Diagram Export


    Export to Mermaid (`graph TD` format) or PlantUML. Shape encoding: LEAF nodes show difficulty rating, AND nodes show `[AND]` marker, OR nodes use rounded shape. Track visited nodes to avoid duplicates.'
- sequence: 4
  fragment_type: example
  content: "## Data Model & Builder Example\n\n```python\nclass NodeType(Enum):\n    OR = \"or\"; AND = \"and\"; LEAF = \"leaf\"\n\nclass Difficulty(Enum):\n    TRIVIAL = 1; LOW = 2; MODERATE = 3; HIGH = 4; EXPERT = 5\n\n@dataclass\nclass AttackAttributes:\n    difficulty: Difficulty = Difficulty.MODERATE\n    cost: Cost = Cost.MODERATE\n    detection_risk: DetectionRisk = DetectionRisk.MODERATE\n    time_hours: float = 0.0\n    requires_insider: bool = False\n\n@dataclass\nclass AttackNode:\n    id: str\n    name: str\n    node_type: NodeType = NodeType.OR\n    attributes: AttackAttributes = field(default_factory=AttackAttributes)\n    children: List[\"AttackNode\"] = field(default_factory=list)\n    mitigations: List[str] = field(default_factory=list)\n```\n\n```python\ntree = (AttackTreeBuilder(\"Compromise API\", \"Attack tree for API service\")\n    .add_or_node(\"root\", \"Compromise API\")\n    .add_leaf(\"sql\", \"SQL Injection\", AttackAttributes(difficulty=Difficulty.LOW), mitigations=[\"Parameterized queries\"])\n    .add_leaf(\"auth\", \"Bypass Auth\", AttackAttributes(difficulty=Difficulty.HIGH), mitigations=[\"MFA\", \"Rate limiting\"])\n    .connect(\"root\", \"sql\")\n    .connect(\"root\", \"auth\")\n    .build(\"root\"))\n```"
- sequence: 5
  fragment_type: example
  content: "## Path Analysis & Mitigation Priority Example (Pattern 4)\n\n```python\nanalyzer = AttackPathAnalyzer(tree)\n\npaths = analyzer.get_all_paths()\nfor path in paths:\n    metrics = analyzer.calculate_path_metrics(path)\n    print(f\"Path: {[n.name for n in path]}\")\n    print(f\"  Difficulty: {metrics['total_difficulty']}, Cost: {metrics['total_cost']}\")\n\ncritical = analyzer.identify_critical_nodes()\nfor node, count in critical[:5]:\n    print(f\"{node.name}: appears in {count} paths\")\n\ncoverage = analyzer.coverage_analysis(mitigated_attacks={\"sql\"})\nprint(f\"Coverage: {coverage['coverage_percentage']:.1f}%\")\n\npriorities = analyzer.prioritize_mitigations()\nfor p in priorities[:3]:\n    print(f\"Mitigate '{p['attack']}' → blocks {p['coverage_impact']:.1f}% of paths\")\n```"
- sequence: 6
  fragment_type: guardrail
  content: '## Best Practices


    ### Do''s

    - **Start with clear goals** — Define what attacker wants

    - **Be exhaustive** — Consider all attack vectors

    - **Attribute attacks** — Cost, skill, and detection

    - **Update regularly** — New threats emerge

    - **Validate with experts** — Red team review


    ### Don''ts

    - **Don''t oversimplify** — Real attacks are complex

    - **Don''t ignore dependencies** — AND nodes matter

    - **Don''t forget insider threats** — Not all attackers are external

    - **Don''t skip mitigations** — Trees are for defense planning

    - **Don''t make it static** — Threat landscape evolves'
