raw_prose: '# Bash Defensive Patterns


  Comprehensive guidance for writing production-ready Bash scripts using defensive programming techniques, error handling, and safety best practices to prevent common pitfalls and ensure reliability.


  ## When to Use


  - Writing production automation scripts

  - Building CI/CD pipeline scripts

  - Creating system administration utilities

  - Developing error-resilient deployment automation

  - Writing scripts that must handle edge cases safely

  - Building maintainable shell script libraries

  - Implementing comprehensive logging and monitoring

  - Creating scripts that must work across different platforms


  ## Core Defensive Principles


  ### Strict Mode

  `set -Eeuo pipefail` at script top: -E inherits ERR trap, -e exits on any error, -u exits on undefined variable, -o pipefail propagates pipe failures.


  ### Error Trapping and Cleanup

  `trap ''echo "Error on line $LINENO"'' ERR` and `trap ''rm -rf "$TMPDIR"'' EXIT` to ensure cleanup even on crash.


  ### Variable Safety

  Always quote variables. `: "${REQUIRED_VAR:?REQUIRED_VAR is not set}"` for required vars.


  ### Array Handling

  `for item in "${items[@]}"`. Read into array via `mapfile -t lines < <(some_command)`.


  ### Conditional Safety

  Use `[[ ]]` for Bash-specific features, `[ ]` for POSIX. Check existence with `[[ -z "${VAR:-}" ]]`.


  ## Fundamental Patterns


  - **Pattern 1: Safe Script Directory** — `SCRIPT_DIR="$(cd -- "$(dirname -- "${BASH_SOURCE[0]}")" && pwd -P)"`

  - **Pattern 2: Function Template** — `local -r` constants, validate inputs, return 0/1, errors to stderr

  - **Pattern 3: Temp File Handling** — `TMPDIR=$(mktemp -d)`, `trap ''rm -rf -- "$TMPDIR"'' EXIT`

  - **Pattern 4: Argument Parsing** — `while $# -gt 0; case ... esac` loop with shift, usage() heredoc

  - **Pattern 5: Structured Logging** — `log_info/warn/error/debug` functions with timestamp, logs to stderr

  - **Pattern 6: Signal Handling** — `trap` ERR, EXIT, SIGTERM, SIGINT for graceful shutdown

  - **Pattern 7: Safe File Operations** — `mv -n` (no clobber), atomic writes via temp + rename

  - **Pattern 8: Idempotent Scripts** — check state before mutation; safe to re-run

  - **Pattern 9: Safe Command Substitution** — quote `$(cmd)` results, capture exit code separately

  - **Pattern 10: Dry-Run Support** — `if $DRY_RUN; then echo "would: $cmd"; else eval $cmd; fi`


  ## Advanced Defensive Techniques


  - **Named Parameters** — pass key=value pairs, parse in function

  - **Dependency Checking** — verify required commands at start with `command -v`


  ## Best Practices Summary


  1. Always use strict mode (`set -Eeuo pipefail`)

  2. Quote everything; use `${var:-default}` for optionals

  3. Trap EXIT for cleanup; trap ERR for diagnostics

  4. Validate inputs early; fail with clear stderr messages

  5. Use `local` and `readonly` (`local -r`) inside functions

  6. Prefer `[[ ]]` over `[ ]` in Bash

  7. Use `mktemp` for temp files; never hardcode `/tmp/foo`

  8. Process files with `find ... -print0` and `read -d ''''` for null-delimited safety'
