- sequence: 5
  fragment_type: execution
  content: '## Pattern 3: Testing Classes


    Use dependency injection to provide mock implementations of repositories and services via `jest.Mocked<T>` or `vi.fn()`. Create mocks in `beforeEach`, instantiate the class under test with mocks. Assert both return values and that mocks were called with expected arguments.


    ## Pattern 5: Mocking Modules


    - Mock entire modules with `vi.mock("./api", () => ({ ... }))`.

    - For partial mocks, use `vi.importActual()` to keep real implementations while overriding specific exports.

    - Mock constructors by returning `vi.fn().mockImplementation(() => ({ ... }))`.


    ## Pattern 6: Dependency Injection for Testability


    Design services with constructor-injected dependencies. In tests, provide mock implementations. This avoids brittle module-level mocking and makes tests explicit about what they''re testing.


    ## Pattern 7: Spying on Functions


    Use `vi.spyOn(object, "method")` to observe calls without replacing implementation. Always call `spy.mockRestore()` in cleanup. For console spying, use `.mockImplementation(() => {})` to suppress output.'
