  content: '# JavaScript Testing Patterns


    Comprehensive patterns for testing JavaScript and TypeScript applications using Jest and Vitest, covering unit testing, mocking, integration testing, and Testing Library patterns.


    ## Core Concepts


    1. **Test Structure (AAA)** — Arrange-Act-Assert: set up preconditions, execute, verify.

    2. **Test Isolation** — Each test independent. Mock external dependencies, use setup/teardown.

    3. **Test Doubles** — Mock (replaces implementation, tracks calls), Stub (predetermined values), Spy (wraps real, records calls).

    4. **Testing Pyramid** — Many unit tests, fewer integration tests, fewest E2E tests.'
