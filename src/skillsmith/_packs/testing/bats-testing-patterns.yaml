  content: "## Integration with CI/CD\n\n### GitHub Actions Workflow\n\n```yaml\nname: Tests\n\non: [push, pull_request]\n\njobs:\n  test:\n    runs-on: ubuntu-latest\n\n    steps:\n      - uses: actions/checkout@v3\n\n      - name: Install Bats\n        run: |\n          npm install --global bats\n\n      - name: Run Tests\n        run: |\n          bats tests/*.bats\n\n      - name: Run Tests with Tap Reporter\n        run: |\n          bats tests/*.bats --tap | tee test_output.tap\n```\n\n### Makefile Integration\n\n```makefile\n.PHONY: test test-verbose test-tap\n\ntest:\n\tbats tests/*.bats\n\ntest-verbose:\n\tbats tests/*.bats --verbose\n\ntest-tap:\n\tbats tests/*.bats --tap\n\ntest-parallel:\n\tbats tests/*.bats --parallel 4\n\ncoverage: test\n\t# Optional: Generate coverage reports\n```"
