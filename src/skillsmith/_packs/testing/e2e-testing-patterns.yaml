raw_prose: "# E2E Testing Patterns\n\nBuild reliable, fast, and maintainable end-to-end test suites that provide confidence to ship code quickly and catch regressions before users do.\n\n## When to Use This Skill\n\n- Implementing end-to-end test automation\n- Debugging flaky or unreliable tests\n- Testing critical user workflows\n- Setting up CI/CD test pipelines\n- Testing across multiple browsers\n- Validating accessibility requirements\n- Testing responsive designs\n- Establishing E2E testing standards\n\n## Core Concepts\n\n### 1. E2E Testing Fundamentals\n\n**What to Test with E2E:**\n\n- Critical user journeys (login, checkout, signup)\n- Complex interactions (drag-and-drop, multi-step forms)\n- Cross-browser compatibility\n- Real API integration\n- Authentication flows\n\n**What NOT to Test with E2E:**\n\n- Unit-level logic (use unit tests)\n- API contracts (use integration tests)\n- Edge cases (too slow)\n- Internal implementation details\n\n### 2. Test Philosophy\n\n**The Testing Pyramid:**\n\n```\n        /\\\n       /E2E\\         ← Few, focused on critical paths\n      /─────\\\n     /Integr\\        ← More, test component interactions\n    /────────\\\n   /Unit Tests\\      ← Many, fast, isolated\n  /────────────\\\n```\n\n**Best Practices:**\n\n- Test user behavior, not implementation\n- Keep tests independent\n- Make tests deterministic\n- Optimize for speed\n- Use data-testid, not CSS selectors\n\n## Playwright Patterns\n\n### Setup and Configuration\n\n```typescript\n// playwright.config.ts\nimport { defineConfig, devices } from \"@playwright/test\";\n\nexport default defineConfig({\n  testDir: \"./e2e\",\n  timeout: 30000,\n  expect: {\n    timeout: 5000,\n  },\n  fullyParallel: true,\n  forbidOnly: !!process.env.CI,\n  retries: process.env.CI ? 2 : 0,\n  workers: process.env.CI ? 1 : undefined,\n  reporter: [[\"html\"], [\"junit\", { outputFile: \"results.xml\" }]],\n  use: {\n    baseURL: \"http://localhost:3000\",\n    trace: \"on-first-retry\",\n    screenshot: \"only-on-failure\",\n    video: \"retain-on-failure\",\n  },\n  projects: [\n    { name: \"chromium\", use: { ...devices[\"Desktop Chrome\"] } },\n    { name: \"firefox\", use: { ...devices[\"Desktop Firefox\"] } },\n    { name: \"webkit\", use: { ...devices[\"Desktop Safari\"] } },\n    { name: \"mobile\", use: { ...devices[\"iPhone 13\"] } },\n  ],\n});\n```\n\n### Pattern 1: Page Object Model\n\n```typescript\n// pages/LoginPage.ts\nimport { Page, Locator } from \"@playwright/test\";\n\nexport class LoginPage {\n  readonly page: Page;\n  readonly emailInput: Locator;\n  readonly passwordInput: Locator;\n  readonly loginButton: Locator;\n  readonly errorMessage: Locator;\n\n  constructor(page: Page) {\n    this.page = page;\n    this.emailInput = page.getByLabel(\"Email\");\n    this.passwordInput = page.getByLabel(\"Password\");\n    this.loginButton = page.getByRole(\"button\", { name: \"Login\" });\n    this.errorMessage = page.getByRole(\"alert\");\n  }\n\n  async goto() {\n    await this.page.goto(\"/login\");\n  }\n\n  async login(email: string, password: string) {\n    await this.emailInput.fill(email);\n    await this.passwordInput.fill(password);\n    await this.loginButton.click();\n  }\n\n  async getErrorMessage(): Promise<string> {\n    return (await this.errorMessage.textContent()) ?? \"\";\n  }\n}\n\n// Test using Page Object\nimport { test, expect } from \"@playwright/test\";\nimport { LoginPage } from \"./pages/LoginPage\";\n\ntest(\"successful login\", async ({ page }) => {\n  const loginPage = new LoginPage(page);\n  await loginPage.goto();\n  await loginPage.login(\"user@example.com\", \"password123\");\n\n  await expect(page).toHaveURL(\"/dashboard\");\n  await expect(page.getByRole(\"heading\", { name: \"Dashboard\" })).toBeVisible();\n});\n\ntest(\"failed login shows error\", async ({ page }) => {\n  const loginPage = new LoginPage(page);\n  await loginPage.goto();\n  await loginPage.login(\"invalid@example.com\", \"wrong\");\n\n  const error = await loginPage.getErrorMessage();\n  expect(error).toContain(\"Invalid credentials\");\n});\n```\n\n### Pattern 2: Fixtures for Test Data\n\n```typescript\n// fixtures/test-data.ts\nimport { test as base } from \"@playwright/test\";\n\ntype TestData = {\n  testUser: {\n    email: string;\n    password: string;\n    name: string;\n  };\n  adminUser: {\n    email: string;\n    password: string;\n  };\n};\n\nexport const test = base.extend<TestData>({\n  testUser: async ({}, use) => {\n    const user = {\n      email: `test-${Date.now()}@example.com`,\n      password: \"Test123!@#\",\n      name: \"Test User\",\n    };\n    // Setup: Create user in database\n    await createTestUser(user);\n    await use(user);\n    // Teardown: Clean up user\n    await deleteTestUser(user.email);\n  },\n\n  adminUser: async ({}, use) => {\n    await use({\n      email: \"admin@example.com\",\n      password: process.env.ADMIN_PASSWORD!,\n    });\n  },\n});\n\n// Usage in tests\nimport { test } from \"./fixtures/test-data\";\n\ntest(\"user can update profile\", async ({ page, testUser }) => {\n  await page.goto(\"/login\");\n  await page.getByLabel(\"Email\").fill(testUser.email);\n  await page.getByLabel(\"Password\").fill(testUser.password);\n  await page.getByRole(\"button\", { name: \"Login\" }).click();\n\n  await page.goto(\"/profile\");\n  await page.getByLabel(\"Name\").fill(\"Updated Name\");\n  await page.getByRole(\"button\", { name: \"Save\" }).click();\n\n  await expect(page.getByText(\"Profile updated\")).toBeVisible();\n});\n```\n\n### Pattern 3: Waiting Strategies\n\n```typescript\n// ❌ Bad: Fixed timeouts\nawait page.waitForTimeout(3000); // Flaky!\n\n// ✅ Good: Wait for specific conditions\nawait page.waitForLoadState(\"networkidle\");\nawait page.waitForURL(\"/dashboard\");\nawait page.waitForSelector('[data-testid=\"user-profile\"]');\n\n// ✅ Better: Auto-waiting with assertions\nawait expect(page.getByText(\"Welcome\")).toBeVisible();\nawait expect(page.getByRole(\"button\", { name: \"Submit\" })).toBeEnabled();\n\n// Wait for API response\nconst responsePromise = page.waitForResponse(\n  (response) =>\n    response.url().includes(\"/api/users\") && response.status() === 200,\n);\nawait page.getByRole(\"button\", { name: \"Load Users\" }).click();\nconst response = await responsePromise;\nconst data = await response.json();\nexpect(data.users).toHaveLength(10);\n\n// Wait for multiple conditions\nawait Promise.all([\n  page.waitForURL(\"/success\"),\n  page.waitForLoadState(\"networkidle\"),\n  expect(page.getByText(\"Payment successful\")).toBeVisible(),\n]);\n```\n\n### Pattern 4: Network Mocking and Interception\n\n```typescript\n// Mock API responses\ntest(\"displays error when API fails\", async ({ page }) => {\n  await page.route(\"**/api/users\", (route) => {\n    route.fulfill({\n      status: 500,\n      contentType: \"application/json\",\n      body: JSON.stringify({ error: \"Internal Server Error\" }),\n    });\n  });\n\n  await page.goto(\"/users\");\n  await expect(page.getByText(\"Failed to load users\")).toBeVisible();\n});\n\n// Intercept and modify requests\ntest(\"can modify API request\", async ({ page }) => {\n  await page.route(\"**/api/users\", async (route) => {\n    const request = route.request();\n    const postData = JSON.parse(request.postData() || \"{}\");\n\n    // Modify request\n    postData.role = \"admin\";\n\n    await route.continue({\n      postData: JSON.stringify(postData),\n    });\n  });\n\n  // Test continues...\n});\n\n// Mock third-party services\ntest(\"payment flow with mocked Stripe\", async ({ page }) => {\n  await page.route(\"**/api/stripe/**\", (route) => {\n    route.fulfill({\n      status: 200,\n      body: JSON.stringify({\n        id: \"mock_payment_id\",\n        status: \"succeeded\",\n      }),\n    });\n  });\n\n  // Test payment flow with mocked response\n});\n```\n\n## Cypress Patterns\n\n### Setup and Configuration\n\n```typescript\n// cypress.config.ts\nimport { defineConfig } from \"cypress\";\n\nexport default defineConfig({\n  e2e: {\n    baseUrl: \"http://localhost:3000\",\n    viewportWidth: 1280,\n    viewportHeight: 720,\n    video: false,\n    screenshotOnRunFailure: true,\n    defaultCommandTimeout: 10000,\n    requestTimeout: 10000,\n    setupNodeEvents(on, config) {\n      // Implement node event listeners\n    },\n  },\n});\n```\n\n### Pattern 1: Custom Commands\n\n```typescript\n// cypress/support/commands.ts\ndeclare global {\n  namespace Cypress {\n    interface Chainable {\n      login(email: string, password: string): Chainable<void>;\n      createUser(userData: UserData): Chainable<User>;\n      dataCy(value: string): Chainable<JQuery<HTMLElement>>;\n    }\n  }\n}\n\nCypress.Commands.add(\"login\", (email: string, password: string) => {\n  cy.visit(\"/login\");\n  cy.get('[data-testid=\"email\"]').type(email);\n  cy.get('[data-testid=\"password\"]').type(password);\n  cy.get('[data-testid=\"login-button\"]').click();\n  cy.url().should(\"include\", \"/dashboard\");\n});\n\nCypress.Commands.add(\"createUser\", (userData: UserData) => {\n  return cy.request(\"POST\", \"/api/users\", userData).its(\"body\");\n});\n\nCypress.Commands.add(\"dataCy\", (value: string) => {\n  return cy.get(`[data-cy=\"${value}\"]`);\n});\n\n// Usage\ncy.login(\"user@example.com\", \"password\");\ncy.dataCy(\"submit-button\").click();\n```\n\n### Pattern 2: Cypress Intercept\n\n```typescript\n// Mock API calls\ncy.intercept(\"GET\", \"/api/users\", {\n  statusCode: 200,\n  body: [\n    { id: 1, name: \"John\" },\n    { id: 2, name: \"Jane\" },\n  ],\n}).as(\"getUsers\");\n\ncy.visit(\"/users\");\ncy.wait(\"@getUsers\");\ncy.get('[data-testid=\"user-list\"]').children().should(\"have.length\", 2);\n\n// Modify responses\ncy.intercept(\"GET\", \"/api/users\", (req) => {\n  req.reply((res) => {\n    // Modify response\n    res.body.users = res.body.users.slice(0, 5);\n    res.send();\n  });\n});\n\n// Simulate slow\
  \ network\ncy.intercept(\"GET\", \"/api/data\", (req) => {\n  req.reply((res) => {\n    res.delay(3000); // 3 second delay\n    res.send();\n  });\n});\n```\n\n## Advanced Patterns\n\n### Pattern 1: Visual Regression Testing\n\n```typescript\n// With Playwright\nimport { test, expect } from \"@playwright/test\";\n\ntest(\"homepage looks correct\", async ({ page }) => {\n  await page.goto(\"/\");\n  await expect(page).toHaveScreenshot(\"homepage.png\", {\n    fullPage: true,\n    maxDiffPixels: 100,\n  });\n});\n\ntest(\"button in all states\", async ({ page }) => {\n  await page.goto(\"/components\");\n\n  const button = page.getByRole(\"button\", { name: \"Submit\" });\n\n  // Default state\n  await expect(button).toHaveScreenshot(\"button-default.png\");\n\n  // Hover state\n  await button.hover();\n  await expect(button).toHaveScreenshot(\"button-hover.png\");\n\n  // Disabled state\n  await button.evaluate((el) => el.setAttribute(\"disabled\", \"true\"));\n  await expect(button).toHaveScreenshot(\"button-disabled.png\");\n});\n```\n\n### Pattern 2: Parallel Testing with Sharding\n\n```typescript\n// playwright.config.ts\nexport default defineConfig({\n  projects: [\n    {\n      name: \"shard-1\",\n      use: { ...devices[\"Desktop Chrome\"] },\n      grepInvert: /@slow/,\n      shard: { current: 1, total: 4 },\n    },\n    {\n      name: \"shard-2\",\n      use: { ...devices[\"Desktop Chrome\"] },\n      shard: { current: 2, total: 4 },\n    },\n    // ... more shards\n  ],\n});\n\n// Run in CI\n// npx playwright test --shard=1/4\n// npx playwright test --shard=2/4\n```\n\n### Pattern 3: Accessibility Testing\n\n```typescript\n// Install: npm install @axe-core/playwright\nimport { test, expect } from \"@playwright/test\";\nimport AxeBuilder from \"@axe-core/playwright\";\n\ntest(\"page should not have accessibility violations\", async ({ page }) => {\n  await page.goto(\"/\");\n\n  const accessibilityScanResults = await new AxeBuilder({ page })\n    .exclude(\"#third-party-widget\")\n    .analyze();\n\n  expect(accessibilityScanResults.violations).toEqual([]);\n});\n\ntest(\"form is accessible\", async ({ page }) => {\n  await page.goto(\"/signup\");\n\n  const results = await new AxeBuilder({ page }).include(\"form\").analyze();\n\n  expect(results.violations).toEqual([]);\n});\n```\n\n## Best Practices\n\n1. **Use Data Attributes**: `data-testid` or `data-cy` for stable selectors\n2. **Avoid Brittle Selectors**: Don't rely on CSS classes or DOM structure\n3. **Test User Behavior**: Click, type, see - not implementation details\n4. **Keep Tests Independent**: Each test should run in isolation\n5. **Clean Up Test Data**: Create and destroy test data in each test\n6. **Use Page Objects**: Encapsulate page logic\n7. **Meaningful Assertions**: Check actual user-visible behavior\n8. **Optimize for Speed**: Mock when possible, parallel execution\n\n```typescript\n// ❌ Bad selectors\ncy.get(\".btn.btn-primary.submit-button\").click();\ncy.get(\"div > form > div:nth-child(2) > input\").type(\"text\");\n\n// ✅ Good selectors\ncy.getByRole(\"button\", { name: \"Submit\" }).click();\ncy.getByLabel(\"Email address\").type(\"user@example.com\");\ncy.get('[data-testid=\"email-input\"]').type(\"user@example.com\");\n```\n\n## Common Pitfalls\n\n- **Flaky Tests**: Use proper waits, not fixed timeouts\n- **Slow Tests**: Mock external APIs, use parallel execution\n- **Over-Testing**: Don't test every edge case with E2E\n- **Coupled Tests**: Tests should not depend on each other\n- **Poor Selectors**: Avoid CSS classes and nth-child\n- **No Cleanup**: Clean up test data after each test\n- **Testing Implementation**: Test user behavior, not internals\n\n## Debugging Failing Tests\n\n```typescript\n// Playwright debugging\n// 1. Run in headed mode\nnpx playwright test --headed\n\n// 2. Run in debug mode\nnpx playwright test --debug\n\n// 3. Use trace viewer\nawait page.screenshot({ path: 'screenshot.png' });\nawait page.video()?.saveAs('video.webm');\n\n// 4. Add test.step for better reporting\ntest('checkout flow', async ({ page }) => {\n    await test.step('Add item to cart', async () => {\n        await page.goto('/products');\n        await page.getByRole('button', { name: 'Add to Cart' }).click();\n    });\n\n    await test.step('Proceed to checkout', async () => {\n        await page.goto('/cart');\n        await page.getByRole('button', { name: 'Checkout' }).click();\n    });\n});\n\n// 5. Inspect page state\nawait page.pause();  // Pauses execution, opens inspector\n```"
