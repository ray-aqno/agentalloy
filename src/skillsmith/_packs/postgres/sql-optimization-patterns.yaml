raw_prose: '# SQL Optimization Patterns


  Transform slow database queries into lightning-fast operations through systematic optimization, proper indexing, and query plan analysis.


  ## When to Use


  - Debugging slow-running queries

  - Designing performant database schemas

  - Optimizing application response times

  - Reducing database load and costs

  - Improving scalability for growing datasets

  - Analyzing EXPLAIN query plans

  - Implementing efficient indexes

  - Resolving N+1 query problems


  ## Core Concepts


  ### Query Execution Plans (EXPLAIN)


  PostgreSQL: `EXPLAIN`, `EXPLAIN ANALYZE`, `EXPLAIN (ANALYZE, BUFFERS, VERBOSE)`.


  Key metrics: Seq Scan (full table — usually slow), Index Scan (good), Index Only Scan (best), Nested Loop (small data), Hash Join (large), Merge Join (sorted data), Cost (lower is better), Rows, Actual Time.


  ### Index Strategies


  Types: B-Tree (default), Hash (equality only), GIN (full-text, JSONB, arrays), GiST (geometric), BRIN (very large tables with correlation).


  Index forms: standard, composite (order matters), partial (subset of rows), expression (`LOWER(email)`), covering (INCLUDE columns), full-text (GIN tsvector), JSONB.


  ### Query Optimization Patterns


  - **Avoid SELECT \*** — fetch only needed columns

  - **Functions in WHERE prevent index usage** — use functional index or normalized data

  - **Filter before join** to shrink intermediate sets


  ## Optimization Patterns


  ### Pattern 1: Eliminate N+1 Queries

  Replace per-row queries with a single JOIN or batch IN-clause query.


  ### Pattern 2: Optimize Pagination

  OFFSET on large tables is slow. Use cursor-based pagination: `WHERE (created_at, id) < (cursor_ts, cursor_id) ORDER BY ... LIMIT N` with a covering index.


  ### Pattern 3: Aggregate Efficiently

  COUNT(*) is slow on large tables — use `pg_class.reltuples` for estimates, or filter first. GROUP BY: filter before grouping; use covering index.


  ### Pattern 4: Subquery Optimization

  Replace correlated subqueries with JOIN + GROUP BY or window functions. Use CTEs for clarity.


  ### Pattern 5: Batch Operations

  Batch INSERT in single statement; use COPY for bulk. Batch UPDATE via temp table + UPDATE FROM.


  ## Advanced Techniques


  - **Materialized Views** — pre-compute expensive queries; `REFRESH MATERIALIZED VIEW [CONCURRENTLY]`.

  - **Partitioning** — split large tables by range (date) or list. Queries auto-prune partitions.

  - **Query hints** — `USE INDEX` (MySQL), `SET enable_nestloop = OFF` (Postgres), `max_parallel_workers_per_gather`.


  ## Best Practices


  1. Index Selectively — too many indexes slow writes

  2. Monitor Query Performance — slow query logs

  3. Keep Statistics Updated — ANALYZE regularly

  4. Use Appropriate Data Types

  5. Normalize Thoughtfully

  6. Cache Frequently Accessed Data

  7. Connection Pooling

  8. Regular Maintenance — VACUUM, ANALYZE, REINDEX


  ## Common Pitfalls


  - **Over-Indexing** — each index slows INSERT/UPDATE/DELETE

  - **Unused Indexes** — waste space and slow writes

  - **Missing Indexes** — slow queries, full scans

  - **Implicit Type Conversion** — prevents index usage

  - **OR Conditions** — can''t use indexes efficiently

  - **LIKE with Leading Wildcard** — `LIKE ''%abc''` can''t use index

  - **Function in WHERE** — prevents index usage unless functional index exists


  ## Monitoring Queries


  PostgreSQL: `pg_stat_statements` for slow queries, `pg_stat_user_tables` for missing indexes (high `seq_scan`), `pg_stat_user_indexes` for unused indexes (`idx_scan = 0`).'
