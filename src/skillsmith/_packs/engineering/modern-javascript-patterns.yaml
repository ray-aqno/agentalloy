- sequence: 8
  fragment_type: execution
  content: '## Pattern 9: Modules


    Use named exports (`export const`, `export function`, `export class`) over default exports for better refactoring. Import with `import { name } from "./module.js"`. Use dynamic imports (`await import("./module.js")`) for code splitting. Create barrel files with re-exports to simplify import paths.


    ## Pattern 10: Modern Operators


    - **Optional chaining** (`?.`): safely access nested properties, array indices, and methods

    - **Nullish coalescing** (`??`): default values only for `null`/`undefined`, not falsy values

    - **Logical assignment** (`??=`, `||=`, `&&=`): conditional assignment operators

    - **structuredClone**: deep copy objects without JSON.parse/JSON.stringify limitations'
