- sequence: 5
  fragment_type: execution
  content: '## Pattern 6: Promises


    Create promises with `new Promise((resolve, reject) => ...)`. Chain with `.then()/.catch()`. Use `Promise.all()` for parallel execution (fails fast on first rejection). Use `Promise.allSettled()` to get all results regardless of failures. Use `Promise.race()` for timeout patterns.


    ## Pattern 7: Async/Await


    Prefer async/await over `.then()` chains for cleaner error handling. Use `try/catch` for error handling. For parallel execution, start all promises first, then await together with `Promise.all()`. Use `async function*` generators with `for await...of` for paginated APIs.'
- sequence: 6
