  content: "## Clean Architecture — Core Implementation\n\n```python\n# domain/entities/user.py\nfrom dataclasses import dataclass\nfrom datetime import datetime\n\n@dataclass\nclass User:\n    \"\"\"Core user entity — no framework dependencies.\"\"\"\n    id: str\n    email: str\n    name: str\n    created_at: datetime\n    is_active: bool = True\n\n    def deactivate(self):\n        self.is_active = False\n\n    def can_place_order(self) -> bool:\n        return self.is_active\n\n\n# domain/interfaces/user_repository.py\nfrom abc import ABC, abstractmethod\nfrom typing import Optional\nfrom domain.entities.user import User\n\nclass IUserRepository(ABC):\n    \"\"\"Port: defines contract, no implementation details.\"\"\"\n\n    @abstractmethod\n    async def find_by_id(self, user_id: str) -> Optional[User]: ...\n\n    @abstractmethod\n    async def find_by_email(self, email: str) -> Optional[User]: ...\n\n    @abstractmethod\n    async def save(self, user: User) -> User: ...\n\n    @abstractmethod\n    async def delete(self, user_id: str) -> bool: ...\n\n\n# use_cases/create_user.py\nfrom dataclasses import dataclass\nfrom datetime import datetime\nfrom typing import Optional\nimport uuid\nfrom domain.entities.user import User\nfrom domain.interfaces.user_repository import IUserRepository\n\n@dataclass\nclass CreateUserRequest:\n    email: str\n    name: str\n\n@dataclass\nclass CreateUserResponse:\n    user: Optional[User]\n    success: bool\n    error: Optional[str] = None\n\nclass CreateUserUseCase:\n    \"\"\"Use case: orchestrates business logic, no HTTP or DB details.\"\"\"\n\n    def __init__(self, user_repository: IUserRepository):\n        self.user_repository = user_repository\n\n    async def execute(self, request: CreateUserRequest) -> CreateUserResponse:\n        existing = await self.user_repository.find_by_email(request.email)\n        if existing:\n            return CreateUserResponse(user=None, success=False, error=\"Email already exists\")\n\n        user = User(\n            id=str(uuid.uuid4()),\n            email=request.email,\n            name=request.name,\n            created_at=datetime.now(),\n        )\n        saved_user = await self.user_repository.save(user)\n        return CreateUserResponse(user=saved_user, success=True)\n\n\n# adapters/repositories/postgres_user_repository.py\nfrom domain.interfaces.user_repository import IUserRepository\nfrom domain.entities.user import User\nfrom typing import Optional\nimport asyncpg\n\nclass PostgresUserRepository(IUserRepository):\n    \"\"\"Adapter: PostgreSQL implementation of the user port.\"\"\"\n\n    def __init__(self, pool: asyncpg.Pool):\n        self.pool = pool\n\n    async def find_by_id(self, user_id: str) -> Optional[User]:\n        async with self.pool.acquire() as conn:\n            row = await conn.fetchrow(\"SELECT * FROM users WHERE id = $1\", user_id)\n            return self._to_entity(row) if row else None\n\n    async def find_by_email(self, email: str) -> Optional[User]:\n        async with self.pool.acquire() as conn:\n            row = await conn.fetchrow(\"SELECT * FROM users WHERE email = $1\", email)\n            return self._to_entity(row) if row else None\n\n    async def save(self, user: User) -> User:\n        async with self.pool.acquire() as conn:\n            await conn.execute(\n                \"\"\"\n                INSERT INTO users (id, email, name, created_at, is_active)\n                VALUES ($1, $2, $3, $4, $5)\n                ON CONFLICT (id) DO UPDATE\n                SET email = $2, name = $3, is_active = $5\n                \"\"\",\n                user.id, user.email, user.name, user.created_at, user.is_active,\n            )\n        return user\n\n    async def delete(self, user_id: str) -> bool:\n        async with self.pool.acquire() as conn:\n            result = await conn.execute(\"DELETE FROM users WHERE id = $1\", user_id)\n            return result == \"DELETE 1\"\n\n    def _to_entity(self, row) -> User:\n        return User(\n            id=row[\"id\"], email=row[\"email\"], name=row[\"name\"],\n            created_at=row[\"created_at\"], is_active=row[\"is_active\"],\n        )\n\n\n# adapters/controllers/user_controller.py\nfrom fastapi import APIRouter, Depends, HTTPException\nfrom pydantic import BaseModel\nfrom use_cases.create_user import CreateUserUseCase, CreateUserRequest\n\nrouter = APIRouter()\n\nclass CreateUserDTO(BaseModel):\n    email: str\n    name: str\n\n@router.post(\"/users\")\nasync def create_user(\n    dto: CreateUserDTO,\n    use_case: CreateUserUseCase = Depends(get_create_user_use_case),\n):\n    \"\"\"Controller handles HTTP only — no business logic lives here.\"\"\"\n    response = await use_case.execute(CreateUserRequest(email=dto.email, name=dto.name))\n    if not response.success:\n        raise HTTPException(status_code=400, detail=response.error)\n    return {\"user\": response.user}\n```"
