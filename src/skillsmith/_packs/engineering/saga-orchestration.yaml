  content: "## Choreography Saga Example (Pattern 3)\n\n```python\nclass InventoryService:\n    async def handle_order_created(self, event: OrderCreated):\n        try:\n            await self.reserve(event.items)\n            await self.event_bus.publish(InventoryReserved(order_id=event.order_id))\n        except InsufficientStockError:\n            await self.event_bus.publish(InventoryReservationFailed(order_id=event.order_id))\n\nclass PaymentService:\n    async def handle_inventory_reserved(self, event: InventoryReserved):\n        try:\n            payment = await self.charge(event.order_id)\n            await self.event_bus.publish(PaymentCharged(order_id=event.order_id))\n        except PaymentFailedError:\n            await self.event_bus.publish(PaymentFailed(order_id=event.order_id))\n\nclass ShippingService:\n    async def handle_payment_charged(self, event: PaymentCharged):\n        try:\n            await self.create_shipment(event.order_id)\n            await self.event_bus.publish(OrderFulfilled(order_id=event.order_id))\n        except ShippingError:\n            await self.event_bus.publish(ShipmentFailed(order_id=event.order_id))\n```"
- sequence: 6
  fragment_type: guardrail
  content: '## Troubleshooting


    ### Stuck Sagas

    Implement a timeout watchdog that queries for sagas in STARTED or COMPENSATING state beyond a threshold. Resume or force-fail them.


    ### Duplicate Events

    Use idempotency keys on all saga steps. Check if the step has already been executed before re-executing.


    ### Lost Events

    Use durable message queues (Kafka, RabbitMQ with persistence). Implement dead-letter queues for failed processing.


    ### Timeout Handling

    Set per-step timeouts. If a step doesn''t complete within the timeout, treat it as a failure and begin compensation.'
