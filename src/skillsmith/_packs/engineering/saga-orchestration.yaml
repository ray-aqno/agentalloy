- sequence: 1
  fragment_type: rationale
  content: '# Saga Orchestration


    Implement distributed transactions using saga patterns — either orchestration (central coordinator) or choreography (event-driven). Sagas break long-running transactions into a sequence of local transactions with compensating actions for rollback.


    ## Orchestration vs Choreography


    **Orchestration**: A central coordinator tells each participant what to do. Maintains saga state machine. Easier to reason about, single point of control.


    **Choreography**: Each service publishes events and reacts to others. No central coordinator — loosely coupled but harder to trace.


    ## Saga States


    `STARTED` → `COMPENSATING` (on failure) → `FAILED` (compensation done)

    `STARTED` → `COMPLETED` (all steps succeed)


    ## Compensation Rules


    Every mutation must have a compensating action. Compensations run in reverse order: `reserve_inventory`/`release_inventory`, `charge_payment`/`refund_payment`, `create_shipment`/`cancel_shipment`.'
- sequence: 2
  fragment_type: setup
  content: '## When to Use This Skill


    - Implementing distributed transactions across microservices

    - Building order fulfillment, payment, and inventory workflows

    - Designing compensation logic for failure recovery

    - Choosing between orchestration and choreography

    - Handling idempotent step execution

    - Troubleshooting stuck or duplicate sagas'
- sequence: 3
  fragment_type: execution
  content: '## Pattern 1: Saga Orchestrator Data Model


    Define `SagaState` enum (STARTED, COMPENSATING, COMPLETED, FAILED). Define `SagaStep` dataclass with name, action, compensation, and completed flag. Define `Saga` dataclass with id, state, current_step index, list of steps, and context dict.


    ## Pattern 2: Order Fulfillment Saga (Orchestration)


    The orchestrator executes steps sequentially: reserve inventory, charge payment, create shipment. Each step marks `completed=True` on success. On any exception, switch to `COMPENSATING` state and run compensations in reverse order of completed steps. Save saga state after each transition. Return `SagaResult` with success flag and saga_id.


    ## Pattern 4: Idempotent Step Guards


    Before executing a step, check if `{saga_id}:{step_name}` already exists in the step repository. If yes, return the cached result. If no, execute the action and persist the result. This prevents duplicate execution on retries.'
