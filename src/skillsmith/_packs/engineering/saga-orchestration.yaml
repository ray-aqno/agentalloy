  fragment_type: example
  content: "## Order Fulfillment Orchestration Example (Pattern 2)\n\n```python\nclass OrderFulfillmentSaga:\n    def __init__(self, inventory_svc, payment_svc, shipping_svc, saga_repo):\n        self.inventory_svc = inventory_svc\n        self.payment_svc = payment_svc\n        self.shipping_svc = shipping_svc\n        self.saga_repo = saga_repo\n\n    async def execute(self, order: Order) -> SagaResult:\n        saga = Saga(id=f\"order-{order.id}\", steps=[\n            SagaStep(\"reserve_inventory\", \"reserve\", \"release\"),\n            SagaStep(\"charge_payment\", \"charge\", \"refund\"),\n            SagaStep(\"create_shipment\", \"ship\", \"cancel_shipment\"),\n        ], context={\"order_id\": order.id, \"total\": order.total})\n\n        try:\n            await self.inventory_svc.reserve(order.items)\n            saga.steps[0].completed = True\n            payment = await self.payment_svc.charge(order.customer_id, order.total)\n            saga.context[\"payment_id\"] = payment.id\n            saga.steps[1].completed = True\n            shipment = await self.shipping_svc.create(order.id, order.shipping_address)\n            saga.steps[2].completed = True\n            saga.state = SagaState.COMPLETED\n        except Exception as e:\n            saga.state = SagaState.COMPENSATING\n            await self._compensate(saga)\n```"
