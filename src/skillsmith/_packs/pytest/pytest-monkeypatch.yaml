raw_prose: |
  # Pytest Monkeypatch

  ## Overview

  The `monkeypatch` fixture safely modifies attributes, dict items, environment variables, and `sys.path` for the duration of a test, restoring originals on teardown. Methods include `setattr`, `delattr`, `setitem`, `delitem`, `setenv`, `delenv`, and `chdir`. This skill covers monkeypatch usage.

  Sourced from https://docs.pytest.org/en/stable/how-to/monkeypatch.html.

  .. _monkeypatching:

  # How to monkeypatch/mock modules and environments

  .. currentmodule:: pytest

  Sometimes tests need to invoke functionality which depends
  on global settings or which invokes code which cannot be easily
  tested such as network access.  The ``monkeypatch`` fixture
  helps you to safely set/delete an attribute, dictionary item or
  environment variable, or to modify ``sys.path`` for importing.

  The ``monkeypatch`` fixture provides these helper methods for safely patching and mocking
  functionality in tests:

  * `monkeypatch.setattr(obj, name, value, raising=True) <pytest.MonkeyPatch.setattr>`
  * `monkeypatch.delattr(obj, name, raising=True) <pytest.MonkeyPatch.delattr>`
  * `monkeypatch.setitem(mapping, name, value) <pytest.MonkeyPatch.setitem>`
  * `monkeypatch.delitem(obj, name, raising=True) <pytest.MonkeyPatch.delitem>`
  * `monkeypatch.setenv(name, value, prepend=None) <pytest.MonkeyPatch.setenv>`
  * `monkeypatch.delenv(name, raising=True) <pytest.MonkeyPatch.delenv>`
  * `monkeypatch.syspath_prepend(path) <pytest.MonkeyPatch.syspath_prepend>`
  * `monkeypatch.chdir(path) <pytest.MonkeyPatch.chdir>`
  * `monkeypatch.context() <pytest.MonkeyPatch.context>`

  All modifications will be undone after the requesting
  test function or fixture has finished. The ``raising``
  parameter determines if a ``KeyError`` or ``AttributeError``
  will be raised if the target of the set/deletion operation does not exist.

  Consider the following scenarios:

  1. Modifying the behavior of a function or the property of a class for a test e.g.
  there is an API call or database connection you will not make for a test but you know
  what the expected output should be. Use :py`monkeypatch.setattr <MonkeyPatch.setattr>` to patch the
  function or property with your desired testing behavior. This can include your own functions.
  Use :py`monkeypatch.delattr <MonkeyPatch.delattr>` to remove the function or property for the test.

  2. Modifying the values of dictionaries e.g. you have a global configuration that
  you want to modify for certain test cases. Use :py`monkeypatch.setitem <MonkeyPatch.setitem>` to patch the
  dictionary for the test. :py`monkeypatch.delitem <MonkeyPatch.delitem>` can be used to remove items.

  3. Modifying environment variables for a test e.g. to test program behavior if an
  environment variable is missing, or to set multiple values to a known variable.
  :py`monkeypatch.setenv <MonkeyPatch.setenv>` and :py`monkeypatch.delenv <MonkeyPatch.delenv>` can be used for
  these patches.

  4. Use ``monkeypatch.setenv("PATH", value, prepend=os.pathsep)`` to modify ``$PATH``, and
  :py`monkeypatch.chdir <MonkeyPatch.chdir>` to change the context of the current working directory
  during a test.

  5. Use :py`monkeypatch.syspath_prepend <MonkeyPatch.syspath_prepend>` to modify ``sys.path`` which will also
  call ``pkg_resources.fixup_namespace_packages`` and :py`importlib.invalidate_caches`.

  6. Use :py`monkeypatch.context <MonkeyPatch.context>` to apply patches only in a specific scope, which can help
  control teardown of complex fixtures or patches to the stdlib.

  See the `monkeypatch blog post`_ for some introduction material
  and a discussion of its motivation.

  .. _`monkeypatch blog post`: https://tetamap.wordpress.com//2009/03/03/monkeypatching-in-unit-tests-done-right/

  ## Monkeypatching functions

  Consider a scenario where you are working with user directories. In the context of
  testing, you do not want your test to depend on the running user. ``monkeypatch``
  can be used to patch functions dependent on the user to always return a
  specific value.

  In this example, :py`monkeypatch.setattr <MonkeyPatch.setattr>` is used to patch ``Path.home``
  so that the known testing path ``Path("/abc")`` is always used when the test is run.
  This removes any dependency on the running user for testing purposes.
  :py`monkeypatch.setattr <MonkeyPatch.setattr>` must be called before the function which will use
  the patched function is called.
  After the test function finishes the ``Path.home`` modification will be undone.

  ```python
  # contents of test_module.py with source code and the test
  from pathlib import Path
  ```


      def getssh():
          """Simple function to return expanded homedir ssh path."""
          return Path.home() / ".ssh"


      def test_getssh(monkeypatch):
          # mocked return function to replace Path.home
          # always return '/abc'
          def mockreturn():
              return Path("/abc")

          # Application of the monkeypatch to replace Path.home
          # with the behavior of mockreturn defined above.
          monkeypatch.setattr(Path, "home", mockreturn)

          # Calling getssh() will use mockreturn in place of Path.home
          # for this test with the monkeypatch.
          x = getssh()
          assert x == Path("/abc/.ssh")

  ## Monkeypatching returned objects: building mock classes

  :py`monkeypatch.setattr <MonkeyPatch.setattr>` can be used in conjunction with classes to mock returned
  objects from functions instead of values.
  Imagine a simple function to take an API url and return the json response.

  ```python
  # contents of app.py, a simple API retrieval example
  import requests
  ```


      def get_json(url):
          """Takes a URL, and returns the JSON."""
          r = requests.get(url)
          return r.json()

  We need to mock ``r``, the returned response object for testing purposes.
  The mock of ``r`` needs a ``.json()`` method which returns a dictionary.
  This can be done in our test file by defining a class to represent ``r``.

  ```python
  # contents of test_app.py, a simple test for our API retrieval
  # import requests for the purposes of monkeypatching
  import requests
  ```

      # our app.py that includes the get_json() function
      # this is the previous code block example
      import app


      # custom class to be the mock return value
      # will override the requests.Response returned from requests.get
      class MockResponse:
          # mock json() method always returns a specific testing dictionary
          @staticmethod
          def json():
              return {"mock_key": "mock_response"}


      def test_get_json(monkeypatch):
          # Any arguments may be passed and mock_get() will always return our
          # mocked object, which only has the .json() method.
          def mock_get(*args, **kwargs):
              return MockResponse()

          # apply the monkeypatch for requests.get to mock_get
          monkeypatch.setattr(requests, "get", mock_get)

          # app.get_json, which contains requests.get, uses the monkeypatch
          result = app.get_json("https://fakeurl")
          assert result["mock_key"] == "mock_response"

  ``monkeypatch`` applies the mock for ``requests.get`` with our ``mock_get`` function.
  The ``mock_get`` function returns an instance of the ``MockResponse`` class, which
  has a ``json()`` method defined to return a known testing dictionary and does not
  require any outside API connection.

  You can build the ``MockResponse`` class with the appropriate degree of complexity for
  the scenario you are testing. For instance, it could include an ``ok`` property that
  always returns ``True``, or return different values from the ``json()`` mocked method
  based on input strings.

  This mock can be shared across tests using a ``fixture``:

  ```python
  # contents of test_app.py, a simple test for our API retrieval
  import pytest
  import requests
  ```

      # app.py that includes the get_json() function
      import app


      # custom class to be the mock return value of requests.get()
      class MockResponse:
          @staticmethod
          def json():
              return {"mock_key": "mock_response"}


      # monkeypatched requests.get moved to a fixture
      @pytest.fixture
      def mock_response(monkeypatch):
          """Requests.get() mocked to return {'mock_key':'mock_response'}."""

          def mock_get(*args, **kwargs):
              return MockResponse()

          monkeypatch.setattr(requests, "get", mock_get)


      # notice our test uses the custom fixture instead of monkeypatch directly
      def test_get_json(mock_response):
          result = app.get_json("https://fakeurl")
          assert result["mock_key"] == "mock_response"

  Furthermore, if the mock was designed to be applied to all tests, the ``fixture`` could
  be moved to a ``conftest.py`` file and use the with ``autouse=True`` option.
