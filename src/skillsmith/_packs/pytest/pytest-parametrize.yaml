raw_prose: |
  # Pytest Parametrize

  ## Overview

  Parametrization runs the same test against multiple inputs without duplicating test code. The `@pytest.mark.parametrize` decorator takes a parameter spec and a list of value tuples. Parametrize stacks multiplicatively when applied multiple times. This skill covers parametrize patterns.

  Sourced from https://docs.pytest.org/en/stable/how-to/parametrize.html.

  .. _`test generators`:
  .. _`parametrizing-tests`:
  .. _`parametrized test functions`:
  .. _`parametrize`:

  .. _`parametrize-basics`:

  # How to parametrize fixtures and test functions


  pytest enables test parametrization at several levels:

  - :py`pytest.fixture` allows one to `parametrize fixture
    functions <fixture-parametrize>`.

  * `@pytest.mark.parametrize`_ allows one to define multiple sets of
    arguments and fixtures at the test function or class.

  * `pytest_generate_tests`_ allows one to define custom parametrization
    schemes or extensions.


  .. note:

  ```python
  See `subtests` for an alternative to parametrization.
  ```

  .. _parametrizemark:
  .. _`@pytest.mark.parametrize`:


  ## ``@pytest.mark.parametrize``: parametrizing test functions


  .. regendoc: wipe

  The builtin `pytest.mark.parametrize ref` decorator enables
  parametrization of arguments for a test function.  Here is a typical example
  of a test function that implements checking that a certain input leads
  to an expected output:

  ```python
  # content of test_expectation.py
  import pytest
  ```

      @pytest.mark.parametrize("test_input,expected", [("3+5", 8), ("2+4", 6), ("6*9", 42)])
      def test_eval(test_input, expected):
          assert eval(test_input) == expected

  Here, the ``@parametrize`` decorator defines three different ``(test_input,expected)``
  tuples so that the ``test_eval`` function will run three times using
  them in turn:

  ```pytest
  $ pytest
  ============================ test session starts ============================
  platform linux -- Python 3.x.y, pytest-9.x.y, pluggy-1.x.y
  rootdir: /home/sweet/project
  collected 3 items
  ```

      test_expectation.py ..F                                              [100%]

      ================================= FAILURES =================================
      ____________________________ test_eval[6*9-42] _____________________________

      test_input = '6*9', expected = 42

          @pytest.mark.parametrize("test_input,expected", [("3+5", 8), ("2+4", 6), ("6*9", 42)])
          def test_eval(test_input, expected):
      >       assert eval(test_input) == expected
      E       AssertionError: assert 54 == 42
      E        +  where 54 = eval('6*9')

      test_expectation.py:6: AssertionError
      ========================= short test summary info ==========================
      FAILED test_expectation.py::test_eval[6*9-42] - AssertionError: assert 54...
      ======================= 1 failed, 2 passed in 0.12s ========================

  .. note:

  ```python
  Parameter values are passed as-is to tests (no copy whatsoever).
  ```

      For example, if you pass a list or a dict as a parameter value, and
      the test case code mutates it, the mutations will be reflected in subsequent
      test case calls.

  .. note:

  ```python
  pytest by default escapes any non-ascii characters used in unicode strings
  for the parametrization because it has several downsides.
  If however you would like to use unicode strings in parametrization
  and see them in the terminal as is (non-escaped), use this option
  in your configuration file:
  ```

      .. tab:: toml

          ```toml
          [pytest]
          disable_test_id_escaping_and_forfeit_all_rights_to_community_support = true
  ```

      .. tab:: ini

          ```ini
          [pytest]
          disable_test_id_escaping_and_forfeit_all_rights_to_community_support = true
  ```

      Keep in mind however that this might cause unwanted side effects and
      even bugs depending on the OS used and plugins currently installed,
      so use it at your own risk.


  As designed in this example, only one pair of input/output values fails
  the simple test function.  And as usual with test function arguments,
  you can see the ``input`` and ``output`` values in the traceback.

  Note that you could also use the parametrize marker on a class or a module
  (see `mark`) which would invoke several functions with the argument sets,
  for instance:


  ```python
  import pytest
  ```

      @pytest.mark.parametrize("n,expected", [(1, 2), (3, 4)])
      class TestClass:
          def test_simple_case(self, n, expected):
              assert n + 1 == expected

          def test_weird_simple_case(self, n, expected):
              assert (n * 1) + 1 == expected


  To parametrize all tests in a module, you can assign to the `pytestmark` global variable:


  ```python
  import pytest
  ```

      pytestmark = pytest.mark.parametrize("n,expected", [(1, 2), (3, 4)])


      class TestClass:
          def test_simple_case(self, n, expected):
              assert n + 1 == expected

          def test_weird_simple_case(self, n, expected):
              assert (n * 1) + 1 == expected


  It is also possible to mark individual test instances within parametrize,
  for example with the builtin ``mark.xfail``:

  ```python
  # content of test_expectation.py
  import pytest
  ```

      @pytest.mark.parametrize(
          "test_input,expected",
          [("3+5", 8), ("2+4", 6), pytest.param("6*9", 42, marks=pytest.mark.xfail)],
      )
      def test_eval(test_input, expected):
          assert eval(test_input) == expected

  Let's run this:

  ```pytest
  $ pytest
  ============================ test session starts ============================
  platform linux -- Python 3.x.y, pytest-9.x.y, pluggy-1.x.y
  rootdir: /home/sweet/project
  collected 3 items
  ```

      test_expectation.py ..x                                              [100%]

      ======================= 2 passed, 1 xfailed in 0.12s =======================

  The one parameter set which caused a failure previously now
  shows up as an "xfailed" (expected to fail) test.

  In case the values provided to ``parametrize`` result in an empty list - for
  example, if they're dynamically generated by some function - the behaviour of
  pytest is defined by the `empty_parameter_set_mark` option.

  To get all combinations of multiple parametrized arguments you can stack
  ``parametrize`` decorators:

  ```python
  import pytest
  ```

      @pytest.mark.parametrize("x", [0, 1])
      @pytest.mark.parametrize("y", [2, 3])
      def test_foo(x, y):
          pass

  This will run the test with the arguments set to ``x=0/y=2``, ``x=1/y=2``,
  ``x=0/y=3``, and ``x=1/y=3`` exhausting parameters in the order of the decorators.


