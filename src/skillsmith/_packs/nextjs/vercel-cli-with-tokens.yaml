raw_prose: '# Vercel CLI with Tokens


  Deploy and manage projects on Vercel using the CLI with token-based authentication, without relying on `vercel login`.


  ## Step 1: Locate the Vercel Token


  Before running any Vercel CLI commands, identify where the token is coming from. Work through these scenarios in order:


  ### A) `VERCEL_TOKEN` is already set in the environment

  ```bash

  printenv VERCEL_TOKEN

  ```

  If this returns a value, you''re ready. Skip to Step 2.


  ### B) Token is in a `.env` file under `VERCEL_TOKEN`

  ```bash

  grep ''^VERCEL_TOKEN='' .env 2>/dev/null

  export VERCEL_TOKEN=$(grep ''^VERCEL_TOKEN='' .env | cut -d= -f2-)

  ```


  ### C) Token is in a `.env` file under a different name

  Vercel tokens typically start with `vca_`:

  ```bash

  grep -i ''vercel'' .env 2>/dev/null

  export VERCEL_TOKEN=$(grep ''^<VARIABLE_NAME>='' .env | cut -d= -f2-)

  ```


  ### D) No token found — ask the user

  They can create one at vercel.com/account/tokens.


  **Important:** Once `VERCEL_TOKEN` is exported, the Vercel CLI reads it natively — **do not pass it as a `--token` flag**. Putting secrets in command-line arguments exposes them in shell history and process listings.


  ## Step 2: Locate the Project and Team


  ```bash

  printenv VERCEL_PROJECT_ID

  printenv VERCEL_ORG_ID

  grep -i ''vercel'' .env 2>/dev/null

  ```


  If you have both `VERCEL_ORG_ID` and `VERCEL_PROJECT_ID` in your environment, export them — the CLI will skip any `.vercel/` directory:


  ```bash

  export VERCEL_ORG_ID="<org-id>"

  export VERCEL_PROJECT_ID="<project-id>"

  ```


  Note: `VERCEL_ORG_ID` and `VERCEL_PROJECT_ID` must be set together — setting only one causes an error.


  ## CLI Setup


  ```bash

  npm install -g vercel

  vercel --version

  ```


  ## Deploying a Project


  Always deploy as **preview** unless the user explicitly requests production.


  ### Quick Deploy (have project ID)

  ```bash

  vercel deploy -y --no-wait

  vercel deploy --scope <team-slug> -y --no-wait

  vercel deploy --prod --scope <team-slug> -y --no-wait   # production only when asked

  vercel inspect <deployment-url>                           # check status

  ```


  ### Full Deploy Flow (no project ID — need to link)


  Check state, then link with `vercel link --repo --scope <team-slug> -y` (with git remote, preferred) or plain `vercel link --scope <team-slug> -y` (without).


  Then deploy via git push (preferred when remote exists) or `vercel deploy --scope <team-slug> -y --no-wait`.


  ### Deploying from a Remote Repository

  Clone, link with `vercel link --repo`, deploy.


  ## Managing Environment Variables


  ```bash

  echo "value" | vercel env add VAR_NAME --scope <team-slug>

  echo "value" | vercel env add VAR_NAME production --scope <team-slug>

  vercel env ls --scope <team-slug>

  vercel env pull --scope <team-slug>

  vercel env rm VAR_NAME --scope <team-slug> -y

  ```


  ## Inspecting Deployments


  ```bash

  vercel ls --format json --scope <team-slug>

  vercel inspect <deployment-url>

  vercel inspect <deployment-url> --logs   # build logs (CLI v35+)

  vercel logs <deployment-url>             # runtime request logs

  ```


  ## Managing Domains


  ```bash

  vercel domains ls --scope <team-slug>

  vercel domains add <domain> --scope <team-slug>

  vercel domains add <domain> <project> --scope <team-slug>   # unlinked dir

  ```


  ## Stripe Projects Plan Changes


  If managed by Stripe Projects, **ask the user before any paid or destructive plan change**. Run `stripe projects status --json` first to confirm the Vercel resource''s local name.


  - Upgrade to Pro: `stripe projects add vercel/pro`

  - Downgrade to Hobby: `stripe projects downgrade vercel-plan hobby`


  ## Working Agreement


  - **Never pass `VERCEL_TOKEN` as a `--token` flag.** Export it as an environment variable.

  - **Check the environment for tokens before asking the user.**

  - **Default to preview deployments.** Only deploy to production when explicitly asked.

  - **Ask before pushing to git.**

  - **Do not modify `.vercel/` files directly.**

  - **Do not curl/fetch deployed URLs to verify.** Just return the link to the user.

  - **Use `--format json`** when structured output helps follow-up steps.

  - **Use `-y`** on commands that prompt for confirmation.


  ## Troubleshooting


  ### Token not found

  ```bash

  printenv | grep -i vercel

  grep -i vercel .env 2>/dev/null

  ```


  ### Authentication error

  Token may be expired. Verify with `vercel whoami` (uses `VERCEL_TOKEN`). Ask the user for a fresh token.


  ### Wrong team

  ```bash

  vercel whoami --scope <team-slug>

  ```


  ### Build failure

  ```bash

  vercel inspect <deployment-url> --logs

  ```

  Common causes: missing dependencies, missing env vars, framework misconfiguration.'
