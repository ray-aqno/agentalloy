- sequence: 3
  fragment_type: guardrail
  content: '## Token handling: never as `--token`


    Once `VERCEL_TOKEN` is exported as an environment variable, the Vercel CLI reads it natively — **do not pass it as a `--token` flag**. Putting secrets in command-line arguments exposes them in shell history and process listings.


    ```bash

    # Bad — token visible in shell history and process listings

    vercel deploy --token "vca_abc123"


    # Good — CLI reads VERCEL_TOKEN from the environment

    export VERCEL_TOKEN="vca_abc123"

    vercel deploy

    ```'
