- sequence: 3
  fragment_type: execution
  content: '## Pattern 1: Structured Logging with Structlog


    Configure structlog for JSON output with consistent fields. Use `structlog.configure()` with processors for context vars merging, log level, ISO timestamps, stack info rendering, exception formatting, and JSON rendering. Use `make_filtering_bound_logger` to set the filtering level from `logging` module levels.


    ## Pattern 2: Consistent Log Fields


    Every log entry should include standard fields: `correlation_id`, `method`, `path`, `user_id` on request received; `status_code`, `duration_ms` on completion; `error_type`, `error_message` on failure.


    ## Pattern 3: Semantic Log Levels


    | Level | Purpose |

    |-------|---------|

    | DEBUG | Development diagnostics — variable values, internal state |

    | INFO | Request lifecycle — start/end, job completion |

    | WARNING | Recoverable anomalies — retry attempts, fallback used |

    | ERROR | Failures needing attention — exceptions, service unavailable |


    Never log expected behavior at ERROR. A user entering a wrong password is INFO, not ERROR.'
- sequence: 4
  fragment_type: example
  content: "## Structured Logging Code Examples\n\n```python\nimport structlog\n\nstructlog.configure(\n    processors=[\n        structlog.contextvars.merge_contextvars,\n        structlog.processors.add_log_level,\n        structlog.processors.TimeStamper(fmt=\"iso\"),\n        structlog.processors.StackInfoRenderer(),\n        structlog.processors.format_exc_info,\n        structlog.processors.JSONRenderer(),\n    ],\n    wrapper_class=structlog.make_filtering_bound_logger(\n        getattr(logging, \"INFO\")\n    ),\n    context_class=dict,\n    logger_factory=structlog.PrintLoggerFactory(),\n    cache_logger_on_first_use=True,\n)\nlogger = structlog.get_logger()\n```\n\n```python\nlogger.debug(\"Cache lookup\", key=cache_key, hit=cache_hit)\nlogger.info(\"Order created\", order_id=order.id, total=order.total)\nlogger.warning(\"Rate limit approaching\", current_rate=950, limit=1000)\nlogger.error(\"Payment failed\", order_id=order.id, error=str(e))\n```"
- sequence: 5
  fragment_type: execution
  content: '## Pattern 4: Correlation ID Propagation


    Generate a unique ID at ingress and thread it through all operations. Use `contextvars.ContextVar` to store the correlation ID. In FastAPI, use middleware to extract `X-Correlation-ID` from incoming headers (or generate a UUID), bind it via `structlog.contextvars.bind_contextvars`, and add it to the response header. For outbound HTTP calls, include the `X-Correlation-ID` header in `httpx.AsyncClient` requests.


    ## Pattern 5: The Four Golden Signals with Prometheus


    Track four metric types at every service boundary using `prometheus_client`:

    - **Latency**: `Histogram` for request duration in seconds with appropriate buckets

    - **Traffic**: `Counter` for total HTTP requests by method/endpoint/status

    - **Errors**: `Counter` for HTTP errors by method/endpoint/error_type

    - **Saturation**: `Gauge` for resource utilization (e.g. DB connection pool used)


    Use a `@track_request` decorator with `time.perf_counter()` to instrument endpoints automatically.'
- sequence: 6
  fragment_type: example
  content: "## Correlation ID & Prometheus Code Examples\n\n```python\nfrom contextvars import ContextVar\nimport uuid, structlog\n\ncorrelation_id: ContextVar[str] = ContextVar(\"correlation_id\", default=\"\")\n\ndef set_correlation_id(cid: str | None = None) -> str:\n    cid = cid or str(uuid.uuid4())\n    correlation_id.set(cid)\n    structlog.contextvars.bind_contextvars(correlation_id=cid)\n    return cid\n```\n\n```python\nfrom prometheus_client import Counter, Histogram, Gauge\n\nREQUEST_LATENCY = Histogram(\n    \"http_request_duration_seconds\", \"Request latency\",\n    [\"method\", \"endpoint\", \"status\"],\n    buckets=[0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1, 2.5, 5, 10],\n)\nREQUEST_COUNT = Counter(\"http_requests_total\", \"Total requests\", [\"method\", \"endpoint\", \"status\"])\nERROR_COUNT = Counter(\"http_errors_total\", \"Total errors\", [\"method\", \"endpoint\", \"error_type\"])\nDB_POOL_USAGE = Gauge(\"db_connection_pool_used\", \"DB connections in use\")\n```"
- sequence: 7
  fragment_type: guardrail
  content: '## Pattern 6: Bounded Cardinality


    Avoid labels with unbounded values to prevent metric explosion:

    - BAD: `REQUEST_COUNT.labels(method="GET", user_id=user.id)` — potentially millions of values

    - GOOD: `REQUEST_COUNT.labels(method="GET", endpoint="/users", status="200")` — bounded set

    - For per-user metrics, log the user_id and query logs, use a separate analytics system, or bucket users by type/tier


    ## Pattern 7: Timed Operations


    Use a `@contextmanager` `timed_operation` that logs operation start at DEBUG, operation failure at ERROR with duration, and operation success at INFO with duration. This keeps timing consistent and avoids scattering `time.perf_counter()` calls.'
