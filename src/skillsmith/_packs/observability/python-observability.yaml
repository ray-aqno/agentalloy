  fragment_type: rationale
  content: '# Python Observability


    Instrument Python applications with structured logs, metrics, and traces. When something breaks in production, you need to answer "what, where, and why" without deploying new code.


    ## Core Concepts


    1. **Structured Logging** — Emit logs as JSON with consistent fields. Machine-readable logs enable powerful queries and alerts.

    2. **The Four Golden Signals** — Track latency, traffic, errors, and saturation for every service boundary.

    3. **Correlation IDs** — Thread a unique ID through all logs and spans for a single request, enabling end-to-end tracing.

    4. **Bounded Cardinality** — Keep metric label values bounded. Unbounded labels (like user IDs) explode storage costs.'
