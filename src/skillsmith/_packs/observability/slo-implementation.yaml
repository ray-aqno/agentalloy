raw_prose: '# SLO Implementation


  Define and implement Service Level Indicators (SLIs), Service Level Objectives (SLOs), and error budgets to balance reliability with innovation velocity.


  ## When to Use


  - Defining service reliability targets

  - Measuring user-perceived reliability

  - Implementing error budgets to govern release cadence

  - Creating SLO-based alerts (multi-window burn rates)

  - Tracking reliability against business goals


  ## SLI / SLO / SLA Hierarchy


  - **SLA** (Service Level Agreement) — contractual commitment to customers

  - **SLO** (Service Level Objective) — internal target, stricter than SLA

  - **SLI** (Service Level Indicator) — actual measurement of behavior


  Always set SLO stricter than SLA so you have buffer before contractual penalty kicks in.


  ## Common SLI Types


  - **Availability**: successful requests / total requests

  - **Latency**: requests below threshold / total requests

  - **Durability**: successful writes / total writes

  - **Quality**: requests meeting freshness/correctness threshold


  ## SLO Targets


  | SLO % | Downtime/Month | Downtime/Year |

  |---|---|---|

  | 99%    | 7.2 hours    | 3.65 days   |

  | 99.9%  | 43.2 minutes | 8.76 hours  |

  | 99.95% | 21.6 minutes | 4.38 hours  |

  | 99.99% | 4.32 minutes | 52.56 min   |


  Choose by user expectations, business requirements, current performance, cost of reliability, competitor benchmarks. Don''t aim for 100% — it''s not achievable and the marginal cost is brutal.


  ## Error Budget


  `Error Budget = 1 − SLO Target`. With a 99.9% SLO, the budget is 0.1% (43.2 min/month) of allowable failure. Spend it on planned changes, recovery, experiments. When the budget is exhausted, freeze risky changes.


  Error budget policy (example): 100% remaining → normal velocity; 50% → postpone risky changes; 10% → freeze non-critical; 0% → feature freeze, focus on reliability.


  ## Multi-Window Burn Rate Alerts


  Single-window alerts produce false positives. Multi-window alerts require both a long and short window to exceed threshold simultaneously, reducing noise:


  - Fast burn (critical): 14.4× rate sustained over 1h AND 5m → page

  - Slow burn (warning): 6× rate sustained over 6h AND 30m → ticket


  ## SLO Review Cadence


  - Weekly: current compliance, error budget status, trend, recent incidents

  - Monthly: achievement, budget usage, postmortems, target adjustments

  - Quarterly: SLO relevance, target adjustments, process and tooling improvements


  ## Best Practices


  Start with user-facing services. Use multiple SLIs per service. Set achievable targets. Implement multi-window alerts. Track error budgets consistently. Review SLOs regularly. Document SLO decisions. Align with business goals. Automate SLO reporting. Use SLOs for prioritization (engineering vs reliability work).'
fragments:
- sequence: 1
  fragment_type: rationale
  content: '# Why SLOs


    "How reliable should this service be?" is a business question, not a technical one. Without an explicit answer, every team converges on its own implicit target — usually "as reliable as I can make it," which optimizes engineer time toward marginal nines that no user notices, at the cost of features users do notice.


    **SLOs make the trade-off explicit.** A 99.9% availability target tells everyone — engineering, product, ops, leadership — that ~43 minutes of downtime per month is *acceptable*. It is not a goal; it is a budget. Spending less than the budget means the service is over-engineered for reliability and under-engineered for everything else; spending more means the team needs to slow feature work and invest in stability.


    **Error budgets convert reliability into a finite resource.** Once a team accepts that their SLO budget is 43 minutes/month, every planned change consumes some of it: deploys, migrations, dependency upgrades, chaos experiments. When the budget is exhausted, risky changes get frozen — not as punishment, but as the natural consequence of having spent the resource. This is the single most important property of SLO discipline: it makes "should we deploy this risky change?" answerable from data, not opinion.


    **Multi-window burn rate alerts replace static thresholds** because static thresholds (`error_rate > 1%`) page on every transient blip and miss slow burns that consume the budget over hours. A burn-rate alert that requires *both* a long and a short window to exceed threshold is dramatically less noisy and more correlated with actual user impact.


    **Core principle:** Treat reliability as a measured budget tied to user expectations, not as an aspiration. Every SLO decision in this skill exists to make that budget visible, finite, and enforced.'
- sequence: 2
  fragment_type: setup
  content: '## When to Use


