raw_prose: "# Production Deployment\n\n## Graceful Shutdown with close-with-grace\n\nUse `close-with-grace` for proper shutdown handling:\n\n```typescript\nimport Fastify from 'fastify';\nimport closeWithGrace from 'close-with-grace';\n\nconst app = Fastify({ logger: true });\n\n// Register plugins and routes\nawait app.register(import('./plugins/index.js'));\nawait app.register(import('./routes/index.js'));\n\n// Graceful shutdown handler\ncloseWithGrace({ delay: 10000 }, async ({ signal, err }) => {\n  if (err) {\n    app.log.error({ err }, 'Server closing due to error');\n  } else {\n    app.log.info({ signal }, 'Server closing due to signal');\n  }\n\n  await app.close();\n});\n\n// Start server\nawait app.listen({\n  port: parseInt(process.env.PORT || '3000', 10),\n  host: '0.0.0.0',\n});\n\napp.log.info(`Server listening on ${app.server.address()}`);\n```\n\n## Health Check Endpoints\n\nImplement comprehensive health checks:\n\n```typescript\napp.get('/health', async () => {\n  return { status: 'ok', timestamp: new Date().toISOString() };\n});\n\napp.get('/health/live', async () => {\n  return { status: 'ok' };\n});\n\napp.get('/health/ready', async (request, reply) => {\n  const checks = {\n    database: false,\n    cache: false,\n  };\n\n  try {\n    await app.db`SELECT 1`;\n    checks.database = true;\n  } catch {\n    // Database not ready\n  }\n\n  try {\n    await app.cache.ping();\n    checks.cache = true;\n  } catch {\n    // Cache not ready\n  }\n\n  const allHealthy = Object.values(checks).every(Boolean);\n\n  if (!allHealthy) {\n    reply.code(503);\n  }\n\n  return {\n    status: allHealthy ? 'ok' : 'degraded',\n    checks,\n    timestamp: new Date().toISOString(),\n  };\n});\n\n// Detailed health for monitoring\napp.get('/health/details', {\n  preHandler: [app.authenticate, app.requireAdmin],\n}, async () => {\n  const memory = process.memoryUsage();\n\n  return {\n    status: 'ok',\n    uptime: process.uptime(),\n    memory: {\n      heapUsed: Math.round(memory.heapUsed / 1024 / 1024),\n      heapTotal: Math.round(memory.heapTotal / 1024 / 1024),\n      rss: Math.round(memory.rss / 1024 / 1024),\n    },\n    version: process.env.APP_VERSION,\n    nodeVersion: process.version,\n  };\n});\n```\n\n## Docker Configuration\n\nCreate an optimized Dockerfile:\n\n```dockerfile\n# Build stage\nFROM node:22-alpine AS builder\n\nWORKDIR /app\n\nCOPY package*.json ./\nRUN npm ci --only=production\n\nCOPY . .\n\n# Production stage\nFROM node:22-alpine\n\nWORKDIR /app\n\n# Run as non-root user\nRUN addgroup -g 1001 -S nodejs && \\\n    adduser -S nodejs -u 1001\n\n# Copy from builder\nCOPY --from=builder --chown=nodejs:nodejs /app/node_modules ./node_modules\nCOPY --from=builder --chown=nodejs:nodejs /app/src ./src\nCOPY --from=builder --chown=nodejs:nodejs /app/package.json ./\n\nUSER nodejs\n\nEXPOSE 3000\n\nENV NODE_ENV=production\nENV PORT=3000\n\n# Health check\nHEALTHCHECK --interval=30s --timeout=5s --start-period=5s --retries=3 \\\n  CMD wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1\n\nCMD [\"node\", \"src/app.ts\"]\n```\n\n```yaml\n# docker-compose.yml\nservices:\n  api:\n    build: .\n    ports:\n      - \"3000:3000\"\n    environment:\n      - NODE_ENV=production\n      - DATABASE_URL=postgres://user:pass@db:5432/app\n      - JWT_SECRET=${JWT_SECRET}\n    depends_on:\n      db:\n        condition: service_healthy\n    restart: unless-stopped\n\n  db:\n    image: postgres:16-alpine\n    environment:\n      - POSTGRES_USER=user\n      - POSTGRES_PASSWORD=pass\n      - POSTGRES_DB=app\n    volumes:\n      - pgdata:/var/lib/postgresql/data\n    healthcheck:\n      test: [\"CMD-SHELL\", \"pg_isready -U user -d app\"]\n      interval: 5s\n      timeout: 5s\n      retries: 5\n\nvolumes:\n  pgdata:\n```\n\n## Kubernetes Deployment\n\nDeploy to Kubernetes:\n\n```yaml\n# deployment.yaml\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: fastify-api\nspec:\n  replicas: 3\n  selector:\n    matchLabels:\n      app: fastify-api\n  template:\n    metadata:\n      labels:\n        app: fastify-api\n    spec:\n      containers:\n        - name: api\n          image: my-registry/fastify-api:latest\n          ports:\n            - containerPort: 3000\n          env:\n            - name: NODE_ENV\n              value: \"production\"\n            - name: DATABASE_URL\n              valueFrom:\n                secretKeyRef:\n                  name: api-secrets\n                  key: database-url\n          resources:\n            requests:\n              memory: \"256Mi\"\n              cpu: \"100m\"\n            limits:\n              memory: \"512Mi\"\n              cpu: \"500m\"\n          livenessProbe:\n            httpGet:\n              path: /health/live\n              port: 3000\n            initialDelaySeconds: 5\n            periodSeconds: 10\n          readinessProbe:\n            httpGet:\n              path: /health/ready\n              port: 3000\n            initialDelaySeconds: 5\n            periodSeconds: 5\n          lifecycle:\n            preStop:\n              exec:\n                command: [\"/bin/sh\", \"-c\", \"sleep 5\"]\n---\napiVersion: v1\nkind: Service\nmetadata:\n  name: fastify-api\nspec:\n  selector:\n    app: fastify-api\n  ports:\n    - port: 80\n      targetPort: 3000\n  type: ClusterIP\n```\n\n## Production Logger Configuration\n\nConfigure logging for production:\n\n```typescript\nimport Fastify from 'fastify';\n\nconst app = Fastify({\n  logger: {\n    level: process.env.LOG_LEVEL || 'info',\n    // JSON output for log aggregation\n    formatters: {\n      level: (label) => ({ level: label }),\n      bindings: (bindings) => ({\n        pid: bindings.pid,\n        hostname: bindings.hostname,\n        service: 'fastify-api',\n        version: process.env.APP_VERSION,\n      }),\n    },\n    timestamp: () => `,\"time\":\"${new Date().toISOString()}\"`,\n    // Redact sensitive data\n    redact: {\n      paths: [\n        'req.headers.authorization',\n        'req.headers.cookie',\n        '*.password',\n        '*.token',\n        '*.secret',\n      ],\n      censor: '[REDACTED]',\n    },\n  },\n});\n```\n\n## Request Timeouts\n\nConfigure appropriate timeouts:\n\n```typescript\nconst app = Fastify({\n  connectionTimeout: 30000,     // 30s connection timeout\n  keepAliveTimeout: 72000,      // 72s keep-alive (longer than ALB 60s)\n  requestTimeout: 30000,        // 30s request timeout\n  bodyLimit: 1048576,           // 1MB body limit\n});\n\n// Per-route timeout\napp.get('/long-operation', {\n  config: {\n    timeout: 60000, // 60s for this route\n  },\n}, longOperationHandler);\n```\n\n## Trust Proxy Settings\n\nConfigure for load balancers:\n\n```typescript\nconst app = Fastify({\n  // Trust first proxy (load balancer)\n  trustProxy: true,\n\n  // Or trust specific proxies\n  trustProxy: ['127.0.0.1', '10.0.0.0/8'],\n\n  // Or number of proxies to trust\n  trustProxy: 1,\n});\n\n// Now request.ip returns real client IP\n```\n\n## Static File Serving\n\nServe static files efficiently. **Always use `import.meta.dirname` as the base path**, never `process.cwd()`:\n\n```typescript\nimport fastifyStatic from '@fastify/static';\nimport { join } from 'node:path';\n\napp.register(fastifyStatic, {\n  root: join(import.meta.dirname, '..', 'public'),\n  prefix: '/static/',\n  maxAge: '1d',\n  immutable: true,\n  etag: true,\n  lastModified: true,\n});\n```\n\n## Compression\n\nEnable response compression:\n\n```typescript\nimport fastifyCompress from '@fastify/compress';\n\napp.register(fastifyCompress, {\n  global: true,\n  threshold: 1024, // Only compress > 1KB\n  encodings: ['gzip', 'deflate'],\n});\n```\n\n## Metrics and Monitoring\n\nExpose Prometheus metrics:\n\n```typescript\nimport { register, collectDefaultMetrics, Counter, Histogram } from 'prom-client';\n\ncollectDefaultMetrics();\n\nconst httpRequestDuration = new Histogram({\n  name: 'http_request_duration_seconds',\n  help: 'Duration of HTTP requests in seconds',\n  labelNames: ['method', 'route', 'status'],\n  buckets: [0.01, 0.05, 0.1, 0.5, 1, 5],\n});\n\nconst httpRequestTotal = new Counter({\n  name: 'http_requests_total',\n  help: 'Total number of HTTP requests',\n  labelNames: ['method', 'route', 'status'],\n});\n\napp.addHook('onResponse', (request, reply, done) => {\n  const route = request.routeOptions.url || request.url;\n  const labels = {\n    method: request.method,\n    route,\n    status: reply.statusCode,\n  };\n\n  httpRequestDuration.observe(labels, reply.elapsedTime / 1000);\n  httpRequestTotal.inc(labels);\n  done();\n});\n\napp.get('/metrics', async (request, reply) => {\n  reply.header('Content-Type', register.contentType);\n  return register.metrics();\n});\n```\n\n## Zero-Downtime Deployments\n\nSupport rolling updates:\n\n```typescript\nimport closeWithGrace from 'close-with-grace';\n\n// Stop accepting new connections gracefully\ncloseWithGrace({ delay: 30000 }, async ({ signal }) => {\n  app.log.info({ signal }, 'Received shutdown signal');\n\n  // Stop accepting new connections\n  // Existing connections continue to be served\n\n  // Wait for in-flight requests (handled by close-with-grace delay)\n  await app.close();\n\n  app.log.info('Server closed');\n});\n```\n\n"
