raw_prose: "# JSON Schema Validation\n\n## Use TypeBox for Type-Safe Schemas\n\n**Prefer TypeBox for defining schemas.** It provides TypeScript types automatically and compiles to JSON Schema:\n\n```typescript\nimport Fastify from 'fastify';\nimport { Type, type Static } from '@sinclair/typebox';\n\nconst app = Fastify();\n\n// Define schema with TypeBox - get TypeScript types for free\nconst CreateUserBody = Type.Object({\n  name: Type.String({ minLength: 1, maxLength: 100 }),\n  email: Type.String({ format: 'email' }),\n  age: Type.Optional(Type.Integer({ minimum: 0, maximum: 150 })),\n});\n\nconst UserResponse = Type.Object({\n  id: Type.String({ format: 'uuid' }),\n  name: Type.String(),\n  email: Type.String(),\n  createdAt: Type.String({ format: 'date-time' }),\n});\n\n// TypeScript types are derived automatically\ntype CreateUserBodyType = Static<typeof CreateUserBody>;\ntype UserResponseType = Static<typeof UserResponse>;\n\napp.post<{\n  Body: CreateUserBodyType;\n  Reply: UserResponseType;\n}>('/users', {\n  schema: {\n    body: CreateUserBody,\n    response: {\n      201: UserResponse,\n    },\n  },\n}, async (request, reply) => {\n  // request.body is fully typed as CreateUserBodyType\n  const user = await createUser(request.body);\n  reply.code(201);\n  return user;\n});\n```\n\n## TypeBox Common Patterns\n\n```typescript\nimport { Type, type Static } from '@sinclair/typebox';\n\n// Enums\nconst Status = Type.Union([\n  Type.Literal('active'),\n  Type.Literal('inactive'),\n  Type.Literal('pending'),\n]);\n\n// Arrays\nconst Tags = Type.Array(Type.String(), { minItems: 1, maxItems: 10 });\n\n// Nested objects\nconst Address = Type.Object({\n  street: Type.String(),\n  city: Type.String(),\n  country: Type.String(),\n  zip: Type.Optional(Type.String()),\n});\n\n// References (reusable schemas)\nconst User = Type.Object({\n  id: Type.String({ format: 'uuid' }),\n  name: Type.String(),\n  address: Address,\n  tags: Tags,\n  status: Status,\n});\n\n// Nullable\nconst NullableString = Type.Union([Type.String(), Type.Null()]);\n\n// Record/Map\nconst Metadata = Type.Record(Type.String(), Type.Unknown());\n```\n\n## Register TypeBox Schemas Globally\n\n```typescript\nimport { Type, type Static } from '@sinclair/typebox';\n\n// Define shared schemas\nconst ErrorResponse = Type.Object({\n  error: Type.String(),\n  message: Type.String(),\n  statusCode: Type.Integer(),\n});\n\nconst PaginationQuery = Type.Object({\n  page: Type.Integer({ minimum: 1, default: 1 }),\n  limit: Type.Integer({ minimum: 1, maximum: 100, default: 20 }),\n});\n\n// Register globally\napp.addSchema(Type.Object({ $id: 'ErrorResponse', ...ErrorResponse }));\napp.addSchema(Type.Object({ $id: 'PaginationQuery', ...PaginationQuery }));\n\n// Reference in routes\napp.get('/items', {\n  schema: {\n    querystring: { $ref: 'PaginationQuery#' },\n    response: {\n      400: { $ref: 'ErrorResponse#' },\n    },\n  },\n}, handler);\n```\n\n## Plain JSON Schema (Alternative)\n\nYou can also use plain JSON Schema directly:\n\n```typescript\nimport Fastify from 'fastify';\n\nconst app = Fastify();\n\nconst createUserSchema = {\n  body: {\n    type: 'object',\n    properties: {\n      name: { type: 'string', minLength: 1, maxLength: 100 },\n      email: { type: 'string', format: 'email' },\n      age: { type: 'integer', minimum: 0, maximum: 150 },\n    },\n    required: ['name', 'email'],\n    additionalProperties: false,\n  },\n  response: {\n    201: {\n      type: 'object',\n      properties: {\n        id: { type: 'string', format: 'uuid' },\n        name: { type: 'string' },\n        email: { type: 'string' },\n        createdAt: { type: 'string', format: 'date-time' },\n      },\n    },\n  },\n};\n\napp.post('/users', { schema: createUserSchema }, async (request, reply) => {\n  const user = await createUser(request.body);\n  reply.code(201);\n  return user;\n});\n```\n\n## Request Validation Parts\n\nValidate different parts of the request:\n\n```typescript\nconst fullRequestSchema = {\n  // URL parameters\n  params: {\n    type: 'object',\n    properties: {\n      id: { type: 'string', format: 'uuid' },\n    },\n    required: ['id'],\n  },\n\n  // Query string\n  querystring: {\n    type: 'object',\n    properties: {\n      include: { type: 'string', enum: ['posts', 'comments', 'all'] },\n      limit: { type: 'integer', minimum: 1, maximum: 100, default: 10 },\n    },\n  },\n\n  // Request headers\n  headers: {\n    type: 'object',\n    properties: {\n      'x-api-key': { type: 'string', minLength: 32 },\n    },\n    required: ['x-api-key'],\n  },\n\n  // Request body\n  body: {\n    type: 'object',\n    properties: {\n      data: { type: 'object' },\n    },\n    required: ['data'],\n  },\n};\n\napp.put('/resources/:id', { schema: fullRequestSchema }, handler);\n```\n\n## Shared Schemas with $id\n\nDefine reusable schemas with `$id` and reference them with `$ref`:\n\n```typescript\n// Add shared schemas to Fastify\napp.addSchema({\n  $id: 'user',\n  type: 'object',\n  properties: {\n    id: { type: 'string', format: 'uuid' },\n    name: { type: 'string' },\n    email: { type: 'string', format: 'email' },\n    createdAt: { type: 'string', format: 'date-time' },\n  },\n  required: ['id', 'name', 'email'],\n});\n\napp.addSchema({\n  $id: 'userCreate',\n  type: 'object',\n  properties: {\n    name: { type: 'string', minLength: 1 },\n    email: { type: 'string', format: 'email' },\n  },\n  required: ['name', 'email'],\n  additionalProperties: false,\n});\n\napp.addSchema({\n  $id: 'error',\n  type: 'object',\n  properties: {\n    statusCode: { type: 'integer' },\n    error: { type: 'string' },\n    message: { type: 'string' },\n  },\n});\n\n// Reference shared schemas\napp.post('/users', {\n  schema: {\n    body: { $ref: 'userCreate#' },\n    response: {\n      201: { $ref: 'user#' },\n      400: { $ref: 'error#' },\n    },\n  },\n}, handler);\n\napp.get('/users/:id', {\n  schema: {\n    params: {\n      type: 'object',\n      properties: { id: { type: 'string', format: 'uuid' } },\n      required: ['id'],\n    },\n    response: {\n      200: { $ref: 'user#' },\n      404: { $ref: 'error#' },\n    },\n  },\n}, handler);\n```\n\n## Array Schemas\n\nDefine schemas for array responses:\n\n```typescript\napp.addSchema({\n  $id: 'userList',\n  type: 'object',\n  properties: {\n    users: {\n      type: 'array',\n      items: { $ref: 'user#' },\n    },\n    total: { type: 'integer' },\n    page: { type: 'integer' },\n    pageSize: { type: 'integer' },\n  },\n});\n\napp.get('/users', {\n  schema: {\n    querystring: {\n      type: 'object',\n      properties: {\n        page: { type: 'integer', minimum: 1, default: 1 },\n        pageSize: { type: 'integer', minimum: 1, maximum: 100, default: 20 },\n      },\n    },\n    response: {\n      200: { $ref: 'userList#' },\n    },\n  },\n}, handler);\n```\n\n## Custom Formats\n\nAdd custom validation formats:\n\n```typescript\nimport Fastify from 'fastify';\n\nconst app = Fastify({\n  ajv: {\n    customOptions: {\n      formats: {\n        'iso-country': /^[A-Z]{2}$/,\n        'phone': /^\\+?[1-9]\\d{1,14}$/,\n      },\n    },\n  },\n});\n\n// Or add formats dynamically\napp.addSchema({\n  $id: 'address',\n  type: 'object',\n  properties: {\n    street: { type: 'string' },\n    country: { type: 'string', format: 'iso-country' },\n    phone: { type: 'string', format: 'phone' },\n  },\n});\n```\n\n## Custom Keywords\n\nAdd custom validation keywords:\n\n```typescript\nimport Fastify from 'fastify';\nimport Ajv from 'ajv';\n\nconst app = Fastify({\n  ajv: {\n    customOptions: {\n      keywords: [\n        {\n          keyword: 'isEven',\n          type: 'number',\n          validate: (schema: boolean, data: number) => {\n            if (schema) {\n              return data % 2 === 0;\n            }\n            return true;\n          },\n          errors: false,\n        },\n      ],\n    },\n  },\n});\n\n// Use custom keyword\napp.post('/numbers', {\n  schema: {\n    body: {\n      type: 'object',\n      properties: {\n        value: { type: 'integer', isEven: true },\n      },\n    },\n  },\n}, handler);\n```\n\n## Coercion\n\nFastify coerces types by default for query strings and params:\n\n```typescript\n// Query string \"?page=5&active=true\" becomes:\n// { page: 5, active: true } (number and boolean, not strings)\n\napp.get('/items', {\n  schema: {\n    querystring: {\n      type: 'object',\n      properties: {\n        page: { type: 'integer' },      // \"5\" -> 5\n        active: { type: 'boolean' },    // \"true\" -> true\n        tags: {\n          type: 'array',\n          items: { type: 'string' },    // \"a,b,c\" -> [\"a\", \"b\", \"c\"]\n        },\n      },\n    },\n  },\n}, handler);\n```\n\n## Validation Error Handling\n\nCustomize validation error responses:\n\n```typescript\napp.setErrorHandler((error, request, reply) => {\n  if (error.validation) {\n    reply.code(400).send({\n      error: 'Validation Error',\n      message: 'Request validation failed',\n      details: error.validation.map((err) => ({\n        field: err.instancePath || err.params?.missingProperty,\n        message: err.message,\n        keyword: err.keyword,\n      })),\n    });\n    return;\n  }\n\n  // Handle other errors\n  reply.code(error.statusCode || 500).send({\n    error: error.name,\n    message: error.message,\n  });\n});\n```\n\n## Schema Compiler Options\n\nConfigure the Ajv schema compiler:\n\n```typescript\nimport Fastify from 'fastify';\n\nconst app = Fastify({\n  ajv: {\n    customOptions: {\n      removeAdditional: 'all',   // Remove extra properties\n      useDefaults: true,         // Apply default values\n      coerceTypes: true,         // Coerce types\n      allErrors: true,           // Report all errors, not just first\n    },\n    plugins: [\n      require('ajv-formats'),    // Add format validators\n    ],\n  },\n});\n```\n\n## Nullable Fields\n\nHandle nullable fields properly:\n\n```typescript\napp.addSchema({\n\
  \  $id: 'profile',\n  type: 'object',\n  properties: {\n    name: { type: 'string' },\n    bio: { type: ['string', 'null'] },  // Can be string or null\n    avatar: {\n      oneOf: [\n        { type: 'string', format: 'uri' },\n        { type: 'null' },\n      ],\n    },\n  },\n});\n```\n\n## Conditional Validation\n\nUse if/then/else for conditional validation:\n\n```typescript\napp.addSchema({\n  $id: 'payment',\n  type: 'object',\n  properties: {\n    method: { type: 'string', enum: ['card', 'bank'] },\n    cardNumber: { type: 'string' },\n    bankAccount: { type: 'string' },\n  },\n  required: ['method'],\n  if: {\n    properties: { method: { const: 'card' } },\n  },\n  then: {\n    required: ['cardNumber'],\n  },\n  else: {\n    required: ['bankAccount'],\n  },\n});\n```\n\n## Schema Organization\n\nOrganize schemas in a dedicated file:\n\n```typescript\n// schemas/index.ts\nexport const schemas = [\n  {\n    $id: 'user',\n    type: 'object',\n    properties: {\n      id: { type: 'string', format: 'uuid' },\n      name: { type: 'string' },\n      email: { type: 'string', format: 'email' },\n    },\n  },\n  {\n    $id: 'error',\n    type: 'object',\n    properties: {\n      statusCode: { type: 'integer' },\n      error: { type: 'string' },\n      message: { type: 'string' },\n    },\n  },\n];\n\n// app.ts\nimport { schemas } from './schemas/index.js';\n\nfor (const schema of schemas) {\n  app.addSchema(schema);\n}\n```\n\n## OpenAPI/Swagger Integration\n\nSchemas work directly with @fastify/swagger:\n\n```typescript\nimport fastifySwagger from '@fastify/swagger';\nimport fastifySwaggerUi from '@fastify/swagger-ui';\n\napp.register(fastifySwagger, {\n  openapi: {\n    info: {\n      title: 'My API',\n      version: '1.0.0',\n    },\n  },\n});\n\napp.register(fastifySwaggerUi, {\n  routePrefix: '/docs',\n});\n\n// Schemas are automatically converted to OpenAPI definitions\n```\n\n## Performance Considerations\n\nResponse schemas enable fast-json-stringify for serialization:\n\n```typescript\n// With response schema - uses fast-json-stringify (faster)\napp.get('/users', {\n  schema: {\n    response: {\n      200: {\n        type: 'array',\n        items: { $ref: 'user#' },\n      },\n    },\n  },\n}, handler);\n\n// Without response schema - uses JSON.stringify (slower)\napp.get('/users-slow', handler);\n```\n\nAlways define response schemas for production APIs to benefit from optimized serialization.\n"
