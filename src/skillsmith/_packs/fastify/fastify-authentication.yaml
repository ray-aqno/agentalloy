    \ !== request.user.id && request.user.role !== 'admin') {\n      return reply.code(403).send({\n        error: 'Forbidden',\n        message: 'You do not own this resource',\n      });\n    }\n  };\n});\n\n// Check post ownership\napp.put('/posts/:id', {\n  onRequest: [\n    app.authenticate,\n    app.checkOwnership(async (request) => {\n      const post = await db.posts.findById(request.params.id);\n      return post?.authorId;\n    }),\n  ],\n}, updatePostHandler);\n\n// Alternative: inline check\napp.put('/posts/:id', {\n  onRequest: [app.authenticate],\n}, async (request, reply) => {\n  const post = await db.posts.findById(request.params.id);\n\n  if (!post) {\n    return reply.code(404).send({ error: 'Post not found' });\n  }\n\n  if (post.authorId !== request.user.id && request.user.role !== 'admin') {\n    return reply.code(403).send({ error: 'Forbidden' });\n  }\n\n  return db.posts.update(post.id, request.body);\n});\n```\n\n## Password Hashing\n\nUse secure password hashing with argon2:\n\n```typescript\nimport { hash, verify } from '@node-rs/argon2';\n\nasync function hashPassword(password: string): Promise<string> {\n  return hash(password, {\n    memoryCost: 65536,\n    timeCost: 3,\n    parallelism: 4,\n  });\n}\n\nasync function verifyPassword(hash: string, password: string): Promise<boolean> {\n  return verify(hash, password);\n}\n\napp.post('/register', async (request, reply) => {\n  const { email, password } = request.body;\n\n  const hashedPassword = await hashPassword(password);\n  const user = await db.users.create({\n    email,\n    password: hashedPassword,\n  });\n\n  reply.code(201);\n  return { id: user.id, email: user.email };\n});\n\napp.post('/login', async (request, reply) => {\n  const { email, password } = request.body;\n  const user = await db.users.findByEmail(email);\n\n  if (!user || !(await verifyPassword(user.password, password))) {\n    return reply.code(401).send({ error: 'Invalid credentials' });\n  }\n\n  const token = app.jwt.sign({ id: user.id, role: user.role });\n  return { token };\n});\n```"
