ssage: 'Validation failed',\n      details: error.validation,\n    });\n  }\n\n  // Handle known errors with status codes\n  const statusCode = error.statusCode ?? 500;\n  const code = error.code ?? 'INTERNAL_ERROR';\n\n  // Don't expose internal error details in production\n  const message = statusCode >= 500 && process.env.NODE_ENV === 'production'\n    ? 'Internal Server Error'\n    : error.message;\n\n  return reply.code(statusCode).send({\n    statusCode,\n    error: code,\n    message,\n  });\n});\n```\n\n## Error Response Schema\n\nDefine consistent error response schemas:\n\n```typescript\napp.addSchema({\n  $id: 'httpError',\n  type: 'object',\n  properties: {\n    statusCode: { type: 'integer' },\n    error: { type: 'string' },\n    message: { type: 'string' },\n    details: {\n      type: 'array',\n      items: {\n        type: 'object',\n        properties: {\n          field: { type: 'string' },\n          message: { type: 'string' },\n        },\n      },\n    },\n  },\n  required: ['statusCode', 'error', 'message'],\n});\n\n// Use in route schemas\napp.get('/users/:id', {\n  schema: {\n    params: {\n      type: 'object',\n      properties: { id: { type: 'string' } },\n      required: ['id'],\n    },\n    response: {\n      200: { $ref: 'user#' },\n      404: { $ref: 'httpError#' },\n      500: { $ref: 'httpError#' },\n    },\n  },\n}, handler);\n```\n\n## Reply Helpers with @fastify/sensible\n\nUse `@fastify/sensible` for standard HTTP errors:\n\n```typescript\nimport fastifySensible from '@fastify/sensible';\n\napp.register(fastifySensible);\n\napp.get('/users/:id', async (request, reply) => {\n  const user = await findUser(request.params.id);\n  if (!user) {\n    return reply.notFound('User not found');\n  }\n  if (!hasAccess(request.user, user)) {\n    return reply.forbidden('You cannot access this user');\n  }\n  return user;\n});\n\n// Available methods:\n// reply.badRequest(message?)\n// reply.unauthorized(message?)\n// reply.forbidden(message?