      async fn handle(_m: u64) {}
      ```

      `mpsc::Receiver::recv` is documented as cancellation-safe: dropping the future does not lose a message. `tokio::io::AsyncReadExt::read` is *not* generally cancellation-safe — bytes may have been read into a buffer that is then dropped, leaving partial state. Before placing a future in a `select!`, check the docs for the cancellation-safety note. If the future is not cancellation-safe and you need it in a select, hoist it out: store it in a `tokio::pin!`'d local across loop iterations so dropping is your decision, not the select's.

  - sequence: 9
    fragment_type: guardrail
    content: |
      ## Anti-patterns

      - **Blocking sync code in an async task.** `std::thread::sleep`, `std::fs::read_to_string`, `reqwest::blocking::*`, or any CPU-bound loop inside an async fn stalls the runtime thread, freezing all sibling tasks on it. Use `tokio::time::sleep`, `tokio::fs`, async clients; for unavoidable blocking work, wrap it in `tokio::task::spawn_blocking`.
      - **`std::sync::Mutex` held across `.await`.** Walked above. Either drop the guard first, restructure, or switch to `tokio::sync::Mutex`. Enable `clippy::await_holding_lock`.
      - **Unbounded `tokio::sync::mpsc::unbounded_channel` in production.** No backpressure; producers can OOM the process. Use `mpsc::channel(N)` with a deliberate `N`.
      - **`Arc<Mutex<T>>` everywhere when message passing would be cleaner.** If only one task ever mutates the state, send it commands over an `mpsc::channel` and let that task own the data. No lock, no contention, clearer ownership.
      - **Spawning tasks and ignoring the `JoinHandle`.** Errors panic into the void; you cannot observe completion. At minimum hold the handle; for fan-out, use `tokio::task::JoinSet` or `futures::future::join_all`.
      - **Not pinning long-lived futures in a `select!` loop.** A non-cancellation-safe future re-created each loop iteration silently restarts work whenever a sibling branch wins.
      - **Using `Rc` or `RefCell` in a future you intend to spawn.** Both are `!Send`. The compiler catches it; the fix is `Arc` and a sync primitive (or a `tokio::sync` primitive if held across await).
      - **Calling `block_on` from inside an async context.** Re-entering the runtime deadlocks on tokio. Just `.await` the future.

  - sequence: 10
    fragment_type: verification
    content: |
      ## Verification

      - [ ] `cargo clippy -- -D clippy::await_holding_lock -D warnings` exits 0 — the lint catches `std::sync::MutexGuard` held across `.await`.
      - [ ] `grep -nE 'std::sync::(Mutex|RwLock)' src/` — for each match, manually confirm no `.await` is reachable while a guard from that lock is alive (or the guard is `drop`ped first).
      - [ ] `grep -n 'unbounded_channel' src/` returns no matches in production code paths, or each match has a comment justifying unbounded use.
      - [ ] Every `tokio::spawn(...)` either holds the returned `JoinHandle` and `.await`s it, or feeds it into a `JoinSet` / `join_all`. Inventory with `grep -n 'tokio::spawn' src/`.
      - [ ] Every future used in a `tokio::select!` branch is documented as cancellation-safe in its source, or is held across iterations via `tokio::pin!`. Verify by reading each `select!` block.
      - [ ] Blocking calls in async contexts go through `tokio::task::spawn_blocking`. `grep -nE '(std::thread::sleep|std::fs::|reqwest::blocking)' src/` returns no matches inside `async fn` bodies.
      - [ ] No nested `block_on` calls inside async code; `grep -n 'block_on' src/` results are only in sync entry points or tests.
      - [ ] `Cargo.toml` pins tokio to `tokio = { version = "1", features = [...] }` (verified against tokio 1.x line, 2026-05-05) with explicit features, not `features = ["full"]` in production binaries.
