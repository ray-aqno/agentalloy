raw_prose: |
  # Rust Error Handling

  Rust has no exceptions. Every fallible operation returns `Result<T, E>` and every "maybe absent" value is `Option<T>`. The `?` operator propagates errors up the stack, calling `From::from` on the error along the way so callers see one unified error type. The rule is one sentence: return `Result<T, E>` for fallible work, propagate with `?`, define a typed error enum with `thiserror` for libraries or use `anyhow::Result` for applications, and reserve `panic!`/`unwrap`/`expect` for genuinely unrecoverable programmer errors. Most production Rust error bugs come from `unwrap()` in library code that should have returned a `Result`, swallowed errors via `let _ = ...`, stringly-typed errors that lose programmatic structure, or `Box<dyn Error>` where a typed enum would have served the caller better.

  ## `Result<T, E>` and `Option<T>`

  `Result` and `Option` are stdlib enums; both are in the prelude:

  ```rust
  pub enum Result<T, E> { Ok(T), Err(E) }
  pub enum Option<T>    { Some(T), None }
  ```

  Use `Result` when failure carries information (an io error, a parse error, a domain rule violation). Use `Option` when absence is the only failure mode (a lookup that may miss, the head of a possibly-empty list). Do not encode "not found" as `Result<T, ()>` — that is what `Option<T>` is for. Conversely, do not encode rich failure as `Option<T>` — the caller cannot tell *why* it is `None`.

  Useful `Option` combinators (drawn from std::option):

  - `map(f)` — transform `Some(x)` to `Some(f(x))`, leave `None` alone.
  - `and_then(f)` — chain a fallible step that itself returns `Option`.
  - `ok_or(err)` / `ok_or_else(|| err)` — convert `Option<T>` to `Result<T, E>` so `?` works.
  - `unwrap_or_else(|| default)` — supply a fallback computed lazily.
  - `?` works on `Option` inside a function that returns `Option`, short-circuiting on `None`.

  ```rust
  fn first_admin_email(users: &[User]) -> Option<&str> {
      let admin = users.iter().find(|u| u.is_admin)?;   // None short-circuits
      admin.email.as_deref()                            // Option<&str>
  }
  ```

  ## The `?` operator and `From::from`

  Inside a function returning `Result<_, E>`, the expression `expr?` desugars (per the Rust Reference, operator-expr question-mark) to roughly:

  ```rust
  match expr {
      Ok(v)  => v,
      Err(e) => return Err(From::from(e)),
  }
  ```

  The `From::from(e)` call is the key. If `expr` returns `Result<T, E1>` and the enclosing function returns `Result<_, E2>`, the compiler will accept `expr?` *only if* `E2: From<E1>` is in scope. This is how a single function that calls `std::io`, `serde_json`, and `reqwest` can return one unified error type — implement `From` for each underlying error and `?` does the conversion automatically.

  ```rust
  use std::io;
  use std::num::ParseIntError;

  #[derive(Debug)]
  enum MyError {
      Io(io::Error),
      Parse(ParseIntError),
  }

  impl From<io::Error> for MyError {
      fn from(e: io::Error) -> Self { MyError::Io(e) }
  }
  impl From<ParseIntError> for MyError {
      fn from(e: ParseIntError) -> Self { MyError::Parse(e) }
  }

  fn parse_config(path: &str) -> Result<u32, MyError> {
      let raw = std::fs::read_to_string(path)?;   // io::Error -> MyError via From
      let n: u32 = raw.trim().parse()?;            // ParseIntError -> MyError via From
      Ok(n)
  }
  ```

  Walk this edge case: if you forget the `impl From<ParseIntError> for MyError`, the second `?` fails to compile with `the trait bound MyError: From<ParseIntError> is not satisfied`. The fix is the `From` impl, not `.map_err(MyError::Parse)` at every call site (though `map_err` is the right tool when the conversion is one-off rather than universal).

  ## Typed errors with `thiserror` (libraries)

  `thiserror` (community crate, 1.x — verified 2026-05-05; not stdlib) generates the boilerplate for the pattern above:

  ```rust
  use std::io;
  use std::num::ParseIntError;
  use thiserror::Error;

  #[derive(Debug, Error)]
  pub enum MyError {
      #[error("read failed: {0}")]
      Io(#[from] io::Error),

      #[error("parse failed: {0}")]
      Parse(#[from] ParseIntError),

      #[error("invalid port {0:?}")]
      InvalidPort(String),
  }
  ```

  `#[derive(Error)]` implements `std::error::Error` (including `source()` for chain walking). `#[from]` generates the `From` impl, so `?` works without you writing the conversion. `#[error("...")]` is the `Display` template. Library error types should be enums with one variant per distinct failure mode the caller might want to match on — *not* a single `Other(String)` catch-all that loses structure.

  Add to `Cargo.toml`:

  ```toml
  [dependencies]
  thiserror = "1"
  ```

  ## Opaque application errors with `anyhow`

  When you are writing a binary, not a library, callers do not need to match on your error variants — they just want a stack of context. `anyhow` (community crate, 1.x — verified 2026-05-05; not stdlib) provides `anyhow::Error`, an opaque error type that wraps any `std::error::Error + Send + Sync + 'static` and carries a chain of context strings.

  ```rust
  use anyhow::{Context, Result};

  fn load_config(path: &str) -> Result<Config> {
      let raw = std::fs::read_to_string(path)
          .with_context(|| format!("read config {path}"))?;
      let cfg: Config = toml::from_str(&raw)
          .with_context(|| format!("parse config {path}"))?;
      Ok(cfg)
  }
  ```

  `Result<T>` is `anyhow`'s alias for `Result<T, anyhow::Error>`. `.context(...)` and `.with_context(|| ...)` add a layer to the error chain; the `Display` impl on `anyhow::Error` walks it and prints `context: cause`. Use anyhow in `main.rs`, CLIs, scripts, and integration tests. Do *not* re-export `anyhow::Error` from a library's public API — downstream callers cannot match on its variants.

  Add to `Cargo.toml`:

  ```toml
  [dependencies]
  anyhow = "1"
  ```

  ## `Result::map_err` for one-off context

  When you want to convert one error to another at a single call site (rather than via a blanket `From` impl), use `map_err`:

  ```rust
  // The source ParseIntError is intentionally discarded here — the InvalidPort
  // variant carries the offending value, which is more useful to the caller.
  let parsed: u32 = raw.trim().parse().map_err(|_e| MyError::InvalidPort(raw.trim().to_string()))?;
  ```

  `map_err` preserves the chain structure — the resulting `MyError` still flows through `?` to the caller. Reach for `map_err` when the underlying error type is generic and a blanket `From` would be too broad, or when one variant of your error type is a richer reformulation than the source error.

  ## When `panic!` / `unwrap` / `expect` are appropriate

  `panic!`, `.unwrap()`, and `.expect("...")` abort the current thread (or the process, depending on the panic strategy). They are appropriate for:

  - **Programmer errors that indicate a bug.** `slice[idx]` already panics on out-of-range; do not paper over it with `get(idx).unwrap()` — same effect, more noise.
  - **Tests, examples, and prototypes.** A failing `unwrap()` in a test is a test failure; that is the intent.
  - **Compile-time-known-good values.** `Regex::new(r"^\d+$").expect("hardcoded regex")` — if the literal regex is broken, that is a build-time bug, not a runtime condition.
  - **`main()` in small programs**, where `.unwrap()` is a fine way to surface an error and exit with a stack trace. (`main` returning `Result<(), E>` is better in any program with more than one error path.)

  They are *not* appropriate for:

  - **Library code.** A library that panics on bad input is a library people stop using.
  - **Request handlers, RPC servers, long-lived workers.** A panic kills the worker; the rest of the system has to compensate.
  - **Anywhere the error is recoverable.** If the caller could plausibly retry, ask the user, or fall back to a default — return the error.

  ## Anti-patterns

  - **`unwrap()` in library code.** Returns to the caller as a panic, which they cannot catch with `?`. Return a `Result` and let them decide.
  - **`let _ = fallible_call();`** Discards the error silently. If you genuinely want to ignore it, log first and write a comment explaining why; otherwise propagate with `?`.
  - **`Box<dyn Error>` when a typed error enum would do.** `Box<dyn Error>` is opaque — callers cannot match on variants. Use it only at API boundaries that span unknown error types (rare in well-designed code).
  - **`.unwrap_or_default()` masking real failures.** `parse_int().unwrap_or_default()` silently turns parse failures into `0`, which is almost never what you want in production.
  - **`panic!` inside a `From` impl.** `From::from` is called by `?` everywhere; a panic here turns *every* `?` site into a potential abort. `From` impls must be infallible — if conversion can fail, use `TryFrom` or a real `Result`.
  - **Stringly-typed errors via `String` as the error type.** `Result<T, String>` loses programmatic structure; callers cannot match on variants, only on substring contents. Define a typed error enum or use `anyhow`.
  - **Wrapping the same context twice.** `.context("read config").context("read config")` produces noisy chains. Each layer should add new information.

  ## Verification

  - [ ] `cargo clippy -- -W clippy::unwrap_used -W clippy::expect_used -D warnings` exits 0 in library crates; allowed sites are annotated `#[allow(clippy::unwrap_used)]` with a justification comment.
  - [ ] `grep -n 'unwrap()' src/` results are all in `tests/`, `examples/`, or annotated allow-sites.
  - [ ] `grep -n 'let _ = ' src/` results are all followed by a comment explaining why the error is intentionally discarded.
  - [ ] No public function in a library crate returns `Result<_, String>` or `Result<_, Box<dyn std::error::Error>>` — verifiable by `cargo doc` review or `grep -nE 'Result<.*, (String|Box<dyn)' src/`.
  - [ ] Every `From<X> for MyError` impl is infallible — no `panic!`, `unwrap`, or `expect` inside its body (`grep -A 5 'impl From' src/`).
  - [ ] Library crates depending on `thiserror` do not also re-export `anyhow::Error` in their public API (`grep -n 'anyhow::Error' src/lib.rs`).
  - [ ] `cargo check` passes — confirms every `?` site has a corresponding `From` impl in scope.

