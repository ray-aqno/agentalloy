raw_prose: |
  # Rust Cargo and Features

  Cargo is the package manager, build driver, and publishing tool for Rust. The rule is one sentence: every Rust project is a crate (or a workspace of crates), every crate has a `Cargo.toml` that declares its dependencies and features, and cargo guarantees a single resolved dependency graph by *unifying* features across the graph — so features must be designed to be additive or you will break consumers in ways that are very hard to debug. Most production cargo friction comes from non-additive features (turning something *off* via a feature), wildcard version requirements, ignoring `Cargo.lock` for libraries, and mixing two crates that re-export the same dependency at incompatible major versions.

  ## `Cargo.toml` structure

  A typical manifest:

  ```toml
  [package]
  name = "my_crate"
  version = "0.3.1"
  edition = "2021"
  rust-version = "1.74"

  [dependencies]
  serde = { version = "1.0", features = ["derive"] }
  tokio = { version = "1", features = ["rt-multi-thread", "macros"], optional = true }

  [dev-dependencies]
  proptest = "1"

  [build-dependencies]
  cc = "1"

  [features]
  default = ["std"]
  std = []
  async = ["dep:tokio"]

  [[bin]]
  name = "my_tool"
  path = "src/bin/my_tool.rs"

  [lib]
  name = "my_crate"
  crate-type = ["rlib"]

  [profile.release]
  lto = "thin"
  codegen-units = 1
  ```

  Key tables:

  - **`[package]`** — identity (`name`, `version`), `edition` (the language edition: 2015, 2018, 2021, 2024), and `rust-version` (the minimum supported toolchain — MSRV). Cargo refuses to build with an older toolchain than `rust-version`.
  - **`[dependencies]`** — runtime deps. Each entry is either a version string (`"1.0"`) or a table with `version`, `features`, `optional`, `default-features`, `path`, `git`, etc.
  - **`[dev-dependencies]`** — only built for `cargo test`, `cargo bench`, and examples. NOT seen by downstream consumers. Putting a test-only crate here keeps it out of the dependency graph for everyone who depends on you.
  - **`[build-dependencies]`** — only for `build.rs`.
  - **`[features]`** — feature flags (see below).
  - **`[[bin]]`, `[lib]`** — binary and library targets. `crate-type = ["rlib"]` is the default for libs; `["cdylib"]` for FFI; `["staticlib"]` for static C linking.
  - **`[profile.dev]`, `[profile.release]`, `[profile.test]`, `[profile.bench]`** — compiler tuning per build mode. `[profile.release.package."*"]` overrides apply to all transitive deps.

  ## Feature flags and the unification rule

  Features are named opt-in switches that conditionally compile code. They are declared under `[features]` and consumed via `#[cfg(feature = "foo")]`.

  ```toml
  [features]
  default = ["std", "json"]
  std = []
  json = ["dep:serde_json"]
  full = ["std", "json", "async"]
  async = ["dep:tokio", "tokio?/rt-multi-thread"]
  ```

  Three syntaxes inside the feature value list (verified 2026-05-05 against doc.rust-lang.org/cargo/reference/features.html):

  - `"std"` — enables another feature in this same crate.
  - `"dep:tokio"` — activates an optional dependency (one declared with `optional = true`). Without `dep:`, the feature name and the dep name collide and the dep is implicitly turned into a feature, which leaks the dep name to consumers.
  - `"tokio?/rt-multi-thread"` — if `tokio` is enabled (by some other feature), also enable its `rt-multi-thread` feature. Without the `?`, this would force `tokio` on.

  **The unification rule.** Cargo resolves the dependency graph once for the whole build. If crate A depends on `serde` with `features = ["std"]` and crate B depends on `serde` with `features = ["derive"]`, the resolved set is `{"std", "derive"}` — the union. Features can only be turned *on*, never off. This is why features must be **additive**: enabling a feature can only add behavior, never remove or change existing behavior.

  Example of the failure mode: crate A enables `serde/std`, expecting allocation and the standard library. Crate B is `no_std` and expects `serde` without `std`. They are both in the same build. Cargo unifies, `std` is on, B's `no_std` build breaks at compile time with cryptic errors about missing `core` symbols. A non-additive feature ("turn off allocation") is the bug — there is no way to design around it once shipped.

  Practical rules for feature design:

  1. Features are *additive only*. If you find yourself wanting "feature X turns off Y", redesign — make Y opt-in instead.
  2. Default features should be a sensible baseline. Every consumer who wants a leaner build will pass `default-features = false`.
  3. Document every feature in your README. Consumers cannot guess what `full` enables.
  4. Avoid feature names that look like dep names unless you use `dep:` syntax. `serde = { optional = true }` plus a feature called `serde` is a footgun.

  ## Workspaces

  A workspace is a top-level directory with one `Cargo.toml` containing `[workspace]` and N member crates underneath. All members share a single `Cargo.lock`, a single `target/` directory, and (since Rust 1.64+, verified 2026-05-05) can inherit common metadata from `[workspace.package]` and `[workspace.dependencies]`.

  ```toml
  # ./Cargo.toml at the workspace root
  [workspace]
  resolver = "2"
  members = ["crates/*"]

  [workspace.package]
  version = "0.1.0"
  edition = "2021"
  rust-version = "1.74"
  license = "Apache-2.0"

  [workspace.dependencies]
  serde = { version = "1.0", features = ["derive"] }
  tokio = { version = "1", features = ["rt-multi-thread"] }
  ```

  ```toml
  # ./crates/foo/Cargo.toml
  [package]
  name = "foo"
  version.workspace = true
  edition.workspace = true
  rust-version.workspace = true
  license.workspace = true

  [dependencies]
  serde.workspace = true
  ```

  Why this matters: in a multi-crate repo, you want every crate to use the *same* version of every shared dep, with the *same* features, so the unification rule stays predictable. `[workspace.dependencies]` is the canonical way to enforce that. Without it, drift sneaks in and breaks unification at the worst time.

  `resolver = "2"` is required for the modern feature resolver, which (a) does not unify features between dev-dependencies and normal deps, and (b) does not unify across target-platform-conditional deps. Always use it for new workspaces. Single-crate `2021` and `2024` edition projects get resolver 2 automatically.

  ## Lockfile policy

  `Cargo.lock` records the exact resolved version of every direct and transitive dependency. The historic guidance was "commit it for binaries, ignore it for libraries." Since 2023, the Cargo team's published guidance is to **commit `Cargo.lock` for libraries too** (verified 2026-05-05). Reasons: it makes CI reproducible against a known-good resolution, it lets `cargo audit` and Dependabot operate against a real lockfile, and it does not affect downstream consumers (they ignore your lockfile and produce their own at build time). The only case where ignoring it makes sense is a workspace of pure libraries where every CI run intentionally tests against the latest resolution — and even then, most projects commit it and run a separate "freshest deps" job with `cargo update`.

  Run `cargo update` deliberately, not as a habit. `cargo update -p crate_name` updates a single crate. `cargo update --precise X.Y.Z -p crate_name` pins exactly. CI should NOT run `cargo update` automatically — that defeats the point of having a lockfile.

  ## crates.io, SemVer, and version requirements

  Cargo follows SemVer with one well-known wrinkle: pre-1.0 versions treat the *minor* component as the breaking-change axis. So:

  - `0.2.5 → 0.2.6` is a non-breaking patch.
  - `0.2.5 → 0.3.0` is breaking.
  - `1.2.5 → 1.3.0` is non-breaking; `1.2.5 → 2.0.0` is breaking.

  Version requirements in `Cargo.toml` (verified 2026-05-05 against doc.rust-lang.org/cargo/reference/specifying-dependencies.html):

  - `"1.2.3"` is shorthand for `"^1.2.3"` — the **caret** requirement, the default. Means ">=1.2.3, <2.0.0" for 1.x; means ">=0.2.3, <0.3.0" for 0.2.x; means ">=0.0.3, <0.0.4" for 0.0.x.
  - `"~1.2.3"` — **tilde**: ">=1.2.3, <1.3.0".
  - `"=1.2.3"` — exact pin. Avoid except for tightly-coupled internal crates.
  - `">=1.2, <1.5"` — explicit range.
  - `"*"` — any version. **Crates.io rejects publish of crates with a `*` requirement on a registry dep.** Treat `*` as a bug.

  Publishing flow: bump the version in `Cargo.toml`, write a changelog entry, `cargo publish --dry-run` to check, then `cargo publish`. If you ship a broken release, `cargo yank --version X.Y.Z my_crate` marks it un-resolvable for new builds (existing lockfiles still resolve to it). Yank is not a delete — the tarball stays available so existing users do not break.

  ## Build profiles

  Profiles tune the compiler for different goals.

  ```toml
  [profile.dev]
  opt-level = 0
  debug = true

  [profile.release]
  opt-level = 3
  lto = "thin"          # or "fat" for maximum link-time optimization
  codegen-units = 1     # fewer units = better optimization, slower compile
  panic = "abort"       # smaller binary, no unwinding
  strip = "symbols"

  [profile.release.package."*"]
  opt-level = 3
  ```

  `panic = "abort"` is appropriate for binaries that should crash hard on panics; libraries should not set it because consumers may rely on unwinding. `lto = "thin"` is a good default — significant gains, modest compile-time cost. `codegen-units = 1` plus `lto = "fat"` is the smallest/fastest binary, but compile times grow significantly.

  ## Anti-patterns

  - **Non-additive features.** A feature that turns something *off* (e.g., a `no_std` feature, when the default is `std`). Invert: make `std` opt-in, `default-features = false` is `no_std`. This is the single most common cargo footgun.
  - **`"*"` version requirements.** Bypasses SemVer entirely; crates.io rejects them on publish. Even for path/git deps, `*` is a smell.
  - **Ignoring `Cargo.lock` in libraries.** Modern guidance is to commit it. Reproducible CI matters more than the historic argument that "consumers ignore it anyway."
  - **`cargo update` in CI without intent.** Updates the lockfile every build, defeats reproducibility, hides regressions until production.
  - **Re-exporting a dependency at two incompatible major versions.** If your public API exposes `serde::Serialize`, and a consumer has a different major version of `serde` in scope, type-checking fails with `expected serde::Serialize, found serde::Serialize` (same name, different crate). Pin one major version per public API surface.
  - **Test-only deps in `[dependencies]`.** Bloats the dependency graph for every consumer. Move to `[dev-dependencies]`.
  - **Hand-editing `Cargo.lock`.** Use `cargo update --precise` instead.
  - **Mixing `optional = true` deps without `dep:` feature syntax.** Implicitly creates a feature with the same name as the dep, which leaks dep names into your public feature surface and makes them impossible to rename.
  - **`default = ["full"]` where `full` is a kitchen-sink alias.** Forces every consumer to compile every feature. Default to a small set; let consumers opt in.
  - **Workspace members with drifting dep versions.** Same crate at two versions inside one workspace defeats unification. Use `[workspace.dependencies]` and `serde.workspace = true`.

  ## Verification

  - [ ] `cargo build` and `cargo test` both succeed; `cargo build --no-default-features` also succeeds (proves `default` is not load-bearing for compile correctness).
  - [ ] `grep -nE '"\*"' Cargo.toml` returns no matches (no wildcard version requirements).
  - [ ] `cargo tree --duplicates` reports no unintended duplicate crate versions; any duplicates listed are documented in a `DEPENDENCIES.md` or commit message.
  - [ ] `Cargo.lock` is committed (run `git ls-files Cargo.lock` and confirm output non-empty).
  - [ ] `cargo deny check` (or `cargo audit`) exits 0; advisories and license violations are addressed before merge.
  - [ ] Every optional dependency is gated by a feature using `dep:` syntax (`grep -nE 'dep:' Cargo.toml` non-empty when `optional = true` is present).
  - [ ] `cargo publish --dry-run` succeeds for any crate intended for crates.io.
  - [ ] Workspaces use `resolver = "2"` (`grep -n 'resolver' Cargo.toml` shows `"2"`).
  - [ ] Workspace members consume shared deps via `serde.workspace = true` style inheritance; no duplicated version strings across member manifests.
  - [ ] No feature *removes* behavior — review every feature's `#[cfg(feature = ...)]` blocks; each must only add code paths.

