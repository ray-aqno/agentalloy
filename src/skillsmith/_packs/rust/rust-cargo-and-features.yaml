      - [ ] Every optional dependency is gated by a feature using `dep:` syntax (`grep -nE 'dep:' Cargo.toml` non-empty when `optional = true` is present).
      - [ ] `cargo publish --dry-run` succeeds for any crate intended for crates.io.
      - [ ] Workspaces use `resolver = "2"` (`grep -n 'resolver' Cargo.toml` shows `"2"`).
      - [ ] Workspace members consume shared deps via `serde.workspace = true` style inheritance; no duplicated version strings across member manifests.
      - [ ] No feature *removes* behavior — review every feature's `#[cfg(feature = ...)]` blocks; each must only add code paths.
