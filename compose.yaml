# AgentAlloy container stack (one stack, every host, CPU-only inference).
# Works with both `podman compose up` (project preference) and `docker compose up`.
#
# GPU acceleration is intentionally out of scope here — pick the native install
# if you want NVIDIA CUDA, AMD ROCm, or Apple Metal. Containers run on CPU.
#
# What this gives you:
#   - agentalloy service on http://localhost:47950  (THE ONLY external surface)
#   - Ollama sidecar running qwen3-embedding:0.6b on the internal compose
#     network; not published to the host
#   - The model is auto-pulled on first start by the `ollama-pull` init service
#   - Database schemas are initialized on first start by the `agentalloy-init` service
#   - Persistent named volumes for corpus data and Ollama models
#
# Usage:
#   podman compose up -d
#   podman compose logs -f agentalloy
#   curl http://localhost:47950/health
#
# After first start, install skill packs:
#   podman exec agentalloy uv run agentalloy install-packs
#
# To inspect / back up corpus data:
#   podman volume inspect agentalloy-data
#
# To run on Docker:  docker compose up -d  (drop-in compatible)

services:
  ollama:
    image: docker.io/ollama/ollama:latest
    container_name: agentalloy-ollama
    volumes:
      - ollama-models:/root/.ollama
    # No `ports:` block — Ollama is reachable only from inside the compose
    # network at http://ollama:11434. The agentalloy service is the only
    # externally-published surface (47950 below).
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 5s
    restart: unless-stopped

  ollama-pull:
    # One-shot init service: pulls the embedding model then exits.
    # Skipped on subsequent runs because the model is cached in the ollama-models volume.
    image: docker.io/ollama/ollama:latest
    container_name: agentalloy-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: "ollama:11434"
    entrypoint: ["sh", "-c", "ollama pull qwen3-embedding:0.6b"]
    restart: "no"

  agentalloy-init:
    # One-shot init service: runs DB schema migrations then exits.
    # Idempotent — safe to re-run; no-ops if schemas already exist.
    build:
      context: .
      dockerfile: Containerfile
    image: agentalloy:local
    container_name: agentalloy-init
    environment:
      LADYBUG_DB_PATH: "/app/data/ladybug"
      DUCKDB_PATH: "/app/data/skills.duck"
    volumes:
      - agentalloy-data:/app/data
    entrypoint: ["uv", "run", "python", "-m", "agentalloy.migrate"]
    restart: "no"

  agentalloy:
    build:
      context: .
      dockerfile: Containerfile
    image: agentalloy:local
    container_name: agentalloy
    depends_on:
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
      agentalloy-init:
        condition: service_completed_successfully
    environment:
      RUNTIME_EMBED_BASE_URL: "http://ollama:11434"
      RUNTIME_EMBEDDING_MODEL: "qwen3-embedding:0.6b"
      EMBEDDING_PROVIDER: "openai_compat"
      LADYBUG_DB_PATH: "/app/data/ladybug"
      DUCKDB_PATH: "/app/data/skills.duck"
      LOG_LEVEL: "INFO"
    volumes:
      - agentalloy-data:/app/data
    ports:
      - "47950:47950"  # To change host port, edit this line.
    healthcheck:
      # curl is installed in the image (see Containerfile). Avoids the
      # python -c argv-escaping quirks some podman/docker versions have
      # with semicolon-separated statements in the JSON array form.
      test: ["CMD", "curl", "-fsS", "--max-time", "3", "http://127.0.0.1:47950/health"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5
    restart: unless-stopped

volumes:
  ollama-models:
    name: agentalloy-ollama-models
  agentalloy-data:
    name: agentalloy-data
