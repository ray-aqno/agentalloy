# Compose stack for Skillsmith (cpu / apple-silicon / nvidia presets).
# Works with both `podman compose up` (project preference) and `docker compose up`.
#
# For AMD Radeon dGPU or iGPU (LM Studio Vulkan backend), use compose.radeon.yaml instead.
#
# What this gives you:
#   - skillsmith service on http://localhost:8000 with the pre-seeded corpus
#   - Ollama running qwen3-embedding:0.6b on http://localhost:11434
#   - The model is auto-pulled on first start by the `ollama-pull` init service
#   - Persistent volumes for the corpus (./data on host) and Ollama models
#
# Usage:
#   podman compose up -d
#   podman compose logs -f skillsmith
#   curl http://localhost:8000/health
#
# To run on Docker:  docker compose up -d  (drop-in compatible)

services:
  ollama:
    image: docker.io/ollama/ollama:latest
    container_name: skillsmith-ollama
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 5s
    restart: unless-stopped

  ollama-pull:
    # One-shot init service: pulls the embedding model then exits.
    # Skipped on subsequent runs because the model is cached in the ollama-models volume.
    image: docker.io/ollama/ollama:latest
    container_name: skillsmith-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: "ollama:11434"
    entrypoint: ["sh", "-c", "ollama pull qwen3-embedding:0.6b"]
    restart: "no"

  skillsmith:
    build:
      context: .
      dockerfile: Containerfile
    image: skillsmith:local
    container_name: skillsmith
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
    environment:
      RUNTIME_EMBED_BASE_URL: "http://ollama:11434"
      RUNTIME_EMBEDDING_MODEL: "qwen3-embedding:0.6b"
      LADYBUG_DB_PATH: "/app/data/ladybug"
      DUCKDB_PATH: "/app/data/skills.duck"
      LOG_LEVEL: "INFO"
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=3); sys.exit(0 if r.status==200 else 1)"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

volumes:
  ollama-models:
    name: skillsmith-ollama-models
