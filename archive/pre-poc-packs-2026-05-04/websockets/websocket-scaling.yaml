raw_prose: |
  # WebSocket Scaling

  ## Overview

  Single-node WebSocket works until traffic outgrows one process. Then four problems show up at once: messages don't fan out across nodes, polling fallback breaks behind a load balancer, auth handshakes get bypassed, and connections silently rot when networks blip.

  This skill covers the four patterns that fix them: **Redis pub/sub fan-out**, **sticky sessions**, **auth on the WebSocket upgrade**, and **heartbeat + reconnection with backoff**.

  Library landscape (verified 2026-04-28):

  - `ws@8.20.x` — raw WebSocket, no protocol overhead, you build the framing semantics.
  - `socket.io@4.8.x` — high-level: rooms, namespaces, polling fallback, auto-reconnect. Pairs with `@socket.io/redis-adapter@7.x` (requires socket.io 4.3.1+).
  - `uWebSockets.js` — extreme throughput, lower-level than Socket.IO; use when `ws` isn't fast enough.
  - **Bun** native `Bun.serve({ websocket })` — production-grade in Bun ≥1.0; competitive with uWebSockets.js.

  ## When to use

  - Adding a second WebSocket node behind a load balancer.
  - Diagnosing "messages drop sometimes" or "polling fallback fails".
  - Reviewing auth on the WebSocket handshake (the most common security gap).
  - Building robust client reconnection that doesn't thunder-herd a recovering server.

  ## Authoritative sources (verified 2026-04-28)

  - Socket.IO multiple nodes: https://socket.io/docs/v4/using-multiple-nodes/
  - Socket.IO Redis adapter: https://socket.io/docs/v4/redis-adapter/
  - `ws` README: https://github.com/websockets/ws
  - OWASP WebSocket cheat sheet: https://cheatsheetseries.owasp.org/cheatsheets/WebSocket_Cheat_Sheet.html

