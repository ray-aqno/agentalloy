  fragment_type: example
  content: "## Human Evaluation Frameworks\n\n### Annotation Guidelines\n\n```python\nfrom dataclasses import dataclass, field\nfrom typing import Optional\n\n@dataclass\nclass AnnotationTask:\n    \"\"\"Structure for human annotation task.\"\"\"\n    response: str\n    question: str\n    context: Optional[str] = None\n\n    def get_annotation_form(self) -> dict:\n        return {\n            \"question\": self.question,\n            \"context\": self.context,\n            \"response\": self.response,\n            \"ratings\": {\n                \"accuracy\": {\n                    \"scale\": \"1-5\",\n                    \"description\": \"Is the response factually correct?\"\n                },\n                \"relevance\": {\n                    \"scale\": \"1-5\",\n                    \"description\": \"Does it answer the question?\"\n                },\n                \"coherence\": {\n                    \"scale\": \"1-5\",\n                    \"description\": \"Is it logically consistent?\"\n                }\n            },\n            \"issues\": {\n                \"factual_error\": False,\n                \"hallucination\": False,\n                \"off_topic\": False,\n                \"unsafe_content\": False\n            },\n            \"feedback\": \"\"\n        }\n```\n\n### Inter-Rater Agreement\n\n```python\nfrom sklearn.metrics import cohen_kappa_score\n\ndef calculate_agreement(\n    rater1_scores: list[int],\n    rater2_scores: list[int]\n) -> dict:\n    \"\"\"Calculate inter-rater agreement.\"\"\"\n    kappa = cohen_kappa_score(rater1_scores, rater2_scores)\n\n    if kappa < 0:\n        interpretation = \"Poor\"\n    elif kappa < 0.2:\n        interpretation = \"Slight\"\n    elif kappa < 0.4:\n        interpretation = \"Fair\"\n    elif kappa < 0.6:\n        interpretation = \"Moderate\"\n    elif kappa < 0.8:\n        interpretation = \"Substantial\"\n    else:\n        interpretation = \"Almost Perfect\"\n\n    return {\n        \"kappa\": kappa,\n        \"interpretation\": interpretation\n    }\n```"
- sequence: 9
  fragment_type: example
  content: "## A/B Testing\n\n### Statistical Testing Framework\n\n```python\nfrom scipy import stats\nimport numpy as np\nfrom dataclasses import dataclass, field\n\n@dataclass\nclass ABTest:\n    variant_a_name: str = \"A\"\n    variant_b_name: str = \"B\"\n    variant_a_scores: list[float] = field(default_factory=list)\n    variant_b_scores: list[float] = field(default_factory=list)\n\n    def add_result(self, variant: str, score: float):\n        \"\"\"Add evaluation result for a variant.\"\"\"\n        if variant == \"A\":\n            self.variant_a_scores.append(score)\n        else:\n            self.variant_b_scores.append(score)\n\n    def analyze(self, alpha: float = 0.05) -> dict:\n        \"\"\"Perform statistical analysis.\"\"\"\n        a_scores = np.array(self.variant_a_scores)\n        b_scores = np.array(self.variant_b_scores)\n\n        # T-test\n        t_stat, p_value = stats.ttest_ind(a_scores, b_scores)\n\n        # Effect size (Cohen's d)\n        pooled_std = np.sqrt((np.std(a_scores)**2 + np.std(b_scores)**2) / 2)\n        cohens_d = (np.mean(b_scores) - np.mean(a_scores)) / pooled_std\n\n        return {\n            \"variant_a_mean\": np.mean(a_scores),\n            \"variant_b_mean\": np.mean(b_scores),\n            \"difference\": np.mean(b_scores) - np.mean(a_scores),\n            \"relative_improvement\": (np.mean(b_scores) - np.mean(a_scores)) / np.mean(a_scores),\n            \"p_value\": p_value,\n            \"statistically_significant\": p_value < alpha,\n            \"cohens_d\": cohens_d,\n            \"effect_size\": self._interpret_cohens_d(cohens_d),\n            \"winner\": self.variant_b_name if np.mean(b_scores) > np.mean(a_scores) else self.variant_a_name\n        }\n\n    @staticmethod\n    def _interpret_cohens_d(d: float) -> str:\n        \"\"\"Interpret Cohen's d effect size.\"\"\"\n        abs_d = abs(d)\n        if abs_d < 0.2:\n            return \"negligible\"\n        elif abs_d < 0.5:\n            return \"small\"\n        elif abs_d < 0.8:\n            return \"medium\"\n        else:\n            return \"large\"\n```"
