raw_prose: '# Prompt Engineering Patterns


  Maximize LLM performance, reliability, and controllability in production: structured outputs, few-shot, chain-of-thought, role-based system prompts, error recovery, prompt caching.


  ## When to Use


  - Designing complex prompts for production LLM applications

  - Optimizing prompt performance and consistency

  - Implementing structured reasoning (CoT, tree-of-thought, self-consistency)

  - Few-shot systems with dynamic example selection

  - Reusable templates with variable interpolation

  - Debugging inconsistent outputs

  - System prompts for specialized AI assistants

  - Structured outputs (JSON mode) for reliable parsing

  - RAG integration with citation-style answers


  ## Core Patterns


  Structured output (Pydantic), chain-of-thought with self-verification, self-consistency (sample N reasoning paths, take majority), few-shot with semantic selector, progressive disclosure, error recovery with fallback, role-based system prompts, prompt caching (90%+ token reduction).


  ## Token Efficiency


  Verbose prompts ("I would like you to please take...") waste budget without quality gain. Concise prompts ("Summarize:") match accuracy at fraction of tokens.


  ## RAG Integration


  Provide retrieved context, instruct citation notation `[1], [2]`, instruct refusal when context is insufficient. Validate cited passages against retrieved set.


  ## Best Practices


  Be specific. Show don''t tell. Structured outputs. Test extensively. Iterate rapidly. Monitor in production. Version control. Document intent.


  ## Common Pitfalls


  Over-engineering, example pollution, context overflow, ambiguous instructions, ignoring edge cases, no error handling, hardcoded values.


  ## Success Metrics


  Accuracy, consistency, latency (P50/P95/P99), token usage, success rate (parseable outputs), user satisfaction.'
fragments:
- sequence: 1
  fragment_type: rationale
  content: '# Why Prompt Engineering Matters


    LLM behavior in production is determined by three layers: model weights, decoding parameters, and the prompt. Of those three, the prompt is the only one a typical application can change. Treating prompts as code — versioned, regression-tested, A/B tested in production — is the difference between an LLM feature that improves over time and one that drifts unpredictably with every model update.


    **Why specificity beats vagueness.** A vague prompt ("be helpful, summarize this") gives the model multiple plausible interpretations; the model picks one stochastically. A specific prompt ("Summarize in exactly 3 bullets, each under 15 words, focusing on findings, conclusions, implications") collapses the response distribution. Specificity is how you trade away creativity in exchange for consistency — usually the right trade in production.


    **Why structured outputs reduce downstream brittleness.** When a prompt returns free-form prose, every consumer must parse it with regex or a follow-up LLM call. When the same prompt returns Pydantic-validated JSON, consumers get type safety, schema-aware error handling, and a contract that survives prompt revisions. Structured outputs are infrastructure, not a nice-to-have.


    **Why prompts as code.** Prompts that are checked in, code-reviewed, regression-tested against fixtures, and rolled out behind feature flags fail predictably and recoverably. Prompts edited live in admin UIs fail silently and irreversibly — no diff log, no rollback, no audit trail. The same engineering hygiene that applies to code applies to prompts.


    **Core principle:** Be specific, show don''t tell, enforce structure, measure performance.'
