raw_prose: "# Authentication & Authorization Implementation Patterns\n\nBuild secure, scalable authentication and authorization systems using industry-standard patterns and modern best practices.\n\n## When to Use This Skill\n\n- Implementing user authentication systems\n- Securing REST or GraphQL APIs\n- Adding OAuth2/social login\n- Implementing role-based access control (RBAC)\n- Designing session management\n- Migrating authentication systems\n- Debugging auth issues\n- Implementing SSO or multi-tenancy\n\n## Core Concepts\n\n### 1. Authentication vs Authorization\n\n**Authentication (AuthN)**: Who are you? Verify identity (username/password, OAuth, biometrics), issue credentials (sessions, tokens), manage login/logout.\n\n**Authorization (AuthZ)**: What can you do? Permission checking, role-based access control (RBAC), resource ownership validation, policy enforcement.\n\n### 2. Authentication Strategies\n\n**Session-Based:** Server stores session state, session ID in cookie, traditional, simple, stateful.\n\n**Token-Based (JWT):** Stateless, self-contained, scales horizontally, can store claims.\n\n**OAuth2/OpenID Connect:** Delegate authentication, social login (Google, GitHub), enterprise SSO.\n\n## JWT Authentication\n\n### Pattern: JWT with access + refresh tokens\n\n```typescript\nfunction generateTokens(userId: string, email: string, role: string) {\n  const accessToken = jwt.sign({ userId, email, role }, process.env.JWT_SECRET!, { expiresIn: \"15m\" });\n  const refreshToken = jwt.sign({ userId }, process.env.JWT_REFRESH_SECRET!, { expiresIn: \"7d\" });\n  return { accessToken, refreshToken };\n}\n\nfunction verifyToken(token: string): JWTPayload {\n  try {\n    return jwt.verify(token, process.env.JWT_SECRET!) as JWTPayload;\n  } catch (error) {\n    if (error instanceof jwt.TokenExpiredError) throw new Error(\"Token expired\");\n    if (error instanceof jwt.JsonWebTokenError) throw new Error(\"Invalid token\");\n    throw error;\n  }\n}\n\nfunction authenticate(req, res, next) {\n  const authHeader = req.headers.authorization;\n  if (!authHeader?.startsWith(\"Bearer \")) return res.status(401).json({ error: \"No token provided\" });\n  const token = authHeader.substring(7);\n  try {\n    req.user = verifyToken(token);\n    next();\n  } catch (error) {\n    return res.status(401).json({ error: \"Invalid token\" });\n  }\n}\n```\n\n### Pattern: Refresh token flow\n\nStore refresh tokens hashed in DB with expiry. On refresh, verify token, lookup in DB, issue new access token. On logout, delete from DB. To logout all devices, delete all tokens for user.\n\n## Session-Based Authentication\n\nUse express-session with Redis store. Cookie config: `secure: true` in production, `httpOnly: true`, `sameSite: 'strict'` for CSRF, 24h `maxAge`. Session middleware checks `req.session.userId` and rejects unauthenticated. Logout calls `req.session.destroy` and clears cookie.\n\n## OAuth2 / Social Login\n\nUse Passport.js with provider strategies (`passport-google-oauth20`, `passport-github2`). Strategy callback: find or create user from profile, link by provider ID. Callback route: generate JWT, redirect to frontend with token in query string.\n\n## Authorization Patterns\n\n### Pattern 1: Role-Based Access Control (RBAC)\n\nDefine a role hierarchy (`Role.ADMIN` includes `MODERATOR` and `USER`). Middleware `requireRole(...roles)` checks `hasRole(req.user.role, requiredRole)` against the hierarchy and returns 403 if insufficient.\n\n### Pattern 2: Permission-Based Access Control\n\nDefine permissions (`READ_USERS`, `WRITE_POSTS`, etc.) and a `rolePermissions` map. Middleware `requirePermission(...permissions)` checks every required permission against the user's role's permissions.\n\n### Pattern 3: Resource Ownership\n\nMiddleware `requireOwnership(resourceType, idParam)` looks up the resource, allows admins, otherwise compares `resource.userId` to `req.user.userId`.\n\n## Security Best Practices\n\n### Password Security\n\nValidate with zod (12+ chars, upper/lower/digit/special). Hash with bcrypt at saltRounds=12. Never store plain. Use `bcrypt.compare` for verification.\n\n### Rate Limiting\n\nUse `express-rate-limit` with Redis store. Login limiter: 5 attempts per 15 minutes. API limiter: 100 requests per minute. Prevents brute force.\n\n## Best Practices\n\n1. Never Store Plain Passwords — always hash with bcrypt/argon2\n2. Use HTTPS — encrypt data in transit\n3. Short-Lived Access Tokens — 15-30 minutes max\n4. Secure Cookies — httpOnly, secure, sameSite flags\n5. Validate All Input — email format, password strength\n6. Rate Limit Auth Endpoints — prevent brute force\n7. Implement CSRF Protection — for session-based auth\n8. Rotate Secrets Regularly — JWT secrets, session secrets\n9. Log Security Events — login attempts, failed auth\n10. Use MFA When Possible — extra security layer\n\n## Common Pitfalls\n\n- **Weak Passwords**: Enforce strong password policies\n- **JWT in localStorage**: Vulnerable to XSS, use httpOnly cookies\n- **No Token Expiration**: Tokens should expire\n- **Client-Side Auth Checks Only**: Always validate server-side\n- **Insecure Password Reset**: Use secure tokens with expiration\n- **No Rate Limiting**: Vulnerable to brute force\n- **Trusting Client Data**: Always validate on server"
