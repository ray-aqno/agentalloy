raw_prose: '# Database Migration


  Master database schema and data migrations across ORMs (Sequelize, TypeORM, Prisma), including rollback strategies and zero-downtime deployments.


  ## When to Use


  - Migrating between different ORMs

  - Performing schema transformations

  - Moving data between databases

  - Implementing rollback procedures

  - Zero-downtime deployments

  - Database version upgrades

  - Data model refactoring


  ## ORM Migrations


  - **Sequelize** — `up`/`down` exports with `queryInterface.createTable`, `addColumn`, `removeColumn`. Run with `sequelize-cli db:migrate`.

  - **TypeORM** — class implementing `MigrationInterface` with `up(queryRunner)` and `down(queryRunner)`. Run with `npm run typeorm migration:run`.

  - **Prisma** — declarative `schema.prisma` model. Generate with `prisma migrate dev --name <name>`, deploy with `prisma migrate deploy`.


  ## Schema Transformations


  - **Adding columns with defaults** — safe; default fills existing rows

  - **Renaming columns (zero-downtime)** — three deploys: add new col + copy data, switch app to new col, drop old col

  - **Changing column types** — add new typed col, transform-copy, drop old, rename new


  ## Data Transformations


  Iterate rows in app code (Sequelize raw query → loop → UPDATE), drop the old column at the end. Down migration reconstructs original column from split fields.


  ## Rollback Strategies


  - **Transaction-based** — wrap migration in `sequelize.transaction()`, rollback on error

  - **Checkpoint-based** — `CREATE TABLE users_backup AS SELECT * FROM users`, verify, restore from backup on failure


  ## Zero-Downtime Migrations


  Blue-green strategy: backward-compatible changes deployed in phases — add new column, double-write, backfill, switch reads, remove old column.


  ## Cross-Database Migrations


  Detect dialect (`queryInterface.sequelize.getDialect()`) and branch — Postgres uses JSONB, MySQL uses JSON, etc.'
