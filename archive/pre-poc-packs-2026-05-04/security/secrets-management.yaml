raw_prose: '# Secrets Management


  Secure secrets handling for CI/CD pipelines and production systems: storage, retrieval, rotation, scanning.


  ## When to Use


  - Storing API keys and credentials

  - Managing database passwords

  - Handling TLS certificates

  - Rotating secrets automatically

  - Implementing least-privilege access in CI/CD


  ## Tool Landscape


  - **HashiCorp Vault** — centralized, dynamic secrets, audit log, fine-grained ACL

  - **AWS Secrets Manager** — AWS-native, automatic rotation, RDS integration

  - **Azure Key Vault** — HSM-backed, certificate management, RBAC

  - **Google Secret Manager** — GCP-native, versioning, IAM integration

  - **GitHub Actions secrets** — repo or environment scope, masked in logs

  - **GitLab CI variables** — protected (protected branches only) and masked variants


  ## Core Practices


  1. Never commit secrets to Git

  2. Use different secrets per environment

  3. Rotate secrets regularly

  4. Implement least-privilege access

  5. Enable audit logging

  6. Use secret scanning (GitGuardian, TruffleHog) — pre-commit hook + CI gate

  7. Mask secrets in logs (`echo "::add-mask::$SECRET"` in GitHub Actions)

  8. Encrypt secrets at rest

  9. Use short-lived tokens when possible

  10. Document secret requirements


  ## Vault Integration


  Store secrets in `secret/data/<path>`. Retrieve in CI via `hashicorp/vault-action` (GitHub) or `vault kv get` (GitLab). Use Kubernetes auth for in-cluster workloads.


  External Secrets Operator syncs Vault → Kubernetes Secrets with `refreshInterval: 1h`. Keeps Vault as source of truth without burdening apps with Vault clients.


  ## Secret Rotation


  Automated (AWS): Lambda triggers on schedule → reads current secret → generates new password → updates DB → updates Secrets Manager. Apps re-fetch via SDK with caching.


  Manual rotation process:

  1. Generate new secret

  2. Update secret in store

  3. Update applications to use new secret

  4. Verify functionality

  5. Revoke old secret


  ## Secret Scanning


  Pre-commit hook (TruffleHog) blocks commits with detected secrets. CI gate runs scanner on every push. `allow_failure: false` so detected secrets fail the build.


  ## Anti-Patterns


  - Hardcoded secrets in code or config

  - Same secret across environments

  - Long-lived static credentials

  - Secrets in commit history (rotate immediately if found, history rewrite alone is insufficient)

  - Logs containing secret values (mask before printing)'
fragments:
- sequence: 1
  fragment_type: rationale
  content: '# Secrets Management — Why It Matters


    Hardcoded or shared secrets create unbounded blast radius. A single leaked database password or API key exposes every environment that reuses it: dev, staging, production, every developer laptop with a checkout, every CI runner that ever printed it to a log. Recovery is not just "rotate the credential" — it is auditing every system the secret touched, every log retention window it might still live in, and every downstream service that cached it.


    The defensive posture rests on four interlocking controls, each containing a different failure mode:


    - **Per-environment separation.** Different secrets per env means a staging compromise does not become a production compromise. Reuse collapses the blast radius into a single sphere.

    - **Rotation.** Secrets discovered in commit history, leaked logs, or departing-employee laptops are only as dangerous as their remaining lifetime. Short-lived tokens and scheduled rotation cap exposure even when leaks go undetected.

    - **Log masking.** CI logs are widely readable, often archived for years, and frequently exfiltrated by build tooling. Masking (`::add-mask::` in GitHub Actions, masked variables in GitLab) keeps a printed secret from becoming a permanent liability.

    - **Audit logging.** When a leak is suspected, the question is "who accessed this secret, from where, when?" Vault and AWS Secrets Manager record every read; without those logs, forensic scope is unbounded.


    Treat secrets as radioactive. Storage, retrieval, rotation, and scanning are all containment — none is optional.'
