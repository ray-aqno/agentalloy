- sequence: 3
  fragment_type: setup
  content: '## Tool Landscape — Picking a Secret Store


    | Tool | Strengths |

    |---|---|

    | HashiCorp Vault | Centralized, dynamic secrets, audit log, fine-grained ACL |

    | AWS Secrets Manager | AWS-native, automatic rotation, RDS integration |

    | Azure Key Vault | HSM-backed keys, certificate management, RBAC |

    | Google Secret Manager | GCP-native, versioning, IAM integration |

    | GitHub Actions secrets | Repo or environment scope, masked in logs |

    | GitLab CI variables | Protected (protected branches), masked, file type |


    Pick by environment. Use Vault for multi-cloud or on-prem; cloud-native managers when you are single-cloud. Native CI variables (GitHub/GitLab) are appropriate for CI-only secrets that never leave the runner; promote anything an application reads at runtime to a real secret store.'
- sequence: 4
  fragment_type: example
  content: '## Vault — Local Setup and Storage


    Bring up a dev server, point the CLI at it, enable the kv-v2 engine, and write a secret:


    ```bash

    # Start Vault dev server (in-memory, root token printed to stdout)

    vault server -dev


    # In another shell, point the CLI at it

    export VAULT_ADDR=''http://127.0.0.1:8200''

    export VAULT_TOKEN=''root''


    # Enable kv-v2 secrets engine at path "secret/"

    vault secrets enable -path=secret kv-v2


    # Store a secret

    vault kv put secret/database/config username=admin password=secret


    # Read it back

    vault kv get secret/database/config

    vault kv get -field=password secret/database/config

    ```


    Dev mode is for local only — data lives in memory, the root token is printed to logs, and TLS is disabled. Production deployments need Raft or Consul storage, TLS, sealed initialization, and Kubernetes/AWS auth methods rather than root tokens.'
- sequence: 5
  fragment_type: example
  content: "## Vault in CI/CD\n\n**GitHub Actions:**\n```yaml\n- name: Import Secrets from Vault\n  uses: hashicorp/vault-action@v2\n  with:\n    url: https://vault.example.com:8200\n    token: ${{ secrets.VAULT_TOKEN }}\n    secrets: |\n      secret/data/database username | DB_USERNAME ;\n      secret/data/database password | DB_PASSWORD ;\n      secret/data/api key | API_KEY\n```\n\n**GitLab CI:**\n```yaml\ndeploy:\n  image: vault:latest\n  before_script:\n    - export VAULT_ADDR=https://vault.example.com:8200\n  script:\n    - DB_PASSWORD=$(vault kv get -field=password secret/database/config)\n```\n\n**External Secrets Operator** syncs Vault to Kubernetes Secrets:\n```yaml\napiVersion: external-secrets.io/v1beta1\nkind: ExternalSecret\nspec:\n  refreshInterval: 1h\n  secretStoreRef:\n    name: vault-backend\n  target:\n    name: database-credentials\n  data:\n    - secretKey: password\n      remoteRef:\n        key: database/config\n        property: password\n```"
- sequence: 6
  fragment_type: example
  content: "## AWS Secrets Manager — Retrieve in GitHub Actions\n\nConfigure AWS credentials, fetch the secret, mask it in the log stream, then promote it to the job environment:\n\n```yaml\n- name: Configure AWS credentials\n  uses: aws-actions/configure-aws-credentials@v4\n  with:\n    aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}\n    aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}\n    aws-region: us-west-2\n\n- name: Get secret from AWS\n  run: |\n    SECRET=$(aws secretsmanager get-secret-value \\\n      --secret-id production/database/password \\\n      --query SecretString \\\n      --output text)\n    echo \"::add-mask::$SECRET\"\n    echo \"DB_PASSWORD=$SECRET\" >> $GITHUB_ENV\n\n- name: Use secret\n  run: ./deploy.sh\n```\n\nThe `::add-mask::` directive must run before any later step prints the value; once masked, GitHub redacts the literal substring everywhere in the log. Prefer OIDC-federated roles over long-lived `AWS_ACCESS_KEY_ID` where supported — the static keys above are themselves a secret that needs the same protection."
- sequence: 7
  fragment_type: example
  content: "## Native CI Secrets — GitHub and GitLab\n\n**GitHub Actions** — repo-scoped or environment-scoped secrets, set in the UI or via `gh secret set`. Environment scope gates secrets behind required reviewers and branch protection:\n\n```yaml\njobs:\n  deploy:\n    runs-on: ubuntu-latest\n    environment: production   # gates on environment protection rules\n    steps:\n      - name: Deploy\n        run: ./deploy.sh\n        env:\n          API_KEY: ${{ secrets.PROD_API_KEY }}\n          DATABASE_URL: ${{ secrets.DATABASE_URL }}\n```\n\nSecret values are auto-masked in logs. Never `echo` them; pass via `env:` so the runner injects them into the process environment without printing.\n\n**GitLab CI** — project or group variables with two flags that matter:\n\n- **Protected** — exposed only on protected branches/tags. Required for production credentials so feature branches cannot exfiltrate them.\n- **Masked** — value is redacted from job logs. GitLab refuses to mask values that fail its character/length rules; if a real secret cannot be masked, regenerate it.\n\n```yaml\ndeploy:\n  only:\n    - main          # protected branch\n  script:\n    - ./deploy.sh   # $API_KEY, $DATABASE_URL injected from masked+protected variables\n```\n\nUse the **File** variable type for multi-line secrets (TLS keys, kubeconfigs) — GitLab writes them to a temp file and exposes the path, avoiding shell-escaping pitfalls."
- sequence: 8
  fragment_type: execution
  content: "## Secret Rotation\n\n**Automated (AWS):** Lambda triggers on schedule, reads the current secret to preserve fields you are not rotating, generates a new password, updates the database, then writes the new value back to Secrets Manager. Apps re-fetch via SDK with caching.\n\n```python\nimport boto3\nimport json\n\ndef lambda_handler(event, context):\n    client = boto3.client('secretsmanager')\n\n    # Read current secret to preserve username and other fields\n    response = client.get_secret_value(SecretId='my-secret')\n    current = json.loads(response['SecretString'])\n\n    # Generate new password and update the database first\n    new_password = generate_strong_password()\n    update_database_password(new_password)\n\n    # Write new secret value, preserving non-rotated fields\n    client.put_secret_value(\n        SecretId='my-secret',\n        SecretString=json.dumps({\n            'username': current['username'],\n            'password': new_password,\n        }),\n    )\n    return {'statusCode': 200}\n```\n\nAlways update the downstream system (DB) before writing the new secret value, so a failed DB update does not leave Secrets Manager pointing at a credential the DB does not accept.\n\n**Manual rotation:**\n1. Generate new secret\n2. Update secret in store\n3. Update apps to use new secret\n4. Verify functionality\n5. Revoke old secret\n\nUse short-lived tokens when possible. Static long-lived credentials are anti-pattern."
- sequence: 9
  fragment_type: execution
  content: "## Secret Scanning\n\n**Pre-commit hook (TruffleHog):**\n```bash\n#!/bin/bash\ndocker run --rm -v \"$(pwd):/repo\" \\\n  trufflesecurity/trufflehog:latest \\\n  filesystem --directory=/repo\n[ $? -ne 0 ] && { echo \"[FAIL] Secret detected\"; exit 1; }\n```\n\n**CI gate:**\n```yaml\nsecret-scan:\n  stage: security\n  image: trufflesecurity/trufflehog:latest\n  script:\n    - trufflehog filesystem .\n  allow_failure: false\n```\n\nRun on every push. Detected secrets must fail the build, not warn."
- sequence: 10
  fragment_type: rationale
  content: '## Best Practices Checklist


    Each item exists because a specific failure mode is otherwise underdefended. Treat the list as a control inventory, not a style guide.


    1. **Never commit secrets to Git.** Git history is forever; rotation is the only fix once a secret is committed.

    2. **Different secrets per environment.** Reuse collapses blast radius — staging compromise becomes prod compromise.

    3. **Rotate on a schedule.** Caps exposure window for undetected leaks.

    4. **Least-privilege access (per role, per env).** A leaked credential should unlock the smallest possible surface.

    5. **Audit logging on all secret access.** Forensic scope is unbounded without it.

    6. **Encrypt at rest.** Backups, snapshots, and disk images all carry secrets if the store does not encrypt.

    7. **Mask secrets in logs at every layer.** CI logs, app logs, error reporters — any of them can become a leak channel.

    8. **Document which secrets each service needs and where they live.** Undocumented secrets cannot be rotated or revoked; they accumulate as orphan risk.

    9. **Prefer short-lived tokens / OIDC federation.** Replaces "rotate every N days" with "credential expires before it can be exfiltrated."'
- sequence: 11
  fragment_type: guardrail
  content: '## Anti-Patterns


    - **Hardcoded secrets in code or config files.** Includes "temporary" values committed during development. Git history is forever.

    - **Same secret across environments.** A staging leak becomes a production leak. Always separate.

    - **Long-lived static credentials when short-lived tokens are available.** AWS IAM users vs. OIDC-federated roles, personal access tokens vs. GitHub App tokens, etc. Prefer the ephemeral option.

    - **Secrets in commit history.** Rotate immediately if found. History rewrite (filter-branch, BFG) alone is insufficient — the secret was already cloned, scraped, and indexed before you could react.

    - **Logs containing secret values.** Mask with `echo "::add-mask::$SECRET"` in GitHub Actions or masked variables in GitLab before any step that might print. Verify by inspecting a real job log, not by reading the workflow.

    - **Reusing the CI runner''s checkout token for app secrets.** The default `GITHUB_TOKEN` / `CI_JOB_TOKEN` is scoped for VCS operations; do not stuff app credentials into it.'
