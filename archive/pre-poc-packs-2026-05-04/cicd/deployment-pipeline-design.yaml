raw_prose: '# Deployment Pipeline Design


  Architecture patterns for multi-stage CI/CD pipelines: stage organization, automated gates, progressive delivery strategies, rollback automation.


  ## When to Use


  - Designing CI/CD architecture for a new service or platform migration

  - Implementing deployment gates between environments

  - Configuring multi-environment pipelines with mandatory security scanning

  - Establishing progressive delivery (canary, blue-green)

  - Debugging pipelines where stages succeed but production is wrong

  - Reducing MTTR by automating rollback on metric degradation


  ## Standard Pipeline Stages


  Source -> Build -> Test -> Staging Deploy -> Integration Tests -> Approval Gate -> Production Deploy -> Verification -> Rollback (on failure).


  Each stage''s output gates the next. Build once, promote the same artifact through environments.


  ## Approval Gate Patterns


  - Manual approval — environment protection rules with required reviewers

  - Time-based — `when: delayed; start_in: 30 minutes` for cooling-off windows

  - Multi-approver — explicit approval task before deployment

  - Automated metric gate — block promotion when error rate exceeds threshold (Argo Rollouts AnalysisTemplate, custom gate scripts)


  ## Deployment Strategies


  | Strategy | Downtime | Rollback Speed | Cost | Best For |

  |---|---|---|---|---|

  | Rolling | None | ~minutes | None | Most stateless services |

  | Blue-Green | None | Instant | 2x infra (temp) | High-risk or DB migrations |

  | Canary | None | Instant | Minimal | High-traffic, metric-driven |

  | Recreate | Yes | Fast | None | Dev/test, batch jobs |

  | Feature Flag | None | Instant | None | Gradual feature exposure |


  ## Health Checks


  Shallow `/ping` returns 200 even when dependencies are broken. Use a deep `/health/ready` endpoint that verifies database, cache, queue, downstream APIs before promoting traffic.


  ## Rollback Strategies


  Automated: `if: failure()` step runs `kubectl rollout undo`. Verify metric thresholds (error rate, latency) post-deploy and roll back if exceeded.


  Database migration rollback: keep migrations backward-compatible (additive only) for at least one release cycle. Versioned undo scripts. Never run destructive migrations until old code is fully retired.


  ## DORA Metrics


  | Metric | Elite Target |

  |---|---|

  | Deployment Frequency | Multiple/day |

  | Lead Time for Changes | < 1 hour |

  | Change Failure Rate | < 5% |

  | Mean Time to Recovery | < 1 hour |'
fragments:
- sequence: 1
  fragment_type: rationale
  content: '# Deployment Pipeline Design


    Architecture patterns for multi-stage CI/CD pipelines: stage organization, automated gates, progressive delivery, rollback automation.


    **Why pipelines need design, not just plumbing.** A deployment pipeline encodes a tradeoff between speed (how fast a commit reaches users) and safety (how confidently bad changes are stopped). Big-bang deploys optimize for speed and pay catastrophically on failure: a single bad release hits 100% of traffic with no graceful path back. Heavily gated waterfalls optimize for safety but starve teams of feedback, push batch sizes up, and ironically increase change failure rate because each release contains more risk.


    **Blast-radius reduction via gates.** The pipeline''s job is to shrink the blast radius of any single bad change. Each automated gate (lint, unit test, integration test, security scan, staging smoke, production canary analysis) acts as a filter that catches a class of failure before it reaches more users. Gates are placed in cost order — cheap, fast checks first; expensive, slow checks last — so the pipeline fails fast on the common cases and only spends real money on changes that have already cleared the cheap filters.


    **Progressive delivery beats big-bang.** Canary, blue-green, and feature-flag rollouts decouple "deployed" from "released to all users." A 10% canary lets real production traffic validate a change against real metrics before the other 90% sees it; if error rate spikes, automated analysis aborts the rollout and only 10% of users were affected. This converts deployment from a binary event into a controlled experiment with a kill switch.


    **Core principle:** balance speed with safety through stage organization, automated quality gates, and progressive delivery. Every design choice in this skill exists to move the speed-vs-safety frontier outward — faster *and* safer, not one at the expense of the other.'
- sequence: 2
  fragment_type: setup
  content: '## When to Use


    - Designing CI/CD for a new service or platform migration

    - Implementing deployment gates between environments

    - Configuring multi-environment pipelines with mandatory security scanning

    - Establishing progressive delivery (canary, blue-green)

    - Debugging pipelines where stages pass but production is wrong

    - Reducing MTTR by automating rollback on metric degradation


    **Inputs you should have before designing:** application type (language/runtime, containerized vs bare-metal, monolith vs microservices), deployment target (Kubernetes, ECS, VMs, serverless), environment topology (dev/staging/prod count, regions, air-gap requirements), rollout requirements (acceptable downtime, rollback SLA, traffic-splitting needs), gate constraints (approval teams, coverage thresholds, SAST/DAST/SCA scans), and monitoring stack (Prometheus, Datadog, CloudWatch) used for automated promotion decisions.


    **Outputs the design produces:** pipeline configuration (stage definitions, job dependencies, parallelism, caching), deployment strategy with annotated config, health check setup (shallow vs deep readiness probes, post-deploy smoke scripts), gate definitions (metric thresholds, approval workflows), and a rollback plan (automated triggers and manual runbook).'
- sequence: 3
  fragment_type: execution
  content: '## Standard Pipeline Stages


    Source -> Build -> Test -> Staging Deploy -> Integration Tests -> Approval Gate -> Production Deploy -> Verification -> Rollback (on failure).


    Detailed:

    1. **Source** — code checkout, dependency resolution

    2. **Build** — compile, package, containerize, sign artifacts

    3. **Test** — unit, integration, SAST/SCA security scans

    4. **Staging Deploy** — deploy + smoke tests

    5. **Integration Tests** — E2E, contract tests, performance baselines

    6. **Approval Gate** — manual or automated metric-based

    7. **Production Deploy** — canary, blue-green, or rolling

    8. **Verification** — deep health checks, synthetic monitoring

    9. **Rollback** — automated trigger on failure signals


    Build once, promote the same artifact through all environments. Never rebuild between staging and production — image digests must match.'
