raw_prose: |
  # Mocha + Chai + Sinon Testing Patterns

  ## Overview

  The classic Node.js testing stack:
  - **Mocha** — test runner, lifecycle hooks, async support
  - **Chai** — assertion library (BDD: `expect(...).to.equal(...)`)
  - **Sinon** — spies, stubs, mocks, fake timers

  Stable, mature APIs that haven't churned in years. Pairs naturally with `nyc` (Istanbul) for coverage.

  ## When to use

  - Existing project uses Mocha (don't migrate to Vitest/Jest just for fashion)
  - You want a small, predictable runner without bundling
  - You need fine-grained Sinon-style spies and fake timers

  Vitest is faster and ESM-native; Jest is one-stop-shop with built-in mocks. Mocha+Chai+Sinon wins on flexibility — every layer is a separate package, replaceable.

