S2023) - non-mutating\nconst reversedItemsModern = computed(() => {\n  return items.value.toReversed()\n})\n</script>\n\n<template>\n  <!-- Original array stays intact -->\n  <div>Original: {{ items }}</div>\n  <div>Sorted: {{ sortedItems }}</div>\n  <div>Reversed: {{ reversedItems }}</div>\n</template>\n```"
