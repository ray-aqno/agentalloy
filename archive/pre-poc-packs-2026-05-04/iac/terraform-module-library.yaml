  fragment_type: guardrail
  content: '## Best Practices


    1. **One concern per module** — VPC, ECS, RDS as separate modules

    2. **All inputs via variables** — No hardcoded values

    3. **All outputs explicit** — Expose what consumers need

    4. **Version pin providers** — `required_providers` with version constraints

