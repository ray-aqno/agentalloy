- sequence: 1
  fragment_type: rationale
  content: '# Terraform Module Library


    Build reusable, composable Terraform modules following best practices. Modules encapsulate infrastructure patterns into versioned, testable units with clear inputs (variables), outputs, and documentation.


    ## Module Structure


    Standard layout: `main.tf` (resources), `variables.tf` (inputs), `outputs.tf` (outputs), `versions.tf` (provider constraints), `README.md`, and `examples/` directory. One concern per module (VPC, ECS cluster, RDS).'
- sequence: 2
  fragment_type: setup
  content: '## When to Use This Skill


    - Creating reusable infrastructure modules

    - Setting up AWS VPC, ECS, RDS, or similar resources

    - Standardizing infrastructure patterns across teams

    - Composing modules for complete environments

    - Writing Terratest tests for infrastructure

    - Versioning and publishing modules'
- sequence: 3
  fragment_type: execution
  content: '## Pattern 1: AWS VPC Module


    Define `aws_vpc` with `cidr_block` variable, DNS support enabled. Create public subnets with `map_public_ip_on_launch = true` and private subnets without it. Use `count = length(var.subnet_cidrs)` for multiple subnets across availability zones. Add internet gateway for public traffic and optional NAT gateway (controlled by `var.enable_nat_gateway` boolean) for private subnet outbound.


    ## Pattern 2: Variables with Validation


    Use `variable` blocks with `description`, `type`, `default`, and `validation` blocks. Example: validate CIDR with `can(cidrhost(var.cidr_block, 0))`. All module inputs must be via variables — no hardcoded values.


    ## Pattern 3: Explicit Outputs


    Output `vpc_id`, `public_subnet_ids`, `private_subnet_ids`, `nat_gateway_ip` (conditional on NAT enabled). Use splat expressions (`[*].id`) for lists.'
- sequence: 4
  fragment_type: example
  content: "## VPC Module Example (Patterns 1-3)\n\n```hcl\n# main.tf\nresource \"aws_vpc\" \"main\" {\n  cidr_block           = var.cidr_block\n  enable_dns_hostnames = true\n  enable_dns_support   = true\n  tags = merge(var.tags, { Name = \"${var.name}-vpc\" })\n}\n\nresource \"aws_subnet\" \"public\" {\n  count                   = length(var.public_subnet_cidrs)\n  vpc_id                  = aws_vpc.main.id\n  cidr_block              = var.public_subnet_cidrs[count.index]\n  availability_zone       = var.availability_zones[count.index]\n  map_public_ip_on_launch = true\n  tags = merge(var.tags, { Name = \"${var.name}-public-${count.index + 1}\" })\n}\n\n# variables.tf\nvariable \"cidr_block\" {\n  type    = string\n  default = \"10.0.0.0/16\"\n  validation {\n    condition     = can(cidrhost(var.cidr_block, 0))\n    error_message = \"Must be a valid CIDR block.\"\n  }\n}\n\n# outputs.tf\noutput \"vpc_id\" { value = aws_vpc.main.id }\noutput \"public_subnet_ids\" { value = aws_subnet.public[*].id }\n```"
- sequence: 5
  fragment_type: execution
  content: '## Pattern 4: Module Composition


    Wire module outputs to inputs. Example: `module.vpc.vpc_id` feeds into `module.ecs_cluster.vpc_id`. Each environment (production, staging) composes the same modules with different variable values. Use consistent tags across all modules.


    ## Pattern 5: Testing with Terratest


    Write Go tests using `terratest/modules/terraform`. Set `TerraformDir` to module path, provide test `Vars`, call `terraform.InitAndApply()`, assert on outputs with `terraform.Output()` and `terraform.OutputList()`. Always `defer terraform.Destroy()` for cleanup. Run tests in parallel with `t.Parallel()`.'
- sequence: 6
  fragment_type: example
  content: "## Module Composition Example (Pattern 4)\n\n```hcl\nmodule \"vpc\" {\n  source             = \"../../modules/vpc\"\n  name               = \"production\"\n  cidr_block         = \"10.0.0.0/16\"\n  availability_zones = [\"us-east-1a\", \"us-east-1b\", \"us-east-1c\"]\n  enable_nat_gateway = true\n  tags = { Environment = \"production\", Team = \"platform\", ManagedBy = \"terraform\" }\n}\n\nmodule \"ecs_cluster\" {\n  source             = \"../../modules/ecs-cluster\"\n  name               = \"production\"\n  vpc_id             = module.vpc.vpc_id\n  private_subnet_ids = module.vpc.private_subnet_ids\n  tags = { Environment = \"production\", Team = \"platform\" }\n}\n```"
