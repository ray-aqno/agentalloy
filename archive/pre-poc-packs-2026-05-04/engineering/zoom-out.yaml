raw_prose: '# Zoom Out


  Request a higher-level perspective on an unfamiliar section of code. The agent climbs
  one layer of abstraction, names the relevant modules and callers, and frames them
  in the project''s ubiquitous-language vocabulary.


  ## When to use


  - Dropped into an unfamiliar area of the codebase.

  - Reading a function whose role in the larger system is unclear.

  - About to refactor or extend a module without confidence in its callers.

  - Onboarding to a new repo or service.


  ## The prompt


  > I don''t know this area of code well. Go up a layer of abstraction. Give me a
  map of all the relevant modules and callers, using the project''s domain glossary
  vocabulary.


  ## What good output looks like


  A short map, not a deep dive. Names the modules, names the callers, uses domain
  terms (from `CONTEXT.md` or equivalent glossary) rather than file paths. Identifies
  which boundary the code sits on (transport, domain, persistence, integration). Avoids
  walking through implementation details — that''s a separate request.


  ## Why this works


  Code agents default to the current file. They explain what the function does without
  explaining what role it plays. Zooming out forces a system-level frame: where does
  this fit, who depends on it, what would break if it changed. That frame is what
  the operator needed in the first place.'
