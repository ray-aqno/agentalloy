- sequence: 3
  fragment_type: execution
  content: '## Pattern 1: Basic Workflow and Activities


    Define activities with `@activity.defn` for actual work (validation, payment, email). Define workflows with `@workflow.defn` and `@workflow.run`. Execute activities via `workflow.execute_activity()` with explicit `start_to_close_timeout` and optional `retry_policy`. Activities are sequential by default — await each before proceeding.


    ## Pattern 2: Saga Pattern with Compensation


    Maintain a compensations list as `list[tuple[name, args]]`. After each successful step, append its compensation. On exception, iterate compensations in reverse and execute each. Log compensation failures — they may need manual intervention.


    ## Pattern 3: Entity Workflow (Long-Lived Stateful)


    Use `workflow.sleep()` for periodic actions (e.g., monthly billing). Use `@workflow.signal` for external input (cancel, update). Use `@workflow.query` for state inspection. The workflow loop runs indefinitely until signaled or a terminal condition is reached.'
