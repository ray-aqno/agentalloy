- sequence: 1
  fragment_type: rationale
  content: '# Workflow Orchestration Patterns


    Implement durable, fault-tolerant workflows using Temporal (or similar platforms). Workflows define the "what" (logic, order, conditions) while activities define the "how" (actual work with side effects).


    ## Core Concepts


    - **Workflows**: Deterministic functions that orchestrate activities. Must not have side effects or use non-deterministic APIs. Temporal replays workflow history on recovery.

    - **Activities**: Functions that perform actual work (API calls, DB writes). Can fail and be retried. Have timeouts and retry policies.

    - **Key Principles**: Workflows are deterministic, activities are idempotent, state is durable, timeouts are explicit.'
- sequence: 2
  fragment_type: setup
  content: '## When to Use This Skill


