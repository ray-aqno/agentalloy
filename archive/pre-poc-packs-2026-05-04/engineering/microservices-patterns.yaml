- sequence: 3
  fragment_type: rationale
  content: '## Communication, Data, and Resilience Patterns


    **Communication Patterns**


    Synchronous (Request/Response): REST APIs, gRPC, GraphQL. Asynchronous (Events/Messages): Event streaming (Kafka), message queues (RabbitMQ, SQS), Pub/Sub patterns.


    **Data Management**


    Database Per Service: each service owns its data, no shared databases, loose coupling. Saga Pattern: distributed transactions via compensating actions, eventual consistency.


    **Resilience Patterns**


    Circuit Breaker: fail fast on repeated errors, prevent cascade failures. Retry with Backoff: transient fault handling, exponential backoff. Bulkhead: isolate resources, limit impact of failures.'
