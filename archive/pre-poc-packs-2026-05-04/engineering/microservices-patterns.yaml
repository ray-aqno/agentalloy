  content: "### Saga Pattern — Distributed Transactions\n\n```python\nfrom enum import Enum\nfrom typing import List, Callable\n\nclass SagaStep:\n    \"\"\"Single step in saga.\"\"\"\n\n    def __init__(self, name: str, action: Callable, compensation: Callable):\n        self.name = name\n        self.action = action\n        self.compensation = compensation\n\nclass SagaStatus(Enum):\n    PENDING = \"pending\"\n    COMPLETED = \"completed\"\n    COMPENSATING = \"compensating\"\n    FAILED = \"failed\"\n\nclass OrderFulfillmentSaga:\n    \"\"\"Orchestrated saga for order fulfillment.\"\"\"\n\n    def __init__(self):\n        self.steps: List[SagaStep] = [\n            SagaStep(\"create_order\", action=self.create_order, compensation=self.cancel_order),\n            SagaStep(\"reserve_inventory\", action=self.reserve_inventory, compensation=self.release_inventory),\n            SagaStep(\"process_payment\", action=self.process_payment, compensation=self.refund_payment),\n            SagaStep(\"confirm_order\", action=self.confirm_order, compensation=self.cancel_order_confirmation)\n        ]\n\n    async def execute(self, order_data: dict) -> SagaResult:\n        \"\"\"Execute saga steps.\"\"\"\n        completed_steps = []\n        context = {\"order_data\": order_data}\n\n        try:\n            for step in self.steps:\n                result = await step.action(context)\n                if not result.success:\n                    await self.compensate(completed_steps, context)\n                    return SagaResult(status=SagaStatus.FAILED, error=result.error)\n\n                completed_steps.append(step)\n                context.update(result.data)\n\n            return SagaResult(status=SagaStatus.COMPLETED, data=context)\n\n        except Exception as e:\n            await self.compensate(completed_steps, context)\n            return SagaResult(status=SagaStatus.FAILED, error=str(e))\n\n    async def compensate(self, completed_steps: List[SagaStep], context: dict):\n        \"\"\"Execute compensating actions in reverse order.\"\"\"\n        for step in reversed(completed_steps):\n            try:\n                await step.compensation(context)\n            except Exception as e:\n                print(f\"Compensation failed for {step.name}: {e}\")\n\n    async def create_order(self, context: dict) -> StepResult:\n        order = await order_service.create(context[\"order_data\"])\n        return StepResult(success=True, data={\"order_id\": order.id})\n\n    async def cancel_order(self, context: dict):\n        await order_service.cancel(context[\"order_id\"])\n\n    async def reserve_inventory(self, context: dict) -> StepResult:\n        result = await inventory_service.reserve(context[\"order_id\"], context[\"order_data\"][\"items\"])\n        return StepResult(success=result.success, data={\"reservation_id\": result.reservation_id})\n\n    async def release_inventory(self, context: dict):\n        await inventory_service.release(context[\"reservation_id\"])\n\n    async def process_payment(self, context: dict) -> StepResult:\n        result = await payment_service.charge(context[\"order_id\"], context[\"order_data\"][\"total\"])\n        return StepResult(success=result.success, data={\"transaction_id\": result.transaction_id}, error=result.error)\n\n    async def refund_payment(self, context: dict):\n        await payment_service.refund(context[\"transaction_id\"])\n```"
