raw_prose: '# API Design Principles


  REST and GraphQL design patterns: resource modeling, HTTP semantics, pagination, versioning, error handling, HATEOAS, and N+1 prevention with DataLoader.


  ## When to Use


  - Designing new REST or GraphQL APIs

  - Refactoring existing APIs for better usability

  - Establishing API design standards

  - Reviewing API specifications before implementation

  - Migrating between paradigms (REST to GraphQL)

  - Optimizing for specific use cases (mobile, third-party integrations)


  ## REST: Resource-Oriented Architecture


  Resources are nouns (users, orders, products), not verbs. URLs represent hierarchies. HTTP methods carry semantics. Resource-orientation beats RPC-style endpoints because it gives you a small, predictable vocabulary (the HTTP methods) that maps directly to caching, idempotency, and authorization rules baked into HTTP infrastructure (CDNs, proxies, load balancers).


  HTTP method semantics:

  - `GET` — retrieve, idempotent, safe (cacheable)

  - `POST` — create new resource (not idempotent)

  - `PUT` — replace entire resource, idempotent

  - `PATCH` — partial update (not necessarily idempotent)

  - `DELETE` — remove, idempotent


  PUT vs PATCH is the most common confusion: PUT replaces the whole resource (omitted fields become null/default); PATCH applies a delta. If you only want to change one field, use PATCH.


  ## Pagination, Filtering, Status Codes, Errors


  Always paginate large collections. Use `page` + `page_size` (cap at 100) or cursor-based for infinite scroll. Return total count, current page, has_next/has_prev.


  Status codes: 2xx success, 4xx client errors, 5xx server. Common: 200 OK, 201 Created, 204 No Content, 400 Bad Request, 401 Unauthorized, 403 Forbidden, 404 Not Found, 409 Conflict, 422 Unprocessable Entity.


  Standardize error response shape: `error`, `message`, `details`, `timestamp`, `path`.


  ## HATEOAS


  Embed `_links` (self, related collections, update/delete with method) so clients discover transitions instead of hardcoding URLs.


  ## Versioning Strategies


  - URL: `/api/v1/users` — most common, easy to route

  - Header: `Accept: application/vnd.api+json; version=1` — clean URLs but harder to browse

  - Query param: `/api/users?version=1` — discouraged; many shared caches and tooling treat differently-versioned URLs identically without explicit `Vary` configuration


  Plan for breaking changes from day one. Versioning debt compounds: every uncoordinated breaking change forces every consumer to refactor on your schedule.


  ## GraphQL: Schema-First


  Types define domain. Queries read. Mutations modify. Subscriptions stream.


  Use Relay-style cursor pagination (`Connection` / `Edge` / `PageInfo`). Use enums for type safety. Custom scalars for `DateTime`, `Money`. Mutations return payload types with both result and structured errors.


  ## N+1 Prevention with DataLoader


  GraphQL''s flexible queries cause N+1 problems. Use DataLoader to batch and cache. Each loader has a `batch_load_fn` that takes IDs, returns results in input order. Initialize per request.


  ## Best Practices


  REST: consistent plural nouns (`/users`), stateless requests, correct HTTP status codes, version from day one, paginate everything, rate limiting, OpenAPI docs.


  GraphQL: schema first, DataLoaders everywhere, structured errors in mutation payloads, cursor-based pagination, `@deprecated` for migration, monitor query complexity.


  ## Common Pitfalls


  - Action-oriented endpoints (`/createUser`) instead of resource-oriented

  - Missing pagination, unbounded responses

  - Inconsistent error formats across endpoints

  - No rate limiting, abuse vector

  - API mirrors database schema, tight coupling

  - GraphQL N+1 from missing DataLoaders

  - Breaking changes without versioning or deprecation'
fragments:
- sequence: 1
  fragment_type: rationale
  content: '# API Design Principles


    Build intuitive, scalable, maintainable APIs. The core question every API choice answers: how do clients discover, invoke, and evolve with this surface without reading your source code?


    **Why resource-orientation beats RPC.** RPC endpoints (`/createUser`, `/getUserById`) force clients to learn a custom verb vocabulary per service. Resource-oriented design (`POST /users`, `GET /users/{id}`) reuses HTTP''s existing vocabulary — five methods, well-defined semantics, decades of tooling. CDNs, proxies, and load balancers already know that GET is cacheable and PUT/DELETE are idempotent; RPC endpoints opt out of all of that.


    **Why HTTP semantics matter.** Idempotency is the property that lets clients safely retry on network failure. Safety (GET, HEAD) is what lets intermediaries cache responses without coordination. Status codes are how operators page on failure modes without parsing bodies. Returning `200 OK` with `{"success": false}` breaks every layer above your handler.


    **The cost of versioning debt.** APIs without a versioning strategy from day one accumulate de facto contracts: every field every consumer happens to read becomes load-bearing. The first time you need to remove or rename one, you discover the cost — coordinating breaking changes across N consumers you don''t control. Version from the first commit, even if v1 is the only version that ever ships.


    **Core principles:** resource-oriented architecture, consistent HTTP semantics, structured errors, pagination, versioning from day one, hypermedia where it pays for itself, DataLoader for any GraphQL graph deeper than two hops.'
