raw_prose: |
  # Feature Flags with OpenFeature

  ## Overview

  Lead with **OpenFeature** as the canonical interface; treat GrowthBook, LaunchDarkly, and Unleash as interchangeable providers. The OpenFeature spec (https://openfeature.dev) is now the consensus vendor-neutral interface (verified 2026-04-28) — all three vendors ship OpenFeature provider packages, and authoring against the spec instead of per-vendor SDKs reduces lock-in and survives vendor swaps.

  Three flag categories that are not interchangeable:

  - **Kill switches** — binary instant-off, no targeting, no analytics. Used to disable a misbehaving feature in seconds. Always boolean. Expected lifetime: indefinite.
  - **Experiment flags** — A/B/n with variant assignment + metric tracking. Used to test hypotheses. Expected lifetime: weeks; archive after the experiment concludes.
  - **Permission flags** — entitlement gates ("can this user see Pro features?"). Driven by user attributes (plan, role, org). Expected lifetime: indefinite.

  Mixing these is the most common failure mode — teams put a kill switch behind an experiment platform and lose seconds-to-disable, or run experiments on permission-style targeting and contaminate the metrics.

  ## When to use

  - Standing up a new flag platform.
  - Reviewing existing flag code that's locked into a vendor SDK.
  - Diagnosing percentage-rollout drift (same user seeing different variants).
  - Auditing the corpus of flags for stale entries to delete.

  ## Authoritative sources (verified 2026-04-28)

  - OpenFeature spec: https://openfeature.dev/specification/
  - GrowthBook: https://docs.growthbook.io
  - LaunchDarkly: https://docs.launchdarkly.com
  - Unleash: https://docs.getunleash.io

