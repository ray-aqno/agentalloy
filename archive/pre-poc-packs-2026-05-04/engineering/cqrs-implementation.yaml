- sequence: 1
  fragment_type: rationale
  content: '# CQRS Implementation


    Command Query Responsibility Segregation separates read and write models. Commands mutate state and return nothing (or an ID). Queries return data and have no side effects.


    ## Architecture Overview


    Client sends Commands via Command Bus to Command Handlers which update the Write Model and publish Domain Events. Client sends Queries via Query Bus to Query Handlers which read from the Read Model. Domain Events flow through Event Handlers to synchronize the Read Model.


    ## Core Concepts


    1. **Commands** — Intent to change state. Named as imperative verbs: CreateOrder, UpdateProfile. Validated before execution.

    2. **Queries** — Data retrieval. Named as questions: GetOrderById, ListUserOrders. Return DTOs, never domain entities.

    3. **Command Bus** — Routes commands to handlers. Provides middleware (logging, validation, auth).

    4. **Query Bus** — Routes queries to handlers. Can add caching, logging, authorization.

    5. **Read Model Sync** — Domain events update denormalized read models asynchronously.'
- sequence: 2
