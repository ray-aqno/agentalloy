- sequence: 3
  fragment_type: execution
  content: '## Command Infrastructure (Patterns 1-3)


    Define a frozen `@dataclass` base `Command`. Create `CommandResult` with success flag, optional data, and optional error. Implement `CommandHandler[T]` as an abstract generic class with `async handle(command: T) -> CommandResult`. Concrete handlers receive dependencies via constructor injection (repository, event bus). The `CommandBus` maps command types to handlers in a dict and dispatches via `await handler.handle(command)`.


    ## Query Infrastructure (Patterns 4-6)


    Define a frozen `@dataclass` base `Query`. Implement `QueryHandler[Q, R]` as an abstract generic class with `async handle(query: Q) -> R`. Query handlers read from the read database and return DTOs. The `QueryBus` maps query types to handlers and executes via `await handler.handle(query)`.'
- sequence: 4
  fragment_type: example
  content: "## Command & Handler Example (Pattern 2)\n\n```python\n@dataclass(frozen=True)\nclass CreateOrder(Command):\n    customer_id: str\n    items: list[dict]\n    shipping_address: str\n\nclass CreateOrderHandler(CommandHandler[CreateOrder]):\n    def __init__(self, order_repo, event_bus):\n        self.order_repo = order_repo\n        self.event_bus = event_bus\n\n    async def handle(self, command: CreateOrder) -> CommandResult:\n        order = Order.create(\n            customer_id=command.customer_id,\n            items=[OrderItem(**item) for item in command.items],\n            shipping_address=command.shipping_address,\n        )\n        await self.order_repo.save(order)\n        await self.event_bus.publish(OrderCreated(\n            order_id=order.id, customer_id=order.customer_id, total=order.total,\n        ))\n        return CommandResult(success=True, data={\"order_id\": order.id})\n```"
- sequence: 5
  fragment_type: example
  content: "## FastAPI CQRS Application (Pattern 7)\n\n```python\nfrom fastapi import FastAPI, HTTPException\n\napp = FastAPI()\n\n@app.post(\"/orders\")\nasync def create_order(request: CreateOrderRequest):\n    command = CreateOrder(\n        customer_id=request.customer_id,\n        items=request.items,\n        shipping_address=request.shipping_address,\n    )\n    result = await command_bus.dispatch(command)\n    if not result.success:\n        raise HTTPException(status_code=400, detail=result.error)\n    return {\"order_id\": result.data[\"order_id\"]}\n\n@app.get(\"/orders/{order_id}\")\nasync def get_order(order_id: str):\n    query = GetOrderById(order_id=order_id)\n    order = await query_bus.execute(query)\n    if not order:\n        raise HTTPException(status_code=404, detail=\"Order not found\")\n    return order\n```"
- sequence: 6
  fragment_type: execution
  content: '## Read Model Synchronization (Pattern 8)


    Create projection classes that handle domain events and update read model tables. `OrderReadModelProjection` handles `OrderCreated` (INSERT) and `OrderShipped` (UPDATE status). Read models are denormalized — optimized for query patterns, not normalization.


    ## Eventual Consistency


    Read models may lag behind write models. Handle with polling: check projection version against expected version with a timeout. If timeout exceeded, return stale data with a `_warning` field. Use `asyncio.sleep(0.1)` between retries.'
- sequence: 7
  fragment_type: guardrail
  content: '## Best Practices


    ### Do''s

    - **Separate command and query models** — Different needs, independent scaling

    - **Use eventual consistency** — Accept propagation delay

    - **Validate in command handlers** — Before state change

    - **Denormalize read models** — Optimize for queries

    - **Version your events** — For schema evolution


    ### Don''ts

    - **Don''t query in commands** — Commands are write-only

    - **Don''t couple read/write schemas** — Independent evolution

    - **Don''t over-engineer** — Start simple, add complexity as needed

    - **Don''t ignore consistency SLAs** — Define acceptable lag'
