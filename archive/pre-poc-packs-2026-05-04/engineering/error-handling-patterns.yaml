raw_prose: '# Error Handling Patterns


  Build resilient applications with robust error handling strategies that gracefully handle failures and provide excellent debugging experiences.


  ## When to Use


  - Implementing error handling in new features

  - Designing error-resilient APIs

  - Debugging production issues

  - Improving application reliability

  - Creating better error messages for users and developers

  - Implementing retry and circuit breaker patterns

  - Handling async/concurrent errors

  - Building fault-tolerant distributed systems


  ## Core Concepts


  ### Error Handling Philosophies


  - **Exceptions:** Traditional try-catch, disrupts control flow. Use for unexpected errors / exceptional conditions.

  - **Result Types:** Explicit success/failure, functional approach. Use for expected errors and validation failures.

  - **Error Codes:** C-style, requires discipline.

  - **Option/Maybe Types:** For nullable values.

  - **Panics/Crashes:** Unrecoverable errors, programming bugs.


  ### Error Categories


  - **Recoverable:** network timeouts, missing files, invalid user input, API rate limits.

  - **Unrecoverable:** out of memory, stack overflow, programming bugs (null pointer).


  ## Python Error Handling


  ### Custom Exception Hierarchy

  Define `ApplicationError(Exception)` base with `code`, `details`, `timestamp`. Subclass for specific cases (`ValidationError`, `NotFoundError`, `ExternalServiceError`). Raise with structured details.


  ### Context Managers for Cleanup

  `@contextmanager` decorated function that yields the resource, commits on success, rolls back and re-raises on exception, closes in `finally`.


  ### Retry with Exponential Backoff

  Decorator with `max_attempts`, `backoff_factor`, `exceptions` tuple. Sleep `backoff_factor ** attempt` between retries.


  ## TypeScript / JavaScript Error Handling


  ### Custom Error Classes

  Extend `Error`. Capture `code`, `statusCode`, `details`. Use `Error.captureStackTrace` for clean traces.


  ### Result Type Pattern

  `type Result<T, E> = { ok: true; value: T } | { ok: false; error: E }` with `Ok(v)` / `Err(e)` helpers and a `chain` combinator. Consumers branch on `result.ok`.


  ### Async Error Handling

  `try`/`catch` async; map `instanceof NotFoundError` → return empty, `instanceof NetworkError` → retry. Promise chains: `.then` validates response, `.catch` logs and rethrows.


  ## Rust Error Handling


  Use `Result<T, E>` and the `?` operator for propagation. Define a custom enum (`AppError::Io(...)`, `AppError::Parse(...)`, etc.). `impl From<ioError> for AppError` enables `?` to auto-convert. `Option<T>::ok_or_else(err)` bridges to `Result`.


  ## Go Error Handling


  Explicit `(value, error)` returns. Wrap with `fmt.Errorf("...: %w", err)` for chained context. Sentinel errors (`ErrNotFound`) compared via `errors.Is`. Custom error types unwrapped via `errors.As`.


  ## Universal Patterns


  ### Pattern 1: Circuit Breaker

  States: CLOSED (normal), OPEN (failing — reject), HALF_OPEN (testing recovery). Open after `failure_threshold` failures; close after `success_threshold` successes in HALF_OPEN.


  ### Pattern 2: Error Aggregation

  Collect multiple errors instead of failing on the first. `ErrorCollector.add`, `hasErrors`, `throw` (single error if 1, else `AggregateError`).


  ### Pattern 3: Graceful Degradation

  `with_fallback(primary, fallback)` runs primary, logs and falls back on error. Stack multiple fallbacks (cache → primary API → backup API → default).


  ## Best Practices


  1. Fail Fast — validate input early

  2. Preserve Context — stack traces, metadata, timestamps

  3. Meaningful Messages — explain what happened and how to fix

  4. Log Appropriately — error = log; expected failure = don''t spam

  5. Handle at Right Level — catch where you can meaningfully handle

  6. Clean Up Resources — try-finally, context managers, defer

  7. Don''t Swallow Errors — log or re-throw, never silently ignore

  8. Type-Safe Errors — use typed errors when possible


  ## Common Pitfalls


  - **Catching Too Broadly:** `except Exception` hides bugs

  - **Empty Catch Blocks:** Silently swallowing errors

  - **Logging and Re-throwing:** Creates duplicate log entries

  - **Not Cleaning Up:** Forgetting to close files, connections

  - **Poor Error Messages:** "Error occurred" is not helpful

  - **Returning Error Codes:** Use exceptions or Result types

  - **Ignoring Async Errors:** Unhandled promise rejections'
