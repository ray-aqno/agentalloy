raw_prose: "# Tailwind Design System (v4)\n\nBuild production-ready design systems with Tailwind CSS v4, including CSS-first configuration, design tokens, component variants, responsive patterns, and accessibility.\n\n> **Note**: This skill targets Tailwind CSS v4 (2024+). For v3 projects, refer to the [upgrade guide](https://tailwindcss.com/docs/upgrade-guide).\n\n## When to Use This Skill\n\n- Creating a component library with Tailwind v4\n- Implementing design tokens and theming with CSS-first configuration\n- Building responsive and accessible components\n- Standardizing UI patterns across a codebase\n- Migrating from Tailwind v3 to v4\n- Setting up dark mode with native CSS features\n\n## Key v4 Changes\n\n| v3 Pattern                            | v4 Pattern                                                            |\n| ------------------------------------- | --------------------------------------------------------------------- |\n| `tailwind.config.ts`                  | `@theme` in CSS                                                       |\n| `@tailwind base/components/utilities` | `@import \"tailwindcss\"`                                               |\n| `darkMode: \"class\"`                   | `@custom-variant dark (&:where(.dark, .dark *))`                      |\n| `theme.extend.colors`                 | `@theme { --color-*: value }`                                         |\n| `require(\"tailwindcss-animate\")`      | CSS `@keyframes` in `@theme` + `@starting-style` for entry animations |\n\n## Quick Start\n\n```css\n/* app.css - Tailwind v4 CSS-first configuration */\n@import \"tailwindcss\";\n\n/* Define your theme with @theme */\n@theme {\n  /* Semantic color tokens using OKLCH for better color perception */\n  --color-background: oklch(100% 0 0);\n  --color-foreground: oklch(14.5% 0.025 264);\n\n  --color-primary: oklch(14.5% 0.025 264);\n  --color-primary-foreground: oklch(98% 0.01 264);\n\n  --color-secondary: oklch(96% 0.01 264);\n  --color-secondary-foreground: oklch(14.5% 0.025 264);\n\n  --color-muted: oklch(96% 0.01 264);\n  --color-muted-foreground: oklch(46% 0.02 264);\n\n  --color-accent: oklch(96% 0.01 264);\n  --color-accent-foreground: oklch(14.5% 0.025 264);\n\n  --color-destructive: oklch(53% 0.22 27);\n  --color-destructive-foreground: oklch(98% 0.01 264);\n\n  --color-border: oklch(91% 0.01 264);\n  --color-ring: oklch(14.5% 0.025 264);\n\n  --color-card: oklch(100% 0 0);\n  --color-card-foreground: oklch(14.5% 0.025 264);\n\n  /* Ring offset for focus states */\n  --color-ring-offset: oklch(100% 0 0);\n\n  /* Radius tokens */\n  --radius-sm: 0.25rem;\n  --radius-md: 0.375rem;\n  --radius-lg: 0.5rem;\n  --radius-xl: 0.75rem;\n\n  /* Animation tokens - keyframes inside @theme are output when referenced by --animate-* variables */\n  --animate-fade-in: fade-in 0.2s ease-out;\n  --animate-fade-out: fade-out 0.2s ease-in;\n  --animate-slide-in: slide-in 0.3s ease-out;\n  --animate-slide-out: slide-out 0.3s ease-in;\n\n  @keyframes fade-in {\n    from {\n      opacity: 0;\n    }\n    to {\n      opacity: 1;\n    }\n  }\n\n  @keyframes fade-out {\n    from {\n      opacity: 1;\n    }\n    to {\n      opacity: 0;\n    }\n  }\n\n  @keyframes slide-in {\n    from {\n      transform: translateY(-0.5rem);\n      opacity: 0;\n    }\n    to {\n      transform: translateY(0);\n      opacity: 1;\n    }\n  }\n\n  @keyframes slide-out {\n    from {\n      transform: translateY(0);\n      opacity: 1;\n    }\n    to {\n      transform: translateY(-0.5rem);\n      opacity: 0;\n    }\n  }\n}\n\n/* Dark mode variant - use @custom-variant for class-based dark mode */\n@custom-variant dark (&:where(.dark, .dark *));\n\n/* Dark mode theme overrides */\n.dark {\n  --color-background: oklch(14.5% 0.025 264);\n  --color-foreground: oklch(98% 0.01 264);\n\n  --color-primary: oklch(98% 0.01 264);\n  --color-primary-foreground: oklch(14.5% 0.025 264);\n\n  --color-secondary: oklch(22% 0.02 264);\n  --color-secondary-foreground: oklch(98% 0.01 264);\n\n  --color-muted: oklch(22% 0.02 264);\n  --color-muted-foreground: oklch(65% 0.02 264);\n\n  --color-accent: oklch(22% 0.02 264);\n  --color-accent-foreground: oklch(98% 0.01 264);\n\n  --color-destructive: oklch(42% 0.15 27);\n  --color-destructive-foreground: oklch(98% 0.01 264);\n\n  --color-border: oklch(22% 0.02 264);\n  --color-ring: oklch(83% 0.02 264);\n\n  --color-card: oklch(14.5% 0.025 264);\n  --color-card-foreground: oklch(98% 0.01 264);\n\n  --color-ring-offset: oklch(14.5% 0.025 264);\n}\n\n/* Base styles */\n@layer base {\n  * {\n    @apply border-border;\n  }\n\n  body {\n    @apply bg-background text-foreground antialiased;\n  }\n}\n```\n\n## Core Concepts\n\n### 1. Design Token Hierarchy\n\n```\nBrand Tokens (abstract)\n    └── Semantic Tokens (purpose)\n        └── Component Tokens (specific)\n\nExample:\n    oklch(45% 0.2 260) → --color-primary → bg-primary\n```\n\n### 2. Component Architecture\n\n```\nBase styles → Variants → Sizes → States → Overrides\n```\n\n## Patterns\n\n### Pattern 1: CVA (Class Variance Authority) Components\n\n```typescript\n// components/ui/button.tsx\nimport { Slot } from '@radix-ui/react-slot'\nimport { cva, type VariantProps } from 'class-variance-authority'\nimport { cn } from '@/lib/utils'\n\nconst buttonVariants = cva(\n  // Base styles - v4 uses native CSS variables\n  'inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50',\n  {\n    variants: {\n      variant: {\n        default: 'bg-primary text-primary-foreground hover:bg-primary/90',\n        destructive: 'bg-destructive text-destructive-foreground hover:bg-destructive/90',\n        outline: 'border border-border bg-background hover:bg-accent hover:text-accent-foreground',\n        secondary: 'bg-secondary text-secondary-foreground hover:bg-secondary/80',\n        ghost: 'hover:bg-accent hover:text-accent-foreground',\n        link: 'text-primary underline-offset-4 hover:underline',\n      },\n      size: {\n        default: 'h-10 px-4 py-2',\n        sm: 'h-9 rounded-md px-3',\n        lg: 'h-11 rounded-md px-8',\n        icon: 'size-10',\n      },\n    },\n    defaultVariants: {\n      variant: 'default',\n      size: 'default',\n    },\n  }\n)\n\nexport interface ButtonProps\n  extends React.ButtonHTMLAttributes<HTMLButtonElement>,\n    VariantProps<typeof buttonVariants> {\n  asChild?: boolean\n}\n\n// React 19: No forwardRef needed\nexport function Button({\n  className,\n  variant,\n  size,\n  asChild = false,\n  ref,\n  ...props\n}: ButtonProps & { ref?: React.Ref<HTMLButtonElement> }) {\n  const Comp = asChild ? Slot : 'button'\n  return (\n    <Comp\n      className={cn(buttonVariants({ variant, size, className }))}\n      ref={ref}\n      {...props}\n    />\n  )\n}\n\n// Usage\n<Button variant=\"destructive\" size=\"lg\">Delete</Button>\n<Button variant=\"outline\">Cancel</Button>\n<Button asChild><Link href=\"/home\">Home</Link></Button>\n```\n\n### Pattern 2: Compound Components (React 19)\n\n```typescript\n// components/ui/card.tsx\nimport { cn } from '@/lib/utils'\n\n// React 19: ref is a regular prop, no forwardRef\nexport function Card({\n  className,\n  ref,\n  ...props\n}: React.HTMLAttributes<HTMLDivElement> & { ref?: React.Ref<HTMLDivElement> }) {\n  return (\n    <div\n      ref={ref}\n      className={cn(\n        'rounded-lg border border-border bg-card text-card-foreground shadow-sm',\n        className\n      )}\n      {...props}\n    />\n  )\n}\n\nexport function CardHeader({\n  className,\n  ref,\n  ...props\n}: React.HTMLAttributes<HTMLDivElement> & { ref?: React.Ref<HTMLDivElement> }) {\n  return (\n    <div\n      ref={ref}\n      className={cn('flex flex-col space-y-1.5 p-6', className)}\n      {...props}\n    />\n  )\n}\n\nexport function CardTitle({\n  className,\n  ref,\n  ...props\n}: React.HTMLAttributes<HTMLHeadingElement> & { ref?: React.Ref<HTMLHeadingElement> }) {\n  return (\n    <h3\n      ref={ref}\n      className={cn('text-2xl font-semibold leading-none tracking-tight', className)}\n      {...props}\n    />\n  )\n}\n\nexport function CardDescription({\n  className,\n  ref,\n  ...props\n}: React.HTMLAttributes<HTMLParagraphElement> & { ref?: React.Ref<HTMLParagraphElement> }) {\n  return (\n    <p\n      ref={ref}\n      className={cn('text-sm text-muted-foreground', className)}\n      {...props}\n    />\n  )\n}\n\nexport function CardContent({\n  className,\n  ref,\n  ...props\n}: React.HTMLAttributes<HTMLDivElement> & { ref?: React.Ref<HTMLDivElement> }) {\n  return (\n    <div ref={ref} className={cn('p-6 pt-0', className)} {...props} />\n  )\n}\n\nexport function CardFooter({\n  className,\n  ref,\n  ...props\n}: React.HTMLAttributes<HTMLDivElement> & { ref?: React.Ref<HTMLDivElement> }) {\n  return (\n    <div\n      ref={ref}\n      className={cn('flex items-center p-6 pt-0', className)}\n      {...props}\n    />\n  )\n}\n\n// Usage\n<Card>\n  <CardHeader>\n    <CardTitle>Account</CardTitle>\n    <CardDescription>Manage your account settings</CardDescription>\n  </CardHeader>\n  <CardContent>\n    <form>...</form>\n  </CardContent>\n  <CardFooter>\n    <Button>Save</Button>\n  </CardFooter>\n</Card>\n```\n\n### Pattern 3: Form Components\n\n```typescript\n// components/ui/input.tsx\nimport { cn } from '@/lib/utils'\n\nexport interface InputProps extends React.InputHTMLAttributes<HTMLInputElement> {\n  error?: string\n  ref?: React.Ref<HTMLInputElement>\n}\n\nexport function Input({ className, type, error, ref, ...props }: InputProps) {\n  return (\n    <div className=\"relative\">\n      <input\n        type={type}\n        className={cn(\n          'flex h-10 w-full rounded-md border border-border bg-background px-3 py-2 text-sm ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium\
  \ placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50',\n          error && 'border-destructive focus-visible:ring-destructive',\n          className\n        )}\n        ref={ref}\n        aria-invalid={!!error}\n        aria-describedby={error ? `${props.id}-error` : undefined}\n        {...props}\n      />\n      {error && (\n        <p\n          id={`${props.id}-error`}\n          className=\"mt-1 text-sm text-destructive\"\n          role=\"alert\"\n        >\n          {error}\n        </p>\n      )}\n    </div>\n  )\n}\n\n// components/ui/label.tsx\nimport { cva, type VariantProps } from 'class-variance-authority'\n\nconst labelVariants = cva(\n  'text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70'\n)\n\nexport function Label({\n  className,\n  ref,\n  ...props\n}: React.LabelHTMLAttributes<HTMLLabelElement> & { ref?: React.Ref<HTMLLabelElement> }) {\n  return (\n    <label ref={ref} className={cn(labelVariants(), className)} {...props} />\n  )\n}\n\n// Usage with React Hook Form + Zod\nimport { useForm } from 'react-hook-form'\nimport { zodResolver } from '@hookform/resolvers/zod'\nimport { z } from 'zod'\n\nconst schema = z.object({\n  email: z.string().email('Invalid email address'),\n  password: z.string().min(8, 'Password must be at least 8 characters'),\n})\n\nfunction LoginForm() {\n  const { register, handleSubmit, formState: { errors } } = useForm({\n    resolver: zodResolver(schema),\n  })\n\n  return (\n    <form onSubmit={handleSubmit(onSubmit)} className=\"space-y-4\">\n      <div className=\"space-y-2\">\n        <Label htmlFor=\"email\">Email</Label>\n        <Input\n          id=\"email\"\n          type=\"email\"\n          {...register('email')}\n          error={errors.email?.message}\n        />\n      </div>\n      <div className=\"space-y-2\">\n        <Label htmlFor=\"password\">Password</Label>\n        <Input\n          id=\"password\"\n          type=\"password\"\n          {...register('password')}\n          error={errors.password?.message}\n        />\n      </div>\n      <Button type=\"submit\" className=\"w-full\">Sign In</Button>\n    </form>\n  )\n}\n```\n\n### Pattern 4: Responsive Grid System\n\n```typescript\n// components/ui/grid.tsx\nimport { cn } from '@/lib/utils'\nimport { cva, type VariantProps } from 'class-variance-authority'\n\nconst gridVariants = cva('grid', {\n  variants: {\n    cols: {\n      1: 'grid-cols-1',\n      2: 'grid-cols-1 sm:grid-cols-2',\n      3: 'grid-cols-1 sm:grid-cols-2 lg:grid-cols-3',\n      4: 'grid-cols-1 sm:grid-cols-2 lg:grid-cols-4',\n      5: 'grid-cols-2 sm:grid-cols-3 lg:grid-cols-5',\n      6: 'grid-cols-2 sm:grid-cols-3 lg:grid-cols-6',\n    },\n    gap: {\n      none: 'gap-0',\n      sm: 'gap-2',\n      md: 'gap-4',\n      lg: 'gap-6',\n      xl: 'gap-8',\n    },\n  },\n  defaultVariants: {\n    cols: 3,\n    gap: 'md',\n  },\n})\n\ninterface GridProps\n  extends React.HTMLAttributes<HTMLDivElement>,\n    VariantProps<typeof gridVariants> {}\n\nexport function Grid({ className, cols, gap, ...props }: GridProps) {\n  return (\n    <div className={cn(gridVariants({ cols, gap, className }))} {...props} />\n  )\n}\n\n// Container component\nconst containerVariants = cva('mx-auto w-full px-4 sm:px-6 lg:px-8', {\n  variants: {\n    size: {\n      sm: 'max-w-screen-sm',\n      md: 'max-w-screen-md',\n      lg: 'max-w-screen-lg',\n      xl: 'max-w-screen-xl',\n      '2xl': 'max-w-screen-2xl',\n      full: 'max-w-full',\n    },\n  },\n  defaultVariants: {\n    size: 'xl',\n  },\n})\n\ninterface ContainerProps\n  extends React.HTMLAttributes<HTMLDivElement>,\n    VariantProps<typeof containerVariants> {}\n\nexport function Container({ className, size, ...props }: ContainerProps) {\n  return (\n    <div className={cn(containerVariants({ size, className }))} {...props} />\n  )\n}\n\n// Usage\n<Container>\n  <Grid cols={4} gap=\"lg\">\n    {products.map((product) => (\n      <ProductCard key={product.id} product={product} />\n    ))}\n  </Grid>\n</Container>\n```\n\nFor advanced animation and dark mode patterns, see [references/advanced-patterns.md](references/advanced-patterns.md):\n\n- **Pattern 5: Native CSS Animations** — dialog `@keyframes`, native popover API with `@starting-style`, `allow-discrete` transitions, and a full `DialogContent`/`DialogOverlay` implementation using Radix UI\n- **Pattern 6: Dark Mode** — `ThemeProvider` context with `localStorage` persistence, `prefers-color-scheme` detection, meta `theme-color` update, and a `ThemeToggle` button component\n\n## Utility Functions\n\n```typescript\n// lib/utils.ts\nimport { type ClassValue, clsx } from \"clsx\";\nimport { twMerge } from \"tailwind-merge\";\n\nexport function cn(...inputs: ClassValue[]) {\n  return twMerge(clsx(inputs));\n}\n\n// Focus ring utility\nexport const focusRing = cn(\n  \"focus-visible:outline-none focus-visible:ring-2\",\n  \"focus-visible:ring-ring focus-visible:ring-offset-2\",\n);\n\n// Disabled utility\nexport const disabled = \"disabled:pointer-events-none disabled:opacity-50\";\n```\n\nFor advanced v4 CSS patterns, the full v3-to-v4 migration checklist, and complete best practices, see [references/advanced-patterns.md](references/advanced-patterns.md):\n\n- **Custom `@utility`** — reusable CSS utilities for decorative lines and text gradients\n- **Theme modifiers** — `@theme inline` (reference other CSS vars), `@theme static` (always output), `@import \"tailwindcss\" theme(static)`\n- **Namespace overrides** — clearing default Tailwind color scales with `--color-*: initial`\n- **Semi-transparent variants** — `color-mix()` for alpha scale generation\n- **Container queries** — `--container-*` token definitions\n- **v3→v4 migration checklist** — 10-item checklist covering config, directives, colors, dark mode, animations, React 19 ref changes\n- **Best practices** — full Do's and Don'ts list"
