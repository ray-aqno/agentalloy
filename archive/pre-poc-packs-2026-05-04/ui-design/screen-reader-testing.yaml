raw_prose: '# Screen Reader Testing


  Practical guide to testing web applications with screen readers for comprehensive accessibility validation.


  ## When to Use


  - Validating screen reader compatibility

  - Testing ARIA implementations

  - Debugging assistive technology issues

  - Verifying form accessibility

  - Testing dynamic content announcements

  - Ensuring navigation accessibility


  ## Major Screen Readers


  | Screen Reader | Platform  | Browser        | Usage |

  | ------------- | --------- | -------------- | ----- |

  | VoiceOver | macOS/iOS | Safari | ~15% |

  | NVDA      | Windows   | Firefox/Chrome | ~31% |

  | JAWS      | Windows   | Chrome/IE      | ~40% |

  | TalkBack  | Android   | Chrome         | ~10% |

  | Narrator  | Windows   | Edge           |  ~4% |


  Minimum coverage: NVDA + Firefox; VoiceOver + Safari (macOS + iOS).

  Comprehensive: add JAWS + Chrome, TalkBack + Chrome (Android), Narrator + Edge.


  ## Screen Reader Modes


  - **Browse / Virtual** — read content, default reading mode

  - **Focus / Forms** — interact with controls, used filling forms

  - **Application** — custom widgets, ARIA applications


  ## VoiceOver (macOS)


  Toggle Cmd+F5. VO modifier = Ctrl+Option. Rotor (VO+U) navigates by Headings, Links, Forms, Landmarks.

  Web shortcuts: VO+Cmd+H (next heading), VO+Cmd+J (form), VO+Cmd+L (link), VO+Cmd+T (table).


  ## NVDA (Windows)


  Start Ctrl+Alt+N, stop Insert+Q. NVDA modifier = Insert. Quick keys: H (heading), F (form), B (button), K (link), D (landmark), T (table). Elements list: NVDA+F7. Browse mode auto-switches to Focus mode in form fields.


  ## JAWS (Windows)


  Start Ctrl+Alt+J. Quick keys: H, T, F, B, G, L, ; (landmark). Forms mode: Enter to enter, Numpad+ to exit. Lists: Insert+F7 (links), F6 (headings), F5 (forms).


  ## TalkBack (Android)


  Settings → Accessibility → TalkBack. Gestures: swipe right (next), swipe left (previous), double-tap (activate), two-finger swipe (scroll).


  ## Common Test Scenarios


  - **Modal Dialog** — focus trap, role="dialog", aria-modal, aria-labelledby pointing to title

  - **Live Regions** — role="status" / role="alert" / aria-live="polite|assertive"

  - **Tab Interface** — role="tablist"/"tab"/"tabpanel", aria-selected, aria-controls


  ## Common Issues & Fixes


  - Icon-only button missing label → add `aria-label`, hide SVG with `aria-hidden="true"`

  - Dynamic content not announced → add `role="status"` and `aria-live="polite"`

  - Form error not read → `aria-invalid="true"`, `aria-describedby` pointing to error with `role="alert"`


  ## Best Practices


  - Test with real screen readers, not just automated tools

  - Test with keyboard only — screen readers and keyboard users overlap

  - Verify focus management on modals and dynamic content

  - Use semantic HTML before reaching for ARIA

  - Listen to actual announcements, not just inspect ARIA attributes'
