- sequence: 4
  fragment_type: execution
  content: '### 1. List Performance (CRITICAL)


    - `list-performance-virtualize` — Use FlashList for large lists

    - `list-performance-item-memo` — Memoize list item components

    - `list-performance-callbacks` — Stabilize callback references

    - `list-performance-inline-objects` — Avoid inline style objects

    - `list-performance-function-references` — Extract functions outside render

    - `list-performance-images` — Optimize images in lists

    - `list-performance-item-expensive` — Move expensive work outside items

    - `list-performance-item-types` — Use item types for heterogeneous lists'
- sequence: 5
  fragment_type: execution
  content: '### 2. Animation (HIGH)


    - `animation-gpu-properties` — Animate only transform and opacity

    - `animation-derived-value` — Use useDerivedValue for computed animations

    - `animation-gesture-detector-press` — Use Gesture.Tap instead of Pressable'
- sequence: 6
  fragment_type: execution
  content: '### 3. Navigation (HIGH)


    - `navigation-native-navigators` — Use native stack and native tabs over JS navigators'
- sequence: 7
  fragment_type: execution
  content: '### 4. UI Patterns (HIGH)


    - `ui-expo-image` — Use expo-image for all images

    - `ui-image-gallery` — Use Galeria for image lightboxes

    - `ui-pressable` — Use Pressable over TouchableOpacity

    - `ui-safe-area-scroll` — Handle safe areas in ScrollViews

    - `ui-scrollview-content-inset` — Use contentInset for headers

    - `ui-menus` — Use native context menus

    - `ui-native-modals` — Use native modals when possible

    - `ui-measure-views` — Use onLayout, not measure()

    - `ui-styling` — Use StyleSheet.create or Nativewind'
- sequence: 8
  fragment_type: execution
  content: '### 5. State Management (MEDIUM)


    - `react-state-minimize` — Minimize state subscriptions

    - `react-state-dispatcher` — Use dispatcher pattern for callbacks

    - `react-state-fallback` — Show fallback on first render

    - `react-compiler-destructure-functions` — Destructure for React Compiler

    - `react-compiler-reanimated-shared-values` — Handle shared values with compiler'
- sequence: 9
  fragment_type: execution
  content: '### 6. Rendering (MEDIUM)


    - `rendering-text-in-text-component` — Wrap text in Text components

    - `rendering-no-falsy-and` — Avoid falsy && for conditional rendering'
- sequence: 10
  fragment_type: execution
  content: '### 7. Monorepo (MEDIUM)


    - `monorepo-native-deps-in-app` — Keep native dependencies in app package

    - `monorepo-single-dependency-versions` — Use single versions across packages'
- sequence: 11
  fragment_type: execution
  content: '### 8. Configuration (LOW)


    - `fonts-config-plugin` — Use config plugins for custom fonts

    - `imports-design-system-folder` — Organize design system imports

    - `js-hoist-intl` — Hoist Intl object creation'
