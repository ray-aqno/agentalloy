raw_prose: '# WCAG Audit Patterns


  Comprehensive guide to auditing web content against WCAG 2.2 guidelines with actionable remediation strategies.


  ## When to Use


  - Conducting accessibility audits

  - Fixing WCAG violations

  - Implementing accessible components

  - Preparing for accessibility lawsuits

  - Meeting ADA / Section 508 requirements

  - Achieving VPAT compliance


  ## Core Concepts


  ### WCAG Conformance Levels


  | Level   | Description            | Required For      |

  | ------- | ---------------------- | ----------------- |

  | **A**   | Minimum accessibility  | Legal baseline    |

  | **AA**  | Standard conformance   | Most regulations  |

  | **AAA** | Enhanced accessibility | Specialized needs |


  ### POUR Principles


  - **Perceivable** — can users perceive the content?

  - **Operable** — can users operate the interface?

  - **Understandable** — can users understand the content?

  - **Robust** — does it work with assistive tech?


  ### Common Violations by Impact


  Critical (blockers): missing alt text on functional images, no keyboard access, missing form labels, auto-playing media without controls.


  Serious: insufficient color contrast, missing skip links, inaccessible custom widgets, missing page titles.


  Moderate: missing language attribute, unclear link text, missing landmarks, improper heading hierarchy.


  ## Principle 1 — Perceivable


  - **1.1.1 Non-text Content (A)** — alt text on functional images, `alt=""` for decorative

  - **1.2.x Time-based Media** — captions, audio descriptions

  - **1.3.1 Info and Relationships (A)** — semantic markup, headings, lists, landmarks

  - **1.3.2 Meaningful Sequence (A)** — DOM order matches reading order

  - **1.4.1 Use of Color (A)** — never convey info by color alone

  - **1.4.3 Contrast Minimum (AA)** — 4.5:1 for body text, 3:1 for large text

  - **1.4.4 Resize Text (AA)** — usable up to 200% zoom

  - **1.4.10 Reflow (AA)** — no horizontal scroll at 320px / 400% zoom

  - **1.4.11 Non-text Contrast (AA)** — 3:1 for UI components and graphics

  - **1.4.12 Text Spacing (AA)** — usable when line-height/spacing increased


  ## Principle 2 — Operable


  - **2.1.1 Keyboard (A)** — every action keyboard-reachable

  - **2.1.2 No Keyboard Trap (A)** — Tab/Shift+Tab can leave any component

  - **2.2.1 Timing Adjustable (A)** — turn off / extend / adjust time limits

  - **2.2.2 Pause, Stop, Hide (A)** — moving content can be paused

  - **2.3.1 Three Flashes (A)** — no content flashes >3x/sec

  - **2.4.1 Bypass Blocks (A)** — skip links to main content

  - **2.4.2 Page Titled (A)** — every page has a descriptive `<title>`

  - **2.4.3 Focus Order (A)** — Tab order matches visual order

  - **2.4.4 Link Purpose (A)** — link text or context conveys destination

  - **2.4.7 Focus Visible (AA)** — visible focus indicator on focused element

  - **2.4.11 Focus Not Obscured (AA, WCAG 2.2)** — sticky headers can''t fully cover focused element


  ## Principle 3 — Understandable


  - **3.1.1 Language of Page (A)** — `<html lang="en">`

  - **3.1.2 Language of Parts (AA)** — `lang` on inline mismatched-language content

  - **3.2.1 / 3.2.2 On Focus / On Input (A)** — focus or input doesn''t trigger context change

  - **3.2.3 / 3.2.4 Consistent Navigation / Identification (AA)** — same nav, same labels

  - **3.3.1 Error Identification (A)** — describe errors in text, not color alone

  - **3.3.2 Labels or Instructions (A)** — explicit `<label>` for every input

  - **3.3.3 Error Suggestion (AA)** — provide remediation when known

  - **3.3.4 Error Prevention (AA)** — confirm/review on legal/financial submissions


  ## Principle 4 — Robust


  - **4.1.2 Name, Role, Value (A)** — every UI control has accessible name + role + state via DOM/ARIA

  - **4.1.3 Status Messages (AA)** — programmatic announcements via `role="status"` / `role="alert"` / `aria-live`


  ## Automated Testing


  Tools: axe-core (Deque), Lighthouse Accessibility, Pa11y, WAVE.

  Catch ~30% of issues automatically. Manual + screen reader testing required for the rest.


  ## Remediation Patterns


  - **Missing form labels** — wrap with `<label>` or use `for`/`id`; `aria-labelledby` for grouped controls

  - **Insufficient color contrast** — use a contrast tool (WebAIM); switch to darker text or lighter background; verify both default and hover states

  - **Keyboard navigation** — `tabindex="0"` on custom interactive elements; handle Enter/Space; trap focus in modals; restore focus on close


  ## Best Practices


  Do: test with real assistive tech, use semantic HTML, design for keyboard first, audit early and often.

  Don''t: rely solely on automated tools, use ARIA when HTML works, hide focus indicators, build inaccessible custom widgets.'
