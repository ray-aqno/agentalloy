- sequence: 5
  fragment_type: verification
  content: '### Perceivable Checklist (Principle 1)


    **1.1 Text Alternatives**

    - [ ] All functional images have descriptive alt text

    - [ ] Decorative images have `alt=""`

    - [ ] Complex images have long descriptions

    - [ ] Icons with meaning have accessible names

    - [ ] CAPTCHAs have alternatives


    **1.3 Adaptable**

    - [ ] Semantic markup (headings, lists, landmarks)

    - [ ] DOM order matches visual reading order

    - [ ] Tables use `<th>` with `scope`


    **1.4 Distinguishable**

    - [ ] Color is never the only signal

    - [ ] Contrast: ≥4.5:1 body text, ≥3:1 large text (AA)

    - [ ] Usable at 200% zoom; no horizontal scroll at 400% / 320px width

    - [ ] UI component contrast ≥3:1

    - [ ] Text spacing override doesn''t break layout'
- sequence: 6
  fragment_type: verification
  content: '### Operable Checklist (Principle 2)


    **2.1 Keyboard Accessible**

    - [ ] Every interactive element reachable by Tab

    - [ ] No keyboard trap — Tab/Shift+Tab can always exit

    - [ ] All actions activatable by keyboard (Enter / Space / Arrow keys)


    **2.2 Enough Time**

    - [ ] Time limits adjustable, extendable, or off

    - [ ] Moving content can be paused/stopped/hidden


    **2.3 Seizures**

    - [ ] No content flashes more than 3 times per second


    **2.4 Navigable**

    - [ ] Skip-to-main link present

    - [ ] Page has descriptive `<title>`

    - [ ] Tab order matches visual order

    - [ ] Link purpose clear from text or surrounding context

    - [ ] Focus indicator always visible (AA)

    - [ ] Focused element not obscured by sticky headers (AA, WCAG 2.2)'
- sequence: 7
  fragment_type: verification
  content: '### Understandable Checklist (Principle 3)


    **3.1 Readable**

    - [ ] `<html lang="en">` on every page

    - [ ] `lang` attribute on inline content in different languages


    **3.2 Predictable**

    - [ ] Focus alone doesn''t trigger context change (no auto-submit on focus)

    - [ ] Input alone doesn''t trigger context change (no auto-submit on change)

    - [ ] Navigation consistent across pages

    - [ ] Same component labeled the same way everywhere


    **3.3 Input Assistance**

    - [ ] Errors identified in text, not by color alone

    - [ ] Every input has an explicit `<label>` (or `aria-label` / `aria-labelledby`)

    - [ ] Error messages suggest a fix when possible

    - [ ] Legal/financial actions have a confirm step'
- sequence: 8
  fragment_type: verification
  content: '### Robust Checklist (Principle 4)


    **4.1 Compatible**

    - [ ] Every UI control exposes name, role, and value to assistive tech

    - [ ] Custom widgets use correct ARIA roles + states (`aria-expanded`, `aria-checked`, etc.)

    - [ ] Status messages use `role="status"` / `role="alert"` / `aria-live`

    - [ ] Form errors use `aria-invalid` + `aria-describedby` to associate error text'
- sequence: 9
  fragment_type: execution
  content: '### Automated Testing


    Tools (run as CI gates):

    - **axe-core** (Deque) — `npm install -D @axe-core/react`, integrate into Jest/Cypress

    - **Lighthouse Accessibility** — `lighthouse <url> --only-categories=accessibility`

    - **Pa11y** — `pa11y https://example.com`

    - **WAVE** — browser extension for visual debugging


    Automated tools catch ~30% of accessibility issues. The rest require **manual keyboard testing** and **screen reader testing**.'
- sequence: 10
  fragment_type: example
  content: "### Remediation: Missing Form Labels\n\n```html\n<!-- Bad -->\n<input type=\"email\" placeholder=\"Email\">\n\n<!-- Good — explicit label -->\n<label for=\"email\">Email</label>\n<input id=\"email\" type=\"email\">\n\n<!-- Or wrap -->\n<label>\n  Email\n  <input type=\"email\">\n</label>\n\n<!-- Grouped controls (e.g. radio set) -->\n<fieldset>\n  <legend>Contact preference</legend>\n  <label><input type=\"radio\" name=\"pref\" value=\"email\"> Email</label>\n  <label><input type=\"radio\" name=\"pref\" value=\"phone\"> Phone</label>\n</fieldset>\n```"
- sequence: 11
  fragment_type: example
  content: '### Remediation: Insufficient Color Contrast


    Check ratios with WebAIM contrast checker (or `axe-core`).

    WCAG AA requires:

    - **4.5:1** for body text

    - **3:1** for large text (18pt regular, 14pt bold)

    - **3:1** for UI components and graphics


    ```css

    /* Bad — 2.8:1 ratio */

    .text-muted { color: #999; background: #fff; }


    /* Good — 4.6:1 ratio */

    .text-muted { color: #767676; background: #fff; }

    ```


    Also verify hover, focus, and active states meet contrast requirements.'
- sequence: 12
  fragment_type: example
  content: "### Remediation: Keyboard Navigation for Custom Widgets\n\n```typescript\nfunction CustomButton({ onAction, children }) {\n  const handleKey = (e) => {\n    if (e.key === \"Enter\" || e.key === \" \") {\n      e.preventDefault();\n      onAction();\n    }\n  };\n  return (\n    <div\n      role=\"button\"\n      tabIndex={0}\n      onClick={onAction}\n      onKeyDown={handleKey}\n      aria-label=\"Custom action\"\n    >\n      {children}\n    </div>\n  );\n}\n```\n\nBetter: just use `<button>` whenever possible — it provides all this for free."
- sequence: 13
  fragment_type: guardrail
  content: '## Best Practices


    **Do:**

    - Test with real assistive tech (screen readers, keyboard-only)

    - Use semantic HTML before reaching for ARIA

    - Design for keyboard navigation first

    - Audit early and often — accessibility is cheaper to build in than retrofit

    - Include accessibility in your CI pipeline (axe-core, Lighthouse)


    **Don''t:**

    - Rely solely on automated tools — they catch ~30% of issues

    - Use ARIA when semantic HTML works

    - Hide focus indicators ("ugly" outlines are still required)

    - Build inaccessible custom widgets when a `<button>` / `<select>` / `<input>` would do

    - Treat accessibility as a one-time audit — it''s continuous'
