raw_prose: '# Dependency Upgrade


  Master major dependency version upgrades, compatibility analysis, staged upgrade strategies, and comprehensive testing approaches.


  ## When to Use


  - Upgrading major framework versions

  - Updating security-vulnerable dependencies

  - Modernizing legacy dependencies

  - Resolving dependency conflicts

  - Planning incremental upgrade paths

  - Testing compatibility matrices

  - Automating dependency updates


  ## Semantic Versioning Review


  `MAJOR.MINOR.PATCH` — MAJOR breaking, MINOR additive, PATCH bugfix.

  - `^2.3.1` = `>=2.3.1 <3.0.0` (minor + patch updates)

  - `~2.3.1` = `>=2.3.1 <2.4.0` (patch only)

  - `2.3.1` = exact


  ## Dependency Analysis


  ```bash

  npm outdated; npm audit; npm audit fix

  yarn outdated; yarn audit

  npx npm-check-updates -u            # update package.json to latest


  npm ls package-name                  # why is this installed?

  yarn why package-name

  npx madge --image graph.png src/     # visualize

  ```


  ## Staged Upgrade Strategy


  Phase 1 — Planning: list current versions, read CHANGELOG.md / MIGRATION.md, define upgrade order (TypeScript → framework → routing → testing → build).


  Phase 2 — Incremental: upgrade one package at a time, run tests + build between each.


  Phase 3 — Validation: write tests asserting peer-dep compatibility (e.g. `react` and `react-dom` versions match).


  ## Breaking Change Handling


  - Identify via CHANGELOG.md

  - Apply codemods: `npx jscodeshift -t <url> src/` (use `--dry` to preview)

  - Custom migration scripts using `glob` + `fs.readFileSync` + regex replace


  ## Testing Strategy


  - Unit tests must still pass

  - Integration tests verify cross-module compatibility

  - Visual regression tests (Percy, Chromatic) catch UI drift

  - E2E tests (Playwright/Cypress) catch real flow regressions


  ## Automated Dependency Updates


  - **Renovate** — `renovate.json` with `extends: ["config:base"]`, auto-merge minor+patch

  - **Dependabot** — `.github/dependabot.yml`, schedule weekly, ignore-rules for known incompatibilities


  ## Rollback Plan


  - Pin known-good versions in `package-lock.json` / `yarn.lock`

  - Tag pre-upgrade commit

  - Revert via `git revert` of upgrade PR + reinstall locked versions


  ## Common Upgrade Patterns


  - **Lock File Management** — commit lockfiles; resolve conflicts by re-running `npm install`/`yarn`, never hand-edit

  - **Peer Dependency Resolution** — use `--legacy-peer-deps` carefully; prefer `npm install <pkg>` matching peers

  - **Workspace Upgrades** — pnpm/yarn workspaces: bump root, run install, verify all workspaces build'
