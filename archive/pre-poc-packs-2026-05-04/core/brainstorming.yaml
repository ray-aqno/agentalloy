raw_prose: '# Brainstorming Ideas Into Designs


  Help turn ideas into fully formed designs and specs through natural collaborative dialogue.


  Start by understanding the current project context, then ask questions one at a time to refine the idea. Once you understand what you''re building, present the design and get user approval.


  **HARD GATE:** Do NOT invoke any implementation skill, write any code, scaffold any project, or take any implementation action until you have presented a design and the user has approved it. This applies to EVERY project regardless of perceived simplicity.


  ## Anti-Pattern: "This Is Too Simple To Need A Design"


  Every project goes through this process. A todo list, a single-function utility, a config change — all of them. "Simple" projects are where unexamined assumptions cause the most wasted work. The design can be short (a few sentences for truly simple projects), but you MUST present it and get approval.


  ## Checklist (do in order)


  1. **Explore project context** — files, docs, recent commits

  2. **Offer visual companion** (if visual questions ahead) — its own message, not combined with anything else

  3. **Ask clarifying questions** — one at a time, understand purpose / constraints / success criteria

  4. **Propose 2-3 approaches** — with trade-offs and your recommendation

  5. **Present design** in sections scaled to complexity, get approval after each section

  6. **Write design doc** — `docs/specs/YYYY-MM-DD-<topic>-design.md`, commit

  7. **Spec self-review** — placeholders, contradictions, ambiguity, scope

  8. **User reviews written spec** — wait for approval

  9. **Transition to implementation** — invoke writing-plans skill


  Terminal state is invoking writing-plans. Do NOT invoke other implementation skills.


  ## Asking Questions


  - One question per message

  - Prefer multiple choice when possible (easier to answer)

  - Focus on purpose, constraints, success criteria

  - If the request describes multiple independent subsystems, flag immediately and decompose before refining


  ## Exploring Approaches


  Propose 2-3 different approaches with trade-offs. Lead with your recommended option and explain why.


  ## Presenting the Design


  - Scale each section to complexity (a few sentences if straightforward; up to 200-300 words if nuanced)

  - Ask after each section whether it looks right

  - Cover: architecture, components, data flow, error handling, testing

  - Be ready to revise


  ## Design for Isolation and Clarity


  - Break the system into smaller units, each with one clear purpose

  - Communicate through well-defined interfaces

  - Each unit independently understandable and testable

  - Smaller, well-bounded units are easier to work with — files that have grown large are usually doing too much


  ## Working in Existing Codebases


  - Explore current structure before proposing changes; follow existing patterns

  - Include targeted improvements where existing code affects the work, but don''t propose unrelated refactoring

  - Stay focused on what serves the current goal


  ## Spec Self-Review


  After writing the spec document, look at it with fresh eyes:

  1. Placeholder scan — TBD/TODO/vague requirements

  2. Internal consistency — do sections contradict?

  3. Scope check — focused enough for one plan?

  4. Ambiguity check — pick one interpretation and make it explicit


  Fix issues inline. No re-review needed.


  ## Key Principles


  - One question at a time

  - Multiple choice preferred

  - YAGNI ruthlessly

  - Explore alternatives — always propose 2-3 approaches

  - Incremental validation

  - Be flexible — go back and clarify when something doesn''t make sense'
