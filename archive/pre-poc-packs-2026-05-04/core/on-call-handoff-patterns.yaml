raw_prose: '# On-Call Handoff Patterns


  Effective shift transitions ensure continuity, context transfer, and reliable incident response across rotations.


  ## When to Use


  - Transitioning on-call responsibilities

  - Writing shift handoff summaries

  - Documenting ongoing investigations

  - Establishing on-call rotation procedures

  - Onboarding new on-call engineers

  - Mid-incident handoff (incident commander role)

  - Auditing/improving handoff quality across teams


  ## Handoff Components


  | Component | Purpose |

  |---|---|

  | Active Incidents | What''s currently broken |

  | Ongoing Investigations | Issues being debugged |

  | Recent Changes | Deployments, configs |

  | Known Issues | Workarounds in place |

  | Upcoming Events | Maintenance, releases |


  ## Handoff Timing


  Recommended: 30-min overlap between shifts.

  - Outgoing: 15 min writing handoff doc, 15 min sync call

  - Incoming: 15 min reviewing doc, 15 min sync call, 5 min verifying alerting routes


  ## Standard Sections


  - Active Incidents — or explicit "none"

  - Ongoing Investigations — status, started, impact, context, next steps, resources

  - Resolved This Shift — duration, root cause, resolution, postmortem link

  - Recent Changes — deployments table, config changes, infrastructure

  - Known Issues & Workarounds — issue, workaround, ticket

  - Upcoming Events — date, event, impact, contact

  - Escalation Reminders — escalation matrix

  - Quick Reference — common commands, dashboard links


  ## Handoff Checklist


  Outgoing: documented active incidents, ongoing investigations, recent changes, known issues, upcoming events; synced with incoming.


  Incoming: read doc, joined sync, verified PagerDuty routing, verified Slack notifications, checked VPN/access, reviewed critical dashboards.


  Test alert: outgoing fires a test, incoming confirms receipt before overlap ends.


  ## Mid-Incident Handoff


  Use a dedicated incident-handoff template covering: current state, what we know, what we''ve done, what needs to happen next, key people, communication state.


  Outgoing engineer remains available on Slack for 15 min after handoff.


  ## Common Failures


  - Incomplete handoff — gate every section with an entry or explicit "none"

  - Timezone gaps prevent sync — fall back to async quick-handoff + Loom/voice memo

  - Inconsistent format across teams — adopt one template org-wide, link from PagerDuty schedule

  - Incoming can''t verify alerting — outgoing fires test alert, incoming confirms receipt'
fragments:
- sequence: 1
  fragment_type: rationale
  content: '# Why Structured On-Call Handoffs Matter


    Unstructured handoffs are a primary driver of inflated MTTR. When the incoming responder lacks situational awareness, they spend the first minutes of any new page rediscovering context the outgoing engineer already had — re-reading dashboards, re-deriving root-cause hypotheses, re-identifying which deploys are suspect. That rediscovery time is pure regression risk: in-flight investigations stall, mitigations get re-attempted, and customers feel the delay.


    A structured handoff also prevents knowledge loss between rotations. Investigations that span multiple shifts (memory leaks observed over days, intermittent timeouts correlated with backup windows) only progress if each shift inherits the prior shift''s hypotheses, ruled-out causes, and pending experiments. Without a written record, the next responder restarts from zero, and slow-burn issues never get resolved.


    Finally, the handoff ritual reinforces a blameless culture. When the format explicitly invites "ongoing investigations," "known issues with workarounds," and "things I didn''t get to," outgoing engineers feel safe disclosing in-flight problems instead of hiding them. Hidden problems become the next shift''s surprise outages. A normalized handoff document makes admitting "this is still broken and I don''t know why" the expected, professional behavior — which is the only condition under which engineers will actually do it.'
- sequence: 2
  fragment_type: setup
  content: '## When to Use This Skill


    Apply this skill when:


    - Transitioning on-call responsibilities between engineers and ensuring the incoming responder has full situational awareness

    - Writing a shift summary that captures active incidents, ongoing investigations, and recent changes

    - Handing off mid-incident so a fresh engineer can take over the incident commander role without losing context

    - Documenting ongoing investigations that span multiple shifts

    - Establishing on-call rotation procedures for a new team or service

    - Onboarding a new engineer to the on-call rotation for the first time

    - Auditing or improving handoff quality across teams (e.g., normalizing inconsistent formats org-wide)'
