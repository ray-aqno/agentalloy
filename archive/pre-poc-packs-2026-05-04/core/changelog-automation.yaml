- sequence: 3
  fragment_type: execution
  content: '## Method 1: conventional-changelog (Node.js)


    Run `npx conventional-changelog -p angular -i CHANGELOG.md -s`. Add as `package.json` script. The `-s` flag writes in-place.


    ## Method 2: standard-version


    Run `npx standard-version` to bump version, update CHANGELOG, and create git tag. Configure section mapping in `.versionrc.json` with `types` array mapping commit types to changelog sections. Hidden types are excluded.


    ## Method 3: semantic-release


    Fully automated: analyzes commits, determines version, generates notes, publishes. Configure in `.releaserc.json` with plugin pipeline: commit-analyzer → release-notes-generator → changelog → npm → git → github. Supports prerelease branches.


    ## Method 4: GitHub Actions


    Trigger on push to main. Checkout with `fetch-depth: 0` for full history. Run `npx semantic-release` with `GITHUB_TOKEN` and `NPM_TOKEN`.


    ## Method 5: git-cliff (Rust-based)


    Configure in `cliff.toml` with Tera templates for changelog body. Use `commit_parsers` to map commit message patterns to groups. Run `git-cliff -o CHANGELOG.md` or `--latest` for most recent tag only.


    ## Method 6: commitizen (Python)


    Configure in `pyproject.toml` under `[tool.commitizen]`. Specify `version_files` for files to update. Run `cz bump --changelog --yes` for automated bump + changelog.'
