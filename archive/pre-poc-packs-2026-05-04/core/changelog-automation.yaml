- sequence: 1
  fragment_type: rationale
  content: '# Changelog Automation


    Automate changelog generation from Git commit history using Conventional Commits. A good changelog communicates what changed, why, and what users need to do. Automation ensures every release has accurate, complete documentation.


    ## Core Concepts


    **Keep a Changelog Format**: Sections for Added, Changed, Fixed, Deprecated, Security. Unreleased section at top.


    **Conventional Commits**: `type(scope): description`. Types: `feat` (Added, MINOR bump), `fix` (Fixed, PATCH bump), `feat!`/`BREAKING CHANGE:` (MAJOR bump), `perf` (Performance), `docs` (Documentation, no bump), `chore`/`refactor`/`test`/`ci` (not in changelog).


    **Semantic Versioning**: MAJOR.MINOR.PATCH — breaking.feature.fix.'
- sequence: 2
