  fragment_type: example
  content: "## semantic-release Configuration Example\n\n```json\n{\n  \"branches\": [\"main\", {\"name\": \"beta\", \"prerelease\": true}],\n  \"plugins\": [\n    \"@semantic-release/commit-analyzer\",\n    \"@semantic-release/release-notes-generator\",\n    [\"@semantic-release/changelog\", {\"changelogFile\": \"CHANGELOG.md\"}],\n    [\"@semantic-release/npm\", {\"npmPublish\": true}],\n    [\"@semantic-release/git\", {\n      \"assets\": [\"CHANGELOG.md\", \"package.json\"],\n      \"message\": \"chore(release): ${nextRelease.version}\\n\\n${nextRelease.notes}\"\n    }],\n    \"@semantic-release/github\"\n  ]\n}\n```\n\n## git-cliff Configuration Example\n\n```toml\n[changelog]\nheader = \"# Changelog\\n\\n\"\nbody = \"\"\"\n## [{{ version }}] - {{ timestamp | date(format=\"%Y-%m-%d\") }}\n{% for group, commits in commits | group_by(attribute=\"group\") %}\n### {{ group | upper_first }}\n{% for commit in commits %}\n- {{ commit.message | upper_first }} ({{ commit.id | truncate(length=7, end=\"\") }})\n{%- endfor %}\n{% endfor %}\n\"\"\"\n[git]\nconventional_commits = true\ncommit_parsers = [\n  { message = \"^feat\", group = \"Features\" },\n  { message = \"^fix\", group = \"Bug Fixes\" },\n  { message = \"^perf\", group = \"Performance\" },\n]\n```"
- sequence: 5
  fragment_type: example
  content: '## Commit Message Examples


    ```bash

    # Feature with scope

    feat(auth): add OAuth2 support for Google login


    # Bug fix with issue reference

    fix(checkout): resolve race condition in payment processing

    Closes #123


    # Breaking change

    feat(api)!: change user endpoint response format

    BREAKING CHANGE: The user endpoint now returns `userId` instead of `id`.


    # Multi-paragraph

    fix(database): handle connection timeouts gracefully

    Previously, timeouts caused full request failure without retry.

    This implements exponential backoff with up to 3 retries.

    Fixes #456

    ```


    ## commitizen Configuration (Python)


    ```toml

    [tool.commitizen]

    name = "cz_conventional_commits"

    version = "1.0.0"

    tag_format = "v$version"

    version_files = ["pyproject.toml:version", "src/my_package/__init__.py:__version__"]

    changelog_file = "CHANGELOG.md"

    update_changelog_on_bump = true

    ```'
- sequence: 6
  fragment_type: guardrail
  content: '## Best Practices


    ### Do''s

    - **Follow Conventional Commits** — Enables automation

    - **Write clear messages** — Future you will thank you

    - **Reference issues** — Link commits to tickets

    - **Use scopes consistently** — Define team conventions

    - **Automate releases** — Reduce manual errors


    ### Don''ts

    - **Don''t mix changes** — One logical change per commit

    - **Don''t skip validation** — Use commitlint

    - **Don''t manual edit** — Generated changelogs only

    - **Don''t forget breaking changes** — Mark with `!` or footer

    - **Don''t ignore CI** — Validate commits in pipeline'
