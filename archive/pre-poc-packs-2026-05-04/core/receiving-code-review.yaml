raw_prose: '# Receiving Code Review


  Code review requires technical evaluation, not emotional performance.


  **Core principle:** Verify before implementing. Ask before assuming. Technical correctness over social comfort.


  ## The Response Pattern


  1. **READ** — complete feedback without reacting

  2. **UNDERSTAND** — restate requirement in own words (or ask)

  3. **VERIFY** — check against codebase reality

  4. **EVALUATE** — technically sound for THIS codebase?

  5. **RESPOND** — technical acknowledgment or reasoned pushback

  6. **IMPLEMENT** — one item at a time, test each


  ## Forbidden Responses


  Never:

  - "You''re absolutely right!"

  - "Great point!" / "Excellent feedback!"

  - "Thanks for catching that!" / any gratitude expression

  - "Let me implement that now" (before verification)


  Instead:

  - Restate the technical requirement

  - Ask clarifying questions

  - Push back with technical reasoning if wrong

  - Just start working — actions > words


  ## Handling Unclear Feedback


  If any item is unclear: STOP. Don''t implement anything. Ask for clarification. Items may be related; partial understanding produces wrong implementation.


  Example: "Fix items 1-6" but you only understand 1,2,3,6. Don''t implement 1,2,3,6 first and ask later. Say: "Understand 1,2,3,6. Need clarification on 4 and 5 before implementing."


  ## External Feedback Discipline


  Before implementing external suggestions, check:

  1. Technically correct for THIS codebase?

  2. Breaks existing functionality?

  3. Reason for current implementation?

  4. Works on all platforms/versions?

  5. Does reviewer understand full context?


  If suggestion seems wrong: push back with technical reasoning. If you can''t easily verify: say so, ask for direction. If conflicts with prior architectural decisions: stop and discuss.


  ## YAGNI Check


  If reviewer suggests "implementing properly", grep codebase for actual usage. If unused: "This isn''t called. Remove it (YAGNI)?" If used: implement properly.


  ## When to Push Back


  Push back when: suggestion breaks functionality, reviewer lacks context, violates YAGNI, technically incorrect for this stack, legacy/compat reasons exist, conflicts with architectural decisions.


  How: technical reasoning, not defensiveness. Specific questions. Reference working tests/code. Involve human if architectural.


  ## Acknowledging Correct Feedback


  ✅ "Fixed. [brief description]"

  ✅ "Good catch — [specific issue]. Fixed in [location]."

  ✅ Just fix and show the code


  ❌ "You''re absolutely right!"

  ❌ "Thanks for catching that!"


  ## The Bottom Line


  External feedback = suggestions to evaluate, not orders to follow. Verify. Question. Then implement. No performative agreement. Technical rigor always.'
