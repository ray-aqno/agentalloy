- sequence: 4
  fragment_type: example
  content: "## Example\n\n```\n[Just completed Task 2: Add verification function]\n\nLet me request code review before proceeding.\n\nBASE_SHA=$(git log --oneline | grep \"Task 1\" | head -1 | awk '{print $1}')\nHEAD_SHA=$(git rev-parse HEAD)\n\n[Dispatch code-reviewer subagent]\n  WHAT_WAS_IMPLEMENTED: Verification and repair functions for conversation index\n  PLAN_OR_REQUIREMENTS: Task 2 from docs/plans/deployment-plan.md\n  BASE_SHA: a7981ec\n  HEAD_SHA: 3df7661\n  DESCRIPTION: Added verifyIndex() and repairIndex() with 4 issue types\n\n[Subagent returns]:\n  Strengths: Clean architecture, real tests\n  Issues:\n    Important: Missing progress indicators\n    Minor: Magic number (100) for reporting interval\n  Assessment: Ready to proceed\n\n[Fix progress indicators]\n[Continue to Task 3]\n```"
- sequence: 5
  fragment_type: execution
  content: '## Integration with Workflows


    - **Subagent-driven development** — review after EACH task. Catch issues before they compound. Fix before moving to next task.

    - **Executing plans** — review after each batch (~3 tasks). Get feedback, apply, continue.

    - **Ad-hoc development** — review before merge, or when stuck.'
- sequence: 6
  fragment_type: guardrail
  content: '## Red Flags


    **Never:**

    - Skip review because "it''s simple"

    - Ignore Critical issues

    - Proceed with unfixed Important issues

    - Argue with valid technical feedback


    **If reviewer is wrong:**

    - Push back with technical reasoning

    - Show code/tests that prove it works

    - Request clarification


    Reviewer is a fresh pair of eyes — most "wrong" feedback is actually a signal that your code communicates poorly. Treat that as a finding too.'
