raw_prose: '# Deploy to Vercel


  Deploy any project to Vercel. **Always deploy as preview** (not production) unless the user explicitly asks for production.


  The goal is to get the user into the best long-term setup: their project linked to Vercel with git-push deploys. Every method below tries to move the user closer to that state.


  ## Step 1: Gather Project State


  Run all four checks before deciding which method to use:


  ```bash

  # 1. Check for a git remote

  git remote get-url origin 2>/dev/null


  # 2. Check if locally linked to a Vercel project (either file means linked)

  cat .vercel/project.json 2>/dev/null || cat .vercel/repo.json 2>/dev/null


  # 3. Check if the Vercel CLI is installed and authenticated

  vercel whoami 2>/dev/null


  # 4. List available teams (if authenticated)

  vercel teams list --format json 2>/dev/null

  ```


  ### Team selection


  If the user belongs to multiple teams, present all available team slugs as a bulleted list and ask which one to deploy to. Pass the team slug via `--scope` on all subsequent CLI commands.


  ### About the `.vercel/` directory


  A linked project has either:

  - `.vercel/project.json` — created by `vercel link` (single project linking). Contains `projectId` and `orgId`.

  - `.vercel/repo.json` — created by `vercel link --repo` (repo-based linking). Contains `orgId`, `remoteName`, and a `projects` array.


  Either file means the project is linked. **Do NOT** use `vercel project inspect`, `vercel ls`, or `vercel link` to detect state in an unlinked directory — without a `.vercel/` config, they will interactively prompt (or with `--yes`, silently link as a side-effect). Only `vercel whoami` is safe to run anywhere.


  ## Step 2: Choose a Deploy Method


  ### Linked + has git remote → Git Push (ideal)


  1. **Ask the user before pushing.** Never push without explicit approval.

  2. **Commit and push** — Vercel automatically builds. Non-production branches get preview deployments; the production branch gets a production deployment.

  3. **Retrieve the preview URL** via `vercel ls --format json`.


  ### Linked + no git remote → `vercel deploy`


  ```bash

  vercel deploy [path] -y --no-wait

  vercel inspect <deployment-url>

  ```


  Use `--no-wait` so the CLI returns immediately with the deployment URL.


  ### Not linked + CLI authenticated → Link first, then deploy


  Use `vercel link --repo --scope <team-slug>` if a git remote exists; otherwise plain `vercel link --scope <team-slug>`.


  ### Not linked + CLI not authenticated → Install, auth, link, deploy


  1. `npm install -g vercel`

  2. `vercel login`

  3. Link the project (with `--repo` if applicable)

  4. Deploy via the chosen method


  ### No-Auth Fallback — claude.ai sandbox


  ```bash

  bash /mnt/skills/user/deploy-to-vercel/resources/deploy.sh [path]

  ```


  Returns a Preview URL and a Claim URL. Tell the user: "Your deployment is ready at [previewUrl]. Claim it at [claimUrl] to manage your deployment."


  ### No-Auth Fallback — Codex sandbox


  Try the CLI first; if `vercel` is not installed or fails with "No existing credentials found", fall back to `deploy-codex.sh` from the skill''s installed location.


  ## Output


  Always show the user the deployment URL.

  - **Git push:** Use `vercel ls --format json` to find the preview URL.

  - **CLI deploy:** Show the URL returned by `vercel deploy --no-wait`. Use `vercel inspect <url>` to check build status.

  - **No-auth fallback:** Show both the preview URL and the claim URL.


  **Do not** curl or fetch the deployed URL to verify it works. Just return the link.


  ## Troubleshooting


  ### Network Egress Error (claude.ai)


  If deployment fails due to network restrictions, tell the user to add `*.vercel.com` to allowed domains at https://claude.ai/settings/capabilities.


  ### Escalated Network Access (Codex)


  If deployment fails due to network issues in a sandboxed environment, rerun with escalated permissions (`sandbox_permissions=require_escalated`). Do not escalate the initial CLI availability check — only the actual deploy command.


  ### CLI Auth Failure


  If `vercel login` or `vercel deploy` fails with authentication errors, fall back to the no-auth deploy script.'
