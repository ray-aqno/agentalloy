- sequence: 6
  fragment_type: example
  content: "### Linked + has git remote → Git Push (ideal)\n\n1. **Ask the user before pushing.** Never push without explicit approval:\n   ```\n   This project is connected to Vercel via git. I can commit and push to\n   trigger a deployment. Want me to proceed?\n   ```\n2. **Commit and push:**\n   ```bash\n   git add .\n   git commit -m \"deploy: <description of changes>\"\n   git push\n   ```\n   Vercel automatically builds from the push. Non-production branches get preview deployments; the production branch (usually `main`) gets a production deployment.\n3. **Retrieve the preview URL.** If the CLI is authenticated:\n   ```bash\n   sleep 5\n   vercel ls --format json\n   ```\n   The JSON output has a `deployments` array. Find the latest entry — its `url` field is the preview URL.\n\n   If the CLI is not authenticated, tell the user to check the Vercel dashboard or commit status checks."
- sequence: 7
  fragment_type: example
  content: '### Linked + no git remote → `vercel deploy`


    The project is linked but there''s no git repo. Deploy directly with the CLI.


    ```bash

    vercel deploy [path] -y --no-wait

    ```


    Use `--no-wait` so the CLI returns immediately with the deployment URL instead of blocking until the build finishes. Then check on status with:


    ```bash

    vercel inspect <deployment-url>

    ```


    For production deploys (only if user explicitly asks):

    ```bash

    vercel deploy [path] --prod -y --no-wait

    ```'
- sequence: 8
  fragment_type: example
  content: "### Not linked + CLI authenticated → Link first, then deploy\n\nThe CLI is working but the project isn't linked yet. This is the opportunity to get the user into the best state.\n\n1. **Ask the user which team to deploy to.**\n2. **If a git remote exists**, use repo-based linking:\n   ```bash\n   vercel link --repo --scope <team-slug>\n   ```\n   This reads the git remote URL and matches it to existing Vercel projects. Creates `.vercel/repo.json`. More reliable than `vercel link` (without `--repo`), which tries to match by directory name and often fails when the local folder and Vercel project are named differently.\n3. **If there is no git remote**, fall back to standard linking:\n   ```bash\n   vercel link --scope <team-slug>\n   ```\n   This prompts the user to select or create a project. Creates `.vercel/project.json`.\n4. **Then deploy** using git push (if remote) or `vercel deploy [path] -y --no-wait --scope <team-slug>`."
- sequence: 9
  fragment_type: example
  content: "### Not linked + CLI not authenticated → Install, auth, link, deploy\n\nThe Vercel CLI isn't set up at all.\n\n1. **Install the CLI:**\n   ```bash\n   npm install -g vercel\n   ```\n2. **Authenticate:**\n   ```bash\n   vercel login\n   ```\n   The user completes auth in their browser. If running in a non-interactive environment where login is not possible, skip to the no-auth fallback.\n3. **Ask which team to deploy to** — present team slugs from `vercel teams list --format json`.\n4. **Link the project:**\n   ```bash\n   vercel link --repo --scope <team-slug>   # if git remote exists\n   vercel link --scope <team-slug>          # if no git remote\n   ```\n5. **Deploy** using the best available method."
- sequence: 10
  fragment_type: example
  content: '### No-Auth Fallback — claude.ai sandbox


    **When to use:** Last resort when the CLI can''t be installed or authenticated in the claude.ai sandbox. Returns a Preview URL (live site) and a Claim URL (transfer to your Vercel account).


    ```bash

    bash /mnt/skills/user/deploy-to-vercel/resources/deploy.sh [path]

    ```


    **Examples:**

    ```bash

    # Deploy current directory

    bash /mnt/skills/user/deploy-to-vercel/resources/deploy.sh


    # Deploy existing tarball

    bash /mnt/skills/user/deploy-to-vercel/resources/deploy.sh /path/to/project.tgz

    ```


    The script auto-detects the framework from `package.json`, packages the project (excluding `node_modules`, `.git`, `.env`), uploads it, and waits for the build.


    **Tell the user:** "Your deployment is ready at [previewUrl]. Claim it at [claimUrl] to manage your deployment."'
- sequence: 11
  fragment_type: example
  content: "### No-Auth Fallback — Codex sandbox\n\n**When to use:** In the Codex sandbox where the CLI may not be authenticated. Try the CLI first, fall back to the deploy script if auth fails.\n\n1. **Check whether the Vercel CLI is installed:**\n   ```bash\n   command -v vercel\n   ```\n2. **If installed**, try:\n   ```bash\n   vercel deploy [path] -y --no-wait\n   ```\n3. **If not installed, or CLI fails with \"No existing credentials found\"**:\n   ```bash\n   skill_dir=\"<path-to-skill>\"\n   bash \"$skill_dir/resources/deploy-codex.sh\" [path]\n   ```\n\n**Escalated network access:** Only escalate the actual deploy command if sandboxing blocks the network call (`sandbox_permissions=require_escalated`). Do **not** escalate the `command -v vercel` check."
- sequence: 12
  fragment_type: setup
  content: '## Agent-Specific Notes


    ### Claude Code / terminal-based agents

    Full shell access. Do NOT use the `/mnt/skills/` path. Follow the decision flow above using the CLI directly.


    ### Sandboxed environments (claude.ai)

    You likely cannot run `vercel login` or `git push`. Go directly to the no-auth fallback — claude.ai sandbox.


    ### Codex

    Codex runs in a sandbox. Check if the CLI is available first, then fall back to the deploy script.'
