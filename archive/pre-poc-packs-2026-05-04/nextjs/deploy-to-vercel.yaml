  fragment_type: execution
  content: "## Output\n\nAlways show the user the deployment URL.\n\n- **Git push:** Use `vercel ls --format json` to find the preview URL. If the CLI isn't authenticated, tell the user to check the Vercel dashboard.\n- **CLI deploy:** Show the URL returned by `vercel deploy --no-wait`. Use `vercel inspect <url>` to check build status and report it.\n- **No-auth fallback:** Show both the preview URL and the claim URL:\n  ```\n  Deployment successful!\n\n  Preview URL: https://my-app-abc123.vercel.app\n  Claim URL:   https://vercel.com/claim-deployment?code=...\n\n  View your site at the Preview URL.\n  To transfer this deployment to your Vercel account, visit the Claim URL.\n  ```\n\n**Do not** curl or fetch the deployed URL to verify it works. Just return the link."
- sequence: 14
  fragment_type: guardrail
  content: '## Troubleshooting


    ### Network Egress Error (claude.ai)

    If deployment fails due to network restrictions, tell the user:

    ```

    Deployment failed due to network restrictions. To fix this:

    1. Go to https://claude.ai/settings/capabilities

    2. Add *.vercel.com to the allowed domains

    3. Try deploying again

    ```


    ### Escalated Network Access (Codex)

    If deployment fails due to network issues (timeouts, DNS errors, connection resets) in a sandboxed environment, rerun with escalated permissions (`sandbox_permissions=require_escalated`). Do not escalate the initial CLI availability check — only the actual deploy command.


    ### CLI Auth Failure

    If `vercel login` or `vercel deploy` fails with authentication errors, fall back to the no-auth deploy script (claude.ai or Codex variant, depending on the environment).'
