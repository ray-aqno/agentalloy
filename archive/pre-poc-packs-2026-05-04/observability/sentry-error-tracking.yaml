raw_prose: |
  # Sentry Error Tracking

  ## Overview

  Sentry catches unhandled exceptions, ties them to a release + git SHA + source map, groups them by stack-trace fingerprint, and surfaces them in a queryable dashboard. Complementary to OpenTelemetry: OTel measures *what's slow*, Sentry surfaces *what's broken*.

  Three breaking changes since v7 to be aware of (verified 2026-04-28):

  - **v7 → v8+:** "Transactions" renamed to "Spans". `Sentry.startSpan` is the new API; `Sentry.startTransaction` still works but is deprecated.
  - **Source-map upload:** `npx @sentry/wizard@latest -i sourcemaps` is the recommended path; the older `sentry-cli releases files upload-sourcemaps` still works but is being phased out.
  - **Profiling SDK** is now a separate opt-in integration (`@sentry/profiling-node`), not bundled.

  ## When to use

  - Setting up a new Node.js / Next.js / React app for error tracking.
  - Migrating an app from Sentry v7 to v8/v10 SDK.
  - Diagnosing why source maps don't show in stack traces.
  - Adding PII redaction before shipping a public surface.

  ## Authoritative sources (verified 2026-04-28)

  - Sentry JS SDK: https://docs.sentry.io/platforms/javascript/
  - Migration v7 → v8+: https://github.com/getsentry/sentry-javascript/blob/master/MIGRATION.md
  - Source-map upload: https://docs.sentry.io/platforms/javascript/sourcemaps/uploading/
  - PII / data scrubbing: https://docs.sentry.io/platforms/javascript/data-management/sensitive-data/

