- sequence: 5
  fragment_type: example
  content: '## Quick Start


    ### Create a New Project


    ```bash

    # Create new project with virtual environment

    uv init my-project

    cd my-project


    # Or create in current directory

    uv init .


    # Initialize creates:

    # - .python-version (Python version)

    # - pyproject.toml (project config)

    # - README.md

    # - .gitignore

    ```


    ### Install Dependencies


    ```bash

    # Install packages (creates venv if needed)

    uv add requests pandas


    # Install dev dependencies

    uv add --dev pytest black ruff


    # Install from requirements.txt

    uv pip install -r requirements.txt


    # Install from pyproject.toml

    uv sync

    ```'
- sequence: 6
  fragment_type: execution
  content: '## Virtual Environment Management


    ### Pattern 1: Creating Virtual Environments


    ```bash

    # Create virtual environment with uv

    uv venv


    # Create with specific Python version

    uv venv --python 3.12


    # Create with custom name

    uv venv my-env


    # Create with system site packages

    uv venv --system-site-packages


    # Specify location

    uv venv /path/to/venv

    ```


    ### Pattern 2: Activating Virtual Environments


    ```bash

    # Linux/macOS

    source .venv/bin/activate


    # Windows (Command Prompt)

    .venv\Scripts\activate.bat


    # Windows (PowerShell)

    .venv\Scripts\Activate.ps1


    # Or use uv run (no activation needed)

    uv run python script.py

    uv run pytest

    ```


    ### Pattern 3: Using uv run


    ```bash

    # Run Python script (auto-activates venv)

    uv run python app.py


    # Run installed CLI tool

    uv run black .

    uv run pytest


    # Run with specific Python version

    uv run --python 3.11 python script.py


    # Pass arguments

    uv run python script.py --arg value

    ```'
- sequence: 7
  fragment_type: execution
  content: '## Package Management


    ### Pattern 4: Adding Dependencies


    ```bash

    # Add package (adds to pyproject.toml)

    uv add requests


    # Add with version constraint

    uv add "django>=4.0,<5.0"


    # Add multiple packages

    uv add numpy pandas matplotlib


    # Add dev dependency

    uv add --dev pytest pytest-cov


    # Add optional dependency group

    uv add --optional docs sphinx


    # Add from git

    uv add git+https://github.com/user/repo.git


    # Add from git with specific ref

    uv add git+https://github.com/user/repo.git@v1.0.0


    # Add from local path

    uv add ./local-package


    # Add editable local package

    uv add -e ./local-package

    ```


    ### Pattern 5: Removing Dependencies


    ```bash

    # Remove package

    uv remove requests


    # Remove dev dependency

    uv remove --dev pytest


    # Remove multiple packages

    uv remove numpy pandas matplotlib

    ```


    ### Pattern 6: Upgrading Dependencies


    ```bash

    # Upgrade specific package

    uv add --upgrade requests


    # Upgrade all packages

    uv sync --upgrade


    # Upgrade package to latest

    uv add --upgrade requests


    # Show what would be upgraded

    uv tree --outdated

    ```


    ### Pattern 7: Locking Dependencies


    ```bash

    # Generate uv.lock file

    uv lock


    # Update lock file

    uv lock --upgrade


    # Lock without installing

    uv lock --no-install


    # Lock specific package

    uv lock --upgrade-package requests

    ```'
- sequence: 8
  fragment_type: execution
  content: '## Python Version Management


    ### Pattern 8: Installing Python Versions


    ```bash

    # Install Python version

    uv python install 3.12


    # Install multiple versions

    uv python install 3.11 3.12 3.13


    # Install latest version

    uv python install


    # List installed versions

    uv python list


    # Find available versions

    uv python list --all-versions

    ```


    ### Pattern 9: Setting Python Version


    ```bash

    # Set Python version for project

    uv python pin 3.12


    # This creates/updates .python-version file


    # Use specific Python version for command

    uv --python 3.11 run python script.py


    # Create venv with specific version

    uv venv --python 3.12

    ```'
