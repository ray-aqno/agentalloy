- sequence: 10
  fragment_type: guardrail
  content: '## Best Practices


    1. **Use source layout** — `src/package_name/` prevents accidental imports

    2. **Use pyproject.toml** — Single source of configuration (PEP 621)

    3. **Pin dependency ranges** — `>=2.28.0,<3.0.0` not `==2.28.0`

    4. **Include py.typed marker** — For type hint support in consumers

    5. **Test on TestPyPI first** — Before publishing to production PyPI

    6. **Use API tokens** — Never use password auth for PyPI

    7. **Automate publishing** — GitHub Actions triggered on release creation

    8. **Include classifiers** — Help users find your package on PyPI

    9. **Separate dev dependencies** — Use `[project.optional-dependencies]`

    10. **Dynamic versioning** — Use setuptools-scm for git-tag-based versions'
