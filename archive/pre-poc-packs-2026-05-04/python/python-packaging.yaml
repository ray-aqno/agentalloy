  content: '# Python Packaging


    Comprehensive guide to creating, structuring, and distributing Python packages using modern packaging tools, pyproject.toml, and publishing to PyPI.


    ## Core Concepts


    1. **Package Structure** — Source layout (`src/package_name/`) is recommended. Flat layout is simpler but less flexible. Distribution formats: wheel (.whl) and sdist (.tar.gz).

    2. **Modern Standards** — PEP 517/518 (build system), PEP 621 (metadata in pyproject.toml), PEP 660 (editable installs).

    3. **Build Backends** — setuptools (traditional), hatchling (modern), flit (lightweight pure Python), poetry (deps + packaging).

    4. **Distribution** — PyPI (public), TestPyPI (testing), private repositories (JFrog, AWS CodeArtifact).'
