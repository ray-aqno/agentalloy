- sequence: 6
  fragment_type: execution
  content: '## Pattern 5: Dynamic Versioning


    Use `dynamic = ["version"]` in `[project]` with either `[tool.setuptools.dynamic] version = {attr = "my_package.__version__"}` or `setuptools-scm` for git-tag-based versioning. With setuptools-scm, add `[tool.setuptools_scm] write_to = "src/my_package/_version.py"` and use `importlib.metadata.version("my-package")` in `__init__.py`.


    ## Pattern 6: CLI with Click


    Define a `@click.group()` with `@click.version_option()`, add commands with `@cli.command()`, and register the entry point via `[project.scripts]` in pyproject.toml.


    ## Pattern 7: CLI with argparse


    Use `argparse.ArgumentParser` with `subparsers` for subcommands. Register via `[project.scripts]` in pyproject.toml. Use `sys.exit(1)` for unknown commands.'
- sequence: 7
  fragment_type: example
  content: "## CLI with Click Example (Pattern 6)\n\n```python\nimport click\n\n@click.group()\n@click.version_option()\ndef cli():\n    \"\"\"My awesome CLI tool.\"\"\"\n    pass\n\n@cli.command()\n@click.argument(\"name\")\n@click.option(\"--greeting\", default=\"Hello\", help=\"Greeting to use\")\ndef greet(name: str, greeting: str):\n    click.echo(f\"{greeting}, {name}!\")\n\ndef main():\n    cli()\n```\n\nRegister: `[project.scripts] my-tool = \"my_package.cli:main\"`\n\n```bash\npip install -e .\nmy-tool greet World\nmy-tool greet Alice --greeting=\"Hi\"\n```"
- sequence: 8
  fragment_type: execution
  content: '## Pattern 8: Build Package Locally


    Install `build` and `twine`, then run `python -m build` to create both sdist (.tar.gz) and wheel (.whl) in `dist/`. Use `twine check dist/*` to validate.


    ## Pattern 9: Publishing to PyPI


    First test on TestPyPI: `twine upload --repository testpypi dist/*`. Install from TestPyPI to verify. Then publish to PyPI: `twine upload dist/*`. Use API tokens via `~/.pypirc` with `username = __token__` — never use password auth.


    ## Pattern 10: Automated Publishing with GitHub Actions


    Trigger on `release: types: [created]`. Steps: checkout, setup Python, install build+twine, `python -m build`, `twine check dist/*`, `twine upload dist/*` with `TWINE_PASSWORD` from GitHub secrets.'
