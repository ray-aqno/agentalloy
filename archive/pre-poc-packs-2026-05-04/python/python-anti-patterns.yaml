- sequence: 6
  fragment_type: execution
  content: '## Error Handling Anti-Patterns


    ### Bare Exception Handling

    BAD: `except Exception: pass` swallows all exceptions — bugs hidden forever. Fix: Catch specific exceptions. Log or handle appropriately.


    ### Ignored Partial Failures

    BAD: Batch processing stops on first error. Fix: Capture both successes and failures in a `BatchResult` with separate dictionaries for succeeded and failed items.


    ### Missing Input Validation

    BAD: No validation before creating domain objects. Fix: Validate early at API boundaries using Pydantic''s `model_validate`.


    ## Resource Anti-Patterns


    ### Unclosed Resources

    BAD: Opening files without context managers. Fix: Always use `with` statements for files, connections, and other resources.


    ### Blocking in Async

    BAD: Using `time.sleep()` or `requests.get()` in async functions. Fix: Use async-native libraries (`asyncio.sleep`, `httpx.AsyncClient`).'
