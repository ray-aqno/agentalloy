  content: '# Python Anti-Patterns Checklist


    A reference checklist of common mistakes and anti-patterns in Python code. Review this before finalizing implementations to catch issues early.


    ## When to Use This Skill


    - Reviewing code before merge

    - Debugging mysterious issues

    - Teaching or learning Python best practices

    - Establishing team coding standards

    - Refactoring legacy code


    **Note:** This skill focuses on what to avoid. For guidance on positive patterns and architecture, see the `python-design-patterns` skill.'
- sequence: 2
  fragment_type: execution
  content: '## Infrastructure Anti-Patterns


    ### Scattered Timeout/Retry Logic

    BAD: Timeout logic duplicated everywhere across functions. Fix: Centralize in decorators or client wrappers using tenacity `@retry` with `stop_after_attempt` and `wait_exponential`.


    ### Double Retry

    BAD: Retrying at multiple layers (application retry + client retry). Fix: Retry at one layer only. Know your infrastructure''s retry behavior.


    ### Hard-Coded Configuration

    BAD: Secrets and config values in code. Fix: Use environment variables with typed settings via `pydantic_settings.BaseSettings`.'
