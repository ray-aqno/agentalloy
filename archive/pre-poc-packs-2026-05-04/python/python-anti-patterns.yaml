  fragment_type: execution
  content: '## Architecture Anti-Patterns


    ### Exposed Internal Types

    BAD: Leaking ORM model to API layer. Fix: Use DTOs/response models. Never return SQLAlchemy models or protobufs directly from API endpoints.


    ### Mixed I/O and Business Logic

    BAD: SQL queries embedded in business logic functions. Fix: Repository pattern. Keep business logic pure — accept data as parameters, return results. This makes functions easily testable without mocking databases.'
