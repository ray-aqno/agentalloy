  content: '## Pattern 1: Annotate All Public Signatures


    Every public function, method, and class should have type annotations.


    Use `mypy --strict` or `pyright` in CI to catch type errors early. For existing projects, enable strict mode incrementally using per-module overrides.


    ## Pattern 2: Use Modern Union Syntax


    Python 3.10+ provides cleaner union syntax. Use `T | None` instead of `Optional[T]`. The older `Optional`/`Union` style is still valid for Python 3.9 compatibility.


    ## Pattern 3: Type Narrowing with Guards


    Use conditionals to narrow types for the type checker. After an `if user is None` guard, the type checker knows the else branch has a non-None type. List comprehension filters with `is not None` also narrow element types.'
