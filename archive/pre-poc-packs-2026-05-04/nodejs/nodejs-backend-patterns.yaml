- sequence: 1
  fragment_type: rationale
  content: '# Node.js Backend Patterns


    Build production-ready Node.js backends with Express or Fastify, covering project structure, middleware patterns, error handling, validation, authentication, and database patterns.


    ## Core Concepts


    1. **Layered Architecture** — Controller (HTTP), Service (business logic), Repository (data access)

    2. **Middleware Pipeline** — Logging → Auth → Validation → Rate Limiting → Handler → Error Handler

    3. **Dependency Injection** — Constructor injection for testability

    4. **Error Handling** — Custom error classes with status codes, centralized error middleware'
- sequence: 2
  fragment_type: setup
  content: '## When to Use This Skill


    - Building REST APIs with Express or Fastify

    - Setting up backend project structure

    - Implementing middleware (auth, validation, rate limiting, logging)

    - Error handling strategies for Node.js backends

    - Database patterns (connection pooling, transactions)

    - Authentication and authorization (JWT)

    - Caching strategies with Redis'
- sequence: 3
  fragment_type: execution
  content: '## Pattern 1-2: Application Setup


    Express: Use `helmet()` for security headers, `cors()` with explicit allowed origins (never `*` in production), `compression()`, and `express.json()` with size limits. Fastify: Use `@fastify/cors`, `@fastify/helmet`, and built-in `logger: true`.


    ## Pattern 3: Layered Architecture


    Controller handles HTTP: parse request params, call service, format response with DTOs. Service handles business logic: caching, validation rules, orchestrating multiple repositories. Repository handles data: raw SQL or ORM queries against connection pool.


    ## Pattern 4: Dependency Injection Container


    Register services with factory functions. Resolve dependencies by name. Build dependency graph at startup — controllers depend on services, services depend on repositories, repositories depend on the connection pool.'
