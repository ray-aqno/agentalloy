- sequence: 8
  fragment_type: guardrail
  content: '## Best Practices


    1. **Use TypeScript** — Type safety prevents runtime errors

    2. **Implement proper error handling** — Custom error classes with status codes

    3. **Validate input** — Zod or Joi at API boundaries

    4. **Use environment variables** — Never hardcode secrets

    5. **Structured logging** — Pino or Winston with JSON output

    6. **Rate limiting** — Prevent abuse with Redis-backed limits

    7. **Use HTTPS** — Always in production

    8. **Implement CORS properly** — Don''t use `*` in production

    9. **Dependency injection** — Constructor injection for testability

    10. **Connection pooling** — For all database connections

    11. **Graceful shutdown** — Clean up connections and pending requests

    12. **Health checks** — Endpoint for monitoring

    13. **Compression** — Reduce response payload size

    14. **Monitor performance** — APM tooling for production'
