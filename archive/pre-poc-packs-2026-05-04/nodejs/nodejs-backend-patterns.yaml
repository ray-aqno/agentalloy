  fragment_type: example
  content: "## Layered Architecture Example (Pattern 3)\n\n```typescript\nclass UserController {\n  constructor(private userService: UserService) {}\n  async getUser(req: Request, res: Response) {\n    const user = await this.userService.findById(req.params.id);\n    if (!user) return res.status(404).json({ error: \"User not found\" });\n    res.json(UserDTO.fromEntity(user));\n  }\n}\n\nclass UserService {\n  constructor(private userRepo: UserRepository, private cache: CacheService) {}\n  async findById(id: string): Promise<User | null> {\n    const cached = await this.cache.get(`user:${id}`);\n    if (cached) return cached;\n    const user = await this.userRepo.findById(id);\n    if (user) await this.cache.set(`user:${id}`, user, 300);\n    return user;\n  }\n}\n\nclass UserRepository {\n  constructor(private db: Pool) {}\n  async findById(id: string): Promise<User | null> {\n    const result = await this.db.query(\"SELECT * FROM users WHERE id = $1\", [id]);\n    return result.rows[0] ?? null;\n  }\n}\n```"
- sequence: 5
  fragment_type: execution
  content: '## Pattern 5: Authentication Middleware (JWT)


    Extract Bearer token from `Authorization` header. Verify with `jwt.verify()` and attach decoded user to request. Compose with role-based `authorize(...roles)` middleware that checks `req.user.role`. Stack as: `authenticate, authorize("admin"), handler`.


    ## Pattern 6: Input Validation with Zod


    Define schemas with `z.object()`. Create a `validate(schema)` middleware factory that calls `schema.safeParse(req.body)`. Return 400 with `error.flatten().fieldErrors` on failure. Assign validated `result.data` back to `req.body`.


    ## Pattern 7: Rate Limiting


    Use `express-rate-limit` with Redis store for distributed setups. Configure `windowMs`, `max`, `standardHeaders: true`. Apply per-route or globally.


    ## Pattern 8: Structured Logging


    Use Pino for JSON logging. Generate `requestId` (UUID) per request. Log on `res.finish` event with method, URL, statusCode, and duration.'
