be slow\n\n// GOOD: Use shared memory or files for large data\nconst shm = createSharedArrayBuffer(size);\nchild.send({ shmName: shm.name });\n```\n\n### Zombie Processes\n\n```javascript\n// Always handle child exit\nchild.on('exit', () => {\n  // Cleanup\n});\n\n// Or with spawn options\nspawn('cmd', args, {\n  detached: true,\n  stdio: 'ignore'\n}).unref();  // Won't keep parent alive\n```"
